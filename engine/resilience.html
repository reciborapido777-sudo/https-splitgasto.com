<!DOCTYPE html>
<html lang="es" style="background-color: #000 !important;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nodo No Encontrado | SplitGasto 2026</title>
    <link rel="stylesheet" href="../engine/global.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        html, body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        .glass-panel { background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); }
        .text-gradient-cyan { background: linear-gradient(135deg,#13ecd6,#10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; padding-right: 0.4em; }
        .reveal-node { animation: revealUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
        @keyframes revealUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="text-center space-y-10 max-w-sm w-full reveal-node">
        <div class="flex flex-col items-center gap-5">
            <div class="size-24 glass-panel rounded-[2rem] flex items-center justify-center border border-red-500/20">
                <span class="material-icons-round text-red-400 text-5xl">link_off</span>
            </div>
            <div class="space-y-2">
                <p class="text-[9px] font-black text-zinc-600 uppercase tracking-[0.5em]">Error de Nodo</p>
                <h1 class="text-6xl font-black font-['Space_Grotesk'] tracking-tighter italic text-gradient-cyan">404</h1>
                <p class="text-sm font-bold text-zinc-500 uppercase tracking-wide">Ruta no encontrada en la red</p>
            </div>
        </div>
        <div class="glass-panel p-7 rounded-[2rem] space-y-4">
            <p class="text-[10px] text-zinc-600 uppercase tracking-widest font-black">El nodo solicitado no existe o fue eliminado del protocolo.</p>
            <div class="flex flex-col gap-3 pt-2">
                <button onclick="window.location.href='../dashboard.html'" 
                        class="w-full py-5 bg-white text-black rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-[#13ecd6] transition-all active:scale-95">
                    Volver al Mando
                </button>
                <button onclick="window.history.back()" 
                        class="w-full py-4 glass-panel rounded-2xl font-black text-xs uppercase tracking-widest text-zinc-500 hover:text-white transition-all">
                    Retroceder
                </button>
            </div>
        </div>
        <p class="text-[8px] font-black text-zinc-800 uppercase tracking-[0.5em]">SplitGasto 2026 · Sistema de Resiliencia</p>
    </div>
    <script>
        window.addEventListener('pageshow', () => {
            document.body.style.opacity = '1';
            document.body.style.filter = 'none';
        });
    </script>
</body>
</html>
