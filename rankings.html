<!DOCTYPE html>
<html lang="es" style="background-color:#0a0a0a">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Rankings Alpha | SplitGasto 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link rel="stylesheet" href="engine/global.css"/>
<style>
  :root { --cyan:#13ecd6; --purple:#a855f7; --orange:#FF9D42; --gold:#D4AF37; }
  * { font-family:'Manrope',sans-serif; box-sizing:border-box; }
  body { background:#0a0a0a; min-height:100dvh; }

  .glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; }

  /* Podium */
  .podium-block {
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    border-radius:16px 16px 0 0;
    position:relative;
    transition:all 0.3s;
  }
  .podium-block:hover { filter:brightness(1.1); }

  /* Medal badges */
  .medal-1 { background:linear-gradient(135deg,#ffd700,#b8860b); }
  .medal-2 { background:linear-gradient(135deg,#c0c0c0,#808080); }
  .medal-3 { background:linear-gradient(135deg,#cd7f32,#8b4513); }

  /* Rank row */
  .rank-row {
    display:flex; align-items:center; gap:12px;
    padding:14px 16px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.06);
    background:rgba(255,255,255,0.03);
    transition:all 0.2s;
    cursor:pointer;
  }
  .rank-row:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.12); }
  .rank-row.me { border-color:rgba(19,236,214,0.3); background:rgba(19,236,214,0.06); }

  /* Achievement badges */
  .achievement {
    display:flex; align-items:center; gap:10px;
    padding:14px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.06);
    background:rgba(255,255,255,0.03);
  }
  .achievement.unlocked { border-color:rgba(212,175,55,0.3); background:rgba(212,175,55,0.06); }
  .achievement.locked { opacity:0.4; }

  /* Progress bar */
  .xp-bar {
    height:8px; border-radius:50px;
    background:rgba(255,255,255,0.07);
    overflow:hidden;
  }
  .xp-fill {
    height:100%; border-radius:50px;
    background:linear-gradient(90deg, var(--cyan), var(--purple));
    transition:width 1s ease;
  }

  /* Tab switcher */
  .tab-btn { flex:1; text-align:center; padding:10px; border-radius:12px; font-size:0.8rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .tab-btn.active { background:rgba(19,236,214,0.15); color:var(--cyan); }
  .tab-btn:not(.active) { color:rgba(255,255,255,0.4); }

  @keyframes count-up { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  .count-up { animation:count-up 0.5s ease forwards; }

  .bottom-nav { background:rgba(10,10,10,0.95); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.06); }
</style>
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#13ecd6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SplitGasto">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body class="text-white pb-32">

<!-- Header -->
<header class="flex justify-between items-center px-5 py-4 sticky top-0 z-50" style="background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05)">
  <button onclick="SGRouter.back()" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:rgba(255,255,255,0.07)">
    <span class="material-icons-round" style="color:var(--cyan)">arrow_back_ios_new</span>
  </button>
  <div class="text-center">
    <h1 class="font-bold text-base">Rankings Alpha</h1>
    <p class="text-xs opacity-50">Clasificación Global</p>
  </div>
  <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.2)">
    <span class="material-icons-round text-sm" style="color:var(--gold)">emoji_events</span>
  </div>
</header>

<main class="max-w-md mx-auto px-4 pt-6 space-y-6">

  <!-- My position card -->
  <div class="glass p-5" style="border-color:rgba(19,236,214,0.2)">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-base" style="background:rgba(19,236,214,0.15);color:var(--cyan)">C</div>
        <div>
          <p class="font-black">Commander</p>
          <p class="text-xs" style="color:var(--cyan)">Socio Fundador · Nivel 12</p>
        </div>
      </div>
      <div class="text-right">
        <p class="text-2xl font-black" style="color:var(--cyan)">#7</p>
        <p class="text-xs opacity-40">Global</p>
      </div>
    </div>
    <div class="space-y-2">
      <div class="flex justify-between text-xs">
        <span class="opacity-40">Experiencia: 8.420 / 10.000 XP</span>
        <span style="color:var(--cyan)">84%</span>
      </div>
      <div class="xp-bar">
        <div class="xp-fill" style="width:84%"></div>
      </div>
      <p class="text-xs opacity-40">1.580 XP para el siguiente nivel</p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex p-1 rounded-xl" style="background:rgba(255,255,255,0.04)">
    <div class="tab-btn active" onclick="switchTab(this,'global')">Global</div>
    <div class="tab-btn" onclick="switchTab(this,'weekly')">Semanal</div>
    <div class="tab-btn" onclick="switchTab(this,'group')">Mi Grupo</div>
    <div class="tab-btn" onclick="switchTab(this,'achievements')">Logros</div>
  </div>

  <!-- Podium (top 3) -->
  <div id="podium-section">
    <div class="flex items-end justify-center gap-4 h-40 px-4">
      <!-- 2nd place -->
      <div class="flex flex-col items-center gap-2">
        <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm" style="background:rgba(168,85,247,0.2);color:#a855f7">M</div>
        <p class="text-xs font-bold">Mario</p>
        <div class="podium-block w-20 h-24" style="background:linear-gradient(180deg,rgba(168,85,247,0.2),rgba(168,85,247,0.1))">
          <div class="medal-2 w-8 h-8 rounded-full flex items-center justify-center text-white font-black text-sm absolute -top-4 left-1/2 -translate-x-1/2">2</div>
          <p class="text-xs font-bold pb-3" style="color:#a855f7">7.890 XP</p>
        </div>
      </div>
      <!-- 1st place -->
      <div class="flex flex-col items-center gap-2">
        <div class="w-12 h-12 rounded-full flex items-center justify-center font-bold" style="background:rgba(212,175,55,0.2);color:var(--gold)">🏆</div>
        <p class="text-xs font-bold" style="color:var(--gold)">AlphaDev</p>
        <div class="podium-block w-24 h-32" style="background:linear-gradient(180deg,rgba(212,175,55,0.25),rgba(212,175,55,0.1))">
          <div class="medal-1 w-10 h-10 rounded-full flex items-center justify-center text-white font-black absolute -top-5 left-1/2 -translate-x-1/2">1</div>
          <p class="text-xs font-bold pb-3" style="color:var(--gold)">12.450 XP</p>
        </div>
      </div>
      <!-- 3rd place -->
      <div class="flex flex-col items-center gap-2">
        <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm" style="background:rgba(255,157,66,0.2);color:var(--orange)">E</div>
        <p class="text-xs font-bold">Elena</p>
        <div class="podium-block w-20 h-20" style="background:linear-gradient(180deg,rgba(255,157,66,0.2),rgba(255,157,66,0.1))">
          <div class="medal-3 w-8 h-8 rounded-full flex items-center justify-center text-white font-black text-sm absolute -top-4 left-1/2 -translate-x-1/2">3</div>
          <p class="text-xs font-bold pb-3" style="color:var(--orange)">6.210 XP</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Ranking list -->
  <div id="ranking-list" class="space-y-2">
    <!-- rendered by JS -->
  </div>

  <!-- Achievements tab content (hidden) -->
  <div id="achievements-section" class="hidden space-y-3">
    <!-- rendered by JS -->
  </div>

</main>

<!-- Bottom Nav -->
<nav class="bottom-nav fixed bottom-0 left-0 right-0 flex justify-around items-center px-4 py-3 pb-6">
  <button onclick="SGRouter.navigate('dashboard')" class="flex flex-col items-center gap-1 opacity-40">
    <span class="material-icons-round text-xl">home</span>
    <span class="text-[10px]">Inicio</span>
  </button>
  <button onclick="SGRouter.navigate('activity')" class="flex flex-col items-center gap-1 opacity-40">
    <span class="material-icons-round text-xl">timeline</span>
    <span class="text-[10px]">Actividad</span>
  </button>
  <button class="flex flex-col items-center gap-1" style="color:var(--gold)">
    <span class="material-icons-round text-xl">emoji_events</span>
    <span class="text-[10px]">Rankings</span>
  </button>
  <button onclick="SGRouter.navigate('analytics')" class="flex flex-col items-center gap-1 opacity-40">
    <span class="material-icons-round text-xl">bar_chart</span>
    <span class="text-[10px]">Métricas</span>
  </button>
  <button onclick="SGRouter.navigate('profile')" class="flex flex-col items-center gap-1 opacity-40">
    <span class="material-icons-round text-xl">person</span>
    <span class="text-[10px]">Perfil</span>
  </button>
</nav>

<script src="engine/router.js"></script>
<script>
const rankingData = {
  global: [
    {rank:4, name:'CryptoKing', xp:5840, level:9, color:'#3b82f6', badge:'🔵'},
    {rank:5, name:'Zsolt V.', xp:5120, level:8, color:'#22c55e', badge:'🟢'},
    {rank:6, name:'Luna M.', xp:4780, level:8, color:'#ec4899', badge:'🌸'},
    {rank:7, name:'Commander', xp:4200, level:7, color:'#13ecd6', badge:'⚡', isMe:true},
    {rank:8, name:'Rafa P.', xp:3920, level:7, color:'#f59e0b', badge:'🟡'},
    {rank:9, name:'Ana C.', xp:3450, level:6, color:'#a855f7', badge:'💜'},
    {rank:10, name:'David K.', xp:3100, level:6, color:'#ef4444', badge:'🔴'},
  ],
  weekly: [
    {rank:1, name:'Commander', xp:840, level:12, color:'#13ecd6', badge:'⚡', isMe:true},
    {rank:2, name:'Mario', xp:720, level:10, color:'#a855f7', badge:'💜'},
    {rank:3, name:'Elena', xp:640, level:9, color:'#FF9D42', badge:'🟠'},
    {rank:4, name:'Luna M.', xp:580, level:8, color:'#ec4899', badge:'🌸'},
    {rank:5, name:'Zsolt V.', xp:510, level:7, color:'#22c55e', badge:'🟢'},
  ],
  group: [
    {rank:1, name:'Commander', xp:4200, level:12, color:'#13ecd6', badge:'⚡', isMe:true},
    {rank:2, name:'Mario', xp:3100, level:8, color:'#a855f7', badge:'💜'},
    {rank:3, name:'Elena', xp:2840, level:7, color:'#FF9D42', badge:'🟠'},
    {rank:4, name:'Sofia', xp:1920, level:5, color:'#ec4899', badge:'🌸'},
  ]
};

const achievements = [
  {icon:'🏆', title:'Primer Pago', desc:'Registra tu primer gasto', xp:100, unlocked:true},
  {icon:'👥', title:'Socio Fundador', desc:'Únete en la fase Alpha', xp:500, unlocked:true},
  {icon:'⚡', title:'Scanner Pro', desc:'Escanea 10 tickets con IA', xp:200, unlocked:true},
  {icon:'🎯', title:'Precisión Alpha', desc:'5 liquidaciones exactas al céntimo', xp:300, unlocked:true},
  {icon:'🌍', title:'Viajero Global', desc:'Gasta en 3 monedas distintas', xp:400, unlocked:false},
  {icon:'🎰', title:'Ruleta Master', desc:'Gana 10 partidas de ruleta', xp:250, unlocked:false},
  {icon:'💎', title:'Élite Total', desc:'Alcanza el nivel 20', xp:1000, unlocked:false},
  {icon:'🔐', title:'Bóveda Sagrada', desc:'100 tickets en la bóveda', xp:350, unlocked:false},
];

let currentTab = 'global';

function switchTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = tab;

  const podium = document.getElementById('podium-section');
  const rankList = document.getElementById('ranking-list');
  const achSection = document.getElementById('achievements-section');

  if (tab === 'achievements') {
    podium.style.display = 'none';
    rankList.classList.add('hidden');
    achSection.classList.remove('hidden');
    renderAchievements();
  } else {
    podium.style.display = '';
    rankList.classList.remove('hidden');
    achSection.classList.add('hidden');
    renderRanking(tab);
  }
}

function renderRanking(tab) {
  const data = rankingData[tab] || rankingData.global;
  const list = document.getElementById('ranking-list');
  list.innerHTML = data.map(p => `
    <div class="rank-row ${p.isMe?'me':''}" onclick="SGRouter.showToast('Ver perfil: ${p.name}','info')">
      <div class="text-sm font-black w-6 text-center ${p.rank<=3?'':'opacity-40'}" style="color:${p.rank===1?'var(--gold)':p.rank===2?'#c0c0c0':p.rank===3?'#cd7f32':''}">
        ${p.rank <= 3 ? ['🥇','🥈','🥉'][p.rank-1] : '#'+p.rank}
      </div>
      <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm" style="background:${p.color}22;color:${p.color}">${p.name[0]}</div>
      <div class="flex-1">
        <p class="text-sm font-bold">${p.name}${p.isMe?' <span class="text-xs" style="color:var(--cyan)">(tú)</span>':''}</p>
        <p class="text-xs opacity-40">Nivel ${p.level}</p>
      </div>
      <div class="text-right">
        <p class="text-sm font-bold" style="color:${p.color}">${p.xp.toLocaleString('es-ES')} XP</p>
        <p class="text-xs opacity-30">${p.badge}</p>
      </div>
    </div>`).join('');
}

function renderAchievements() {
  const sec = document.getElementById('achievements-section');
  const unlocked = achievements.filter(a => a.unlocked).length;
  sec.innerHTML = `
    <div class="glass p-4 flex items-center justify-between mb-2">
      <div>
        <p class="font-bold">Progreso de Logros</p>
        <p class="text-xs opacity-40">${unlocked} de ${achievements.length} desbloqueados</p>
      </div>
      <div class="text-2xl font-black" style="color:var(--gold)">${unlocked}/${achievements.length}</div>
    </div>
    ${achievements.map(a => `
    <div class="achievement ${a.unlocked?'unlocked':'locked'}">
      <div class="text-2xl w-10 text-center">${a.icon}</div>
      <div class="flex-1">
        <p class="text-sm font-bold">${a.title}</p>
        <p class="text-xs opacity-50">${a.desc}</p>
      </div>
      <div class="text-right">
        <p class="text-xs font-bold" style="color:${a.unlocked?'var(--gold)':'rgba(255,255,255,0.3)'}">+${a.xp} XP</p>
        <span class="material-icons-round text-sm" style="color:${a.unlocked?'var(--gold)':'rgba(255,255,255,0.2)'}">${a.unlocked?'check_circle':'lock'}</span>
      </div>
    </div>`).join('')}`;
}

// Init
renderRanking('global');
</script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
                    .then(r => {
                        r.update(); // Force SW update check
                        console.log('[SW] Registered:', r.scope);
                    })
                    .catch(e => console.warn('[SW] Failed:', e));
            });
        }
    </script>
</body>
</html>
