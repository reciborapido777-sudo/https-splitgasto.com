<!DOCTYPE html>
<html lang="es" style="background-color:#0a0a0a">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Añadir Gasto | SplitGasto 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link rel="stylesheet" href="engine/global.css"/>
<style>
  :root { --cyan:#13ecd6; --purple:#a855f7; --orange:#FF9D42; }
  * { font-family:'Manrope',sans-serif; box-sizing:border-box; }
  body { background:#0a0a0a; min-height:100dvh; }

  .glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; }

  /* Amount input */
  #amount-input {
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:3.5rem;
    font-weight:900;
    text-align:center;
    width:100%;
    caret-color:var(--cyan);
  }
  #amount-input::placeholder { color:rgba(255,255,255,0.15); }

  /* Category buttons */
  .cat-btn {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:10px 14px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.04);
    cursor:pointer;
    transition:all 0.2s;
    font-size:0.7rem;
    font-weight:700;
    min-width:72px;
  }
  .cat-btn.active { border-color:var(--cyan); background:rgba(19,236,214,0.1); color:var(--cyan); }
  .cat-btn:hover { background:rgba(255,255,255,0.07); }

  /* Form inputs */
  .sg-input {
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:14px;
    color:white;
    padding:14px 16px;
    width:100%;
    font-size:0.9rem;
    font-weight:600;
    outline:none;
    transition:border-color 0.2s;
  }
  .sg-input:focus { border-color:var(--cyan); }
  .sg-input::placeholder { color:rgba(255,255,255,0.25); font-weight:400; }

  /* Split toggle */
  .split-option {
    flex:1; text-align:center; padding:10px;
    border-radius:12px;
    font-size:0.8rem; font-weight:700;
    cursor:pointer; transition:all 0.2s;
  }
  .split-option.active { background:var(--cyan); color:#0a0a0a; }
  .split-option:not(.active) { color:rgba(255,255,255,0.4); }

  /* Payer avatars */
  .payer-chip {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    cursor:pointer; min-width:56px;
  }
  .payer-avatar {
    width:48px; height:48px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:0.85rem;
    border:2px solid rgba(255,255,255,0.1);
    transition:all 0.2s;
  }
  .payer-chip.selected .payer-avatar { border-color:var(--cyan); box-shadow:0 0 12px rgba(19,236,214,0.4); }
  .payer-chip.selected .payer-name { color:var(--cyan); }
  .payer-name { font-size:0.65rem; font-weight:700; opacity:0.6; }

  /* Save button */
  #save-btn {
    background:linear-gradient(135deg, var(--cyan), #0fbfaf);
    color:#0a0a0a; border-radius:50px;
    font-weight:800; font-size:1rem;
    box-shadow:0 8px 32px rgba(19,236,214,0.35);
    transition:all 0.2s;
  }
  #save-btn:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(19,236,214,0.5); }
  #save-btn:active { transform:scale(0.97); }
  #save-btn:disabled { opacity:0.4; }

  /* Scanner CTA */
  .scanner-cta {
    background:linear-gradient(135deg, rgba(19,236,214,0.08), rgba(168,85,247,0.08));
    border:1px solid rgba(19,236,214,0.2);
    border-radius:20px;
    cursor:pointer;
    transition:all 0.2s;
  }
  .scanner-cta:hover { border-color:rgba(19,236,214,0.4); background:rgba(19,236,214,0.12); }
</style>
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#13ecd6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SplitGasto">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body class="text-white pb-32">

<!-- Header -->
<header class="flex justify-between items-center px-5 py-4 sticky top-0 z-50" style="background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05)">
  <button onclick="SGRouter.back()" class="flex items-center justify-center w-10 h-10 rounded-full" style="background:rgba(255,255,255,0.07)">
    <span class="material-icons-round text-white/60">close</span>
  </button>
  <h1 class="font-bold text-base">Nuevo Gasto</h1>
  <button id="save-btn" class="px-5 py-2 text-sm" onclick="saveExpense()">Guardar</button>
</header>

<main class="max-w-md mx-auto px-4 pt-4 space-y-5">

  <!-- Scanner shortcut -->
  <div class="scanner-cta p-4 flex items-center gap-4" onclick="SGRouter.navigate('scanner','add-expense')">
    <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background:rgba(19,236,214,0.15)">
      <span class="material-icons-round" style="color:var(--cyan)">document_scanner</span>
    </div>
    <div>
      <p class="font-bold text-sm">Escanear Ticket con IA</p>
      <p class="text-xs opacity-50">Extrae datos automáticamente</p>
    </div>
    <span class="material-icons-round ml-auto opacity-30">chevron_right</span>
  </div>

  <!-- Amount -->
  <div class="glass p-6 text-center">
    <p class="text-xs font-bold uppercase tracking-widest opacity-40 mb-3">Importe</p>
    <div class="flex items-center justify-center gap-3">
      <span class="text-2xl font-black opacity-40">€</span>
      <input type="number" id="amount-input" placeholder="0,00" step="0.01" min="0" inputmode="decimal"/>
    </div>
    <p class="text-xs opacity-30 mt-2" id="per-person-hint">— € por persona</p>
  </div>

  <!-- Description -->
  <div class="space-y-2">
    <label class="text-xs font-bold uppercase tracking-widest opacity-40">Descripción</label>
    <div class="relative">
      <input type="text" id="desc-input" class="sg-input pl-12" placeholder="¿En qué se gastó?"/>
      <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 opacity-30">edit_note</span>
    </div>
  </div>

  <!-- Categories -->
  <div class="space-y-2">
    <label class="text-xs font-bold uppercase tracking-widest opacity-40">Categoría</label>
    <div class="flex gap-2 overflow-x-auto pb-1" style="-webkit-overflow-scrolling:touch;scrollbar-width:none">
      <button class="cat-btn active" data-cat="food" onclick="selectCat(this)">🍣<span>Comida</span></button>
      <button class="cat-btn" data-cat="transport" onclick="selectCat(this)">🚗<span>Transporte</span></button>
      <button class="cat-btn" data-cat="leisure" onclick="selectCat(this)">🎬<span>Ocio</span></button>
      <button class="cat-btn" data-cat="home" onclick="selectCat(this)">🏠<span>Hogar</span></button>
      <button class="cat-btn" data-cat="travel" onclick="selectCat(this)">✈️<span>Viajes</span></button>
      <button class="cat-btn" data-cat="health" onclick="selectCat(this)">💊<span>Salud</span></button>
      <button class="cat-btn" data-cat="other" onclick="selectCat(this)">📦<span>Otro</span></button>
    </div>
  </div>

  <!-- Date + Group -->
  <div class="grid grid-cols-2 gap-3">
    <div class="space-y-2">
      <label class="text-xs font-bold uppercase tracking-widest opacity-40">Fecha</label>
      <input type="date" id="date-input" class="sg-input"/>
    </div>
    <div class="space-y-2">
      <label class="text-xs font-bold uppercase tracking-widest opacity-40">Grupo</label>
      <select id="group-input" class="sg-input" style="appearance:none;cursor:pointer">
        <option>🍣 Sushi Kyoto Pro</option>
        <option>🏔️ Viaje Pirineos</option>
        <option>🏠 Piso Alpha 2026</option>
      </select>
    </div>
  </div>

  <!-- Paid by -->
  <div class="glass p-5 space-y-4">
    <div class="flex justify-between items-center">
      <h3 class="font-bold text-sm">Pagado por</h3>
      <button class="text-xs font-bold" style="color:var(--cyan)">+ Múltiples</button>
    </div>
    <div class="flex gap-4 overflow-x-auto pb-1" id="payers-row" style="-webkit-overflow-scrolling:touch;scrollbar-width:none">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- Split method -->
  <div class="glass p-5 space-y-4">
    <h3 class="font-bold text-sm">Método de reparto</h3>
    <div class="flex p-1 rounded-xl" style="background:rgba(255,255,255,0.04)">
      <div class="split-option active" onclick="selectSplit(this,'equal')">Igual</div>
      <div class="split-option" onclick="selectSplit(this,'percentage')">%</div>
      <div class="split-option" onclick="selectSplit(this,'exact')">Exacto</div>
      <div class="split-option" onclick="selectSplit(this,'shares')">Partes</div>
    </div>

    <!-- Participants with amounts -->
    <div id="split-details" class="space-y-3 mt-2">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- Notes -->
  <div class="space-y-2">
    <label class="text-xs font-bold uppercase tracking-widest opacity-40">Nota (opcional)</label>
    <textarea id="notes-input" class="sg-input resize-none" rows="2" placeholder="Añade una nota…"></textarea>
  </div>

  <!-- Save -->
  <button id="save-btn-bottom" class="w-full py-5 rounded-full font-black text-lg" style="background:linear-gradient(135deg,var(--cyan),#0fbfaf);color:#0a0a0a;box-shadow:0 8px 32px rgba(19,236,214,0.35)" onclick="saveExpense()">
    <span class="flex items-center justify-center gap-2">
      <span class="material-icons-round">check_circle</span>
      GUARDAR GASTO
    </span>
  </button>

</main>

<script src="engine/router.js"></script>
<script>
const members = [
  {name:'Commander', initials:'C', color:'#13ecd6'},
  {name:'Mario', initials:'M', color:'#a855f7'},
  {name:'Elena', initials:'E', color:'#FF9D42'},
  {name:'Sofia', initials:'S', color:'#ec4899'},
];

let selectedPayer = 0;
let selectedCat = 'food';
let splitMethod = 'equal';

// Set today's date
const today = new Date().toISOString().split('T')[0];
document.getElementById('date-input').value = today;

function renderPayers() {
  const row = document.getElementById('payers-row');
  row.innerHTML = members.map((m, i) => `
    <div class="payer-chip ${i === selectedPayer ? 'selected' : ''}" onclick="selectPayer(${i})">
      <div class="payer-avatar" style="background:${m.color}22;color:${m.color};border-color:${i===selectedPayer?m.color:'rgba(255,255,255,0.1)'}">${m.initials}</div>
      <span class="payer-name">${m.name}</span>
    </div>`).join('') + `
    <div class="payer-chip" onclick="addPayer()">
      <div class="payer-avatar" style="border:2px dashed rgba(255,255,255,0.2)">
        <span class="material-icons-round text-sm opacity-30">add</span>
      </div>
      <span class="payer-name opacity-40">Añadir</span>
    </div>`;
}

function selectPayer(idx) {
  selectedPayer = idx;
  renderPayers();
}

function addPayer() { SGRouter.showToast('Próximamente: múltiples pagadores', 'info'); }

function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedCat = btn.dataset.cat;
}

function selectSplit(el, method) {
  document.querySelectorAll('.split-option').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  splitMethod = method;
  renderSplitDetails();
}

function renderSplitDetails() {
  const amount = parseFloat(document.getElementById('amount-input').value) || 0;
  const perPerson = splitMethod === 'equal' ? (amount / members.length).toFixed(2) : '—';
  document.getElementById('per-person-hint').textContent = splitMethod === 'equal' ? `${perPerson} € por persona` : '— € por persona';

  const container = document.getElementById('split-details');
  container.innerHTML = members.map((m, i) => {
    let valueContent;
    if (splitMethod === 'equal') {
      valueContent = `<span class="text-sm font-bold" style="color:var(--cyan)">${perPerson} €</span>`;
    } else if (splitMethod === 'percentage') {
      valueContent = `<div class="flex items-center gap-1"><input type="number" value="25" min="0" max="100" class="sg-input w-16 text-center py-2 text-sm" style="padding:6px;"/><span class="opacity-40">%</span></div>`;
    } else if (splitMethod === 'exact') {
      valueContent = `<input type="number" placeholder="0.00" class="sg-input w-24 text-center py-2 text-sm" style="padding:6px;"/>`;
    } else {
      valueContent = `<div class="flex items-center gap-1"><input type="number" value="1" min="1" class="sg-input w-16 text-center py-2 text-sm" style="padding:6px;"/><span class="opacity-40">parte</span></div>`;
    }
    return `
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div style="width:36px;height:36px;border-radius:50%;background:${m.color}22;color:${m.color};border:2px solid ${m.color}33;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.8rem">${m.initials}</div>
          <span class="text-sm font-semibold">${m.name}</span>
        </div>
        ${valueContent}
      </div>`;
  }).join('');
}

// Live per-person update
document.getElementById('amount-input').addEventListener('input', renderSplitDetails);

function saveExpense() {
  const amount = parseFloat(document.getElementById('amount-input').value);
  const desc = document.getElementById('desc-input').value.trim();

  if (!amount || amount <= 0) { SGRouter.showToast('Introduce un importe válido', 'warning'); return; }
  if (!desc) { SGRouter.showToast('Añade una descripción', 'warning'); return; }

  document.getElementById('save-btn').disabled = true;
  SGRouter.showToast('Gasto guardado ✓', 'success');
  setTimeout(() => SGRouter.navigate('split', 'add-expense'), 800);
}

renderPayers();
renderSplitDetails();
</script>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 z-50" style="background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06)">
        <div class="max-w-7xl mx-auto px-4 flex justify-around items-center py-3 pb-6">
            <button onclick="SGRouter.navigate('dashboard')" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition-opacity">
                <span class="material-icons-round text-xl">grid_view</span>
                <span style="font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">Mando</span>
            </button>
            <button onclick="SGRouter.navigate('groups')" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition-opacity">
                <span class="material-icons-round text-xl">groups_3</span>
                <span style="font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">Grupos</span>
            </button>
            <button onclick="SGRouter.navigate('games')" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition-opacity">
                <span class="material-icons-round text-xl">casino</span>
                <span style="font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">Juegos</span>
            </button>
            <button onclick="SGRouter.navigate('analytics')" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition-opacity">
                <span class="material-icons-round text-xl">query_stats</span>
                <span style="font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">Métricas</span>
            </button>
            <button onclick="SGRouter.navigate('profile')" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition-opacity">
                <span class="material-icons-round text-xl">person</span>
                <span style="font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">Perfil</span>
            </button>
        </div>
    </nav>


    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(r => console.log('[SW] Registered:', r.scope))
                    .catch(e => console.warn('[SW] Registration failed:', e));
            });
        }
    </script>
</body>
</html>
