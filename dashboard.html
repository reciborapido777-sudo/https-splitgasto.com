<!DOCTYPE html>
<html lang="es" style="background-color: #000 !important; overflow-x: hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Centro de Mando | SplitGasto 2026</title>
    
    <link rel="stylesheet" href="engine/global.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Plus+Jakarta+Sans:wght@800&family=Space_Grotesk:wght@500;700;900&display=swap');
        
        html, body { 
            background: #000; color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden !important; width: 100% !important; margin: 0; padding: 0;
            box-sizing: border-box;
            overscroll-behavior: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateZ(0);
        }

        .text-gradient-cyan { 
            background: linear-gradient(135deg, #13ecd6 0%, #10b981 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            display: inline-block;
            padding-right: 0.55em !important; /* Blindaje Alpha v1.62 */
        }

        .experience-card {
            position: relative; height: 320px; border-radius: 3rem;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
            background: #0a0a0a;
            transform: translateZ(0);
        }

        .reveal-node { animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes revealUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .money-display {
            display: inline-block;
            padding-right: 0.55em !important; 
            white-space: nowrap;
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#13ecd6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SplitGasto">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body class="min-h-screen pb-32">

    <div class="max-w-7xl mx-auto px-6 py-8 space-y-12">
        
        <header class="flex justify-between items-center py-4 sticky top-0 bg-black/60 backdrop-blur-xl z-50">
            <div class="flex items-center gap-6">
                <button onclick="SGRouter.navigate('landing')" class="size-14 rounded-2xl glass-panel flex items-center justify-center hover:bg-white/5 active:scale-90 transition-all shadow-lg">
                    <span class="material-icons-round text-zinc-500 text-2xl">logout</span>
                </button>
                
                <div class="flex items-center gap-4 cursor-pointer group" onclick="SGRouter.navigate('profile', 'dashboard')">
                    <img src="https://api.dicebear.com/9.x/initials/svg?seed=SG&backgroundColor=1a2a1a&fontFamily=Arial&fontSize=40" class="size-12 rounded-xl border border-white/10 group-hover:border-[#FF9D42]/50 transition-all" alt="Avatar">
                    <div class="hidden sm:block">
                        <p class="text-[9px] font-black text-zinc-600 uppercase tracking-[0.4em] mb-0.5 group-hover:text-[#FF9D42] transition-colors">Socio Fundador</p>
                        <h1 class="text-base font-black font-['Space_Grotesk'] tracking-tighter uppercase italic">Comandante</h1>
                    </div>
                </div>
            </div>

            <button onclick="SGRouter.navigate('notifications', 'dashboard')" class="size-14 glass-panel rounded-2xl flex items-center justify-center relative hover:bg-white/5 transition-all">
                <span class="material-icons-round text-zinc-400">notifications</span>
                <span class="absolute top-4 right-4 size-2 bg-[#FF9D42] rounded-full shadow-[0_0_10px_rgba(255,157,66,0.5)]"></span>
            </button>
        </header>

        <section class="glass-panel p-12 rounded-[3.5rem] border-[#13ecd6]/10 relative overflow-hidden reveal-node">
            <div class="absolute -right-20 -top-20 size-64 bg-[#13ecd6]/5 rounded-full blur-[80px]"></div>
            
            <div class="space-y-10 relative z-10">
                <div class="space-y-2">
                    <p class="text-[9px] font-black text-zinc-500 uppercase tracking-[0.5em]">Patrimonio Neto Auditado</p>
                    <h2 class="text-6xl sm:text-7xl md:text-8xl font-black font-['Space_Grotesk'] tracking-tighter italic text-gradient-cyan">
                        1.450,26€
                    </h2>
                </div>
                
                <div class="grid grid-cols-2 gap-8 border-t border-white/5 pt-10">
                    <div class="space-y-1">
                        <p class="text-[9px] font-black text-zinc-600 uppercase tracking-widest">Liquidaciones</p>
                        <p class="text-xl font-bold font-['Space_Grotesk'] text-[#FF9D42] money-display">-84,50€</p>
                    </div>
                    <div class="space-y-1 text-right sm:text-left">
                        <p class="text-[9px] font-black text-zinc-600 uppercase tracking-widest">A Recibir</p>
                        <p class="text-xl font-bold font-['Space_Grotesk'] text-[#13ecd6] money-display">+210,00€</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-3 md:grid-cols-6 gap-4 reveal-node" style="animation-delay: 0.1s">
            <button onclick="SGRouter.navigate('scanner', 'dashboard')" class="glass-panel p-6 rounded-[2rem] flex flex-col items-center gap-4 hover:bg-white/5 group active:scale-95 transition-all">
                <span class="material-icons-round text-[#13ecd6] text-3xl group-hover:scale-110 transition-transform">qr_code_scanner</span>
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-500">Scanner</span>
            </button>
            <button onclick="SGRouter.navigate('groups', 'dashboard')" class="glass-panel p-6 rounded-[2rem] flex flex-col items-center gap-4 hover:bg-white/5 group active:scale-95 transition-all">
                <span class="material-icons-round text-[#a855f7] text-3xl group-hover:scale-110 transition-transform">groups_3</span>
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-500">Grupos</span>
            </button>
            <button onclick="SGRouter.navigate('vault', 'dashboard')" class="glass-panel p-6 rounded-[2rem] flex flex-col items-center gap-4 hover:bg-white/5 group active:scale-95 transition-all">
                <span class="material-icons-round text-[#FF9D42] text-3xl group-hover:scale-110 transition-transform">auto_stories</span>
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-500">Bóveda</span>
            </button>
            <button onclick="SGRouter.navigate('analytics', 'dashboard')" class="glass-panel p-6 rounded-[2rem] flex flex-col items-center gap-4 hover:bg-white/5 group active:scale-95 transition-all">
                <span class="material-icons-round text-zinc-100 text-3xl group-hover:scale-110 transition-transform">query_stats</span>
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-500">Métricas</span>
            </button>
            <button onclick="SGRouter.navigate('games', 'dashboard')" class="glass-panel p-6 rounded-[2rem] flex flex-col items-center gap-4 hover:bg-white/5 group active:scale-95 transition-all" style="border-color:rgba(212,175,55,0.15)">
                <span class="material-icons-round text-3xl group-hover:scale-110 transition-transform" style="color:#D4AF37">casino</span>
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-500">Juegos</span>
            </button>
            <button onclick="SGRouter.navigate('add-expense', 'dashboard')" class="glass-panel p-6 rounded-[2rem] flex flex-col items-center gap-4 hover:bg-white/5 group active:scale-95 transition-all" style="border-color:rgba(19,236,214,0.15)">
                <span class="material-icons-round text-[#13ecd6] text-3xl group-hover:scale-110 transition-transform">add_circle</span>
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-500">Gasto</span>
            </button>
        </section>

        <section class="experience-card group cursor-pointer reveal-node active:scale-[0.98] transition-all" style="animation-delay: 0.2s" onclick="SGRouter.navigate('split', 'dashboard')">
            <img src="https://images.unsplash.com/photo-1579027989536-b7b1f875659b?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:scale-105 transition-all duration-700">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent flex flex-col justify-end p-10 space-y-4">
                <div class="flex items-center gap-3">
                    <span class="size-2 bg-[#13ecd6] rounded-full animate-pulse"></span>
                    <p class="text-[10px] font-black text-[#13ecd6] uppercase tracking-[0.5em]">Foco Actual</p>
                </div>
                <h3 class="text-4xl font-black font-['Space_Grotesk'] uppercase italic leading-none tracking-tighter">Sushi Kyoto Pro</h3>
                <p class="text-[11px] text-zinc-400 font-bold uppercase tracking-widest">12 Socios activos • <span class="money-display text-white font-black">256,00€</span> en juego</p>
            </div>
        </section>

    </div>


    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-xl border-t border-white/5">
        <div class="max-w-7xl mx-auto px-6 flex justify-around items-center py-4 pb-6">
            <button onclick="SGRouter.navigate('dashboard')" class="flex flex-col items-center gap-1.5 group">
                <span class="material-icons-round text-xl" style="color:#13ecd6">grid_view</span>
                <span class="text-[8px] font-black uppercase tracking-widest" style="color:#13ecd6">Mando</span>
            </button>
            <button onclick="SGRouter.navigate('groups')" class="flex flex-col items-center gap-1.5 group">
                <span class="material-icons-round text-xl group-hover:text-white transition-colors" style="">groups_3</span>
                <span class="text-[8px] font-black uppercase tracking-widest group-hover:text-white transition-colors" style="">Grupos</span>
            </button>
            <button onclick="SGRouter.navigate('activity')" class="flex flex-col items-center gap-1.5 group">
                <span class="material-icons-round text-xl group-hover:text-white transition-colors" style="">receipt_long</span>
                <span class="text-[8px] font-black uppercase tracking-widest group-hover:text-white transition-colors" style="">Gastos</span>
            </button>
            <button onclick="SGRouter.navigate('analytics')" class="flex flex-col items-center gap-1.5 group">
                <span class="material-icons-round text-xl group-hover:text-white transition-colors" style="">query_stats</span>
                <span class="text-[8px] font-black uppercase tracking-widest group-hover:text-white transition-colors" style="">Métricas</span>
            </button>
            <button onclick="SGRouter.navigate('profile')" class="flex flex-col items-center gap-1.5 group">
                <span class="material-icons-round text-xl group-hover:text-white transition-colors" style="">person</span>
                <span class="text-[8px] font-black uppercase tracking-widest group-hover:text-white transition-colors" style="">Perfil</span>
            </button>
        </div>
    </nav>
    <script src="engine/router.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(r => console.log('[SW] Registered:', r.scope))
                    .catch(e => console.warn('[SW] Registration failed:', e));
            });
        }
    </script>
</body>
</html>
