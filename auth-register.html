<!DOCTYPE html>
<html lang="es" style="background-color: #000 !important; overflow-x: hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nueva Cuenta | SplitGasto 2026</title>
    
    <link rel="stylesheet" href="engine/global.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Space_Grotesk:wght@500;700;900&display=swap');
        
        html, body { 
            background: #000; color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; flex-direction: column; 
            min-height: 100vh; margin: 0; padding: 0;
            overflow-x: hidden !important;
            overscroll-behavior: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateZ(0); /* Aceleración GPU Alpha */
        }

        .input-field { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 24px; 
            border-radius: 20px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            outline: none; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 13px;
            color: white;
            transform: translateZ(0);
        }

        .input-field:focus { 
            border-color: #13ecd6; 
            background: rgba(19, 236, 214, 0.05);
            box-shadow: 0 0 20px rgba(19, 236, 214, 0.1); 
        }

        .reveal-node { animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes revealUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#13ecd6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SplitGasto">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body class="p-6 md:p-12">

    <header class="flex items-center gap-6 mb-16 reveal-node">
        <button onclick="SGRouter.back()" class="size-14 rounded-2xl glass-panel flex items-center justify-center hover:bg-white/5 transition-all active:scale-90 shadow-xl">
            <span class="material-icons-round text-white">arrow_back</span>
        </button>
        <div>
            <p class="text-[10px] font-black text-[#13ecd6] uppercase tracking-[0.5em] mb-1">Iniciación</p>
            <h1 class="text-3xl font-black font-['Space_Grotesk'] uppercase italic tracking-tighter leading-none">Nueva Cuenta</h1>
        </div>
    </header>

    <main class="space-y-10 flex-1 max-w-md mx-auto w-full reveal-node" style="animation-delay: 0.1s">
        <div class="space-y-8">
            <div class="space-y-3">
                <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest ml-1">Identidad de Socio</p>
                <input type="text" class="input-field w-full" placeholder="NOMBRE COMPLETO" autocomplete="name">
            </div>

            <div class="space-y-3">
                <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest ml-1">Correo Encriptado</p>
                <input type="email" class="input-field w-full" placeholder="SOCIO@SPLITGASTO.COM" autocomplete="email">
            </div>

            <div class="space-y-3">
                <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest ml-1">Clave de Acceso</p>
                <input type="password" class="input-field w-full" placeholder="••••••••••••" autocomplete="new-password">
            </div>
        </div>

        <div class="pt-6">
            <button onclick="SGRouter.navigate('dashboard', 'register')" class="w-full py-7 bg-white text-black rounded-[2rem] font-black text-xs uppercase tracking-[0.6em] hover:bg-[#13ecd6] transition-all shadow-2xl active:scale-95">
                Finalizar Registro
            </button>
            <p class="text-[9px] text-center text-zinc-700 uppercase font-black mt-8 tracking-[0.3em]">Al entrar, acepta los términos de SplitGasto® 2026</p>
        </div>
    </main>

    <script src="engine/router.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
                    .then(r => {
                        r.update(); // Force SW update check
                        console.log('[SW] Registered:', r.scope);
                    })
                    .catch(e => console.warn('[SW] Failed:', e));
            });
        }
    </script>
</body>
</html>
