<!DOCTYPE html>
<html lang="es" style="background:#050505;overflow-x:hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dardos Alpha | SplitGasto 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#13ecd6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SplitGasto">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#13ecd6',
                        'bg-dark': '#050505',
                        'surface': '#0f0f0f',
                        'surface2': '#1a1a1a',
                        'purple': '#a855f7',
                        'orange': '#FF9D42'
                    },
                    fontFamily: { manrope: ['Manrope', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Manrope', sans-serif; background: #050505; color: white; min-height: 100vh; }
        
        #dartCanvas { cursor: crosshair; touch-action: none; }
        
        .dart-board {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes dartThrow {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .throwing { animation: dartThrow 0.3s ease-out; }

        @keyframes scorePopup {
            0% { transform: translate(-50%,-50%) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
            70% { transform: translate(-50%,-80%) scale(1); opacity: 1; }
            100% { transform: translate(-50%,-120%) scale(0.8); opacity: 0; }
        }

        .score-popup {
            position: absolute;
            pointer-events: none;
            animation: scorePopup 1.2s ease-out forwards;
            font-size: 22px;
            font-weight: 900;
            text-shadow: 0 0 20px currentColor;
            z-index: 50;
        }

        @keyframes winGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(19,236,214,0.3); }
            50% { box-shadow: 0 0 60px rgba(19,236,214,0.7); }
        }

        .winner-card { animation: winGlow 1.5s ease infinite; }

        @keyframes neonPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .neon-pulse { animation: neonPulse 2s ease infinite; }

        .player-card { transition: all 0.3s ease; }
        .player-card.active { border-color: #13ecd6 !important; background: rgba(19,236,214,0.08) !important; }

        @keyframes hitRing {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        .hit-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid #13ecd6;
            width: 20px;
            height: 20px;
            animation: hitRing 0.6s ease-out forwards;
            pointer-events: none;
        }

        .confetti-piece {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 9999;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>

                <span class="material-icons-round text-xl">casino</span>

    <script src="engine/router.js"></script>
    <script>
        // ─── Game State ───────────────────────────────────────────────
        const PLAYERS = [
            { name: 'Tú', emoji: '🎯', color: '#13ecd6', score: 0, darts: [] },
            { name: 'Alex', emoji: '🏆', color: '#a855f7', score: 0, darts: [] },
            { name: 'María', emoji: '⚡', color: '#FF9D42', score: 0, darts: [] },
            { name: 'David', emoji: '🔥', color: '#ef4444', score: 0, darts: [] }
        ];

        let currentPlayer = 0;
        let currentRound = 1;
        let dartsThisRound = 0;
        const DARTS_PER_ROUND = 3;
        const MAX_ROUNDS = 5;
        let gameOver = false;
        let log = [];

        // Dartboard zones [ring, multiplier, basePoints]
        const ZONES = [
            { name: 'BULLSEYE', color: '#13ecd6', mult: 1, pts: 50, maxR: 0.08 },
            { name: 'BULL', color: '#22c55e', mult: 1, pts: 25, maxR: 0.15 },
            { name: 'T20', color: '#ef4444', mult: 3, pts: 20, maxR: 0.25 },
            { name: 'S20', color: '#1a1a1a', mult: 1, pts: 20, maxR: 0.35 },
            { name: 'D20', color: '#ef4444', mult: 2, pts: 20, maxR: 0.45 },
            { name: 'T20', color: '#1a1a1a', mult: 3, pts: 15, maxR: 0.55 },
            { name: 'S15', color: '#D4AF37', mult: 1, pts: 15, maxR: 0.70 },
            { name: 'D15', color: '#1a1a1a', mult: 2, pts: 10, maxR: 0.82 },
            { name: 'S10', color: '#555', mult: 1, pts: 5, maxR: 0.95 },
            { name: 'MISS', color: '#222', mult: 0, pts: 0, maxR: 1.1 }
        ];

        const canvas = document.getElementById('dartCanvas');
        const ctx = canvas.getContext('2d');
        const CX = canvas.width / 2;
        const CY = canvas.height / 2;
        const R = canvas.width / 2 - 5;

        // ─── Draw Dartboard ───────────────────────────────────────────
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const segments = 20;
            const segAngle = (Math.PI * 2) / segments;
            const segColors = [
                ['#1a1a1a','#D4AF37'],['#D4AF37','#1a1a1a'],['#1a1a1a','#D4AF37'],
                ['#D4AF37','#1a1a1a'],['#1a1a1a','#D4AF37'],['#D4AF37','#1a1a1a'],
                ['#1a1a1a','#D4AF37'],['#D4AF37','#1a1a1a'],['#1a1a1a','#D4AF37'],
                ['#D4AF37','#1a1a1a'],['#1a1a1a','#D4AF37'],['#D4AF37','#1a1a1a'],
                ['#1a1a1a','#D4AF37'],['#D4AF37','#1a1a1a'],['#1a1a1a','#D4AF37'],
                ['#D4AF37','#1a1a1a'],['#1a1a1a','#D4AF37'],['#D4AF37','#1a1a1a'],
                ['#1a1a1a','#D4AF37'],['#D4AF37','#1a1a1a']
            ];
            const scoreNums = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
            const ringRadii = [0.45*R,0.55*R,0.65*R,0.82*R,0.92*R,R];
            const ringMultipliers = [null,'T','S','D','S',null];

            // Outer board background
            ctx.beginPath();
            ctx.arc(CX, CY, R+5, 0, Math.PI*2);
            ctx.fillStyle = '#111';
            ctx.fill();

            // Segments
            for (let s = 0; s < segments; s++) {
                const startA = s * segAngle - Math.PI/2;
                const endA = startA + segAngle;

                for (let r = 0; r < ringRadii.length-1; r++) {
                    ctx.beginPath();
                    ctx.moveTo(CX, CY);
                    ctx.arc(CX, CY, ringRadii[r+1], startA, endA);
                    ctx.arc(CX, CY, ringRadii[r], endA, startA, true);
                    ctx.closePath();

                    let fillColor = segColors[s][r%2];
                    // Triple ring
                    if (r === 1) fillColor = s%2===0 ? '#ef4444' : '#22c55e';
                    // Double ring  
                    if (r === 3) fillColor = s%2===0 ? '#ef4444' : '#22c55e';
                    // Single inner
                    if (r === 0) fillColor = s%2===0 ? '#1a1a1a' : '#111';
                    // Single outer
                    if (r === 2) fillColor = s%2===0 ? '#1a1a1a' : '#2a2a2a';
                    if (r === 4) fillColor = s%2===0 ? '#1a1a1a' : '#2a2a2a';
                    
                    ctx.fillStyle = fillColor;
                    ctx.fill();
                    ctx.strokeStyle = '#050505';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Numbers
                const textR = R * 1.04;
                const textAngle = s * segAngle - Math.PI/2 + segAngle/2;
                ctx.save();
                ctx.translate(CX + Math.cos(textAngle)*textR, CY + Math.sin(textAngle)*textR);
                ctx.rotate(textAngle + Math.PI/2);
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = `bold ${R*0.065}px Manrope`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(scoreNums[s], 0, 0);
                ctx.restore();
            }

            // Bull rings
            ctx.beginPath();
            ctx.arc(CX, CY, R*0.12, 0, Math.PI*2);
            ctx.fillStyle = '#22c55e';
            ctx.fill();
            ctx.strokeStyle = '#050505';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(CX, CY, R*0.06, 0, Math.PI*2);
            ctx.fillStyle = '#13ecd6';
            ctx.fill();

            // Glow effect
            const grd = ctx.createRadialGradient(CX, CY, R*0.5, CX, CY, R+5);
            grd.addColorStop(0, 'rgba(19,236,214,0)');
            grd.addColorStop(1, 'rgba(19,236,214,0.08)');
            ctx.beginPath();
            ctx.arc(CX, CY, R+5, 0, Math.PI*2);
            ctx.fillStyle = grd;
            ctx.fill();

            // Draw placed darts
            PLAYERS.forEach((p, pi) => {
                p.darts.forEach(d => {
                    drawDartOnBoard(d.x, d.y, p.color);
                });
            });
        }

        function drawDartOnBoard(x, y, color) {
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI*2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // Dart tail
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y+12);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // ─── Score Calculation ────────────────────────────────────────
        function getScore(x, y) {
            const dx = x - CX;
            const dy = y - CY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const ratio = dist / R;
            const segments = 20;
            const scoreNums = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];

            if (ratio <= 0.06) return { pts: 50, label: '🎯 BULLSEYE!', mult: 1 };
            if (ratio <= 0.12) return { pts: 25, label: '🟢 BULL', mult: 1 };

            let angle = Math.atan2(dy, dx) + Math.PI/2;
            if (angle < 0) angle += Math.PI*2;
            const segAngle = (Math.PI*2) / segments;
            const segIndex = Math.floor(angle / segAngle) % segments;
            const baseScore = scoreNums[segIndex];

            if (ratio > 0.95) return { pts: 0, label: '❌ MISS', mult: 0 };
            if (ratio >= 0.85 && ratio <= 0.92) return { pts: baseScore*2, label: `✌️ DOUBLE ${baseScore}`, mult: 2 };
            if (ratio >= 0.50 && ratio <= 0.58) return { pts: baseScore*3, label: `🔥 TRIPLE ${baseScore}`, mult: 3 };
            return { pts: baseScore, label: `· ${baseScore}`, mult: 1 };
        }

        // ─── Render Players ───────────────────────────────────────────
        function renderPlayers() {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = PLAYERS.map((p, i) => `
                <div class="player-card rounded-2xl p-3 ${i === currentPlayer ? 'active' : ''}" 
                    style="background:#0f0f0f;border:1px solid ${i===currentPlayer?p.color:'rgba(255,255,255,0.06)'}">
                    <div class="flex items-center gap-2 mb-2">
                        <span style="font-size:18px">${p.emoji}</span>
                        <div>
                            <p style="font-size:11px;font-weight:900;color:${p.color}">${p.name}</p>
                            <p style="font-size:9px;color:rgba(255,255,255,0.4)">${i===currentPlayer?'▶ TURNO':'EN ESPERA'}</p>
                        </div>
                    </div>
                    <p style="font-size:26px;font-weight:900;color:${p.color};line-height:1">${p.score}</p>
                    <p style="font-size:9px;color:rgba(255,255,255,0.3)">PUNTOS</p>
                </div>
            `).join('');
        }

        function updateDartsLeft() {
            const icons = ['⦿','⦿','⦿'].map((d,i) => 
                i < DARTS_PER_ROUND - dartsThisRound ? `<span style="color:#13ecd6">${d}</span>` : `<span style="opacity:0.2">${d}</span>`
            ).join(' ');
            document.getElementById('dartsLeft').innerHTML = icons;
            document.getElementById('roundLabel').textContent = `RONDA ${currentRound}/${MAX_ROUNDS} • ${PLAYERS[currentPlayer].name.toUpperCase()}`;
        }

        // ─── Throw Dart ───────────────────────────────────────────────
        function throwDart(x, y) {
            if (gameOver) return;

            const result = getScore(x, y);
            const player = PLAYERS[currentPlayer];

            player.score += result.pts;
            player.darts.push({ x, y });

            // Show hit ring
            showHitRing(x, y, result.pts > 0 ? player.color : '#ef4444');

            // Show score popup
            showScorePopup(x, y, result.pts > 0 ? `+${result.pts}` : 'MISS', player.color);

            dartsThisRound++;

            // Log
            addLog(`${player.emoji} ${player.name}: ${result.label} → ${player.score}pts`);

            if (result.pts >= 50) SGRouter.showToast('🎯 ¡BULLSEYE! +50pts', 'premium');
            else if (result.mult === 3) SGRouter.showToast(`🔥 ¡TRIPLE! +${result.pts}pts`, 'info');
            else if (result.mult === 2) SGRouter.showToast(`✌️ ¡DOBLE! +${result.pts}pts`, 'success');

            drawBoard();
            renderPlayers();

            if (dartsThisRound >= DARTS_PER_ROUND) {
                // Next player
                setTimeout(() => {
                    dartsThisRound = 0;
                    // Clear darts for display (keep last round's)
                    PLAYERS[currentPlayer].darts = [];
                    currentPlayer = (currentPlayer + 1) % PLAYERS.length;

                    if (currentPlayer === 0) {
                        currentRound++;
                        if (currentRound > MAX_ROUNDS) {
                            endGame();
                            return;
                        }
                    }
                    updateDartsLeft();
                    renderPlayers();
                    drawBoard();
                }, 400);
            }

            updateDartsLeft();
        }

        function showHitRing(x, y, color) {
            const container = document.getElementById('hitRings');
            const ring = document.createElement('div');
            ring.className = 'hit-ring';
            ring.style.left = (x - 10) + 'px';
            ring.style.top = (y - 10) + 'px';
            ring.style.borderColor = color;
            container.appendChild(ring);
            setTimeout(() => ring.remove(), 700);
        }

        function showScorePopup(x, y, text, color) {
            const container = document.getElementById('hitRings');
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            popup.style.color = color;
            popup.textContent = text;
            container.appendChild(popup);
            setTimeout(() => popup.remove(), 1300);
        }

        function addLog(entry) {
            log.unshift(entry);
            if (log.length > 20) log.pop();
            const logEl = document.getElementById('sessionLog');
            logEl.innerHTML = log.map((l, i) => `
                <div class="flex items-center gap-2 py-1" style="border-bottom:${i < log.length-1?'1px solid rgba(255,255,255,0.04)':'none'}">
                    <span style="font-size:11px;color:rgba(255,255,255,0.5)">${l}</span>
                </div>
            `).join('');
        }

        function clearLog() {
            log = [];
            document.getElementById('sessionLog').innerHTML = '<p style="font-size:11px;color:rgba(255,255,255,0.3);text-align:center">Los lanzamientos aparecerán aquí</p>';
        }

        // ─── End Game ─────────────────────────────────────────────────
        function endGame() {
            gameOver = true;
            const winner = PLAYERS.reduce((a, b) => a.score > b.score ? a : b);
            const loser = PLAYERS.reduce((a, b) => a.score < b.score ? a : b);

            document.getElementById('winnerName').textContent = winner.name;
            document.getElementById('winnerScore').textContent = `Con ${winner.score} puntos`;
            document.getElementById('winnerInvites').textContent = loser.name;
            document.getElementById('winnerModal').classList.remove('hidden');

            launchConfetti();
        }

        function launchConfetti() {
            const colors = ['#13ecd6','#a855f7','#FF9D42','#ef4444','#D4AF37','#22c55e'];
            for (let i = 0; i < 80; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random()*100 + 'vw';
                piece.style.top = '-10px';
                piece.style.background = colors[Math.floor(Math.random()*colors.length)];
                piece.style.animationDuration = (Math.random()*2+1.5) + 's';
                piece.style.animationDelay = Math.random()*2 + 's';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 4000);
            }
        }

        function resetGame() {
            PLAYERS.forEach(p => { p.score = 0; p.darts = []; });
            currentPlayer = 0;
            currentRound = 1;
            dartsThisRound = 0;
            gameOver = false;
            log = [];
            document.getElementById('winnerModal').classList.add('hidden');
            clearLog();
            drawBoard();
            renderPlayers();
            updateDartsLeft();
            SGRouter.showToast('Nueva partida iniciada', 'info');
        }

        // ─── Canvas Events ────────────────────────────────────────────
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            if (e.touches) {
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener('click', (e) => {
            const pos = getCanvasPos(e);
            if (!gameOver) {
                canvas.classList.add('throwing');
                setTimeout(() => canvas.classList.remove('throwing'), 300);
                throwDart(pos.x, pos.y);
            }
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const t = e.changedTouches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const pos = {
                x: (t.clientX - rect.left) * scaleX,
                y: (t.clientY - rect.top) * scaleY
            };
            if (!gameOver) throwDart(pos.x, pos.y);
        }, { passive: false });

        // ─── Init ─────────────────────────────────────────────────────
        drawBoard();
        renderPlayers();
        updateDartsLeft();
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(r => console.log('[SW] Registered:', r.scope))
                    .catch(e => console.warn('[SW] Registration failed:', e));
            });
        }
    </script>
</body>
</html>
