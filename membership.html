<!DOCTYPE html>
<html lang="es" style="background-color: #000 !important; overflow-x: hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Lounge | SplitGasto 2026</title>
    
    <link rel="stylesheet" href="engine/global.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Space_Grotesk:wght@500;700;900&display=swap');
        
        html, body { 
            background: #000; color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden !important; width: 100% !important; margin: 0; padding: 0;
            box-sizing: border-box;
            overscroll-behavior: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateZ(0); 
        }

        .game-card {
            position: relative;
            height: 240px;
            border-radius: 3rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            transform: translateZ(0);
        }

        .game-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(255, 157, 66, 0.4);
            box-shadow: 0 30px 60px -15px rgba(255, 157, 66, 0.2);
        }

        .game-overlay { 
            background: linear-gradient(to top, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0.2) 100%); 
        }
        
        .reveal-node { 
            animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            opacity: 0; 
        }
        
        @keyframes revealUp { 
            from { transform: translateY(30px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }

        .premium-glow {
            box-shadow: 0 0 30px rgba(255, 157, 66, 0.1);
            border: 1px solid rgba(255, 157, 66, 0.2);
        }

        /* Corrección de Visibilidad de Fondos */
        .bg-fallback {
            background-color: #0a0a0a;
        }
    </style>
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#13ecd6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SplitGasto">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body class="min-h-screen pb-32">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-12">
        
        <header class="flex justify-between items-center py-4 sticky top-0 bg-black/60 backdrop-blur-xl z-50">
            <div class="flex items-center gap-6">
                <button onclick="SGRouter.back()" class="group flex items-center justify-center size-14 rounded-2xl glass-panel hover:bg-white/10 transition-all active:scale-90 shadow-xl">
                    <span class="material-icons-round text-zinc-600 group-hover:text-[#FF9D42] transition-colors text-3xl">arrow_back</span>
                </button>
                <div class="space-y-0.5">
                    <p class="text-[9px] font-black text-zinc-600 uppercase tracking-[0.4em]">Estatus Élite</p>
                    <h1 class="text-3xl font-black font-['Space_Grotesk'] tracking-tighter uppercase italic leading-none">Lounge</h1>
                </div>
            </div>
            
            <div class="size-14 glass-panel rounded-2xl flex items-center justify-center text-[#FF9D42] shadow-[0_0_20px_rgba(255,157,66,0.2)]">
                <span class="material-icons-round">workspace_premium</span>
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 reveal-node">
            
            <div class="game-card group bg-fallback" onclick="SGRouter.navigate('game-roulette', 'membership')">
                <img src="https://images.unsplash.com/photo-1596838132731-179709759672?q=80&w=600" class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:scale-110 transition-transform duration-1000" alt="Ruleta">
                <div class="absolute inset-0 game-overlay flex flex-col justify-end p-8 space-y-2">
                    <span class="material-icons-round text-[#FF9D42]">autorenew</span>
                    <h3 class="text-xl font-black font-['Space_Grotesk'] uppercase italic leading-none text-white">Ruleta</h3>
                    <p class="text-[8px] font-black uppercase tracking-widest text-zinc-500">Protocolo de Azar</p>
                </div>
            </div>

            <div class="game-card group bg-fallback" onclick="SGRouter.navigate('game-coin', 'membership')">
                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=600" class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:scale-110 transition-transform duration-1000" alt="Dardos">
                <div class="absolute inset-0 game-overlay flex flex-col justify-end p-8 space-y-2">
                    <span class="material-icons-round text-[#13ecd6]">track_changes</span>
                    <h3 class="text-xl font-black font-['Space_Grotesk'] uppercase italic leading-none text-white">Dardos</h3>
                    <p class="text-[8px] font-black uppercase tracking-widest text-zinc-500">Calibración Precisa</p>
                </div>
            </div>

            <div class="game-card group bg-fallback" onclick="SGRouter.navigate('game-cards', 'membership')">
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=600" class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:scale-110 transition-transform duration-1000" alt="Cartas">
                <div class="absolute inset-0 game-overlay flex flex-col justify-end p-8 space-y-2">
                    <span class="material-icons-round text-[#a855f7]">style</span>
                    <h3 class="text-xl font-black font-['Space_Grotesk'] uppercase italic leading-none text-white">Carta Alta</h3>
                    <p class="text-[8px] font-black uppercase tracking-widest text-zinc-500">Lógica de Naipes</p>
                </div>
            </div>

            <div class="game-card group premium-glow bg-fallback" onclick="SGRouter.navigate('games', 'membership')">
                <img src="https://images.unsplash.com/photo-1621504450181-5d356f63d3ee?q=80&w=600" class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:scale-110 transition-transform duration-1000" alt="Moneda">
                <div class="absolute inset-0 game-overlay flex flex-col justify-end p-8 space-y-2">
                    <span class="material-icons-round text-[#FF9D42] animate-bounce">monetization_on</span>
                    <h3 class="text-xl font-black font-['Space_Grotesk'] uppercase italic text-[#FF9D42] leading-none">Moneda Alpha</h3>
                    <p class="text-[8px] font-black uppercase tracking-widest text-orange-500/60">Socio Fundador Exclusive</p>
                </div>
            </div>

        </main>
    </div>
    <script src="engine/router.js"></script>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 z-50" style="background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06)">
        <div class="max-w-7xl mx-auto px-4 flex justify-around items-center py-3 pb-6">
            <button onclick="SGRouter.navigate('dashboard')" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition-opacity">
                <span class="material-icons-round text-xl">grid_view</span>
                <span style="font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">Mando</span>
            </button>
            <button onclick="SGRouter.navigate('groups')" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition-opacity">
                <span class="material-icons-round text-xl">groups_3</span>
                <span style="font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">Grupos</span>
            </button>
            <button onclick="SGRouter.navigate('games')" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition-opacity">
                <span class="material-icons-round text-xl">casino</span>
                <span style="font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">Juegos</span>
            </button>
            <button onclick="SGRouter.navigate('analytics')" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition-opacity">
                <span class="material-icons-round text-xl">query_stats</span>
                <span style="font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">Métricas</span>
            </button>
            <button onclick="SGRouter.navigate('profile')" class="flex flex-col items-center gap-1 opacity-60 hover:opacity-100 transition-opacity">
                <span class="material-icons-round text-xl">person</span>
                <span style="font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">Perfil</span>
            </button>
        </div>
    </nav>


    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(r => console.log('[SW] Registered:', r.scope))
                    .catch(e => console.warn('[SW] Registration failed:', e));
            });
        }
    </script>
</body>
</html>
