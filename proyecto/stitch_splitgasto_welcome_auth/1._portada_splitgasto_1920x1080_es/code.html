<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#8B5CF6", // Purple from the gradient
                        "background-light": "#000000", // AMOLED Black as requested
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1.5rem",
                    },
                },
            },
        };
    </script>
<style>
        body {
            background-color: #000000;
            overflow: hidden;
        }
        .glow-s {
            filter: drop-shadow(0 0 15px rgba(255, 107, 0, 0.4)) 
                    drop-shadow(0 0 30px rgba(139, 92, 246, 0.3));
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #FF9D00 0%, #8B5CF6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }.hero-container {
            perspective: 1000px;
        }
        .logo-3d {
            transform: rotateX(5deg) rotateY(-5deg);
            transition: transform 0.5s ease;
        }
        .logo-3d:hover {
            transform: rotateX(0deg) rotateY(0deg) scale(1.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-white min-h-screen flex items-center justify-center p-8">
<main class="relative w-full max-w-[1920px] aspect-[16/9] flex flex-col items-center justify-center overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-orange-500/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="hero-container flex flex-col items-center z-10">
<div class="logo-3d relative mb-12">
<div class="absolute inset-0 bg-gradient-to-br from-orange-400/20 to-purple-600/20 rounded-full blur-2xl scale-125 opacity-50"></div>
<div class="relative flex items-center justify-center glow-s p-4">
<svg class="drop-shadow-2xl" fill="none" height="240" viewBox="0 0 100 100" width="240" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="logoGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#FF9D00"></stop>
<stop offset="100%" style="stop-color:#8B5CF6"></stop>
</linearGradient>
<filter id="innerShadow">
<feOffset dx="1" dy="1"></feOffset>
<feGaussianBlur result="offset-blur" stdDeviation="1"></feGaussianBlur>
<feComposite in="SourceGraphic" in2="offset-blur" operator="out" result="inverse"></feComposite>
<feFlood flood-color="black" flood-opacity=".5" result="color"></feFlood>
<feComposite in="color" in2="inverse" operator="in" result="shadow"></feComposite>
<feComponentTransfer in="shadow" result="shadow">
<feFuncA slope=".5" type="linear"></feFuncA>
</feComponentTransfer>
<feMerge>
<feMergeNode in="SourceGraphic"></feMergeNode>
<feMergeNode in="shadow"></feMergeNode>
</feMerge>
</filter>
</defs>
<path d="M75 30C75 18.9543 66.0457 10 55 10H30C18.9543 10 10 18.9543 10 30C10 41.0457 18.9543 50 30 50H70C81.0457 50 90 58.9543 90 70C90 81.0457 81.0457 90 70 90H45C33.9543 90 25 81.0457 25 70" filter="url(#innerShadow)" stroke="url(#logoGradient)" stroke-linecap="round" stroke-width="14"></path>
</svg>
</div>
</div>
<h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-4 flex items-center">
<span class="text-white neon-text">SplitGasto</span>
<span class="text-3xl md:text-4xl text-white/40 align-top ml-2 font-normal">®</span>
</h1>
<p class="text-2xl md:text-3xl font-medium tracking-wide text-white/70">
                Divide gastos, <span class="gradient-text font-bold">multiplica momentos</span>
</p>
</div>
<div class="absolute bottom-16 w-full flex justify-center gap-12 opacity-60">
<div class="flex items-center gap-2 border border-white/10 rounded-2xl px-6 py-3 bg-white/5">
<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
<span class="text-sm font-medium tracking-widest uppercase">Estética Premium</span>
</div>
<div class="flex items-center gap-2 border border-white/10 rounded-2xl px-6 py-3 bg-white/5">
<div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
<span class="text-sm font-medium tracking-widest uppercase">Identidad Neón</span>
</div>
</div>
</main>
<div class="fixed bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/20 rounded-full md:hidden"></div>

</body></html>
