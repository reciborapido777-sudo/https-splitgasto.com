<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro Gasto - Marketing Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102221",
                        "amoled": "#050a0a"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050a0a;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(13, 242, 223, 0.2);
        }
        .glass-panel {
            background: rgba(24, 52, 50, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(13, 242, 223, 0.1);
        }
        .canvas-1920-1080 {
            width: 1920px;
            height: 1080px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .phone-frame {
            width: 440px;
            height: 880px;
            border-radius: 60px;
            border: 8px solid #1a2e2c;
            background: #102221;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5), 0 0 40px rgba(13, 242, 223, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-amoled text-white flex items-center justify-center min-h-screen">
<!-- Marketing Canvas 1920x1080 -->
<div class="canvas-1920-1080">
<!-- Abstract Background Elements for 3D Depth -->
<div class="absolute top-[-10%] left-[-5%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
<!-- Top Headline: Centered -->
<div class="mb-12 text-center z-10">
<h1 class="text-white text-6xl font-bold tracking-tight mb-2">Registra gastos</h1>
<p class="text-primary text-xl font-medium tracking-widest uppercase opacity-80">Control total y simétrico</p>
</div>
<!-- Device Container: Perfectly Centered -->
<div class="phone-frame z-10">
<!-- Top App Bar Interface -->
<div class="flex items-center justify-between px-8 pt-12 pb-6">
<span class="material-symbols-outlined text-primary text-2xl">arrow_back_ios</span>
<h2 class="text-white text-xl font-bold">Nuevo Gasto</h2>
<span class="material-symbols-outlined text-primary text-2xl">settings</span>
</div>
<!-- Amount Section: Centered -->
<div class="flex flex-col items-center justify-center py-10">
<p class="text-[#90cbc6] text-sm font-medium mb-1">IMPORTE TOTAL</p>
<h1 class="text-white tracking-tight text-[64px] font-bold leading-none">-$85.50</h1>
<div class="h-1 w-16 bg-primary rounded-full mt-4"></div>
</div>
<!-- Transaction Card: Float Effect -->
<div class="px-6 mb-6">
<div class="flex items-center gap-4 rounded-2xl glass-panel p-5 shadow-2xl">
<div class="w-14 h-14 rounded-xl bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">restaurant</span>
</div>
<div class="flex-1">
<div class="flex flex-col gap-0.5">
<p class="text-[#90cbc6] text-xs font-normal opacity-70">Hoy, 20:30</p>
<p class="text-white text-lg font-bold leading-tight">Cena Amigos</p>
<p class="text-primary text-xs font-semibold tracking-wide">COMIDA Y BEBIDA</p>
</div>
</div>
<span class="material-symbols-outlined text-[#90cbc6] opacity-50">edit</span>
</div>
</div>
<!-- Wheel Picker Selection -->
<div class="px-6 mb-8">
<div class="flex rounded-xl overflow-hidden bg-[#183432]/40 border border-[#224946]">
<div class="flex-1 py-3 text-center border-r border-[#224946]">
<p class="text-white/40 text-[10px] font-bold uppercase mb-1">Método</p>
<p class="text-white text-sm font-bold">Tarjeta</p>
</div>
<div class="flex-1 py-3 text-center border-r border-[#224946] bg-primary/10">
<p class="text-primary text-[10px] font-bold uppercase mb-1">Categoría</p>
<p class="text-primary text-sm font-bold">Ocio</p>
</div>
<div class="flex-1 py-3 text-center">
<p class="text-white/40 text-[10px] font-bold uppercase mb-1">Moneda</p>
<p class="text-white text-sm font-bold">EUR</p>
</div>
</div>
</div>
<!-- Keyboard Interface Simulation -->
<div class="mt-auto bg-black/40 pt-6 pb-10 px-8 rounded-t-[40px]">
<div class="grid grid-cols-3 gap-6 mb-8">
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">1</button>
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">2</button>
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">3</button>
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">4</button>
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">5</button>
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">6</button>
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">7</button>
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">8</button>
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">9</button>
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">.</button>
<button class="text-2xl font-bold text-white h-12 flex items-center justify-center">0</button>
<button class="text-white h-12 flex items-center justify-center">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<!-- Main Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 transition-all text-background-dark font-bold text-lg py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">check_circle</span>
                    Confirmar Gasto
                </button>
</div>
<!-- Home Indicator -->
<div class="flex justify-center pb-2">
<div class="w-32 h-1.5 bg-white/20 rounded-full"></div>
</div>
</div>
<!-- Floating Decorative 3D Elements (Symmetrical) -->
<div class="absolute left-[15%] top-[50%] -translate-y-1/2 opacity-20 hidden xl:block">
<div class="w-64 h-64 border-2 border-primary rounded-3xl rotate-12 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[120px] -rotate-12">account_balance_wallet</span>
</div>
</div>
<div class="absolute right-[15%] top-[50%] -translate-y-1/2 opacity-20 hidden xl:block">
<div class="w-64 h-64 border-2 border-primary rounded-3xl -rotate-12 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[120px] rotate-12">insights</span>
</div>
</div>
</div>
</body></html>
