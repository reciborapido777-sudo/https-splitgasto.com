<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#000000", // AMOLED Absolute Black
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .metallic-logo {
            background: linear-gradient(135deg, #ff8c00 0%, #7f13ec 100%);
            box-shadow: 
                0 0 40px 10px rgba(127, 19, 236, 0.3),
                inset -4px -4px 12px rgba(0,0,0,0.4),
                inset 4px 4px 12px rgba(255,255,255,0.3);
            position: relative;
        }
        .metallic-logo::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 100%);
            border-radius: inherit;
        }
        .glow-aura {
            background: radial-gradient(circle, rgba(127, 19, 236, 0.15) 0%, rgba(0,0,0,0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display antialiased overflow-hidden">
<!-- Main Marketing Canvas 1920x1080 concept (Screen Fit) -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-8 overflow-hidden">
<!-- Background Subtle Glow -->
<div class="glow-aura absolute inset-0 pointer-events-none"></div>
<!-- Central Content Container -->
<div class="relative z-10 flex flex-col items-center text-center gap-12 max-w-4xl">
<!-- 3D Metallic S Logo -->
<div class="relative group">
<!-- Abstract Glow Behind Logo -->
<div class="absolute -inset-8 bg-primary/20 blur-3xl rounded-full opacity-50 group-hover:opacity-75 transition-opacity"></div>
<!-- The "S" Metallic Element -->
<div class="metallic-logo flex items-center justify-center w-48 h-48 @[480px]:w-64 @[480px]:h-64 rounded-xl border border-white/10 overflow-hidden transform hover:scale-105 transition-transform duration-500">
<span class="text-white text-8xl @[480px]:text-9xl font-black italic tracking-tighter select-none drop-shadow-2xl z-20">
                        S
                    </span>
<!-- Reflection Overlay -->
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/20 to-transparent pointer-events-none"></div>
</div>
</div>
<!-- Brand Section -->
<div class="flex flex-col gap-4">
<h1 class="text-white text-6xl @[480px]:text-8xl font-black tracking-[-0.05em] leading-tight">
                    SplitGasto®
                </h1>
<div class="flex flex-col items-center gap-6">
<!-- Elegant Divider -->
<div class="w-16 h-1 bg-gradient-to-r from-transparent via-primary to-transparent rounded-full opacity-60"></div>
<h2 class="text-white/80 text-xl @[480px]:text-2xl font-light tracking-[0.2em] uppercase leading-relaxed max-w-2xl">
                        Divide gastos, multiplica momentos
                    </h2>
</div>
</div>
<!-- Subtle Interaction Indicator for Promo (Optional for Static Image) -->
<div class="mt-8 flex items-center gap-2 text-white/40 uppercase text-xs tracking-[0.4em] font-medium">
<span class="material-symbols-outlined text-sm">workspace_premium</span>
                Experiencia Premium
            </div>
</div>
<!-- Decorative Corners (Futuristic elements) -->
<div class="absolute top-12 left-12 w-12 h-12 border-t-2 border-l-2 border-white/10 rounded-tl-lg"></div>
<div class="absolute top-12 right-12 w-12 h-12 border-t-2 border-r-2 border-white/10 rounded-tr-lg"></div>
<div class="absolute bottom-12 left-12 w-12 h-12 border-b-2 border-l-2 border-white/10 rounded-bl-lg"></div>
<div class="absolute bottom-12 right-12 w-12 h-12 border-b-2 border-r-2 border-white/10 rounded-br-lg"></div>
<!-- Floating Abstract Accents -->
<div class="absolute top-1/4 -left-20 w-64 h-64 bg-primary/10 blur-[100px] rounded-full"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-[#ff8c00]/5 blur-[100px] rounded-full"></div>
</div>
<!-- Hidden HeroSection component structure for compliance, modified for the visual -->
<div class="hidden">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-dark">
<div class="@container">
<div class="@[480px]:p-4">
<div class="flex min-h-[480px] flex-col gap-6 bg-cover bg-center bg-no-repeat @[480px]:gap-8 @[480px]:rounded-xl items-center justify-center p-4" data-alt="Futuristic dark metallic background with purple and orange accents" style="background-image: radial-gradient(circle, rgba(127, 19, 236, 0.2) 0%, rgba(0, 0, 0, 1) 100%);">
<div class="flex flex-col gap-2 text-center">
<h1 class="text-white text-4xl font-black leading-tight tracking-[-0.033em] @[480px]:text-5xl">
                                SplitGasto®
                            </h1>
<h2 class="text-white text-sm font-normal">Divide gastos, multiplica momentos</h2>
</div>
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-4 bg-primary text-white text-sm font-bold">
<span class="truncate">Comenzar</span>
</button>
</div>
</div>
</div>
</div>
</div>
</body></html>
