<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Marketing SplitGasto - Bienvenida</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c2bee",
                        "background-light": "#f7f6f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .logo-gradient {
            background: linear-gradient(135deg, #ff8c00 0%, #8c2bee 100%);
        }
        body {
            background-color: #000000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<!-- Marketing Container: Designed for 1920x1080 visual impact but responsive -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-center bg-background-dark overflow-hidden">
<!-- Center Content Wrapper -->
<div class="flex flex-col items-center justify-center px-6 text-center max-w-[1920px]">
<!-- Logo 'S' with Gradient -->
<div class="relative mb-10">
<div class="logo-gradient w-48 h-48 md:w-64 md:h-64 rounded-xl flex items-center justify-center shadow-2xl shadow-primary/20">
<span class="text-white text-[100px] md:text-[140px] font-extrabold tracking-tighter select-none">S</span>
</div>
<!-- Subtle glow effect behind logo -->
<div class="absolute inset-0 logo-gradient blur-[80px] opacity-30 -z-10"></div>
</div>
<!-- Brand Name: SPLITGASTO -->
<h1 class="text-white text-5xl md:text-8xl font-extrabold tracking-[0.15em] mb-6 drop-shadow-sm uppercase">
                SPLITGASTO
            </h1>
<!-- Slogan: Divide gastos, multiplica momentos -->
<p class="text-white/70 text-lg md:text-2xl font-light tracking-wide max-w-2xl leading-relaxed">
                Divide gastos, multiplica momentos
            </p>
</div>
<!-- Decorative Elements for High-End feel -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none">
<div class="absolute top-[-10%] left-[-5%] w-1/3 h-1/3 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-1/3 h-1/3 bg-orange-500/10 rounded-full blur-[120px]"></div>
</div>
<!-- Component Simulation for Visual Consistency -->
<div class="hidden">
<!-- HeaderImage Mock -->
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-background-dark" data-alt="Abstract gradient showing orange merging into purple" style="background-image: linear-gradient(135deg, rgba(255,140,0,0.2) 0%, rgba(140,43,238,0.2) 100%);">
</div>
<!-- HeadlineText Mock -->
<h1 class="text-white tracking-light text-[32px] font-bold leading-tight px-4 text-center pb-3 pt-6 uppercase">SPLITGASTO</h1>
<!-- BodyText Mock -->
<p class="text-white text-base font-normal leading-normal pb-3 pt-1 px-4 text-center">Divide gastos, multiplica momentos</p>
</div>
</div>
</body></html>
