<!DOCTYPE html>
<html lang="es" class="dark" style="background-color:#050505">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Cara o Cruz | SplitGasto 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link rel="stylesheet" href="engine/global.css"/>
<style>
  :root { --cyan:#13ecd6; --purple:#a855f7; --orange:#FF9D42; }
  * { font-family:'Manrope',sans-serif; box-sizing:border-box; }
  body { background:#050505; min-height:100dvh; overflow-x:hidden; }

  .glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; }

  /* ─── 3D Coin ─── */
  #coin-scene {
    perspective:600px;
    width:200px; height:200px;
    margin:0 auto;
    cursor:pointer;
  }
  #coin {
    width:100%; height:100%;
    transform-style:preserve-3d;
    position:relative;
    transition:none;
  }
  .coin-face {
    position:absolute; inset:0;
    border-radius:50%;
    backface-visibility:hidden;
    display:flex; align-items:center; justify-content:center;
    border:4px solid rgba(19,236,214,0.3);
  }
  #coin-heads {
    background:radial-gradient(circle at 35% 35%, #2ae4d3 0%, #13ecd6 45%, #08a69a 100%);
    box-shadow:0 0 40px rgba(19,236,214,0.5), inset 0 2px 4px rgba(255,255,255,0.3), inset 0 -2px 4px rgba(0,0,0,0.3);
  }
  #coin-tails {
    transform:rotateY(180deg);
    background:radial-gradient(circle at 35% 35%, #c4a832 0%, #d4af37 45%, #8b7320 100%);
    box-shadow:0 0 40px rgba(212,175,55,0.5), inset 0 2px 4px rgba(255,255,255,0.3), inset 0 -2px 4px rgba(0,0,0,0.3);
    border-color:rgba(212,175,55,0.4);
  }
  .coin-inner {
    width:78%;
    height:78%;
    border-radius:50%;
    border:2px dashed;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:4px;
  }
  #coin-heads .coin-inner { border-color:rgba(255,255,255,0.3); }
  #coin-tails .coin-inner { border-color:rgba(255,255,255,0.25); }

  /* Coin shadow */
  #coin-shadow {
    width:80%; height:30px;
    background:radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%);
    border-radius:50%;
    filter:blur(10px);
    margin:0 auto;
    transition:opacity 0.3s;
  }

  /* Flip animation (set by JS) */
  @keyframes flip-heads { 0%{transform:rotateY(0)} 100%{transform:rotateY(1800deg)} }
  @keyframes flip-tails { 0%{transform:rotateY(0)} 100%{transform:rotateY(1980deg)} }
  .flip-heads { animation:flip-heads 2s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
  .flip-tails { animation:flip-tails 2s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

  /* Bounce landing */
  @keyframes coin-bounce { 0%{transform:rotateY(var(--end-rot)) translateY(0)} 30%{transform:rotateY(var(--end-rot)) translateY(-15px)} 60%{transform:rotateY(var(--end-rot)) translateY(-5px)} 100%{transform:rotateY(var(--end-rot)) translateY(0)} }

  /* Result glow */
  #result-card {
    transition:all 0.4s;
    border-radius:24px;
  }
  #result-card.heads-win {
    background:linear-gradient(135deg, rgba(19,236,214,0.15), rgba(19,236,214,0.05));
    border:1px solid rgba(19,236,214,0.4);
    box-shadow:0 0 40px rgba(19,236,214,0.2);
  }
  #result-card.tails-win {
    background:linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
    border:1px solid rgba(212,175,55,0.4);
    box-shadow:0 0 40px rgba(212,175,55,0.2);
  }

  /* Buttons */
  .choice-btn {
    border-radius:16px;
    font-weight:800;
    font-size:0.95rem;
    transition:all 0.2s;
    border:2px solid transparent;
    position:relative; overflow:hidden;
  }
  .choice-btn.selected-heads {
    background:rgba(19,236,214,0.15);
    border-color:var(--cyan);
    color:var(--cyan);
  }
  .choice-btn.selected-tails {
    background:rgba(212,175,55,0.15);
    border-color:#d4af37;
    color:#d4af37;
  }
  .choice-btn.idle {
    background:rgba(255,255,255,0.06);
    border-color:rgba(255,255,255,0.12);
  }
  #flip-btn {
    background:linear-gradient(135deg, var(--cyan), #0fbfaf);
    color:#050505;
    border-radius:50px;
    font-weight:800; font-size:1.1rem;
    box-shadow:0 8px 32px rgba(19,236,214,0.4);
    transition:all 0.2s;
  }
  #flip-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 40px rgba(19,236,214,0.6); }
  #flip-btn:disabled { opacity:0.5; cursor:not-allowed; }

  .bottom-nav { background:rgba(5,5,5,0.95); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.06); }

  .confetti-piece { position:fixed; border-radius:2px; animation:confetti-fall linear forwards; z-index:100; pointer-events:none; }
  @keyframes confetti-fall { from{transform:translateY(-20px) rotate(0deg);opacity:1} to{transform:translateY(110vh) rotate(720deg);opacity:0} }

  /* Ambient glow */
  .heads-glow { box-shadow:0 0 80px rgba(19,236,214,0.2); }
  .tails-glow { box-shadow:0 0 80px rgba(212,175,55,0.2); }

        .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 12px;cursor:pointer;transition:all .2s}
        .nav-item span.material-icons-round,.nav-item .mat-icon{font-size:20px;color:#4a4a4a;transition:color .2s}
        .nav-item p{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;color:#4a4a4a;transition:color .2s}
        .nav-item.active span.material-icons-round,.nav-item.active p{color:#13ecd6}
        .nav-item:hover span.material-icons-round,.nav-item:hover p{color:#fff}
</style>

<body class="text-white pb-32">

<!-- Header -->
<header class="flex justify-between items-center px-5 py-4 sticky top-0 z-50" style="background:rgba(5,5,5,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05)">

    <span class="material-icons-round" style="color:var(--cyan)">arrow_back_ios_new</span>
  </button>
  <div class="text-center">
    <h1 class="font-bold text-base">Cara o Cruz</h1>
    <p class="text-xs opacity-50">El Clásico de SplitGasto</p>
  </div>
  <div class="w-10 h-10 flex items-center justify-center rounded-full" style="background:rgba(255,255,255,0.07)">
    <span class="text-xs font-bold opacity-40" id="flip-count-hdr">×0</span>
  </div>
</header>

<main class="max-w-md mx-auto px-4 pt-6 space-y-5">

  <!-- Stats row -->
  <div class="grid grid-cols-3 gap-3">
    <div class="glass p-3 text-center">
      <p class="text-lg font-bold" style="color:var(--cyan)" id="heads-count">0</p>
      <p class="text-xs opacity-40">Cara</p>
    </div>
    <div class="glass p-3 text-center">
      <p class="text-lg font-bold text-white" id="total-flips">0</p>
      <p class="text-xs opacity-40">Total</p>
    </div>
    <div class="glass p-3 text-center">
      <p class="text-lg font-bold" style="color:#d4af37" id="tails-count">0</p>
      <p class="text-xs opacity-40">Cruz</p>
    </div>
  </div>

  <!-- Choice row (who calls?) -->
  <div class="glass p-4">
    <p class="text-xs font-bold uppercase tracking-widest opacity-40 mb-3">¿Quién elige?</p>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <p class="text-xs opacity-50 mb-2" id="player1-name">Commander</p>
        <div class="flex gap-2">
          <button class="choice-btn flex-1 py-2 px-3 text-sm idle" id="p1-heads" onclick="selectChoice('p1','heads')">👆 Cara</button>
          <button class="choice-btn flex-1 py-2 px-3 text-sm idle" id="p1-tails" onclick="selectChoice('p1','tails')">✋ Cruz</button>
        </div>
      </div>
      <div>
        <p class="text-xs opacity-50 mb-2" id="player2-name">Mario</p>
        <div class="flex gap-2">
          <button class="choice-btn flex-1 py-2 px-3 text-sm idle" id="p2-heads" onclick="selectChoice('p2','heads')">👆 Cara</button>
          <button class="choice-btn flex-1 py-2 px-3 text-sm idle" id="p2-tails" onclick="selectChoice('p2','tails')">✋ Cruz</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 3D Coin -->
  <div class="flex flex-col items-center py-4 gap-4">
    <div id="coin-scene" onclick="tapCoin()">
      <div id="coin">
        <div class="coin-face" id="coin-heads">
          <div class="coin-inner">
            <span class="material-icons-round text-white text-3xl">account_balance_wallet</span>
            <span class="text-white text-xs font-black tracking-widest">CARA</span>
          </div>
        </div>
        <div class="coin-face" id="coin-tails">
          <div class="coin-inner">
            <span class="material-icons-round text-white text-3xl">monetization_on</span>
            <span class="text-white text-xs font-black tracking-widest">CRUZ</span>
          </div>
        </div>
      </div>
    </div>
    <div id="coin-shadow"></div>
    <p class="text-xs opacity-30">Toca la moneda o usa el botón</p>
  </div>

  <!-- Result card -->
  <div id="result-card" class="hidden p-5 text-center">
    <div class="text-4xl mb-2" id="result-emoji">🪙</div>
    <p class="text-2xl font-extrabold mb-1" id="result-title">—</p>
    <p class="text-sm opacity-60" id="result-sub">—</p>
    <div class="mt-4 flex justify-center gap-3">
      <button onclick="confirmResult()" class="px-5 py-2 rounded-full font-bold text-sm" style="background:var(--cyan);color:#050505">
        Confirmar
      </button>
      <button onclick="resetCoin()" class="px-5 py-2 rounded-full font-bold text-sm" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15)">
        Repetir
      </button>
    </div>
  </div>

  <!-- Flip button -->
  <button id="flip-btn" class="w-full py-5" onclick="flipCoin()">
    <span class="flex items-center justify-center gap-2">
      <span class="material-icons-round">toll</span>
      ¡LANZAR MONEDA!
    </span>
  </button>

  <!-- History -->
  <div class="glass p-5">
    <h3 class="font-bold text-sm mb-3">Historial</h3>
    <div id="history" class="space-y-1">
      <p class="text-xs opacity-30 text-center py-2">Sin lanzamientos aún</p>
    </div>
  </div>

</main>

<!-- Bottom Nav -->
<nav class="bottom-nav fixed bottom-0 left-0 right-0 flex justify-around items-center px-4 py-3 pb-6">
  <button onclick="SGRouter.navigate('dashboard')" class="flex flex-col items-center gap-1 opacity-40">
    <span class="material-icons-round text-xl">home</span>
    <span class="text-[10px]">Inicio</span>
  </button>

    <span class="text-[10px]">Grupos</span>
  </button>
  <button class="flex flex-col items-center gap-1" style="color:var(--cyan)">
    <span class="material-icons-round text-xl">casino</span>
    <span class="text-[10px]">Juegos</span>
  </button>
  <button onclick="SGRouter.navigate('vault')" class="flex flex-col items-center gap-1 opacity-40">
    <span class="material-icons-round text-xl">account_balance_wallet</span>
    <span class="text-[10px]">Bóveda</span>
  </button>
  <button onclick="SGRouter.navigate('profile')" class="flex flex-col items-center gap-1 opacity-40">
    <span class="material-icons-round text-xl">person</span>
    <span class="text-[10px]">Perfil</span>
  </button>
</nav>

<script src="engine/router.js"></script>
<script>
let headsCount = 0, tailsCount = 0, totalFlips = 0;
let isFlipping = false;
let choices = {p1: null, p2: null};
let history = [];
const players = [{name:'Commander', color:'#13ecd6'}, {name:'Mario', color:'#a855f7'}];
let lastResult = null;

function selectChoice(player, side) {
  choices[player] = side;
  const other = player === 'p1' ? 'p2' : 'p1';
  // Auto-select opposite for other player if not chosen
  if (!choices[other]) {
    const otherSide = side === 'heads' ? 'tails' : 'heads';
    choices[other] = otherSide;
    updateChoiceButtons(other, otherSide);
  }
  updateChoiceButtons(player, side);
}

function updateChoiceButtons(player, side) {
  const h = document.getElementById(`${player}-heads`);
  const t = document.getElementById(`${player}-tails`);
  h.className = `choice-btn flex-1 py-2 px-3 text-sm ${side==='heads'?'selected-heads':'idle'}`;
  t.className = `choice-btn flex-1 py-2 px-3 text-sm ${side==='tails'?'selected-tails':'idle'}`;
}

function tapCoin() { if (!isFlipping) flipCoin(); }

function flipCoin() {
  if (isFlipping) return;
  isFlipping = true;

  document.getElementById('flip-btn').disabled = true;
  document.getElementById('result-card').classList.add('hidden');

  const coin = document.getElementById('coin');
  coin.style.animation = 'none';
  coin.style.transform = '';

  // Determine result
  const result = Math.random() < 0.5 ? 'heads' : 'tails';
  lastResult = result;

  // Apply flip animation
  const animClass = result === 'heads' ? 'flip-heads' : 'flip-tails';
  void coin.offsetWidth; // reflow
  coin.classList.remove('flip-heads', 'flip-tails');
  coin.classList.add(animClass);

  // Shadow animation
  const shadow = document.getElementById('coin-shadow');
  shadow.style.opacity = '0.3';

  setTimeout(() => {
    shadow.style.opacity = '0.6';
    coin.classList.remove('flip-heads', 'flip-tails');
    coin.style.transform = result === 'heads' ? 'rotateY(0deg)' : 'rotateY(180deg)';

    // Update counts
    if (result === 'heads') headsCount++;
    else tailsCount++;
    totalFlips++;

    document.getElementById('heads-count').textContent = headsCount;
    document.getElementById('tails-count').textContent = tailsCount;
    document.getElementById('total-flips').textContent = totalFlips;
    document.getElementById('flip-count-hdr').textContent = `×${totalFlips}`;

    // Determine winner
    showResult(result);

    isFlipping = false;
    document.getElementById('flip-btn').disabled = false;
  }, 2100);
}

function showResult(result) {
  const isHeads = result === 'heads';
  const resultCard = document.getElementById('result-card');
  resultCard.classList.remove('hidden', 'heads-win', 'tails-win');
  resultCard.classList.add(isHeads ? 'heads-win' : 'tails-win');

  // Determine who wins
  let winnerMsg = '';
  if (choices.p1 || choices.p2) {
    const p1Won = choices.p1 === result;
    const p2Won = choices.p2 === result;
    if (p1Won) winnerMsg = `¡${players[0].name} gana!`;
    else if (p2Won) winnerMsg = `¡${players[1].name} gana!`;
    else winnerMsg = 'Ninguno acertó – repetir';
  } else {
    winnerMsg = isHeads ? `${players[0].name} paga` : `${players[1].name} paga`;
  }

  document.getElementById('result-emoji').textContent = isHeads ? '👆' : '✋';
  document.getElementById('result-title').textContent = isHeads ? '¡CARA!' : '¡CRUZ!';
  document.getElementById('result-title').style.color = isHeads ? 'var(--cyan)' : '#d4af37';
  document.getElementById('result-sub').textContent = winnerMsg;

  // History
  const time = new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
  history.unshift({result, label: isHeads?'CARA':'CRUZ', time, winner: winnerMsg});
  renderHistory();

  launchConfetti(isHeads ? '#13ecd6' : '#d4af37');
  SGRouter.showToast(isHeads ? '¡Cara! 👆' : '¡Cruz! ✋', 'success');
}

function renderHistory() {
  const el = document.getElementById('history');
  if (history.length === 0) {
    el.innerHTML = '<p class="text-xs opacity-30 text-center py-2">Sin lanzamientos aún</p>';
    return;
  }
  el.innerHTML = history.slice(0,6).map((h, i) => `
    <div class="flex items-center justify-between py-1 ${i>0?'border-t border-white/5':''}">
      <div class="flex items-center gap-2">
        <span class="text-xs font-black px-2 py-0.5 rounded-full" style="background:${h.result==='heads'?'rgba(19,236,214,0.15)':'rgba(212,175,55,0.15)'};color:${h.result==='heads'?'#13ecd6':'#d4af37'}">${h.label}</span>
        <span class="text-xs opacity-60">${h.winner}</span>
      </div>
      <span class="text-xs opacity-30">${h.time}</span>
    </div>`).join('');
}

function resetCoin() {
  const coin = document.getElementById('coin');
  coin.style.transition = 'transform 0.5s ease';
  coin.style.transform = 'rotateY(0deg)';
  lastResult = null;
  choices = {p1: null, p2: null};
  // Reset choice buttons
  ['p1','p2'].forEach(p => {
    ['heads','tails'].forEach(s => {
      document.getElementById(`${p}-${s}`).className = 'choice-btn flex-1 py-2 px-3 text-sm idle';
    });
  });
  document.getElementById('result-card').classList.add('hidden');
}

function confirmResult() {
  SGRouter.showToast('Resultado confirmado ✓', 'success');
  document.getElementById('result-card').classList.add('hidden');
  setTimeout(() => SGRouter.navigate('split', 'game-coin'), 1200);
}

function launchConfetti(color) {
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}vw;top:-20px;background:${Math.random()>0.5?color:'#ffffff'};width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>0.5?'50%':'2px'}`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}

// Init
document.getElementById('player1-name').textContent = players[0].name;
document.getElementById('player2-name').textContent = players[1].name;
</script>
