<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Welcome to SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .amoled-gradient-s {
            background: linear-gradient(135deg, #f48c25 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-container {
            background: radial-gradient(circle, rgba(244, 140, 37, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white transition-colors duration-300">
<!-- Main Container for iOS Phone Form Factor -->
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-[430px] mx-auto bg-background-light dark:bg-background-dark">
<!-- Top Section: Logo & Branding -->
<div class="flex flex-col items-center justify-center flex-grow pt-16 px-6">
<!-- Stylized S Logo -->
<div class="logo-container relative w-32 h-32 flex items-center justify-center mb-8">
<div class="text-7xl font-bold amoled-gradient-s select-none">
                    S
                </div>
<!-- Subtle glow effect behind logo -->
<div class="absolute inset-0 bg-primary/10 blur-3xl rounded-full"></div>
</div>
<!-- Headline Section -->
<div class="text-center space-y-2">
<h1 class="text-4xl font-bold tracking-tight text-gray-900 dark:text-white">
                    SplitGasto
                </h1>
<p class="text-gray-500 dark:text-gray-400 text-lg font-normal leading-snug max-w-[280px] mx-auto">
                    Split expenses, multiply moments
                </p>
</div>
</div>
<!-- Middle Section: Authentication Buttons -->
<div class="px-6 pb-12 w-full max-w-[480px] mx-auto">
<div class="flex flex-col gap-4">
<!-- Primary Action: Email -->
<button class="flex items-center justify-center gap-3 w-full h-[56px] bg-primary text-black font-bold text-base rounded-full shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined !text-[24px]">mail</span>
<span>Continue with Email</span>
</button>
<!-- Secondary Action: Google -->
<button class="flex items-center justify-center gap-3 w-full h-[56px] bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-white font-semibold text-base rounded-full active:scale-[0.98] transition-transform">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
<span>Continue with Google</span>
</button>
<!-- Secondary Action: Apple -->
<button class="flex items-center justify-center gap-3 w-full h-[56px] bg-black text-white dark:bg-white dark:text-black border border-white/10 font-semibold text-base rounded-full active:scale-[0.98] transition-transform">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.78-3.19 1.76-1.11-.02-1.47-.7-2.73-.7-1.26 0-1.66.68-2.71.72-1.14.04-2.29-.89-3.32-2.35-2.09-2.98-1.6-7.65 1.15-9.35 1.37-.85 2.89-.35 3.75.16.86.51 1.49.52 2.38 0 .66-.39 2.27-1.01 3.65-.18.59.24 2.22 1.25 2.68 3.12-2.7 3.01-2.27 6.41-.08 8.81zm-4.71-15.1c0-1.74 1.42-3.23 3.12-3.18.15 1.79-1.38 3.46-3.12 3.18z"></path>
</svg>
<span>Continue with Apple</span>
</button>
</div>
</div>
<!-- Bottom Section: Sign Up Link -->
<div class="pb-10 pt-4 text-center">
<a class="text-sm font-medium text-gray-500 dark:text-gray-400 hover:text-primary transition-colors inline-block group" href="#">
                Don't have an account? 
                <span class="text-primary font-bold ml-1 border-b border-primary/30 group-hover:border-primary">Sign up</span>
</a>
</div>
<!-- Background visual element (abstract gradient) -->
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
</div>
</body></html>
