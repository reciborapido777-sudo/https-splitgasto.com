<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitGasto - Realizar Pago</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00E5FF", // Cyan Neon
                        accent: "#7000FF", // Purple Neon
                        "background-dark": "#000000", // AMOLED Black
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1.5rem",
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 30px rgba(0, 229, 255, 0.5)',
                        'neon-purple': '0 0 30px rgba(112, 0, 255, 0.4)',
                        '3d-btn': '0 10px 0px #008ba3, 0 15px 30px rgba(0, 229, 255, 0.4)',
                        '3d-btn-active': '0 2px 0px #008ba3, 0 5px 15px rgba(0, 229, 255, 0.2)',
                    }
                },
            },
        };
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .neon-text-cyan {
                text-shadow: 0 0 10px rgba(0, 229, 255, 0.8), 0 0 20px rgba(0, 229, 255, 0.4);
            }
            .glass-card {
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .btn-3d {
                transition: all 0.1s ease;
                transform: translateY(-4px);
            }
            .btn-3d:active {
                transform: translateY(4px);
                box-shadow: theme('boxShadow.3d-btn-active');
            }
            .floating {
                animation: floating-anim 3s ease-in-out infinite;
            }
            .floating-delayed {
                animation: floating-anim 3.5s ease-in-out infinite;
                animation-delay: 0.5s;
            }
            @keyframes floating-anim {
                0%, 100% { transform: translateY(0px); }
                50% { transform: translateY(-15px); }
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-dark font-display text-white min-h-screen flex items-center justify-center overflow-hidden">
<div class="relative w-full max-w-[430px] aspect-[9/19.5] flex flex-col items-center justify-between p-10 overflow-hidden bg-background-dark border-x border-white/5 shadow-2xl">

</div>
<span class="text-[10px] font-bold tracking-[0.2em] text-primary/70">BIZUM</span>
</div>

<div class="w-8 h-8 bg-gradient-to-tr from-orange-400 via-pink-500 to-purple-600 rounded-lg flex items-center justify-center font-black text-white text-sm">S</div>
<div class="text-lg font-bold tracking-tight text-white/90">SplitGasto<span class="text-[10px] align-top">®</span></div>
