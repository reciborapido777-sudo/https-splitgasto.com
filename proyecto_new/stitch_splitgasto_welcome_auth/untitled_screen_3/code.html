<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102221",
                        "amoled-black": "#000000"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        .scanning-beam {
            background: linear-gradient(to bottom, transparent, #0df2df, transparent);
            height: 4px;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px #0df2df;
            animation: scan 3s infinite linear;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .focus-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #0df2df;
            filter: drop-shadow(0 0 5px #0df2df);
        }
        .camera-overlay {
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.6) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Bar -->
<div class="fixed top-0 left-0 right-0 z-50 flex items-center bg-transparent p-4 justify-between">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-md">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">IA Scanner</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex size-10 items-center justify-center rounded-full bg-black/40 text-white backdrop-blur-md">
<span class="material-symbols-outlined">flash_on</span>
</button>
</div>
</div>
<!-- Main Viewfinder Area -->
<div class="relative flex-1 w-full bg-black overflow-hidden flex items-center justify-center">
<!-- Mock Camera Feed -->
<div class="absolute inset-0 w-full h-full bg-slate-900 overflow-hidden">
<img alt="Receipt scanning background" class="w-full h-full object-cover opacity-60 grayscale-[30%]" data-alt="A retail receipt laying on a wooden surface for scanning" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBNObIZqdWBFxsKXFMIgbRMhqXDddx1u7d86Gmo7XQsJ4NKUHyk2y7yl_MFuYbjRz9KOX2u1CUMTUS6ZmaJLpm26n5Du5dTX4TLKyhFIYrddrFLH-pe3hU2Cagjs0lVeh_xTQO70e_-H8uVvydyD4r_ZwicpoQ1V7l_OqJsXgOPTrcWL6pQ1AzO_9w5KCJirB5M-llub3gm8_tumbTuLzW4DD__5jWuFchRYeKUnUoD89JB9H3V1KsEZu64Vu3tPf62YgynvIO-WzQB"/>
<div class="absolute inset-0 camera-overlay"></div>
</div>
<!-- Floating Instruction Bubble -->
<div class="absolute top-20 left-1/2 -translate-x-1/2 z-40 w-[85%] max-w-sm">
<div class="bg-black/60 backdrop-blur-xl border border-white/10 px-4 py-3 rounded-2xl flex items-center gap-3">
<div class="bg-primary/20 p-1 rounded-full">
<span class="material-symbols-outlined text-primary text-sm">auto_awesome</span>
</div>
<p class="text-white text-xs sm:text-sm font-medium leading-tight">Alinea el ticket para detectar el importe automáticamente</p>
</div>
</div>
<!-- Smart Focus Frame -->
<div class="relative w-[70%] aspect-[3/5] max-h-[60vh] border border-white/20 rounded-xl overflow-hidden">
<!-- Corners -->
<div class="focus-corner top-0 left-0 border-t-4 border-l-4 rounded-tl-xl"></div>
<div class="focus-corner top-0 right-0 border-t-4 border-r-4 rounded-tr-xl"></div>
<div class="focus-corner bottom-0 left-0 border-b-4 border-l-4 rounded-bl-xl"></div>
<div class="focus-corner bottom-0 right-0 border-b-4 border-r-4 rounded-br-xl"></div>
<!-- Scanning Beam Animation -->
<div class="scanning-beam"></div>
<!-- AI Pulse Indicator -->
<div class="absolute top-4 right-4 flex items-center gap-2">
<span class="flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-primary">IA Activa</span>
</div>
</div>
<!-- Progress Bar (Scanning indicator) -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[60%] flex flex-col gap-2">
<div class="flex justify-between items-end">
<p class="text-white/80 text-[10px] font-medium uppercase tracking-wider">Analizando datos...</p>
<p class="text-primary text-[10px] font-bold">82%</p>
</div>
<div class="h-1 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full shadow-[0_0_10px_#0df2df]" style="width: 82%;"></div>
</div>
</div>
</div>
<!-- Bottom Camera Controls (AMOLED Black) -->
<div class="bg-amoled-black pb-10 pt-6 px-8">
<div class="flex items-center justify-between max-w-sm mx-auto">
<!-- Gallery Icon -->
<button class="flex flex-col items-center gap-1 group">
<div class="size-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white group-active:scale-95 transition-transform">
<span class="material-symbols-outlined">image</span>
</div>
<span class="text-[10px] text-white/50 uppercase tracking-tighter font-bold">Galería</span>
</button>
<!-- Shutter Button -->
<button class="relative flex items-center justify-center size-20 active:scale-90 transition-transform">
<div class="absolute inset-0 rounded-full border-2 border-primary/30"></div>
<div class="absolute inset-1 rounded-full border-2 border-white/80"></div>
<div class="size-14 rounded-full bg-white flex items-center justify-center">
<span class="material-symbols-outlined text-amoled-black text-3xl">photo_camera</span>
</div>
</button>
<!-- Manual Mode / Toggle -->
<button class="flex flex-col items-center gap-1 group">
<div class="size-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white group-active:scale-95 transition-transform">
<span class="material-symbols-outlined">edit_note</span>
</div>
<span class="text-[10px] text-white/50 uppercase tracking-tighter font-bold">Manual</span>
</button>
</div>
</div>
<!-- Bottom Navigation Bar Overlay (For Platform consistency) -->
<div class="fixed bottom-0 left-0 right-0 h-1 bg-amoled-black flex justify-center">
<div class="w-32 h-1.5 bg-white/20 rounded-full mt-2"></div>
</div>
</body></html>
