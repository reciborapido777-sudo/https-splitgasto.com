<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // Absolute black for AMOLED
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-cyan {
            box-shadow: 0 0 15px rgba(13, 242, 242, 0.3);
        }
        .gradient-check {
            background: linear-gradient(135deg, #ff8c00 0%, #a020f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Notification Banner Container -->
<div class="relative w-full max-w-[400px] bg-background-light dark:bg-background-dark border border-primary/20 rounded-2xl glow-cyan overflow-hidden flex flex-col items-stretch">
<!-- BottomSheetHandle used at the top for iOS feel -->
<div class="flex flex-col items-center pt-3">
<div class="h-1.5 w-12 rounded-full bg-gray-300 dark:bg-[#316868]/40"></div>
</div>
<!-- Hero Iconography Section -->
<div class="flex justify-center items-center pt-8 pb-4 relative">
<div class="relative flex items-center justify-center">
<!-- Tech Brain Icon -->
<span class="material-symbols-outlined text-primary text-[80px] opacity-80">
                    psychology
                </span>
<!-- Verified Check with Orange-Purple Gradient -->
<div class="absolute -bottom-2 -right-2 bg-white dark:bg-black rounded-full p-1 border-2 border-background-dark">
<span class="material-symbols-outlined text-[32px] gradient-check font-bold">
                        verified
                    </span>
</div>
</div>
</div>
<!-- HeadlineText Component -->
<div class="px-6">
<h1 class="text-gray-900 dark:text-white tracking-tight text-[28px] font-extrabold leading-tight text-center pb-2 pt-4">
                ¡REPARTO IA COMPLETADO!
            </h1>
</div>
<!-- BodyText Component -->
<div class="px-8">
<p class="text-gray-600 dark:text-gray-300 text-[15px] font-normal leading-relaxed pb-6 text-center">
                La inteligencia artificial ha dividido el gasto basándose en vuestros hábitos. Cuentas claras en tiempo récord.
            </p>
</div>
<!-- Secondary Info Label -->
<div class="flex justify-center pb-2">
<div class="flex items-center gap-1.5 px-3 py-1 rounded-full bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary text-[14px]">auto_awesome</span>
<span class="text-[10px] font-bold text-primary uppercase tracking-widest">Powered by SplitGasto AI</span>
</div>
</div>
<!-- SingleButton Component -->
<div class="px-6 py-6 mt-2">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-[#000000] text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 active:scale-95 transition-transform">
<span class="truncate">VER DETALLES</span>
</button>
</div>
<!-- Subtle Glow Edge Decoration -->
<div class="h-1 w-full bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
</div>
<!-- Hidden visual decorative element for background depth -->
<div class="fixed -z-10 top-0 left-0 w-full h-full pointer-events-none overflow-hidden opacity-30">
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px]"></div>
</div>
</body></html>
