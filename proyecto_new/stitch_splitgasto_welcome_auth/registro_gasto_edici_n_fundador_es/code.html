<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro Gasto: Edición Fundador</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#f2cc0d",
              "background-light": "#f8f8f5",
              "background-dark": "#000000",
            },
            fontFamily: {
              "display": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .founder-gradient-border {
            position: relative;
            background: #000000;
            background-clip: padding-box;
            border: 2px solid transparent;
        }
        .founder-gradient-border::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            z-index: -1;
            margin: -2px;
            border-radius: inherit;
            background: linear-gradient(135deg, #f2cc0d 0%, #7d6b0a 50%, #f2cc0d 100%);
        }
        .luxury-button {
            background: linear-gradient(135deg, #ff8a00 0%, #da1b60 50%, #8e2de2 100%);
            position: relative;
            overflow: hidden;
        }
        .luxury-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(circle, #f2cc0d 1px, transparent 1px);
            background-size: 10px 10px;
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white">
<div class="relative flex h-auto min-h-screen w-full flex-col max-w-[480px] mx-auto overflow-x-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-background-dark p-4 pb-2 justify-between">
<div class="text-white flex size-12 shrink-0 items-center">
<span class="material-symbols-outlined cursor-pointer">close</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Añadir Gasto</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-xl h-12 bg-transparent text-primary gap-2 text-base font-bold">
<span class="material-symbols-outlined">workspace_premium</span>
</button>
</div>
</div>
<!-- Founder Badge -->
<div class="px-4 py-2">
<div class="bg-primary/10 border border-primary/30 rounded-full py-1.5 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary">stars</span>
<span class="text-primary text-xs font-bold tracking-[0.1em] uppercase">✨ MODO FUNDADOR ACTIVO ✨</span>
</div>
</div>
<!-- Amount Headline -->
<div class="flex flex-col items-center pt-8 pb-4">
<p class="text-primary/60 text-xs font-bold tracking-widest uppercase mb-1">Importe Total</p>
<div class="flex items-center gap-1">
<span class="text-primary text-2xl font-bold leading-none mt-2">$</span>
<h1 class="text-white tracking-tight text-[56px] font-extrabold leading-tight">0.00</h1>
</div>
</div>
<!-- Form Fields -->
<div class="px-4 space-y-5 mt-4">
<!-- Description TextField with Founder Border -->
<div class="flex flex-col gap-2">
<label class="text-white/80 text-sm font-medium ml-1">Descripción</label>
<div class="founder-gradient-border rounded-xl flex items-center">
<input class="w-full bg-transparent border-none text-white placeholder:text-white/30 focus:ring-0 h-14 px-4 text-base" placeholder="¿En qué gastaste hoy, Socio?" type="text"/>
<span class="material-symbols-outlined text-primary/60 pr-4">edit_note</span>
</div>
</div>
<!-- Category Select with Founder Style -->
<div class="flex flex-col gap-2">
<label class="text-white/80 text-sm font-medium ml-1">Categoría</label>
<div class="founder-gradient-border rounded-xl">
<select class="w-full bg-transparent border-none text-white focus:ring-0 h-14 px-4 text-base appearance-none">
<option disabled="" selected="" value="">Selecciona una categoría</option>
<option class="bg-background-dark" value="comida">🍔 Comida y Bebida</option>
<option class="bg-background-dark" value="transporte">🚗 Transporte</option>
<option class="bg-background-dark" value="ocio">🎬 Entretenimiento</option>
<option class="bg-background-dark" value="hogar">🏠 Hogar</option>
</select>
</div>
</div>
<!-- Date and Split (Extra Section) -->
<div class="flex gap-4">
<div class="flex-1 flex flex-col gap-2">
<label class="text-white/80 text-sm font-medium ml-1">Fecha</label>
<div class="bg-white/5 border border-white/10 rounded-xl flex items-center h-14 px-4">
<span class="text-white text-base">Hoy</span>
<span class="material-symbols-outlined text-white/40 ml-auto">calendar_today</span>
</div>
</div>
<div class="flex-1 flex flex-col gap-2">
<label class="text-white/80 text-sm font-medium ml-1">Dividir con</label>
<div class="bg-white/5 border border-white/10 rounded-xl flex items-center h-14 px-4">
<div class="flex -space-x-2">
<div class="w-7 h-7 rounded-full bg-primary/20 border border-primary flex items-center justify-center text-[10px] font-bold">YO</div>
<div class="w-7 h-7 rounded-full bg-white/20 border border-background-dark flex items-center justify-center text-[10px] font-bold">+</div>
</div>
<span class="material-symbols-outlined text-white/40 ml-auto">group</span>
</div>
</div>
</div>
</div>
<!-- Quick Category Grid (Luxury Style) -->
<div class="px-4 mt-8">
<p class="text-white/50 text-[10px] font-bold tracking-widest uppercase mb-3 ml-1">Accesos Rápidos</p>
<div class="grid grid-cols-4 gap-3">
<div class="flex flex-col items-center gap-2 p-3 bg-white/5 rounded-xl border border-white/10 hover:border-primary/50 transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-primary/80 group-hover:text-primary">restaurant</span>
<span class="text-[10px] text-white/60">Cena</span>
</div>
<div class="flex flex-col items-center gap-2 p-3 bg-white/5 rounded-xl border border-white/10 hover:border-primary/50 transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-primary/80 group-hover:text-primary">directions_car</span>
<span class="text-[10px] text-white/60">Uber</span>
</div>
<div class="flex flex-col items-center gap-2 p-3 bg-white/5 rounded-xl border border-white/10 hover:border-primary/50 transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-primary/80 group-hover:text-primary">shopping_bag</span>
<span class="text-[10px] text-white/60">Súper</span>
</div>
<div class="flex flex-col items-center gap-2 p-3 bg-white/5 rounded-xl border border-white/10 hover:border-primary/50 transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-primary/80 group-hover:text-primary">payments</span>
<span class="text-[10px] text-white/60">Otros</span>
</div>
</div>
</div>
<!-- Footer Button -->
<div class="mt-auto p-4 pb-10">
<button class="luxury-button w-full py-5 rounded-2xl flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(242,204,13,0.3)]">
<span class="text-white font-extrabold text-lg tracking-wide uppercase">Guardar Gasto</span>
<span class="material-symbols-outlined text-white">bolt</span>
</button>
<p class="text-center text-primary/40 text-[10px] mt-4 font-medium italic">Privilegio de Socio Fundador • Sin Comisiones</p>
</div>
</div>
</body></html>
