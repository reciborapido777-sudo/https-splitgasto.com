<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inicio Liquidación 3D ES</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#06f9f9",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // AMOLED Black as requested
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-button {
            background: rgba(6, 249, 249, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 249, 249, 0.3);
            box-shadow: 0 0 20px rgba(6, 249, 249, 0.15);
        }
        .neon-glow {
            filter: drop-shadow(0 0 15px rgba(6, 249, 249, 0.6));
        }
        .coin-shadow {
            background: radial-gradient(circle, rgba(6, 249, 249, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white overflow-hidden">
<div class="relative flex h-screen w-full flex-col justify-between py-6">
<!-- TopAppBar Component -->
<div class="flex items-center px-4 pt-4 pb-2 justify-between z-10">
<div class="text-white flex size-12 shrink-0 items-center cursor-pointer" data-icon="close">
<span class="material-symbols-outlined text-3xl">close</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Saldando cuentas...</h2>
</div>
<!-- Hero 3D Area -->
<div class="relative flex-1 flex flex-col items-center justify-center">
<!-- Background Glow/Aura -->
<div class="absolute inset-0 flex items-center justify-center overflow-hidden">
<div class="w-96 h-96 coin-shadow rounded-full opacity-50 blur-3xl"></div>
<!-- Simulating Particles (Visual representation through CSS) -->
<div class="absolute w-full h-full">
<div class="absolute top-1/4 left-1/4 w-1 h-1 bg-primary rounded-full animate-pulse opacity-40"></div>
<div class="absolute top-3/4 right-1/4 w-1.5 h-1.5 bg-primary rounded-full animate-pulse opacity-60"></div>
<div class="absolute top-1/2 right-10 w-1 h-1 bg-primary rounded-full animate-pulse opacity-30"></div>
<div class="absolute bottom-1/4 left-10 w-2 h-2 bg-primary rounded-full animate-pulse opacity-50"></div>
</div>
</div>
<!-- HeaderImage Placeholder for the 3D Coin -->
<div class="relative z-10 w-full flex justify-center px-4">
<div class="relative group">
<!-- The 3D Metallic Coin Visualization -->
<div class="w-64 h-64 bg-zinc-900 rounded-full border-[6px] border-[#1a1a1a] flex items-center justify-center shadow-[0_0_50px_rgba(6,249,249,0.3)] neon-glow transform transition-transform duration-1000">
<div class="w-56 h-56 bg-gradient-to-tr from-zinc-800 via-zinc-400 to-zinc-800 rounded-full flex items-center justify-center border-4 border-[#06f9f9]/20">
<span class="text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-zinc-200 to-zinc-600 select-none">S</span>
</div>
<!-- Rim Highlights -->
<div class="absolute inset-0 rounded-full border-t-2 border-primary/40"></div>
<div class="absolute inset-4 rounded-full border-b border-primary/20"></div>
</div>
</div>
</div>
<!-- SingleButton with Glassmorphism -->
<div class="flex px-4 py-8 justify-center z-20 mt-[-20px]">
<button class="glass-button flex min-w-[180px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-10 text-primary text-2xl font-bold leading-normal tracking-[0.05em]">
<span class="truncate">45,50€</span>
</button>
</div>
</div>
<!-- BodyText Footer Info -->
<div class="flex flex-col items-center pb-8 z-10">
<p class="text-zinc-500 text-sm font-medium uppercase tracking-widest pb-1 px-4 text-center">Transferencia de energía</p>
<p class="text-white text-base font-normal leading-normal pb-6 px-4 text-center opacity-80">Hacia: Viaje a Madrid</p>
<!-- CTA Interaction hint -->
<div class="flex flex-col items-center gap-2 animate-bounce">
<span class="material-symbols-outlined text-primary opacity-60">keyboard_double_arrow_up</span>
</div>
</div>
<!-- BottomNavBar (Optional simplified version for this specific flow) -->
<div class="flex gap-2 border-t border-zinc-900 bg-background-dark/80 backdrop-blur-md px-4 pb-8 pt-3">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-zinc-600" href="#">
<div class="flex h-8 items-center justify-center" data-icon="home">
<span class="material-symbols-outlined">home</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 rounded-full text-primary" href="#">
<div class="flex h-8 items-center justify-center" data-icon="receipt_long">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">receipt_long</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-zinc-600" href="#">
<div class="flex h-8 items-center justify-center" data-icon="pie_chart">
<span class="material-symbols-outlined">pie_chart</span>
</div>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-zinc-600" href="#">
<div class="flex h-8 items-center justify-center" data-icon="person">
<span class="material-symbols-outlined">person</span>
</div>
</a>
</div>
</div>
<!-- Background Overlay for depth -->
<div class="fixed inset-0 pointer-events-none">
<div class="absolute top-0 left-0 w-full h-1/4 bg-gradient-to-b from-primary/5 to-transparent"></div>
<div class="absolute bottom-0 left-0 w-full h-1/4 bg-gradient-to-t from-primary/5 to-transparent"></div>
</div>
</body></html>
