<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                        "amoled-black": "#000000"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(13, 204, 242, 0.3), inset 0 0 10px rgba(13, 204, 242, 0.2);
        }
        .coin-gradient {
            background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 45%, #475569 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-amoled-black text-white font-display overflow-hidden">
<div class="relative flex h-screen w-full flex-col items-center justify-between py-12 overflow-hidden">
<!-- Header -->
<header class="z-10 w-full px-6 flex flex-col items-center gap-2">
<h2 class="text-primary text-xs font-bold tracking-[0.4em] uppercase opacity-80">SplitGasto Premium</h2>
<h1 class="text-white text-2xl font-bold tracking-widest text-center uppercase">
                Saldando Cuenta
            </h1>
</header>
<!-- 3D Scene Simulation -->
<div class="relative flex flex-1 items-center justify-center w-full">
<!-- Background Glow -->
<div class="absolute w-64 h-64 bg-primary/10 rounded-full blur-[80px]"></div>
<!-- Neon Ring -->
<div class="absolute w-72 h-72 border-[1px] border-primary/40 rounded-full neon-glow flex items-center justify-center">
<div class="absolute w-[95%] h-[95%] border-[0.5px] border-primary/20 rounded-full"></div>
</div>
<!-- 3D Coin Simulation -->
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Inner coin body -->
<div class="w-40 h-40 rounded-full coin-gradient border-4 border-white/20 shadow-2xl flex items-center justify-center transform transition-transform duration-1000">
<div class="w-32 h-32 rounded-full border-2 border-white/10 flex items-center justify-center">
<span class="text-6xl font-black text-slate-800 select-none">S</span>
</div>
<!-- Metallic Reflection -->
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/30 to-transparent rounded-full pointer-events-none"></div>
</div>
<!-- Orbiting light particles -->
<div class="absolute w-full h-full animate-spin" style="animation-duration: 4s;">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-2 h-2 bg-primary rounded-full shadow-[0_0_15px_#0dccf2]"></div>
</div>
</div>
</div>
<!-- Glassmorphism Payment Details -->
<main class="z-10 w-full px-8 pb-10 flex flex-col items-center gap-8">
<div class="glass-card w-full max-w-sm rounded-xl p-6 flex flex-col items-center gap-1 text-center shadow-2xl">
<p class="text-white/60 text-sm font-medium uppercase tracking-wider">Importe de liquidación</p>
<div class="flex items-baseline gap-1">
<span class="text-white text-5xl font-bold tracking-tight">45,50</span>
<span class="text-primary text-2xl font-bold">€</span>
</div>
</div>
<!-- Progress Indicator -->
<div class="w-full max-w-[200px] flex flex-col gap-3">
<div class="flex justify-between items-center text-[10px] uppercase tracking-widest text-white/40 font-bold">
<span>Criptando</span>
<span>92%</span>
</div>
<div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full shadow-[0_0_10px_#0dccf2]" style="width: 92%;"></div>
</div>
<p class="text-white/40 text-[10px] text-center font-medium italic">
                    Procesando tu pago de forma segura...
                </p>
</div>
</main>
<!-- Bottom Safe Area Decor -->
<div class="absolute bottom-4 flex gap-1 items-center justify-center">
<div class="w-1 h-1 rounded-full bg-primary"></div>
<div class="w-1 h-1 rounded-full bg-primary/40"></div>
<div class="w-1 h-1 rounded-full bg-primary/20"></div>
</div>
<!-- Background Image/Texture for depth -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 50% 50%, #102023 0%, #000000 100%);">
</div>
</div>
</body></html>
