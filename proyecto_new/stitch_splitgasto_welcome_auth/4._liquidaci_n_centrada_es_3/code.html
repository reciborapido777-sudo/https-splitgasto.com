<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#050a0a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .amoled-gradient {
            background: radial-gradient(circle at center, #102321 0%, #050a0a 70%);
        }
        .neon-glow {
            box-shadow: 0 0 50px 10px rgba(13, 242, 223, 0.3);
        }
        .orbit-container {
            position: relative;
            width: 600px;
            height: 600px;
        }
        .floating-icon {
            position: absolute;
            transform: translate(-50%, -50%);
        }
        /* Positions for equidistant icons around a circle */
        .pos-1 { top: 15%; left: 50%; }
        .pos-2 { top: 30%; left: 85%; }
        .pos-3 { top: 70%; left: 85%; }
        .pos-4 { top: 85%; left: 50%; }
        .pos-5 { top: 70%; left: 15%; }
        .pos-6 { top: 30%; left: 15%; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display overflow-hidden">
<!-- Main 1920x1080 Container -->
<div class="relative w-[1920px] h-[1080px] mx-auto amoled-gradient flex flex-col items-center justify-between py-24 overflow-hidden">
<!-- Header Section -->
<div class="z-10 text-center">
<h2 class="text-white text-6xl font-bold tracking-[0.2em] mb-4 uppercase">Liquidación</h2>
<div class="w-32 h-1 bg-primary mx-auto rounded-full"></div>
</div>
<!-- Central Composition -->
<div class="relative flex items-center justify-center flex-1 w-full">
<!-- Background Glow -->
<div class="absolute w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px]"></div>
<!-- Orbiting Icons Area -->
<div class="orbit-container flex items-center justify-center">
<!-- Orbiting Payment Icons -->
<!-- Icon 1: Card -->
<div class="floating-icon pos-1">
<div class="w-32 h-32 rounded-full bg-[#102321] border border-primary/30 flex items-center justify-center text-primary shadow-2xl backdrop-blur-md">
<span class="material-symbols-outlined !text-5xl">credit_card</span>
</div>
</div>
<!-- Icon 2: Wallet -->
<div class="floating-icon pos-2">
<div class="w-32 h-32 rounded-full bg-[#102321] border border-primary/30 flex items-center justify-center text-primary shadow-2xl backdrop-blur-md">
<span class="material-symbols-outlined !text-5xl">account_balance_wallet</span>
</div>
</div>
<!-- Icon 3: Secure -->
<div class="floating-icon pos-3">
<div class="w-32 h-32 rounded-full bg-[#102321] border border-primary/30 flex items-center justify-center text-primary shadow-2xl backdrop-blur-md">
<span class="material-symbols-outlined !text-5xl">verified_user</span>
</div>
</div>
<!-- Icon 4: Tap -->
<div class="floating-icon pos-4">
<div class="w-32 h-32 rounded-full bg-[#102321] border border-primary/30 flex items-center justify-center text-primary shadow-2xl backdrop-blur-md">
<span class="material-symbols-outlined !text-5xl">contactless</span>
</div>
</div>
<!-- Icon 5: QR -->
<div class="floating-icon pos-5">
<div class="w-32 h-32 rounded-full bg-[#102321] border border-primary/30 flex items-center justify-center text-primary shadow-2xl backdrop-blur-md">
<span class="material-symbols-outlined !text-5xl">qr_code_2</span>
</div>
</div>
<!-- Icon 6: Global -->
<div class="floating-icon pos-6">
<div class="w-32 h-32 rounded-full bg-[#102321] border border-primary/30 flex items-center justify-center text-primary shadow-2xl backdrop-blur-md">
<span class="material-symbols-outlined !text-5xl">language</span>
</div>
</div>
<!-- Central 3D Button -->
<div class="relative z-20">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-2xl animate-pulse"></div>
<button class="relative w-80 h-80 rounded-full bg-gradient-to-b from-primary to-[#0ab3a5] text-background-dark shadow-[0_20px_60px_-15px_rgba(13,242,223,0.5)] border-[12px] border-white/10 flex flex-col items-center justify-center gap-4 group transition-transform hover:scale-105 active:scale-95">
<span class="material-symbols-outlined !text-8xl font-light">payments</span>
<span class="text-3xl font-black tracking-widest uppercase">Pagar Ahora</span>
</button>
</div>
</div>
</div>
<!-- Footer Text Section -->
<div class="z-10 text-center max-w-4xl px-8">
<h3 class="text-white text-5xl font-bold mb-6 tracking-tight">Transacciones rápidas y seguras</h3>
<p class="text-primary/70 text-2xl font-light tracking-wide uppercase leading-relaxed">
                Procesamiento encriptado de última generación para tu total tranquilidad
            </p>
</div>
<!-- Decorative Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
<div class="absolute top-20 left-20 w-1 h-40 bg-gradient-to-b from-primary to-transparent"></div>
<div class="absolute top-20 left-20 w-40 h-1 bg-gradient-to-r from-primary to-transparent"></div>
<div class="absolute bottom-20 right-20 w-1 h-40 bg-gradient-to-t from-primary to-transparent"></div>
<div class="absolute bottom-20 right-20 w-40 h-1 bg-gradient-to-l from-primary to-transparent"></div>
</div>
</div>
</body></html>
