<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cierre de Sesión Seguro - SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-dark": "#000000",
                        "surface-dark": "#121212",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --brand-gradient: linear-gradient(135deg, #FF9500 0%, #AF52DE 100%);
            --halo-color: rgba(19, 236, 236, 0.45);
        }
        body {
            font-family: "Inter", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .gradient-icon {
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        .btn-halo {
            box-shadow: 0 0 25px 2px var(--halo-color);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white min-h-screen flex flex-col overflow-hidden">
<header class="flex items-center bg-transparent p-4 pt-6 justify-between">
<button aria-label="Volver" class="text-white flex size-12 shrink-0 items-center justify-center cursor-pointer active:opacity-50 transition-opacity">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<h1 class="text-white text-[17px] font-semibold leading-tight tracking-tight flex-1 text-center pr-12">Seguridad</h1>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-8">
<div class="mb-12 relative">
<div class="absolute inset-0 bg-white/5 blur-[40px] rounded-full scale-150"></div>
<div class="relative flex items-center justify-center w-32 h-32 bg-[#121212] rounded-full border border-white/10 shadow-2xl">
<span class="material-symbols-outlined text-[68px] gradient-icon" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                    lock
                </span>
</div>
</div>
<h2 class="text-white tracking-tight text-[28px] font-extrabold leading-tight text-center pb-4 px-4">
            ¿Deseas cerrar tu sesión?
        </h2>
<p class="text-[#A1A1A1] text-[16px] font-normal leading-relaxed text-center max-w-[280px] tracking-normal">
            Tus grupos y gastos están a salvo y se sincronizarán en cuanto vuelvas.
        </p>
</main>
<footer class="w-full max-w-[440px] mx-auto p-8 pb-12 flex flex-col gap-5">
<button class="flex items-center justify-center overflow-hidden rounded-full h-[64px] px-5 bg-primary text-black text-[17px] font-bold tracking-tight w-full btn-halo active:scale-[0.97] transition-all duration-200">
<span>Mantener Sesión</span>
</button>
<button class="flex items-center justify-center overflow-hidden rounded-full h-[64px] px-5 bg-[#1A1A1A] text-[#8E8E93] text-[17px] font-semibold tracking-tight w-full border border-white/5 active:bg-red-950/30 active:text-red-400 active:border-red-900/50 transition-all duration-200">
<span>Cerrar Sesión</span>
</button>
</footer>
<div class="h-6 bg-background-dark"></div>

</body></html>
