<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2beeda",
              "background-light": "#f6f8f8",
              "background-dark": "#000000",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(43, 238, 218, 0.6);
        }
        .nfc-ring {
            border: 2px solid rgba(43, 238, 218, 0.3);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .card-3d-gradient {
            background: linear-gradient(135deg, #1a1a1a 0%, #333333 50%, #1a1a1a 100%);
            box-shadow: 0 25px 50px -12px rgba(43, 238, 218, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<!-- Main Container -->
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Top Bar -->
<div class="flex items-center p-6 justify-between z-50">
<div class="text-black dark:text-white flex size-12 shrink-0 items-center justify-center cursor-pointer hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h2 class="text-black dark:text-white text-sm font-medium leading-tight tracking-widest flex-1 text-center uppercase opacity-60">Pago Proyectado 3D</h2>
<div class="size-12"></div> <!-- Spacer for balance -->
</div>
<!-- Amount Display -->
<div class="flex flex-col items-center justify-center pt-8 z-50">
<span class="text-primary text-xs font-bold tracking-[0.3em] uppercase mb-2">Total a Pagar</span>
<h1 class="text-black dark:text-white tracking-tighter text-[56px] font-bold leading-none glow-text">45,50€</h1>
</div>
<!-- 3D Stage / Immersive Area -->
<div class="flex-1 relative flex items-center justify-center overflow-hidden">
<!-- NFC Concentric Waves -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="nfc-ring w-[300px] h-[300px] opacity-20"></div>
<div class="nfc-ring w-[450px] h-[450px] opacity-10"></div>
<div class="nfc-ring w-[600px] h-[600px] opacity-5"></div>
</div>
<!-- 3D Card Representation -->
<div class="relative z-40 transform perspective-[1000px] rotate-x-[25deg] rotate-y-[-10deg] rotate-z-[5deg]">
<div class="w-80 h-48 card-3d-gradient rounded-xl p-6 relative border border-white/10 flex flex-col justify-between overflow-hidden">
<!-- Card Glare Effect -->
<div class="absolute top-0 -left-full w-full h-full bg-gradient-to-r from-transparent via-white/10 to-transparent skew-x-[-20deg]"></div>
<div class="flex justify-between items-start relative z-10">
<div class="size-10 bg-gradient-to-br from-primary to-emerald-400 rounded-md flex items-center justify-center shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-black font-bold">account_balance_wallet</span>
</div>
<span class="text-white/40 text-[10px] tracking-widest uppercase font-bold italic">SplitGasto Platinum</span>
</div>
<div class="flex flex-col gap-1 relative z-10">
<div class="flex items-center gap-3">
<div class="w-10 h-7 bg-yellow-600/20 rounded border border-yellow-600/30"></div>
<div class="text-white/80 font-mono tracking-widest text-lg">•••• 4421</div>
</div>
<div class="flex justify-between items-end mt-2">
<span class="text-white/60 text-[8px] uppercase tracking-widest font-bold">Metal Edition</span>
<div class="flex -space-x-2">
<div class="size-6 rounded-full bg-primary opacity-80"></div>
<div class="size-6 rounded-full bg-emerald-400 opacity-60"></div>
</div>
</div>
</div>
<!-- NFC Pulse Origin -->
<div class="absolute -right-10 top-1/2 -translate-y-1/2 w-40 h-40 bg-primary/20 blur-[60px] rounded-full"></div>
</div>
</div>
<!-- NFC Connection Icon -->
<div class="absolute bottom-1/4 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center">
<div class="size-16 rounded-full bg-primary/10 border border-primary/30 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-3xl animate-pulse">contactless</span>
</div>
</div>
</div>
<!-- Instruction Text -->
<div class="pb-12 px-8 z-50">
<h1 class="text-black dark:text-white text-[20px] font-bold leading-tight tracking-[-0.015em] text-center pb-2 uppercase italic">ACERCA EL TELÉFONO AL LECTOR</h1>
<p class="text-black dark:text-white text-sm font-normal leading-normal opacity-50 text-center tracking-wide">Tecnología 3D SplitGasto activa • NFC listo</p>
</div>
<!-- Bottom Security Info -->
<div class="px-6 py-8 flex items-center justify-center gap-2 opacity-30">
<span class="material-symbols-outlined text-xs text-black dark:text-white">lock</span>
<span class="text-[10px] text-black dark:text-white uppercase tracking-[0.2em] font-bold">Transacción Encriptada 256-bit</span>
</div>
<!-- Ambient Background Lights -->
<div class="absolute -bottom-[20%] -left-[20%] w-full h-full bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute -top-[20%] -right-[20%] w-full h-full bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
</div>
</body></html>
