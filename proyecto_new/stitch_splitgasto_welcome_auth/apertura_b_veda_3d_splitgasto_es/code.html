<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Apertura Bóveda 3D SplitGasto ES</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2beede",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // Pure AMOLED Black
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(43, 238, 222, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(43, 238, 222, 0.2);
        }
        .glow-cyan {
            box-shadow: 0 0 40px rgba(43, 238, 222, 0.4);
        }
        .text-glow {
            text-shadow: 0 0 15px rgba(43, 238, 222, 0.8);
        }
        .particle-float {
            position: absolute;
            background: #2beede;
            border-radius: 50%;
            filter: blur(1px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30 min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation -->
<nav class="flex items-center bg-background-light dark:bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between z-50">
<div class="text-white flex size-12 shrink-0 items-center">
<span class="material-symbols-outlined cursor-pointer">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center uppercase tracking-widest opacity-80">SplitGasto Premium</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 bg-transparent text-primary gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<span class="material-symbols-outlined">verified_user</span>
</button>
</div>
</nav>
<!-- Main 3D Composition Area -->
<main class="relative flex-1 flex flex-col items-center justify-center px-4 overflow-hidden">
<!-- Background Lighting/Glow Effects -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/10 via-transparent to-transparent pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-primary/20 blur-[120px] rounded-full"></div>
<!-- 3D Vault Interface Simulator -->
<div class="relative w-full max-w-[340px] aspect-square flex items-center justify-center">
<!-- Floating Data Particles -->
<div class="absolute w-1 h-1 bg-primary top-10 left-20 animate-pulse opacity-60"></div>
<div class="absolute w-2 h-2 bg-primary bottom-20 right-10 animate-pulse opacity-40"></div>
<div class="absolute w-1.5 h-1.5 bg-primary/80 top-1/3 right-1/4 animate-ping opacity-30"></div>
<!-- The Split Door Mechanism (Visualizing the open state) -->
<div class="absolute inset-0 flex justify-between z-10 pointer-events-none">
<!-- Left Door Section -->
<div class="w-[48%] h-full glass-panel rounded-l-xl border-r-0 transform -translate-x-full transition-transform duration-1000 opacity-30 flex items-center justify-end pr-4">
<div class="w-1 h-20 bg-primary/30 rounded-full"></div>
</div>
<!-- Right Door Section -->
<div class="w-[48%] h-full glass-panel rounded-r-xl border-l-0 transform translate-x-full transition-transform duration-1000 opacity-30 flex items-center justify-start pl-4">
<div class="w-1 h-20 bg-primary/30 rounded-full"></div>
</div>
</div>
<!-- Central Content: Unlocked Message and Glow -->
<div class="relative z-20 flex flex-col items-center">
<div class="mb-8 relative">
<!-- Core Light Source -->
<div class="absolute inset-0 bg-primary blur-[40px] opacity-40 animate-pulse"></div>
<div class="relative bg-background-dark/60 p-6 rounded-full border border-primary/50 glow-cyan">
<span class="material-symbols-outlined text-primary !text-6xl" style="font-variation-settings: 'FILL' 1">lock_open</span>
</div>
</div>
<h1 class="text-primary text-[28px] font-bold leading-tight px-4 text-center pb-2 tracking-[0.2em] text-glow">
                    BÓVEDA DESBLOQUEADA
                </h1>
<p class="text-primary/70 text-sm font-medium leading-normal px-4 text-center uppercase tracking-tighter">
                    Acceso biométrico confirmado
                </p>
</div>
</div>
<!-- Emerging Document Folders Section -->
<div class="w-full mt-12 px-2 z-30">
<div class="grid grid-cols-2 gap-4">
<!-- Folder 1 -->
<div class="glass-panel p-4 rounded-xl flex flex-col gap-3 group hover:border-primary transition-all duration-300 transform translate-y-4">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">description</span>
</div>
<div>
<p class="text-white text-base font-bold leading-tight">Facturas</p>
<p class="text-primary/50 text-xs">12 Archivos</p>
</div>
</div>
<!-- Folder 2 -->
<div class="glass-panel p-4 rounded-xl flex flex-col gap-3 group hover:border-primary transition-all duration-300 transform translate-y-4">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">gavel</span>
</div>
<div>
<p class="text-white text-base font-bold leading-tight">Contratos</p>
<p class="text-primary/50 text-xs">4 Archivos</p>
</div>
</div>
</div>
</div>
<!-- Bottom Status -->
<div class="mt-auto pb-12 w-full flex flex-col items-center">
<div class="flex items-center gap-2 text-primary/40 text-xs uppercase tracking-widest">
<span class="size-1.5 rounded-full bg-primary animate-ping"></span>
                Servidor Encriptado (AES-256)
            </div>
</div>
</main>
<!-- Hero Image Background (Abstract Tech) -->
<div class="fixed inset-0 -z-10 opacity-20 pointer-events-none">
<div class="w-full h-full bg-[url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&amp;w=2832&amp;auto=format&amp;fit=crop')] bg-cover bg-center" data-alt="Abstract dark digital data network pattern with blue highlights"></div>
</div>
</body></html>
