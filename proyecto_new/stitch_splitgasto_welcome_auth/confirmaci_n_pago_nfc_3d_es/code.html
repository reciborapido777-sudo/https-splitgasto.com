<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#25f4e2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#050a0a", // Deep AMOLED black
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .shockwave {
            border: 2px solid #25f4e2;
            border-radius: 50%;
            position: absolute;
            transform: scale(1);
            opacity: 0.3;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            filter: blur(8px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden selection:bg-primary/30">
<div class="relative flex h-screen w-full flex-col items-center justify-between p-6">
<!-- Ambient Background Elements -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<!-- Shockwaves (Visual representation of the animation state) -->
<div class="shockwave w-[300px] h-[300px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 scale-[2.5] opacity-10"></div>
<div class="shockwave w-[300px] h-[300px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 scale-[1.8] opacity-20"></div>
<!-- Floating Particles -->
<div class="particle bg-orange-500 w-4 h-4 top-1/4 left-1/4 opacity-40"></div>
<div class="particle bg-purple-600 w-6 h-6 bottom-1/3 right-1/4 opacity-30"></div>
<div class="particle bg-primary w-3 h-3 top-2/3 left-10 opacity-50"></div>
<div class="particle bg-orange-400 w-2 h-2 top-1/2 right-10 opacity-40"></div>
</div>
<!-- Top App Bar -->
<div class="w-full flex items-center justify-between z-10">
<div class="p-2 rounded-full glass-card">
<span class="material-symbols-outlined text-white text-2xl">close</span>
</div>
<h2 class="text-white/60 text-sm font-medium tracking-[0.2em] uppercase">SplitGasto Pay</h2>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</div>
<!-- Central 3D Success Visualization -->
<div class="relative flex flex-col items-center justify-center flex-1 w-full">
<!-- 3D Icon Container -->
<div class="relative mb-8">
<!-- Inner Glow -->
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full scale-150"></div>
<!-- Main 3D Check Icon (Glassmorphic implementation) -->
<div class="relative flex items-center justify-center size-32 rounded-full glass-card border-primary/40 shadow-[0_0_50px_rgba(37,244,226,0.3)]">
<div class="absolute inset-2 border-2 border-white/10 rounded-full"></div>
<span class="material-symbols-outlined text-7xl text-primary font-bold" style="font-variation-settings: 'FILL' 1, 'wght' 700">
                        check_circle
                    </span>
</div>
</div>
<!-- Headline Text -->
<div class="text-center z-10">
<h1 class="text-white tracking-tighter text-[40px] font-bold leading-none mb-2">¡PAGO CONFIRMADO!</h1>
<p class="text-primary/80 font-medium tracking-wide">Transacción completada con éxito</p>
</div>
</div>
<!-- Floating Merchant Card -->
<div class="w-full max-w-sm mb-8 z-10">
<div class="glass-card rounded-2xl p-6 flex flex-col gap-4 relative overflow-hidden group">
<!-- Inner card shine -->
<div class="absolute -top-full -left-full w-full h-full bg-gradient-to-br from-white/10 to-transparent rotate-45 transform"></div>
<div class="flex items-center gap-4">
<div class="size-12 rounded-xl bg-white/10 flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-primary">restaurant</span>
</div>
<div class="flex flex-col">
<p class="text-white text-xl font-bold leading-tight">Café de la Ópera</p>
<p class="text-white/50 text-sm">Plaza de Oriente, Madrid</p>
</div>
<div class="ml-auto flex flex-col items-end">
<p class="text-white text-xl font-bold">12,50€</p>
<p class="text-primary text-[10px] font-bold tracking-widest uppercase">NFC OK</p>
</div>
</div>
<div class="h-[1px] w-full bg-white/10"></div>
<div class="flex justify-between items-center text-xs text-white/40">
<span class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">calendar_today</span>
                        Hoy, 14:22
                    </span>
<span class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">credit_card</span>
                        Visa •••• 4242
                    </span>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="w-full z-10 mb-4">
<button class="w-full py-4 bg-primary text-background-dark font-bold text-lg rounded-xl shadow-[0_0_20px_rgba(37,244,226,0.4)] active:scale-[0.98] transition-transform">
                LISTO
            </button>
</div>
</div>
<!-- Hidden placeholders to fulfill UI designer requirements -->
<div class="hidden">
<div data-alt="Abstract turquoise neon shockwave pattern on black background"></div>
<div data-alt="Frosted glass textures with orange and purple light particles"></div>
<div data-location="Madrid, Spain" style=""></div>
</div>
</body></html>
