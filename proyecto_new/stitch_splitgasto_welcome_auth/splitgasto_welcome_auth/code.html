<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitGasto - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecd6",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102220",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-effect {
            background: rgba(40, 57, 55, 0.5);
            backdrop-filter: blur(10px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col">
<!-- Top Navigation / Logo Header -->
<header class="flex items-center bg-transparent p-4 pb-2 justify-between">
<div class="text-primary flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-4xl">payments</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-extrabold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">SplitGasto</h2>
</header>
<!-- Hero Section -->
<main class="flex-1 flex flex-col">
<div class="@container px-4">
<div class="py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-xl min-h-[240px] shadow-2xl shadow-primary/10" data-alt="People happily sharing a meal and splitting a bill" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDuI_FElJJGzgYmZGm4aNM1j3x040yJuzq6PB_6ijUcq8Yt9cfcZYm7sAMwywMR2HCjOQo57kO1-UUz4im8PZ3usIgt9aIEGeLncqKK4eFQv2sUnspFzTzxIs6P__eqyFHwshyYEMF1zUWFYUtpFumMsrEbkSUbBcnLiTCrXO829WfZWFu7O_0q7H2_b7xYi0-3_K1V3RnSloI7WcckzEIHj8r8lbqEV3ebehmtqw3hd7iu7NlToObcJmLEgEJs9SpExz6jasAqjpWN");'>
</div>
</div>
</div>
<!-- Headline Text -->
<div class="px-6 py-8">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[36px] font-extrabold leading-[1.1] text-center">
                Split bills, <span class="text-primary">not friendships.</span>
</h1>
<p class="text-slate-500 dark:text-[#9db9b6] text-center mt-4 text-base font-medium">
                The global standard for effortless group expenses.
            </p>
</div>
<!-- Authentication Actions -->
<div class="flex justify-center mt-auto">
<div class="flex flex-1 gap-3 max-w-[480px] flex-col items-stretch px-6 py-6">
<!-- Primary Action -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-[#111817] text-lg font-bold leading-normal tracking-tight w-full hover:opacity-90 transition-opacity">
<span class="truncate">Sign Up with Email</span>
</button>
<!-- Divider -->
<div class="relative py-4 flex items-center justify-center">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-white/10"></div>
</div>
<div class="relative px-4 bg-background-light dark:bg-background-dark">
<span class="text-slate-400 dark:text-[#9db9b6] text-xs font-bold uppercase tracking-widest">or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="flex flex-col gap-3">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center gap-3 overflow-hidden rounded-xl h-14 px-5 bg-white dark:bg-[#283937] text-slate-900 dark:text-white border border-slate-200 dark:border-transparent text-base font-bold leading-normal w-full shadow-sm">
<span class="material-symbols-outlined text-2xl">mail</span>
<span class="truncate">Continue with Google</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center gap-3 overflow-hidden rounded-xl h-14 px-5 bg-white dark:bg-[#283937] text-slate-900 dark:text-white border border-slate-200 dark:border-transparent text-base font-bold leading-normal w-full shadow-sm">
<span class="material-symbols-outlined text-2xl">ios</span>
<span class="truncate">Continue with Apple</span>
</button>
</div>
<!-- Secondary Action -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 bg-transparent text-slate-600 dark:text-primary text-base font-bold leading-normal w-full mt-2">
<span class="truncate">Already have an account? Log In</span>
</button>
</div>
</div>
</main>
<!-- Footer / Language Selector -->
<footer class="p-6 flex flex-col items-center gap-6">
<div class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-primary/10 rounded-full cursor-pointer hover:bg-slate-200 dark:hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-primary text-lg">language</span>
<span class="text-slate-600 dark:text-primary text-sm font-bold">English (US)</span>
<span class="material-symbols-outlined text-slate-400 dark:text-primary text-sm">expand_more</span>
</div>
<div class="flex gap-4 text-xs font-medium text-slate-400 dark:text-slate-500 uppercase tracking-wider">
<a class="hover:underline" href="#">Terms</a>
<span>•</span>
<a class="hover:underline" href="#">Privacy</a>
<span>•</span>
<a class="hover:underline" href="#">Support</a>
</div>
</footer>
<!-- Safe area spacing for iOS -->
<div class="h-8 bg-background-light dark:bg-background-dark"></div>
</body></html>
