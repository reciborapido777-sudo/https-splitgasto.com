<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Liquidación de Deudas - Marketing Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --primary-glow: rgba(13, 242, 223, 0.6);
        }
        .liquidar-button {
            background: linear-gradient(145deg, #122a28, #050d0c);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 2px 4px rgba(255, 255, 255, 0.1),
                        0 0 40px var(--primary-glow);
            border: 2px solid rgba(13, 242, 223, 0.4);
        }
        .floating-icon {
            background: rgba(24, 52, 50, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(13, 242, 223, 0.2);
        }
        .perspective-container {
            perspective: 1200px;
        }
        .neon-text-glow {
            text-shadow: 0 0 15px rgba(13, 242, 223, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white overflow-hidden">
<div class="relative w-[1920px] h-[1080px] mx-auto overflow-hidden bg-background-dark flex flex-col items-center justify-center">
<div class="absolute inset-0">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[150px]"></div>
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 2px 2px, #0df2df 1px, transparent 0); background-size: 80px 80px;"></div>
</div>
<div class="relative z-10 w-full flex flex-col items-center justify-center">
<div class="absolute top-24 text-center">
<h2 class="text-primary/60 tracking-[0.3em] text-2xl font-bold uppercase mb-4">4. Liquidación</h2>
</div>
<div class="perspective-container flex items-center justify-center w-full h-[600px] gap-24">
<div class="flex flex-col gap-12 -translate-y-10">
<div class="floating-icon w-32 h-32 rounded-3xl flex items-center justify-center rotate-[-12deg] shadow-2xl">
<span class="material-symbols-outlined text-primary text-6xl">payments</span>
</div>
<div class="floating-icon w-24 h-24 rounded-2xl flex items-center justify-center rotate-[8deg] translate-x-12 shadow-xl opacity-70">
<span class="material-symbols-outlined text-primary text-5xl">credit_card</span>
</div>
</div>
<div class="relative group cursor-default">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl scale-110"></div>
<div class="liquidar-button w-96 h-96 rounded-full flex flex-col items-center justify-center relative z-20">
<div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-6xl font-bold">check_circle</span>
</div>
<span class="text-white text-6xl font-black tracking-tighter neon-text-glow">LIQUIDAR</span>
<div class="mt-4 flex gap-1">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-8 h-2 rounded-full bg-primary/30"></div>
<div class="w-2 h-2 rounded-full bg-primary/30"></div>
</div>
</div>
<div class="absolute -top-10 -right-10 w-16 h-16 floating-icon rounded-full flex items-center justify-center animate-pulse">
<span class="material-symbols-outlined text-primary text-3xl">done_all</span>
</div>
</div>
<div class="flex flex-col gap-12 translate-y-10">
<div class="floating-icon w-32 h-32 rounded-3xl flex items-center justify-center rotate-[12deg] shadow-2xl">
<span class="material-symbols-outlined text-primary text-6xl">account_balance_wallet</span>
</div>
<div class="floating-icon w-24 h-24 rounded-2xl flex items-center justify-center rotate-[-8deg] -translate-x-12 shadow-xl opacity-70">
<span class="material-symbols-outlined text-primary text-5xl">account_balance</span>
</div>
</div>
</div>
<div class="absolute bottom-24 text-center">
<p class="text-white text-5xl font-bold tracking-tight mb-4">
                    Saldar cuentas nunca fue tan fácil
                </p>
<div class="h-1.5 w-60 bg-primary mx-auto rounded-full opacity-50"></div>
</div>
</div>
<div class="absolute top-0 left-0 w-64 h-64 border-l-2 border-t-2 border-primary/10 rounded-tl-[100px] m-12"></div>
<div class="absolute top-0 right-0 w-64 h-64 border-r-2 border-t-2 border-primary/10 rounded-tr-[100px] m-12"></div>
<div class="absolute bottom-0 left-0 w-64 h-64 border-l-2 border-b-2 border-primary/10 rounded-bl-[100px] m-12"></div>
<div class="absolute bottom-0 right-0 w-64 h-64 border-r-2 border-b-2 border-primary/10 rounded-br-[100px] m-12"></div>
<div class="absolute left-1/4 top-1/3 floating-icon px-6 py-3 rounded-full flex items-center gap-3">
<div class="w-3 h-3 bg-primary rounded-full"></div>
<span class="text-xl font-bold text-white uppercase tracking-widest">Bizum</span>
</div>
<div class="absolute right-1/4 bottom-1/3 floating-icon px-6 py-3 rounded-full flex items-center gap-3">
<div class="w-3 h-3 bg-primary rounded-full"></div>
<span class="text-xl font-bold text-white uppercase tracking-widest">Transferencia</span>
</div>
</div>

</body></html>
