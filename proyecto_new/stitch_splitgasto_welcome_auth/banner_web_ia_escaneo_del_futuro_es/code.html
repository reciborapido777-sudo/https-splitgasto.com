<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IA Escaneo del Futuro - SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // AMOLED Black as requested
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .text-gradient {
            background: linear-gradient(to right, #ff8a00, #da1b60, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glow-cyan {
            box-shadow: 0 0 20px rgba(13, 242, 242, 0.4);
        }
        .scan-line {
            height: 2px;
            background: #0df2f2;
            box-shadow: 0 0 15px #0df2f2, 0 0 5px #0df2f2;
            width: 100%;
            position: absolute;
            top: 40%;
            z-index: 20;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30 overflow-x-hidden">
<!-- Top Navigation / Logo -->
<div class="relative flex h-auto w-full flex-col bg-background-light dark:bg-background-dark">
<div class="flex items-center bg-background-light dark:bg-background-dark p-6 justify-between">
<div class="flex size-12 shrink-0 items-center">
<!-- SplitGasto 'S' Logo Placeholder -->
<div class="flex items-center justify-center bg-primary rounded-lg size-10 glow-cyan">
<span class="text-black font-bold text-2xl">S</span>
</div>
</div>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-lg h-12 bg-transparent text-white p-0">
<span class="material-symbols-outlined text-white text-[28px]">menu</span>
</button>
</div>
</div>
</div>
<!-- Hero Image Section (3D Smartphone & Scanner) -->
<div class="relative flex w-full flex-col bg-background-light dark:bg-background-dark">
<div class="@container">
<div class="px-4 py-3">
<div class="relative w-full aspect-[9/12] max-h-[500px] bg-neutral-900 rounded-3xl border-4 border-neutral-800 overflow-hidden shadow-2xl">
<!-- Background Receipt Image -->
<div class="absolute inset-0 bg-center bg-cover opacity-60" data-alt="Hyper-realistic receipt being scanned by a smartphone" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAcIwm0IPhQH1l039TrCKgH9luRHViY3pION7hcxgXjXEiNgh0JHTWF9cJcs5W_APgJrEACMifJikhT9O8qdOqBGQQxEqwXaxd-AGvHgAeEfq4wdAQRKIQdwDsO_FcLbdp40w-XcOOTgRQZ3q1MTPVH-yoY9u2JK5JWb3BYAhgBvLw0BvMc0z12ffIemQ-d2KvKILhl60CTZPYoSOK61XqdF3Tu_HRhT62xo-suhPsNQXHEnwAhnz15wcu8VLj1Dif4OW0yZaFfCC2c");'>
</div>
<!-- Scanner Overlay Beam -->
<div class="scan-line"></div>
<!-- Futuristic Grid Overlay -->
<div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: linear-gradient(#0df2f2 1px, transparent 1px), linear-gradient(90deg, #0df2f2 1px, transparent 1px); background-size: 40px 40px;">
</div>
<!-- AI Recognition Tags (Floating UI) -->
<div class="absolute top-1/4 left-10 bg-primary/90 text-black px-3 py-1 rounded-full text-xs font-bold shadow-lg">
                        CAFÉ LATTE - $4.50
                    </div>
<div class="absolute top-1/2 right-10 bg-primary/90 text-black px-3 py-1 rounded-full text-xs font-bold shadow-lg">
                        CROISSANT - $3.25
                    </div>
</div>
</div>
</div>
</div>
<!-- Headline Section -->
<div class="relative flex w-full flex-col bg-background-light dark:bg-background-dark">
<h1 class="text-gradient tracking-tighter text-[42px] font-bold leading-[1.1] px-6 text-center pb-4 pt-8">
            IA: EL ESCANEO DEL FUTURO
        </h1>
</div>
<!-- Body Text Section -->
<div class="relative flex w-full flex-col bg-background-light dark:bg-background-dark">
<p class="text-neutral-400 text-lg font-normal leading-relaxed pb-8 pt-2 px-8 text-center">
            Olvídate de las cuentas a mano. Nuestra IA detecta cada producto y divide el gasto por ti en segundos.
        </p>
</div>
<!-- CTA Button Section -->
<div class="relative flex w-full flex-col bg-background-light dark:bg-background-dark pb-12">
<div class="flex px-8 py-3">
<button class="flex min-w-[84px] w-full max-w-[480px] mx-auto cursor-pointer items-center justify-center overflow-hidden rounded-xl h-16 px-5 bg-primary text-black text-lg font-bold leading-normal tracking-wide glow-cyan transition-transform active:scale-95">
<span class="material-symbols-outlined mr-2">document_scanner</span>
<span class="truncate">Probar Escáner Ahora</span>
</button>
</div>
</div>
<!-- Footer Benefits (Extra context consistent with AI theme) -->
<div class="grid grid-cols-2 gap-4 px-8 pb-20">
<div class="flex flex-col items-center text-center p-4 bg-white/5 rounded-xl border border-white/10">
<span class="material-symbols-outlined text-primary mb-2">bolt</span>
<span class="text-xs font-medium text-neutral-300 uppercase tracking-widest">Instantáneo</span>
</div>
<div class="flex flex-col items-center text-center p-4 bg-white/5 rounded-xl border border-white/10">
<span class="material-symbols-outlined text-primary mb-2">precision_manufacturing</span>
<span class="text-xs font-medium text-neutral-300 uppercase tracking-widest">99.9% Precisión</span>
</div>
</div>
<!-- Bottom Spacing -->
<div class="h-10 bg-background-light dark:bg-background-dark"></div>
</body></html>
