<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d4c1",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102220",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .logo-gradient {
            background: linear-gradient(135deg, #ff8a00 0%, #da1b60 50%, #9c27b0 100%);
        }
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #11d4c1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col items-center justify-between bg-background-dark overflow-hidden">
<!-- Top Spacer for iOS Safe Area -->
<div class="h-12 w-full"></div>
<!-- Center Branding Section -->
<div class="flex flex-col items-center justify-center flex-1">
<!-- Stylized 'S' Logo -->
<div class="relative mb-6">
<div class="logo-gradient flex items-center justify-center w-32 h-32 rounded-xl shadow-2xl">
<span class="text-white text-7xl font-bold italic tracking-tighter">S</span>
</div>
<!-- Subtle Glow Effect -->
<div class="absolute -inset-4 logo-gradient opacity-20 blur-2xl rounded-full -z-10"></div>
</div>
<!-- App Name -->
<h1 class="text-white text-4xl font-bold tracking-tight px-4 text-center">
                SplitGasto
            </h1>
</div>
<!-- Bottom Loading Indicator -->
<div class="pb-24 flex flex-col items-center gap-4">
<!-- Minimalist Progress Circle -->
<div class="flex items-center justify-center">
<div class="spinner"></div>
</div>
<!-- Optional subtle text -->
<p class="text-white/40 text-sm font-medium tracking-wide uppercase">Iniciando</p>
</div>
<!-- Safe Area Inset Bottom -->
<div class="h-8 w-full"></div>
</div>
<!-- Hidden Image Data for context consistency -->
<div class="hidden">
<div data-alt="vibrant orange and purple abstract gradient pattern"></div>
</div>
</body></html>
