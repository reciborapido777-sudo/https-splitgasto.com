<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ecb613",
                        "background-light": "#f8f8f6",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-effect {
            background: rgba(51, 45, 25, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(236, 182, 19, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-start overflow-hidden">
<!-- Status Bar Simulation -->
<div class="w-full flex items-center justify-between px-8 pt-6 pb-2">
<div class="text-white font-semibold text-sm">09:41</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-white text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-white text-[18px]">wifi</span>
<span class="material-symbols-outlined text-white text-[24px]">battery_full</span>
</div>
</div>
<!-- Date & Time (iOS Style) -->
<div class="mt-8 text-center flex flex-col gap-1">
<p class="text-white/80 text-xl font-medium">martes, 24 de octubre</p>
<h1 class="text-white text-8xl font-bold tracking-tight">09:41</h1>
</div>
<!-- Notification Container -->
<div class="mt-12 w-full max-w-[400px] px-4">
<div class="glass-effect rounded-xl shadow-2xl overflow-hidden">
<!-- App Header -->
<div class="flex items-center justify-between px-5 pt-4 pb-2">
<div class="flex items-center gap-2">
<div class="size-6 bg-primary rounded-md flex items-center justify-center">
<span class="material-symbols-outlined text-background-dark text-[18px] font-bold">account_balance_wallet</span>
</div>
<span class="text-white/70 text-sm font-semibold tracking-wide">SPLITGASTO</span>
</div>
<span class="text-white/40 text-xs">ahora</span>
</div>
<!-- Notification Content -->
<div class="px-5 pb-5">
<div class="flex flex-col gap-2 mt-2">
<div class="flex items-center gap-2">
<span class="text-2xl">🏆</span>
<h2 class="text-primary text-xl font-bold tracking-tight">¡ENHORABUENA!</h2>
</div>
<p class="text-white/90 text-[15px] leading-snug">
                        Has alcanzado el <span class="text-primary font-bold">NIVEL 4: MAESTRO DEL AHORRO</span>. Entra para descubrir tus nuevos beneficios y el tema visual exclusivo.
                    </p>
</div>
<!-- Action Button -->
<div class="mt-5">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-3 px-6 rounded-full transition-colors flex items-center justify-center gap-2">
<span>DESCUBRIR</span>
<span class="material-symbols-outlined text-[20px]">stars</span>
</button>
</div>
</div>
</div>
</div>
<!-- Bottom Action Icons -->
<div class="mt-auto mb-12 w-full max-w-[400px] flex justify-between px-10">
<button class="size-12 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md">
<span class="material-symbols-outlined text-white">flashlight_on</span>
</button>
<button class="size-12 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md">
<span class="material-symbols-outlined text-white">photo_camera</span>
</button>
</div>
<!-- Home Indicator -->
<div class="mb-2 w-32 h-1 bg-white/40 rounded-full"></div>
<!-- Abstract Background Elements (Subtle Glows) -->
<div class="absolute -z-10 top-1/4 left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute -z-10 bottom-0 right-0 w-[200px] h-[200px] bg-primary/10 blur-[100px] rounded-full"></div>
</body></html>
