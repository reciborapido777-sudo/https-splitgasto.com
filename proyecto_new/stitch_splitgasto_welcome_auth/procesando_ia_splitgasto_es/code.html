<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#7f13ec",
              "accent-orange": "#ff8a00",
              "accent-turquoise": "#00f5ff",
              "background-light": "#f7f6f8",
              "background-dark": "#000000", // AMOLED absolute black
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #000000;
            overflow: hidden;
        }
        .glow-halo {
            box-shadow: 0 0 40px 5px rgba(0, 245, 255, 0.3);
        }
        .brain-gradient {
            background: linear-gradient(135deg, #ff8a00 0%, #7f13ec 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Floating particles simulation */
        .particle {
            position: absolute;
            background: #7f13ec;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white antialiased">
<!-- Main Container -->
<div class="relative flex h-screen w-full flex-col items-center justify-between overflow-hidden px-6 py-12">
<!-- Background Particles Decoration -->
<div class="absolute inset-0 z-0">
<div class="particle h-1 w-1 top-[15%] left-[20%]" style="box-shadow: 0 0 10px #7f13ec;"></div>
<div class="particle h-1.5 w-1.5 top-[40%] left-[80%]" style="box-shadow: 0 0 12px #00f5ff; background: #00f5ff;"></div>
<div class="particle h-1 w-1 top-[70%] left-[15%]" style="box-shadow: 0 0 10px #7f13ec;"></div>
<div class="particle h-2 w-2 top-[85%] left-[60%]" style="box-shadow: 0 0 15px #ff8a00; background: #ff8a00;"></div>
<div class="particle h-1 w-1 top-[25%] left-[75%]" style="box-shadow: 0 0 8px #7f13ec;"></div>
</div>
<!-- Top App Bar Component -->
<div class="relative z-10 flex w-full items-center justify-between pt-2">
<div class="text-white/50 flex size-10 items-center justify-center">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-white text-sm font-medium tracking-[0.2em] uppercase opacity-70">Procesando IA</h2>
<div class="size-10"></div>
</div>
<!-- Center Interactive Loader Area -->
<div class="relative z-10 flex flex-col items-center justify-center">
<!-- Neural Core Visual -->
<div class="relative flex items-center justify-center">
<!-- Outer Rotating Turquoise Halo -->
<div class="absolute h-64 w-64 rounded-full border border-accent-turquoise/20 glow-halo"></div>
<div class="absolute h-56 w-56 rounded-full border-[2px] border-t-accent-turquoise border-r-transparent border-b-transparent border-l-transparent animate-[spin_3s_linear_infinite]"></div>
<!-- Inner Brain Icon -->
<div class="relative flex h-48 w-48 items-center justify-center rounded-full bg-background-dark">
<span class="material-symbols-outlined !text-[80px] brain-gradient">
                        psychology
                    </span>
</div>
</div>
<!-- Percentage Display -->
<div class="mt-12 text-center">
<h1 class="text-white tracking-tight text-[56px] font-bold leading-none">75<span class="text-primary">%</span></h1>
<div class="mt-4 flex flex-col items-center gap-2">
<p class="text-accent-turquoise text-lg font-medium animate-pulse">Detectando importes...</p>
</div>
</div>
</div>
<!-- Progress & Status Messages -->
<div class="relative z-10 w-full max-w-xs space-y-6">
<!-- Progress Bar Component -->
<div class="flex flex-col gap-3">
<div class="h-1.5 w-full rounded-full bg-white/10 overflow-hidden">
<div class="h-full bg-gradient-to-r from-accent-orange via-primary to-accent-turquoise" style="width: 75%;"></div>
</div>
<div class="flex justify-between items-center opacity-50">
<p class="text-[10px] font-bold tracking-widest uppercase">SplitGasto Engine v4.0</p>
<p class="text-[10px] font-bold tracking-widest uppercase">Secure OCR</p>
</div>
</div>
<!-- Status Logs -->
<div class="flex flex-col gap-2 items-center">
<p class="text-white/40 text-sm font-normal">Desglosando productos e importes...</p>
<p class="text-white/20 text-xs font-normal">Optimizando imagen de origen...</p>
</div>
</div>
<!-- Footer Brand -->
<div class="relative z-10 pb-4 text-center">
<p class="text-white/30 text-[10px] font-medium tracking-[0.3em] uppercase">Powered by SplitGasto Neural Net</p>
</div>
</div>
<!-- Background Image Mock for Depth (Hidden/Invisible but present as requested) -->
<div class="hidden" data-alt="Fondo con sutiles partículas digitales de color morado y naranja sobre negro absoluto"></div>
<div class="hidden" data-alt="Icono de cerebro con degradado naranja y morado"></div>
</body></html>
