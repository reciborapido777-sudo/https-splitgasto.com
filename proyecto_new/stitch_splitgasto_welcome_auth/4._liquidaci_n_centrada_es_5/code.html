<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                        "amoled": "#000000"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Space Grotesk", sans-serif;
            background-color: #000000;
        }
        .neon-glow {
            box-shadow: 0 0 40px rgba(13, 204, 242, 0.4), 0 0 80px rgba(13, 204, 242, 0.2);
        }
        .button-3d {
            box-shadow: 0 8px 0 #0aa8c7, 0 15px 30px rgba(13, 204, 242, 0.3);
            transition: transform 0.1s ease;
        }
        .bg-mesh {
            background: radial-gradient(circle at center, #102023 0%, #000000 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-amoled text-white overflow-hidden flex items-center justify-center min-h-screen">
<!-- Main Container for 1920x1080 Marketing Image -->
<div class="relative w-full h-full max-w-[1920px] max-h-[1080px] aspect-video flex flex-col items-center justify-between py-24 px-10 bg-mesh overflow-hidden">
<!-- Header Section -->
<div class="flex flex-col items-center gap-4 z-10">
<h1 class="text-primary tracking-widest text-6xl lg:text-8xl font-bold leading-tight text-center font-display uppercase">
                REEMBOLSO JUSTO
            </h1>
<p class="text-white/80 text-2xl lg:text-4xl font-light leading-normal text-center font-display">
                Paga con un solo clic
            </p>
</div>
<!-- Central 3D Neon Button Section -->
<div class="relative flex flex-col items-center justify-center flex-grow py-12">
<!-- Background Glow Effect -->
<div class="absolute w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px] -z-10"></div>
<!-- The 3D Neon Button -->
<button class="button-3d group relative flex min-w-[400px] lg:min-w-[600px] cursor-pointer items-center justify-center overflow-hidden rounded-2xl h-32 lg:h-48 px-12 bg-primary text-background-dark text-5xl lg:text-7xl font-extrabold leading-normal tracking-[0.05em] uppercase font-display neon-glow">
<span class="truncate">LIQUIDAR</span>
<!-- Subtle reflection effect -->
<div class="absolute top-0 left-0 w-full h-1/2 bg-white/20 rounded-t-2xl"></div>
</button>
<!-- Visual hint of interactivity -->
<div class="mt-12 flex items-center gap-3 text-primary/60">
<span class="material-symbols-outlined text-4xl">touch_app</span>
<span class="text-xl font-medium tracking-widest uppercase">Toque instantáneo</span>
</div>
</div>
<!-- Footer / Bottom Branding -->
<div class="flex flex-col items-center gap-6 z-10">
<div class="flex items-center gap-8 opacity-40">
<span class="material-symbols-outlined text-5xl">account_balance_wallet</span>
<span class="material-symbols-outlined text-5xl">bolt</span>
<span class="material-symbols-outlined text-5xl">verified_user</span>
</div>
<div class="h-1 w-32 bg-primary/20 rounded-full"></div>
</div>
<!-- Decorative UI Elements (Abstract Patterns) -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
<div class="absolute top-10 left-10 border-l border-t border-primary/40 w-24 h-24"></div>
<div class="absolute top-10 right-10 border-r border-t border-primary/40 w-24 h-24"></div>
<div class="absolute bottom-10 left-10 border-l border-b border-primary/40 w-24 h-24"></div>
<div class="absolute bottom-10 right-10 border-r border-b border-primary/40 w-24 h-24"></div>
</div>
</div>
</body></html>
