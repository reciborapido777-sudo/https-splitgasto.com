<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#0df2f2",
                "background-dark": "#000000",
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --primary-glow: rgba(13, 242, 242, 0.4);
            --euro-glow: #00ff88;
            --dollar-glow: #0df2f2;
            --yen-glow: #ff00ff;
            --pound-glow: #ffd700;
        }
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #000000;
        }
        .amoled-bg {
            background-color: #000000;
        }
        .neon-symbol {
            filter: drop-shadow(0 0 10px currentColor);
            font-weight: 800;
        }
        .floating-element {
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white min-h-screen flex flex-col overflow-hidden">
<div class="p-6 pt-10 flex justify-between items-center w-full">
<div class="flex gap-1.5 flex-1">
<div class="h-1 flex-1 bg-primary/20 rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full shadow-[0_0_8px_rgba(13,242,242,0.6)]"></div>
<div class="h-1 flex-1 bg-primary/20 rounded-full"></div>
</div>
<span class="ml-4 text-xs font-bold text-primary/60 tracking-widest uppercase">02 / 03</span>
</div>
<div class="flex-1 flex flex-col items-center justify-center relative px-6">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-primary/10 rounded-full blur-[80px] pointer-events-none"></div>
<div class="relative w-full aspect-square max-w-[320px] flex items-center justify-center">
<div class="relative z-10 bg-white/5 p-8 rounded-full border border-white/10 backdrop-blur-sm">
<span class="material-symbols-outlined text-primary text-[80px] neon-symbol" style="font-variation-settings: 'FILL' 1, 'wght' 200">currency_exchange</span>
</div>
<div class="floating-element top-4 left-10 text-[#00ff88] text-4xl neon-symbol opacity-80" style="transform: rotate(-15deg);">€</div>
<div class="floating-element top-10 right-8 text-[#0df2f2] text-5xl neon-symbol" style="transform: rotate(10deg);">$</div>
<div class="floating-element bottom-12 left-6 text-[#ff00ff] text-4xl neon-symbol opacity-70" style="transform: rotate(20deg);">¥</div>
<div class="floating-element bottom-6 right-12 text-[#ffd700] text-4xl neon-symbol opacity-90" style="transform: rotate(-10deg);">£</div>
<div class="absolute inset-4 border border-primary/10 rounded-full"></div>
<div class="absolute inset-12 border border-primary/5 rounded-full"></div>
<div class="absolute top-1/4 right-1/4 w-1 h-1 bg-primary rounded-full blur-[1px]"></div>
<div class="absolute bottom-1/3 left-1/4 w-1.5 h-1.5 bg-white rounded-full blur-[2px] opacity-40"></div>
</div>
<div class="text-center mt-12 mb-8 z-20">
<h1 class="text-white text-3xl font-extrabold tracking-tight mb-4">
            Sin Fronteras Económicas
        </h1>
<p class="text-gray-400 text-base leading-relaxed max-w-[300px] mx-auto">
            Gestiona tus gastos en más de <span class="text-primary font-bold">170 divisas</span> con conversión inteligente en tiempo real.
        </p>
</div>
</div>
<div class="p-8 w-full">
<button class="w-full bg-primary hover:bg-primary/90 text-black font-extrabold py-5 rounded-2xl transition-all active:scale-[0.98] shadow-[0_0_25px_rgba(13,242,242,0.3)] flex items-center justify-center gap-2 group">
<span class="text-sm uppercase tracking-widest">Siguiente</span>
<span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
<div class="mt-6 flex justify-center">
<button class="text-gray-500 text-xs font-semibold uppercase tracking-widest hover:text-white transition-colors">
            Saltar
        </button>
</div>
</div>
<div class="flex justify-center pb-2">
<div class="w-32 h-1.5 bg-white/20 rounded-full"></div>
</div>

</body></html>
