<!DOCTYPE html>
<html class="h-full" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Liquidar: Confirmar y Pagar - SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --background-dark: #082F49;
            --card-dark: #0C4A6E;
            --accent: #2DD4BF;
            --primary: #0EA5E9;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--background-dark);
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-status-bar {
            height: 44px;
        }
        .ios-home-indicator {
            height: 34px;
        }
        .safe-area-inset-bottom {
            padding-bottom: 34px;
        }
        .custom-shadow {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col h-full overflow-hidden">
<header class="ios-status-bar flex items-end justify-center px-6 pb-2">
<div class="flex justify-between w-full items-center">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1">
<span class="material-symbols-outlined text-[14px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[14px]">wifi</span>
<span class="material-symbols-outlined text-[14px]">battery_full</span>
</div>
</div>
</header>
<nav class="px-4 py-2 flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white">arrow_back_ios_new</span>
</button>
<div class="text-center">
<h1 class="text-lg font-bold">Liquidar deuda</h1>
<p class="text-[10px] text-accent uppercase tracking-widest font-bold">Paso 2 de 2</p>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5">
<span class="material-symbols-outlined text-white">help</span>
</button>
</nav>
<main class="flex-1 overflow-y-auto px-6 pt-6 space-y-8">
<div class="flex flex-col items-center text-center space-y-4">
<div class="relative">
<div class="w-24 h-24 rounded-full border-2 border-accent p-1">
<div class="w-full h-full bg-gradient-to-br from-teal-400 to-blue-600 rounded-full flex items-center justify-center text-3xl font-bold">
                        J
                    </div>
</div>
<div class="absolute -bottom-1 -right-1 bg-accent text-slate-900 rounded-full p-1 shadow-lg">
<span class="material-symbols-outlined text-[18px] block">verified</span>
</div>
</div>
<div>
<p class="text-slate-400 text-sm">Vas a pagar a</p>
<h2 class="text-2xl font-bold">Jorge Martínez</h2>
</div>
</div>
<div class="bg-white/5 border border-white/10 rounded-[2rem] p-8 text-center space-y-2 focus-within:border-accent/50 transition-colors group">
<label class="text-xs text-slate-400 uppercase tracking-widest font-medium" for="amount">Importe a liquidar</label>
<div class="flex items-center justify-center gap-1">
<input class="bg-transparent border-none text-center text-5xl font-bold text-white focus:ring-0 p-0 w-32" id="amount" type="text" value="12,00"/>
<span class="text-4xl font-bold text-accent">€</span>
</div>
</div>
<div class="space-y-4">
<h3 class="text-sm font-semibold text-slate-400 ml-1">Selecciona método de pago</h3>
<div class="space-y-3">
<label class="flex items-center justify-between p-4 bg-[var(--card-dark)] border border-accent/40 rounded-2xl cursor-pointer hover:bg-white/5 transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-accent">phone_android</span>
</div>
<div>
<p class="font-bold">Bizum</p>
<p class="text-xs text-slate-400">Pago instantáneo</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-accent flex items-center justify-center">
<div class="w-3 h-3 bg-accent rounded-full"></div>
</div>
<input checked="" class="hidden" name="payment" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:bg-white/5 transition-all opacity-80">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-white">account_balance</span>
</div>
<div>
<p class="font-bold">Transferencia</p>
<p class="text-xs text-slate-400">IBAN: ES21 0030 ...</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-white/20"></div>
<input class="hidden" name="payment" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:bg-white/5 transition-all opacity-80">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-white">payments</span>
</div>
<div>
<p class="font-bold">PayPal</p>
<p class="text-xs text-slate-400">jorge.mtz@email.com</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-white/20"></div>
<input class="hidden" name="payment" type="radio"/>
</label>
</div>
</div>
</main>
<footer class="p-6 safe-area-inset-bottom space-y-4">
<button class="w-full bg-accent hover:bg-[#26bba8] text-slate-900 font-bold py-5 rounded-2xl shadow-xl shadow-accent/10 transition-transform active:scale-95 flex items-center justify-center gap-2">
            Confirmar Pago
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center text-[10px] text-slate-500 uppercase tracking-tighter">Transacción segura encriptada punto a punto</p>
<div class="ios-home-indicator flex justify-center items-center">
<div class="w-32 h-1 bg-white/20 rounded-full"></div>
</div>
</footer>
<div class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/90 backdrop-blur-sm">
<div class="text-center space-y-6">
<div class="w-24 h-24 bg-accent rounded-full flex items-center justify-center mx-auto">
<span class="material-symbols-outlined text-slate-900 text-5xl">check</span>
</div>
<div class="space-y-2">
<h3 class="text-2xl font-bold">¡Pago Confirmado!</h3>
<p class="text-slate-400">La deuda con Jorge ha sido saldada.</p>
</div>
<button class="bg-white/10 hover:bg-white/20 px-8 py-3 rounded-xl font-semibold transition-colors">Volver al inicio</button>
</div>
</div>

</body></html>
