<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitGasto - AI Bilingual Demo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer components {
            .glass-card {
                @apply bg-[rgba(255,255,255,0.06)] backdrop-blur-2xl border border-[rgba(255,255,255,0.12)];
            }
            .scanning-line {
                height: 3px;
                background: linear-gradient(90deg, transparent, #0df2df, transparent);
                box-shadow: 0 0 20px #0df2df, 0 0 40px rgba(13, 242, 223, 0.4);
                width: 100%;
                position: absolute;
                top: 40%;
                z-index: 20;
            }
            .pulsing-glow {
                animation: pulse-glow 2.5s ease-in-out infinite;
            }
            @keyframes pulse-glow {
                0%, 100% { opacity: 1; filter: drop-shadow(0 0 10px #0df2df); }
                50% { opacity: 0.8; filter: drop-shadow(0 0 3px #0df2df); }
            }
        }
    </style>
<style>
        body {
            background-color: #000000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white overflow-hidden min-h-screen flex flex-col items-center">
<div class="h-12 w-full max-w-[430px] flex items-center justify-between px-8 shrink-0">
<span class="text-xs font-bold">9:41</span>
<div class="flex gap-1.5">

</div>

</div>

<main class="flex-1 w-full max-w-[430px] flex flex-col items-center px-6 pt-2 pb-8 overflow-y-auto no-scrollbar">

</div>
</div>
</div>
</div>
</div>
<div class="w-full mt-10 flex flex-col items-center text-center px-4">
<h2 class="text-2xl font-black tracking-tighter text-white mb-2 uppercase italic">AI Processing<span class="text-primary">...</span></h2>
<div class="space-y-1">

</div>
<div class="mt-10 w-full flex justify-center">
<button class="group relative bg-white text-black py-4 px-12 rounded-full font-bold text-sm flex items-center gap-3 transition-all active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.2)]">
<span class="material-symbols-outlined text-[20px]">receipt_long</span>
                    Review Receipt

<div class="w-full max-w-[430px] flex justify-center pb-3 shrink-0">

</div>
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-[20%] -left-20 w-80 h-80 bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[20%] -right-20 w-80 h-80 bg-primary/5 blur-[120px] rounded-full"></div>
