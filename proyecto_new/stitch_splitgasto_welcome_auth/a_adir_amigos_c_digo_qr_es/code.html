<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Añadir Amigos - SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13c8ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // AMOLED Black
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .qr-gradient-border {
            background: linear-gradient(135deg, #13c8ec 0%, #0a6b7e 100%);
            padding: 3px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Añadir Amigos</h1>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 max-w-md mx-auto w-full">
<!-- HeadlineText -->
<div class="text-center mb-2">
<h2 class="text-white tracking-tight text-[32px] font-bold leading-tight">Viaje a Roma</h2>
<div class="h-1 w-12 bg-primary mx-auto mt-2 rounded-full"></div>
</div>
<!-- QR Code Container (Images Replacement) -->
<div class="relative w-full aspect-square max-w-[300px] my-8 flex items-center justify-center">
<!-- Decorative Glow -->
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full"></div>
<div class="qr-gradient-border rounded-xl shadow-2xl shadow-primary/10">
<div class="bg-white p-4 rounded-[10px] relative overflow-hidden">
<!-- Simulating a stylized QR Code with a pattern and Logo -->
<div class="w-[240px] h-[240px] bg-center bg-no-repeat bg-cover flex items-center justify-center relative" data-alt="Modern QR code with turquoise accents for group invite" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuApEaKCF5DAydiOa7FW3mHrP2g74xKiZYs66RE-5XiQDoISXfNA9Npw8MsmkPz_hvvMtV3D6SrZ0kLKhhE-8ahMiPbWaR4b_XN-WqNDnUSO9Wer-kqBsbfDftabnukdRblNfg9T8yOrbM7upCldiVaUHaMXQPRFZAh48eB9nlEsPkCyef7ybc8fMK4BIlgOkJ3k_wgPdT2Ns-2x5wvEdyv-Jq0pVtgC6N_kjDEFtvkGs459ZQh1k0MmR58qGIIF8CYJKeeJAEkw9KCA");'>
<!-- Logo Overlay in center -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-white p-1 rounded-lg shadow-sm border border-gray-100">
<div class="bg-primary w-10 h-10 rounded-md flex items-center justify-center">
<span class="material-symbols-outlined text-background-dark font-bold">payments</span>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- BodyText -->
<div class="text-center mb-10">
<p class="text-gray-400 text-base font-normal leading-relaxed px-4">
                Escanea este código para unirte al grupo <span class="text-white font-semibold">Viaje a Roma</span> y empezar a dividir gastos.
            </p>
</div>
<!-- ButtonGroup -->
<div class="w-full space-y-3">
<button class="flex items-center justify-center gap-3 w-full h-14 bg-primary hover:bg-primary/90 text-background-dark text-base font-bold rounded-xl transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">share</span>
<span class="truncate">Compartir enlace</span>
</button>
<button class="flex items-center justify-center gap-3 w-full h-14 bg-white/5 hover:bg-white/10 border border-white/10 text-white text-base font-semibold rounded-xl transition-all">
<span class="material-symbols-outlined text-primary">mail</span>
<span class="truncate">Añadir por email</span>
</button>
</div>
<!-- Help Link -->
<div class="mt-8 pb-6">
<button class="text-primary/70 text-sm font-medium hover:text-primary transition-colors flex items-center gap-1">
                ¿Problemas para escanear? 
                <span class="material-symbols-outlined text-xs">info</span>
</button>
</div>
</main>
<!-- Bottom Padding for iOS Home Indicator -->
<div class="h-8 bg-background-dark"></div>
</body></html>
