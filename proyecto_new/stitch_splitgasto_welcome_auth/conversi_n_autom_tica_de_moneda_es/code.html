<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Conversión Automática de Moneda</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // AMOLED Black
                        "surface-dark": "#121212",
                        "border-dark": "#1f3a3a",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white font-display">
<!-- Main Container (Phone Form Factor) -->
<div class="relative flex min-h-screen w-full max-w-[430px] mx-auto flex-col overflow-hidden shadow-2xl border-x border-white/5">
<!-- TopAppBar -->
<div class="sticky top-0 z-50 flex items-center bg-background-light/80 dark:bg-background-dark/80 ios-blur p-4 pb-2 justify-between">
<div aria-label="Volver" class="text-white flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-white">arrow_back_ios_new</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Añadir Gasto</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex size-10 cursor-pointer items-center justify-center rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white">more_horiz</span>
</button>
</div>
</div>
<!-- Section Header: Instruction -->
<div class="px-4 pt-6">
<h4 class="text-primary text-xs font-bold uppercase tracking-widest text-center">Importe del gasto</h4>
</div>
<!-- Main Input Section -->
<div class="flex flex-col items-center px-4 py-8">
<div class="flex flex-col items-center w-full max-w-sm">
<!-- Currency Selector & Amount -->
<div class="flex flex-col items-center gap-2 mb-4">
<div class="flex items-center gap-2 bg-surface-dark border border-border-dark px-4 py-2 rounded-full cursor-pointer hover:bg-primary/10 transition-colors">
<div class="w-6 h-4 bg-blue-800 rounded-sm overflow-hidden relative">
<div class="absolute inset-0 flex flex-wrap" data-alt="Bandeira dos Estados Unidos minimalista">
<div class="w-full h-1/2 bg-red-600"></div>
<div class="w-1/3 h-1/2 bg-blue-800 absolute top-0 left-0"></div>
</div>
</div>
<span class="text-sm font-bold tracking-tight">USD - Dólar EE.UU.</span>
<span class="material-symbols-outlined text-primary text-sm">expand_more</span>
</div>
<div class="relative mt-4 group">
<div class="flex items-center justify-center">
<span class="text-white/40 text-4xl font-light mr-2">$</span>
<input class="bg-transparent border-none text-white text-6xl font-extrabold text-center focus:ring-0 w-full max-w-[280px] p-0" placeholder="0.00" type="text" value="150.00"/>
</div>
<div class="h-1 w-24 bg-primary mx-auto rounded-full mt-2 opacity-50 group-focus-within:opacity-100 transition-opacity"></div>
</div>
</div>
<!-- Instant Conversion Label -->
<div class="flex flex-col items-center">
<h2 class="text-primary tracking-tight text-[32px] font-extrabold leading-tight px-4 text-center">
                        ≈ 138,45 EUR
                    </h2>
<p class="text-white/40 text-xs font-medium uppercase tracking-tighter mt-1">Conversión automática</p>
</div>
</div>
</div>
<!-- Exchange Rate Card -->
<div class="p-4">
<div class="bg-surface-dark border border-border-dark p-4 rounded-xl flex items-center justify-between shadow-lg">
<div class="flex flex-col gap-1">
<p class="text-white text-base font-bold leading-tight">1 USD = 0,923 EUR</p>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[14px] text-white/40">schedule</span>
<p class="text-white/40 text-xs font-normal leading-normal">Actualizado hace 2 min</p>
</div>
</div>
<button class="flex size-11 cursor-pointer items-center justify-center rounded-lg bg-primary/10 text-primary border border-primary/20 hover:bg-primary/20 transition-all active:scale-95">
<span class="material-symbols-outlined">sync</span>
</button>
</div>
</div>
<!-- Details Form -->
<div class="flex flex-col gap-1 px-4 py-2">
<div class="flex max-w-[480px] flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-white/60 text-sm font-bold leading-normal pb-2 uppercase tracking-wider">Concepto</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-border-dark bg-surface-dark h-14 placeholder:text-white/20 p-[15px] text-base font-normal leading-normal transition-all" value="Cena en Manhattan"/>
</div>
</label>
</div>
<div class="flex max-w-[480px] flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-white/60 text-sm font-bold leading-normal pb-2 uppercase tracking-wider">Categoría</p>
<div class="flex w-full flex-1 items-stretch rounded-lg relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">restaurant</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-border-dark bg-surface-dark h-14 p-[15px] pl-12 text-base font-normal leading-normal cursor-pointer" readonly="" value="Comida y Bebida"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</label>
</div>
</div>
<!-- Space for numeric keypad simulation -->
<div class="flex-grow"></div>
<!-- Bottom Action -->
<div class="p-6 pb-10 bg-gradient-to-t from-background-dark via-background-dark to-transparent">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark text-lg font-extrabold h-16 rounded-2xl transition-all active:scale-[0.98] shadow-[0_0_20px_rgba(19,236,236,0.3)] flex items-center justify-center gap-2">
<span class="material-symbols-outlined font-bold">check_circle</span>
                Registrar Gasto
            </button>
<p class="text-center text-white/30 text-[10px] mt-4 uppercase tracking-[0.2em]">SplitGasto Conversion Engine v2.4</p>
</div>
<!-- iOS Home Indicator -->
<div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full"></div>
</div>
</body></html>
