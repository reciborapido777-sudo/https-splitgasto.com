<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Investor Appreciation Card</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&amp;family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#730bda",
                        "background-light": "#f7f5f8",
                        "background-dark": "#000000",
                        "gold": "#D4AF37",
                        "bronze": "#CD7F32"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>.geometric-overlay {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBllIvjVAKBXsVZEJRSLE7G2HtmCUGTDLO5HKNfRs_XMwtTCBSW_RnnMK9yQwBWfL5z45GxL232rT8xU9mBiE7-EChpMvnVIrKHXd3K4Uoy7eu7bfR1gHv8pUNZg55P1eupXhjNupSj6PiartMHdSBC4B0mDoJJLief2v1lwNVZR_Ukx5uTR2MpJjpN3LdwYVin3BO7TFTBSVqWdd6L5Kr-5Rce-1dPJQURgACjjfMix3m57E2kN2Fkn7RdXV_l_ODCyFa54OqfXili);
    opacity: 0.15
    }
.metallic-gradient {
    background: linear-gradient(135deg, #ff8c00 0%, #730bda 100%)
    }
.gold-text {
    background: linear-gradient(to bottom, #f3e5ab 0%, #d4af37 50%, #b8860b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent
    }
.gold-pulse {
    box-shadow: 0 0 40px 10px rgba(212, 175, 55, 0.15)
    }
.wax-seal {
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #8b0000);
    box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.5), inset -2px -2px 5px rgba(0, 0, 0, 0.4)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white selection:bg-primary/30 overflow-hidden">
<!-- Main Container -->
<div class="relative flex h-screen w-full flex-col items-center justify-center overflow-hidden bg-background-dark p-6">
<!-- Subtle Background Texture -->
<div class="absolute inset-0 geometric-overlay pointer-events-none"></div>
<!-- Top App Bar (iOS Style) -->
<div class="absolute top-0 left-0 right-0 flex items-center justify-between p-6 z-10">
<div class="text-white/60 hover:text-white transition-colors cursor-pointer">
<span class="material-symbols-outlined text-[28px]">close</span>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center justify-center size-10 rounded-full bg-white/5 backdrop-blur-md text-white/80">
<span class="material-symbols-outlined text-[24px]">share</span>
</button>
<button class="flex items-center justify-center size-10 rounded-full bg-white/5 backdrop-blur-md text-white/80">
<span class="material-symbols-outlined text-[24px]">download</span>
</button>
</div>
</div>
<!-- The Appreciation Card -->
<div class="relative w-full max-w-[400px] aspect-[3/4] rounded-xl border border-white/10 bg-gradient-to-b from-white/5 to-transparent backdrop-blur-sm p-8 flex flex-col items-center justify-between shadow-2xl overflow-hidden group">
<!-- Internal Glow -->
<div class="absolute -top-24 -right-24 size-64 bg-primary/10 blur-[100px] rounded-full"></div>
<div class="absolute -bottom-24 -left-24 size-64 bg-gold/5 blur-[100px] rounded-full"></div>
<!-- Top Header -->
<div class="text-center space-y-2 z-10">
<h3 class="font-serif italic text-gold-text text-sm tracking-[0.2em] uppercase">Investor Appreciation</h3>
<h1 class="font-serif text-2xl lg:text-3xl font-bold tracking-tight text-white leading-tight">
                    THANK YOU FOR INVESTING IN THE FUTURE
                </h1>
</div>
<!-- Center Logo Area -->
<div class="relative flex items-center justify-center py-10">
<!-- Pulse Effect -->
<div class="absolute size-48 rounded-full gold-pulse animate-pulse"></div>
<!-- Metallic 'S' Logo -->
<div class="relative size-40 metallic-gradient rounded-3xl flex items-center justify-center shadow-[0_20px_50px_rgba(115,11,218,0.3)] transform group-hover:scale-105 transition-transform duration-700">
<div class="absolute inset-0 bg-white/10 rounded-3xl opacity-50"></div>
<!-- Symbol Placeholder -->
<span class="text-white text-8xl font-extrabold tracking-tighter select-none drop-shadow-2xl italic">S</span>
<!-- Shine Effect -->
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/20 to-transparent rounded-3xl"></div>
</div>
</div>
<!-- Certified Text -->
<div class="text-center z-10">
<p class="text-white/90 text-lg font-semibold tracking-wide uppercase">
                    Certified Premium Partner
                </p>
<div class="h-px w-12 bg-gold/50 mx-auto my-2"></div>
<p class="text-white/60 text-sm font-medium tracking-widest uppercase">
                    SplitGasto® 2026 Funding Round
                </p>
</div>
<!-- Footer: Wax Seal & QR Code -->
<div class="w-full flex items-end justify-between mt-4 z-10">
<!-- Wax Seal -->
<div class="flex flex-col items-center gap-2">
<div class="wax-seal size-16 rounded-full flex items-center justify-center border-2 border-red-900/50">
<div class="flex flex-col items-center leading-none">
<span class="text-[8px] font-bold text-black/40 uppercase tracking-tighter">VIP</span>
<span class="text-[10px] font-black text-black/60 uppercase">INVESTOR</span>
</div>
</div>
<span class="text-[10px] text-white/30 uppercase tracking-widest">Seal of Authenticity</span>
</div>
<!-- QR Code Section -->
<div class="flex flex-col items-center gap-2">
<div class="bg-white p-2 rounded-lg shadow-lg">
<img alt="QR Code" class="size-14" data-alt="Unique QR code for private investor portal access" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB96uyvqnjgVwC2MESBgsa58vK8JeLrTfhYVIFOclM60GmoH-ineYzqG4sOw9EY0o1yUgijgGxbePkedV9V7VyfzmV1_u7qPlVruOzfD_qtlWQe1KoAIq2nlBFBBICFlRsNmrDy5dod623Dkqnhp8cr1d4pZT9g1bFqnN4IlzIzBHNm5-xavUuA3DL8sINTIEBE0iRF5QYCAhp3Q-O8N-es_Kdh4khs0NdgTE6fOezlz9JPt6EZ2276QRLko0dNujeWBj8OIInGpVry"/>
</div>
<span class="text-[10px] text-white/30 uppercase tracking-widest">Private Portal</span>
</div>
</div>
<!-- Corner Accents -->
<div class="absolute top-4 left-4 size-8 border-t border-l border-gold/30"></div>
<div class="absolute top-4 right-4 size-8 border-t border-r border-gold/30"></div>
<div class="absolute bottom-4 left-4 size-8 border-b border-l border-gold/30"></div>
<div class="absolute bottom-4 right-4 size-8 border-b border-r border-gold/30"></div>
</div>
<!-- Bottom Navigation Hint -->
<div class="mt-12 flex flex-col items-center gap-3 animate-bounce opacity-40">
<span class="material-symbols-outlined text-white">keyboard_double_arrow_up</span>
<p class="text-[10px] uppercase tracking-[0.3em] font-medium">Swipe for details</p>
</div>
<!-- Background Lighting -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full pointer-events-none -z-10">
<div class="absolute inset-0 bg-primary/5 blur-[120px]"></div>
</div>
</div>
</body></html>
