<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recompensa por Invitación</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // AMOLED Black for better contrast
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-primary {
            box-shadow: 0 0 20px rgba(19, 236, 236, 0.3);
        }
        .particle {
            position: absolute;
            background: #13ecec;
            border-radius: 50%;
            opacity: 0.4;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-x-hidden min-h-screen">
<!-- Background Decor Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="particle w-1 h-1 top-1/4 left-1/4"></div>
<div class="particle w-2 h-2 top-1/3 right-1/4 opacity-20"></div>
<div class="particle w-1.5 h-1.5 bottom-1/4 left-1/3"></div>
<div class="particle w-1 h-1 bottom-1/3 right-10"></div>
<div class="absolute top-[-10%] left-1/2 -translate-x-1/2 w-64 h-64 bg-primary/10 blur-[100px] rounded-full"></div>
</div>
<div class="relative flex flex-col min-h-screen max-w-md mx-auto">
<!-- TopAppBar -->
<header class="flex items-center p-4 justify-between">
<button class="text-white flex size-12 shrink-0 items-center justify-center hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Recompensa</h2>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 text-center">
<!-- Headline Section -->
<div class="mb-8">
<div class="inline-flex items-center justify-center w-20 h-20 bg-primary/20 rounded-full mb-6 glow-primary">
<span class="material-symbols-outlined text-primary text-5xl">celebration</span>
</div>
<h1 class="text-white tracking-light text-[32px] font-extrabold leading-tight mb-2">¡Puntos Recibidos!</h1>
<p class="text-primary text-2xl font-bold tracking-wide">+50 Puntos de Nivel</p>
</div>
<!-- Visual Progress Module -->
<div class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 mb-8 backdrop-blur-sm">
<div class="flex flex-col gap-4">
<div class="flex gap-6 justify-between items-end">
<div class="text-left">
<p class="text-[#92c9c9] text-xs font-medium uppercase tracking-wider">Próximo Rango</p>
<p class="text-white text-lg font-bold leading-normal">Maestro Fundador</p>
</div>
<p class="text-primary text-sm font-bold leading-normal bg-primary/10 px-2 py-1 rounded">750/1000 pts</p>
</div>
<div class="rounded-full bg-white/10 h-3 overflow-hidden">
<div class="h-full rounded-full bg-primary glow-primary" style="width: 75%;"></div>
</div>
</div>
</div>
<!-- Body Message -->
<div class="px-4 mb-10">
<p class="text-white/80 text-base font-normal leading-relaxed">
                    ¡Tu amigo <span class="text-white font-bold">Juan</span> se ha unido a SplitGasto! Estás más cerca del nivel <span class="text-primary font-medium">Maestro Fundador</span>.
                </p>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-4 mt-auto pb-10">
<button class="w-full bg-primary hover:bg-[#11d8d8] text-black font-bold py-4 rounded-xl transition-all active:scale-[0.98] glow-primary">
                    Seguir Invitando
                </button>
<button class="w-full bg-transparent hover:bg-white/5 text-white font-bold py-4 rounded-xl border border-white/20 transition-all">
                    Ver mi Nivel
                </button>
</div>
</main>
<!-- Illustration / Contextual Image -->
<div class="px-6 pb-6">
<div class="relative w-full aspect-[21/9] overflow-hidden rounded-xl bg-gradient-to-tr from-primary/10 to-transparent flex items-center justify-center">
<div class="flex -space-x-4">
<div class="w-12 h-12 rounded-full border-2 border-background-dark bg-zinc-800 flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-zinc-400">person</span>
</div>
<div class="w-12 h-12 rounded-full border-2 border-primary bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-black">check</span>
</div>
</div>
<div class="absolute inset-0 bg-center bg-no-repeat bg-cover opacity-20" data-alt="Modern abstract turquoise pattern representing connection" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCTEH1K5OPQ9-izvWfGFiEFl_mEs8TNFvHjKkL9-nVQgPKcZsbTUyfl0mPVaGSrOD1j_Sd5VcPMvE5jmO7YnKltV4C6RgMXY19SW85do-G98seOFD2PHdYwW0iENMrAE9dxn75qx30sRU_XmzN3tYGk_FZr76ll_DIOqizqcCKOhiQTjFIBgEA64KUPTa3kuF1pXKtoG3TvrwqT14KRSsI_fLJbmNj_6O6g7n0Oh-bWAzpiP30maaTJwfZYcQmqUXt56NwJB13Lg0NI");'>
</div>
</div>
</div>
</div>
</body></html>
