<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Localization SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .amoled-bg {
            background-color: #000000;
        }
        .glow-effect {
            box-shadow: 0 0 20px rgba(13, 242, 242, 0.3);
        }
        .scanning-pulse {
            position: relative;
        }
        .scanning-pulse::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border: 2px solid #0df2f2;
            border-radius: 50%;
            opacity: 0.3;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="relative flex h-auto w-full flex-col bg-background-light dark:bg-background-dark">
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-primary flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12 font-display">Smart Localization</h2>
</div>
</div>
<!-- Hero Section with 3D Globe Visual -->
<div class="flex-1 flex flex-col items-center justify-center px-6">
<div class="relative w-72 h-72 flex items-center justify-center">
<!-- Simulated Scanning Pulse Background -->
<div class="absolute inset-0 rounded-full border-2 border-primary/20 scale-110"></div>
<div class="absolute inset-0 rounded-full border border-primary/10 scale-125"></div>
<!-- Central Globe Placeholder -->
<div class="relative w-64 h-64 rounded-full overflow-hidden bg-zinc-900 flex items-center justify-center border border-primary/30 glow-effect" data-alt="3D stylized globe with neon connection lines and digital grid" style="background: radial-gradient(circle at center, #102222 0%, #000000 100%);">
<div class="absolute inset-0 opacity-40" style="background-image: radial-gradient(#0df2f2 1px, transparent 1px); background-size: 20px 20px;"></div>
<span class="material-symbols-outlined text-primary text-8xl opacity-80">public</span>
<!-- Neon Connection Lines Simulation -->
<div class="absolute w-full h-px bg-primary/40 rotate-45"></div>
<div class="absolute w-full h-px bg-primary/40 -rotate-45"></div>
</div>
</div>
<!-- Status Indicator -->
<div class="mt-10 flex flex-col items-center">
<div class="flex items-center gap-2 mb-2">
<span class="relative flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-primary"></span>
</span>
<p class="text-primary text-xs font-bold tracking-[0.2em] uppercase">AI Scanner Active</p>
</div>
<h3 class="text-white tracking-tight text-2xl font-bold leading-tight px-4 text-center font-display">
                Smart Detection Active
            </h3>
</div>
</div>
<!-- Parameter List Container -->
<div class="px-6 py-4">
<div class="bg-zinc-900/50 backdrop-blur-md rounded-xl border border-white/5 p-4 space-y-1">
<div class="flex justify-between items-center py-3 border-b border-white/5">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary/60 text-xl">location_on</span>
<p class="text-zinc-400 text-sm font-normal leading-normal font-display">Location</p>
</div>
<p class="text-white text-sm font-semibold leading-normal text-right font-display" data-location="London, UK">London, UK</p>
</div>
<div class="flex justify-between items-center py-3 border-b border-white/5">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary/60 text-xl">translate</span>
<p class="text-zinc-400 text-sm font-normal leading-normal font-display">Language</p>
</div>
<p class="text-white text-sm font-semibold leading-normal text-right font-display">English</p>
</div>
<div class="flex justify-between items-center py-3">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary/60 text-xl">payments</span>
<p class="text-zinc-400 text-sm font-normal leading-normal font-display">Currency</p>
</div>
<div class="flex items-center gap-2">
<p class="text-white text-sm font-semibold leading-normal text-right font-display">GBP (£)</p>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-6 pt-2 space-y-4 mb-4">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-gradient-to-r from-[#0df2f2] to-[#08a8a8] text-[#000000] text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
<span class="truncate font-display uppercase tracking-widest">Confirm Settings</span>
</button>
<div class="text-center">
<a class="text-zinc-500 hover:text-primary text-sm font-medium transition-colors underline underline-offset-4 font-display" href="#">
                Change manually
            </a>
</div>
</div>
<!-- iOS Home Indicator Spacing -->
<div class="h-6 w-full"></div>
</body></html>
