<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Resumen de Deudas - Marketing Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // AMOLED Black
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(24, 52, 50, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(13, 242, 223, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(13, 242, 223, 0.4);
        }
        .perspective-container {
            perspective: 1000px;
        }
        .card-3d {
            transform: rotateX(10deg);
        }
        body {
            overflow: hidden;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white">
<!-- Marketing Background Container (1920x1080) -->
<div class="relative w-[1920px] h-[1080px] mx-auto overflow-hidden bg-background-dark flex flex-col items-center justify-center">
<!-- Abstract Background Effects -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[120px]"></div>
<!-- Grid Pattern -->
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 2px 2px, #0df2df 1px, transparent 0); background-size: 60px 60px;"></div>
</div>
<!-- Content Wrapper (Symmetric & Centered) -->
<div class="relative z-10 w-full max-w-[1200px] flex flex-col items-center">

<div class="mb-20 text-center">
<h1 class="text-white tracking-tight text-7xl font-bold leading-tight mb-4 drop-shadow-2xl">
                    Resumen de deudas
                </h1>
<div class="h-1.5 w-40 bg-primary mx-auto rounded-full neon-glow"></div>
</div>
<!-- Central 3D Card Cluster -->
<div class="perspective-container relative w-full flex justify-center items-center h-[500px]">
<!-- Background Decoration Card (Left) -->
<div class="absolute -translate-x-48 -translate-y-10 rotate-[-8deg] opacity-40 scale-90">
<div class="glass-card w-[420px] p-8 rounded-2xl flex items-center gap-6">
<div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">person</span>
</div>
<div class="flex flex-col gap-1">
<p class="text-[#90cbc6] text-xl">Pendiente</p>
<p class="text-white text-2xl font-bold">Carlos te debe</p>
<p class="text-primary text-3xl font-bold">$15.50</p>
</div>
</div>
</div>
<!-- Background Decoration Card (Right) -->
<div class="absolute translate-x-48 translate-y-10 rotate-[8deg] opacity-40 scale-90">
<div class="glass-card w-[420px] p-8 rounded-2xl flex items-center gap-6">
<div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">person</span>
</div>
<div class="flex flex-col gap-1">
<p class="text-[#90cbc6] text-xl">Próximo cobro</p>
<p class="text-white text-2xl font-bold">Lucía te debe</p>
<p class="text-primary text-3xl font-bold">$120.00</p>
</div>
</div>
</div>

<div class="relative z-20 card-3d">
<div class="glass-card w-[560px] p-10 rounded-2xl border-primary/40 neon-glow flex flex-col gap-8">
<div class="flex items-center justify-between">
<div class="flex items-center gap-6">
<div class="w-24 h-24 rounded-2xl bg-center bg-no-repeat bg-cover shadow-xl" data-alt="Avatar portrait of a user for balance visualization" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD2-MM4xlf7DMB8hFVrYzllO0jBU59XYjR9Z9McJK73Vcnci-6liygzgGBnXmPkAJufiRHSY6nX7E1rkjTZJEt2-C0XeIda10C7rV4P2Prmfd_rlWXH3QnaADy_OJs78YgmNW7VetE6no4KvRVEMU_nJx-IB6mRqo06sG3y_9__JfxFe2qRnSa9N6OnOkbClEilOpksolmJqgf1RMDg-G7zRBogUQJ54zgCimLWwulWyY9AFoGorMb2gvhKsuXsIhytTeGvnyWGCODP");'></div>
<div class="flex flex-col">
<p class="text-white text-3xl font-bold">Juan le debe a Ana</p>
<p class="text-[#90cbc6] text-xl">Saldo actualizado hoy</p>
</div>
</div>
<div class="flex flex-col items-end">
<p class="text-primary text-5xl font-extrabold">$50.00</p>
</div>
</div>
<!-- Mini Detail Rows -->
<div class="flex flex-col gap-4 border-t border-primary/10 pt-6">
<div class="flex justify-between items-center opacity-80">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">receipt_long</span>
<span class="text-xl">Cena compartida</span>
</div>
<span class="text-xl font-medium">$35.00</span>
</div>
<div class="flex justify-between items-center opacity-80">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">directions_car</span>
<span class="text-xl">Gasolina viaje</span>
</div>
<span class="text-xl font-medium">$15.00</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-background-dark py-5 rounded-xl font-bold text-2xl flex items-center justify-center gap-3 mt-2 shadow-[0_0_20px_rgba(13,242,223,0.3)]">
<span class="material-symbols-outlined font-bold">arrow_forward_ios</span>
                            Ver todos los detalles
                        </button>
</div>
</div>
</div>
<!-- Bottom Navigation Bar (Floating Simulation) -->
<div class="mt-24 w-[600px] h-24 glass-card rounded-full flex items-center justify-around px-8 neon-glow border-primary/30">
<div class="flex flex-col items-center gap-1 text-[#90cbc6]">
<span class="material-symbols-outlined text-4xl">house</span>
</div>
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined text-5xl fill-1">pie_chart</span>
<div class="w-1.5 h-1.5 bg-primary rounded-full"></div>
</div>
<div class="flex flex-col items-center gap-1 text-[#90cbc6]">
<div class="bg-primary/20 p-4 rounded-full -translate-y-4 shadow-lg border border-primary/20">
<span class="material-symbols-outlined text-primary text-4xl">add</span>
</div>
</div>
<div class="flex flex-col items-center gap-1 text-[#90cbc6]">
<span class="material-symbols-outlined text-4xl">receipt</span>
</div>
<div class="flex flex-col items-center gap-1 text-[#90cbc6]">
<span class="material-symbols-outlined text-4xl">person</span>
</div>
</div>
</div>

<div class="absolute left-20 top-1/2 -translate-y-1/2 opacity-20">
<span class="material-symbols-outlined text-[120px] text-primary">trending_up</span>
</div>
<div class="absolute right-20 top-1/2 -translate-y-1/2 opacity-20">
<span class="material-symbols-outlined text-[120px] text-primary">payments</span>
</div>
