<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Concepto Vídeo 3D SplitGasto ES</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ddff2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .text-gradient-future {
            background: linear-gradient(to right, #f97316, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 20px rgba(249, 115, 22, 0.3);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(13, 223, 242, 0.4);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white selection:bg-primary/30">
<!-- Main Container (iOS Phone Frame Simulation) -->
<div class="relative flex min-h-screen w-full flex-col bg-background-dark overflow-x-hidden">
<!-- Top App Bar Component -->
<div class="flex items-center bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between sticky top-0 z-50">
<div class="text-white flex size-12 shrink-0 items-center cursor-pointer" data-icon="close">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-white text-sm font-medium leading-tight tracking-wider flex-1 text-center uppercase">Concept Art: Teaser 3D</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex size-12 cursor-pointer items-center justify-center rounded-lg bg-transparent text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</div>
</div>
<!-- Hero Cinematic Section -->
<div class="relative flex flex-col items-center justify-center flex-1 px-4 py-8">
<!-- Background Abstract Elements (Simulated Neon Rays & Crystals) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/4 left-[-10%] w-[120%] h-[1px] bg-primary/40 rotate-[15deg] blur-sm"></div>
<div class="absolute top-1/2 right-[-10%] w-[120%] h-[2px] bg-primary/60 rotate-[-10deg] blur-md"></div>
<div class="absolute bottom-1/4 left-1/4 w-32 h-32 bg-primary/10 rounded-full blur-[100px]"></div>
</div>
<!-- Main 3D Render Placeholder -->
<div class="relative w-full max-w-[340px] aspect-square flex items-center justify-center mb-12">
<!-- Floating Crystals (Visual representation via CSS shapes/gradients) -->
<div class="absolute top-0 left-0 w-24 h-40 glass-panel rotate-[25deg] rounded-lg opacity-40"></div>
<div class="absolute bottom-4 right-0 w-20 h-32 glass-panel rotate-[-15deg] rounded-lg opacity-30"></div>
<!-- The "S" Coin Placeholder -->
<div class="relative z-10 w-64 h-64 rounded-full border-4 border-primary/20 flex items-center justify-center bg-gradient-to-br from-zinc-800 to-black shadow-[0_0_80px_rgba(13,223,242,0.2)]" data-alt="Symmetrical 3D silver coin with SplitGasto S logo glowing with turquoise neon light reflections" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCmtf_LbxN3xhVI9WPd-Q_0-B--fQfNQ_5MwYfhVUsbT9Z3MPlFnNQv6eCx2bPoLnTW7p1pDO8LJ2-guol_UeJ_s7ziqieEAqvxKpknd2AoOcp_NaPUT_jJ5BI9jA-5zIg0-wz3le9Zb_5LnE8U3ChClhXd99GMRusG2ifkdqh98kgl1TWjS5i_XyaL9SrqYi8p71NMhEf0IYObeQHzjpGYtQLyypdQSkq_tKr-MoCWBGCQ0ZL8nZB6wID7uWflrzIVpsPTINGdnqUx');">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/20 to-transparent rounded-full"></div>
</div>
</div>
<!-- Main Slogan -->
<div class="text-center z-20">
<p class="text-primary text-xs font-bold tracking-[0.4em] uppercase mb-4 opacity-80">ATMÓSFERA VISUAL CINEMATOGRÁFICA</p>
<h1 class="text-gradient-future tracking-tight text-[38px] md:text-[44px] font-bold leading-none mb-6">
                    EXPERIMENTA <br/> EL FUTURO
                </h1>
</div>
<!-- Specs Grid (Glassmorphism) -->
<div class="grid grid-cols-3 gap-3 w-full max-w-sm px-2 mb-10">
<div class="glass-panel flex flex-col items-center justify-center py-4 rounded-xl">
<p class="text-primary/60 text-[10px] font-bold uppercase tracking-widest mb-1">Calidad</p>
<p class="text-white text-lg font-bold">4K Ultra</p>
</div>
<div class="glass-panel flex flex-col items-center justify-center py-4 rounded-xl border-primary/30 bg-primary/5">
<p class="text-primary/60 text-[10px] font-bold uppercase tracking-widest mb-1">Fluidez</p>
<p class="text-white text-lg font-bold">60 FPS</p>
</div>
<div class="glass-panel flex flex-col items-center justify-center py-4 rounded-xl">
<p class="text-primary/60 text-[10px] font-bold uppercase tracking-widest mb-1">Motor</p>
<p class="text-white text-lg font-bold">Unreal</p>
</div>
</div>
<!-- Primary Action -->
<button class="w-full max-w-sm h-14 bg-primary text-black font-bold rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]">play_circle</span>
<span class="tracking-widest uppercase text-sm">Reproducir Teaser</span>
</button>
</div>
<!-- Secondary Info Section -->
<div class="bg-zinc-900/50 border-t border-zinc-800 p-6 pb-12">
<h3 class="text-zinc-500 text-[10px] font-bold tracking-[0.2em] uppercase mb-4">Detalles del Proyecto</h3>
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<span class="text-zinc-300 text-sm">Visuales Inmersivos</span>
<span class="material-symbols-outlined text-primary text-sm">check_circle</span>
</div>
<div class="w-full h-[1px] bg-zinc-800"></div>
<div class="flex items-center justify-between">
<span class="text-zinc-300 text-sm">Composición Simétrica</span>
<span class="material-symbols-outlined text-primary text-sm">check_circle</span>
</div>
<div class="w-full h-[1px] bg-zinc-800"></div>
<div class="flex items-center justify-between">
<span class="text-zinc-300 text-sm">Audio Espacial Dolby</span>
<span class="material-symbols-outlined text-primary text-sm">check_circle</span>
</div>
</div>
<!-- Technical Map/Location context placeholder -->
<div class="mt-8 rounded-xl overflow-hidden h-32 glass-panel border-none relative group cursor-crosshair">
<div class="absolute inset-0 bg-[url('https://placeholder.pics/svg/600x200/101010/333333/Grid%20Pattern')] opacity-50" data-alt="Dark technical grid pattern representing a digital environment map"></div>
<div class="absolute inset-0 flex items-center justify-center flex-col">
<span class="material-symbols-outlined text-primary mb-1">location_on</span>
<span class="text-[10px] text-primary tracking-widest uppercase">Estudio Render: Madrid</span>
</div>
<div class="data-location hidden" data-location="Madrid, Spain" style=""></div>
</div>
</div>
</div>
</body></html>
