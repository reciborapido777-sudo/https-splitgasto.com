<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&amp;family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8319e6",
                        "background-light": "#f7f6f8",
                        "background-dark": "#000000",
                        "gold": "#D4AF37",
                        "neon-turquoise": "#00f2ff",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif-title": ["Cinzel", "serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .gold-shimmer {
            background: linear-gradient(45deg, #B8860B, #D4AF37, #FFD700, #D4AF37, #B8860B);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .wax-seal {
            background: radial-gradient(circle at 30% 30%, #ffd700 0%, #b8860b 60%, #8b6508 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
        }
        .diamond-glow {
            filter: drop-shadow(0 0 15px rgba(131, 25, 230, 0.6)) drop-shadow(0 0 30px rgba(255, 165, 0, 0.4));
        }
        .radial-lines {
            background-image: radial-gradient(circle at center, transparent 0%, rgba(212, 175, 55, 0.05) 100%),
                              repeating-conic-gradient(from 0deg, transparent 0deg 10deg, rgba(212, 175, 55, 0.03) 11deg 12deg);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white selection:bg-primary/30">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden bg-background-dark">
<!-- Top App Bar -->
<div class="flex items-center bg-black/50 backdrop-blur-md p-4 pb-2 justify-between sticky top-0 z-50">
<div class="text-white flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-gold">auto_awesome</span>
</div>
<h2 class="text-gold font-serif-title text-sm font-bold leading-tight tracking-[0.1em] flex-1 text-center uppercase">Tarjeta de Socio</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-full h-10 w-10 bg-white/10 hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-white text-[20px]">ios_share</span>
</button>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center p-6 relative">
<!-- Background Decoration: Converging Lines -->
<div class="absolute inset-0 radial-lines pointer-events-none"></div>
<!-- VIP Card Container -->
<div class="relative w-full max-w-sm aspect-[5/8] rounded-[2.5rem] p-[1px] bg-gradient-to-b from-gold/40 via-transparent to-neon-turquoise/30 shadow-[0_0_50px_-12px_rgba(131,25,230,0.5)] overflow-hidden">
<div class="absolute inset-0 bg-black rounded-[2.5rem]"></div>
<!-- Card Inner Content -->
<div class="relative h-full flex flex-col items-center justify-between py-12 px-6 text-center">
<!-- Decorative Top Element -->
<div class="w-12 h-1 bg-gradient-to-r from-transparent via-neon-turquoise to-transparent rounded-full opacity-50"></div>
<!-- Header -->
<div class="space-y-4">
<h1 class="font-serif-title text-2xl md:text-3xl font-bold tracking-widest gold-shimmer uppercase leading-tight">
                            Gracias por ser<br/>Pionero
                        </h1>
<div class="flex items-center justify-center gap-2">
<span class="h-[1px] w-8 bg-gold/30"></span>
<span class="text-xs text-gold/60 tracking-[0.3em] font-serif-title">EST. 2026</span>
<span class="h-[1px] w-8 bg-gold/30"></span>
</div>
</div>
<!-- Central Logo Area -->
<div class="relative group">
<!-- Glow behind logo -->
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full"></div>
<!-- Main Logo Image Placeholder -->
<div class="relative w-40 h-40 flex items-center justify-center diamond-glow">
<!-- Custom SVG representation of the 'S' logo with diamond finish -->
<svg class="w-full h-full" viewbox="0 0 100 100">
<defs>
<lineargradient id="logoGrad" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#ff8c00"></stop>
<stop offset="100%" style="stop-color:#8319e6"></stop>
</lineargradient>
<filter id="diamond">
<fegaussianblur in="SourceGraphic" stddeviation="1"></fegaussianblur>
</filter>
</defs>
<path d="M30,20 C15,20 15,45 30,45 L70,45 C85,45 85,70 70,80 C55,90 30,85 25,75" fill="none" stroke="url(#logoGrad)" stroke-linecap="round" stroke-width="12"></path>
<circle class="animate-pulse" cx="50" cy="50" fill="white" r="2"></circle>
</svg>
<!-- Floating Sparkle Icons -->
<span class="material-symbols-outlined absolute top-4 right-4 text-white text-xs animate-pulse">flare</span>
<span class="material-symbols-outlined absolute bottom-10 left-4 text-white text-[10px] opacity-70">colors_spark</span>
</div>
</div>
<!-- Body Text -->
<div class="space-y-4 max-w-[240px]">
<p class="text-white/80 text-base leading-relaxed font-medium">
                            Formas parte de los primeros <span class="text-white font-bold">100 socios</span> de SplitGasto®
                        </p>
<p class="text-xs text-neon-turquoise/70 tracking-widest uppercase font-bold">
                            Acceso Élite Concedido
                        </p>
</div>
<!-- Digital Wax Seal -->
<div class="relative">
<div class="wax-seal size-20 rounded-full flex flex-col items-center justify-center border-2 border-gold/50 rotate-[-12deg]">
<span class="font-serif-title text-[10px] text-black/60 font-black leading-none uppercase">Edición</span>
<span class="font-serif-title text-xl text-black/80 font-bold leading-none">1/100</span>
</div>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="mt-12 w-full max-w-sm flex flex-col items-center gap-6">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-full shadow-[0_0_20px_rgba(131,25,230,0.4)] transition-all flex items-center justify-center gap-2 group">
<span>Continuar a mi cuenta</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div class="flex items-center gap-4 opacity-50">
<div class="h-[1px] w-12 bg-white/20"></div>
<span class="text-[10px] tracking-[0.2em] font-bold uppercase">Socio de Élite</span>
<div class="h-[1px] w-12 bg-white/20"></div>
</div>
</div>
</div>
<!-- Decorative corner accents -->
<div class="fixed bottom-4 left-4 size-16 border-b-2 border-l-2 border-neon-turquoise/20 rounded-bl-xl pointer-events-none"></div>
<div class="fixed top-20 right-4 size-16 border-t-2 border-r-2 border-gold/20 rounded-tr-xl pointer-events-none"></div>
</div>
</body></html>
