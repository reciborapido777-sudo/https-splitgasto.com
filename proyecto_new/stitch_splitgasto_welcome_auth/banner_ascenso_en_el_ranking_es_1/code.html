<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecda",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // AMOLED Pure Black
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .gradient-arrow {
            background: linear-gradient(135deg, #FF8C00 0%, #8A2BE2 100%);
        }
        .glow-turquoise {
            box-shadow: 0 0 20px rgba(19, 236, 218, 0.4);
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<!-- Main Container: Simulating Phone Screen -->
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header / Logo -->
<div class="flex items-center p-6 justify-between z-20">
<div class="flex items-center gap-2">
<div class="text-primary flex size-8 items-center justify-center">
<span class="material-symbols-outlined text-3xl">hub</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight">SplitGasto</h2>
</div>
<button class="text-white/40 hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Ambient Particle Background -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="particle bg-primary/20 w-2 h-2 top-1/4 left-1/4 blur-sm"></div>
<div class="particle bg-purple-500/30 w-3 h-3 top-1/2 right-10 blur-md"></div>
<div class="particle bg-orange-500/20 w-1.5 h-1.5 bottom-1/3 left-10 blur-sm"></div>
<div class="particle bg-primary/40 w-1 h-1 top-20 right-1/4"></div>
<div class="particle bg-white/10 w-2 h-2 bottom-20 left-1/2 blur-lg"></div>
<!-- Radial Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] bg-[radial-gradient(circle,_rgba(19,236,218,0.05)_0%,_transparent_70%)]"></div>
</div>
<!-- Central Content Area -->
<div class="flex-1 flex flex-col items-center justify-center px-6 z-10">
<!-- Graphic Element: The Arrow -->
<div class="relative mb-8">
<div class="gradient-arrow w-32 h-32 rounded-3xl flex items-center justify-center rotate-45 transform shadow-[0_20px_50px_rgba(138,43,226,0.3)]">
<span class="material-symbols-outlined text-white text-7xl -rotate-45 font-bold">trending_up</span>
</div>
<!-- Decorative rings -->
<div class="absolute -inset-4 border border-white/10 rounded-full scale-110"></div>
<div class="absolute -inset-8 border border-white/5 rounded-full scale-125"></div>
</div>
<!-- Typography Block -->
<div class="text-center space-y-4 max-w-sm">
<h1 class="text-white tracking-[0.1em] text-4xl font-extrabold leading-tight">
                    ¡ESTÁS ESCALANDO!
                </h1>
<p class="text-white/80 text-lg font-medium leading-relaxed px-2">
                    Has subido <span class="text-primary font-bold">45 puestos</span>. <br/>
                    Ahora estás en el <span class="text-white font-bold">TOP 1.000</span> global.
                </p>
</div>
<!-- Stats Mini-Card -->
<div class="mt-10 grid grid-cols-2 gap-4 w-full max-w-[320px]">
<div class="bg-white/5 border border-white/10 rounded-2xl p-4 text-center">
<p class="text-white/50 text-xs uppercase tracking-widest mb-1">Anterior</p>
<p class="text-white text-xl font-bold">1.045</p>
</div>
<div class="bg-primary/10 border border-primary/20 rounded-2xl p-4 text-center">
<p class="text-primary/60 text-xs uppercase tracking-widest mb-1">Actual</p>
<p class="text-primary text-xl font-bold">1.000</p>
</div>
</div>
</div>
<!-- Action Area -->
<div class="px-6 pb-12 z-20">
<div class="flex flex-col gap-4 max-w-sm mx-auto">
<button class="glow-turquoise flex h-16 w-full cursor-pointer items-center justify-center overflow-hidden rounded-full bg-primary text-background-dark text-lg font-extrabold leading-normal tracking-wider transition-transform active:scale-95">
<span class="truncate uppercase">VER POSICIÓN</span>
</button>
<button class="flex h-12 w-full cursor-pointer items-center justify-center rounded-full text-white/40 text-sm font-bold uppercase tracking-widest hover:text-white/60 transition-colors">
<span>CERRAR</span>
</button>
</div>
</div>
<!-- Bottom Safe Area Notch (Visual only) -->
<div class="h-1.5 w-32 bg-white/20 rounded-full mx-auto mb-2 shrink-0"></div>
</div>
</body></html>
