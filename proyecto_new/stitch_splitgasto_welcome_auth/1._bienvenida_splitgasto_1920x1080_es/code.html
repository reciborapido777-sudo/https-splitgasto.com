<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitGasto - Bienvenida</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FF6B00",
                        secondary: "#9D00FF",
                        "background-light": "#F8FAFC",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1.5rem",
                    },
                },
            },
        };
    </script>
<style>
        .glass-button {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .neon-glow-1 {
            background: radial-gradient(circle at center, rgba(255, 107, 0, 0.15) 0%, transparent 70%);
            filter: blur(60px);
        }
        .neon-glow-2 {
            background: radial-gradient(circle at center, rgba(157, 0, 255, 0.12) 0%, transparent 70%);
            filter: blur(60px);
        }
        .metallic-s {
            background: linear-gradient(135deg, #FF6B00 0%, #9D00FF 100%);
            box-shadow: 0 10px 40px rgba(157, 0, 255, 0.3);
            position: relative;
        }
        .metallic-s::after {
            content: '';
            position: absolute;
            top: 5%;
            left: 5%;
            width: 90%;
            height: 90%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
            border-radius: inherit;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen overflow-hidden">
<div class="relative w-full h-screen flex flex-col items-center justify-center p-8 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] neon-glow-1 pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] neon-glow-2 pointer-events-none"></div>
<div class="relative z-10 flex flex-col items-center max-w-lg w-full text-center space-y-12">
<div class="animate-float">
<div class="w-32 h-32 rounded-3xl metallic-s flex items-center justify-center">
<span class="text-white text-7xl font-extrabold italic select-none">S</span>
</div>
</div>
<div class="space-y-4">
<h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight leading-tight">
<span class="block">Comparte gastos</span>
<span class="bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">fácilmente</span>
</h1>
<p class="text-slate-400 text-lg md:text-xl font-medium max-w-xs mx-auto">
                    La forma más inteligente y rápida de gestionar finanzas compartidas.
                </p>
</div>
<div class="w-full pt-8">
<button class="glass-button w-full py-5 rounded-2xl flex items-center justify-center space-x-3 transition-all active:scale-95 group">
<span class="text-xl font-bold tracking-widest uppercase">Empezar</span>
<span class="material-icons-round text-primary group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
<div class="absolute bottom-10 left-0 right-0 flex justify-center space-x-2">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-2 rounded-full bg-slate-800"></div>
<div class="h-1.5 w-2 rounded-full bg-slate-800"></div>
<div class="h-1.5 w-2 rounded-full bg-slate-800"></div>
<div class="h-1.5 w-2 rounded-full bg-slate-800"></div>
<div class="h-1.5 w-2 rounded-full bg-slate-800"></div>
<div class="h-1.5 w-2 rounded-full bg-slate-800"></div>
</div>
</div>
<div class="fixed top-0 w-full p-6 flex justify-between items-center z-50 pointer-events-none">
<div class="text-sm font-bold tracking-tighter dark:text-white/40">9:41</div>
<div class="flex space-x-1.5 items-center">
<span class="material-icons-round text-sm dark:text-white/40">signal_cellular_alt</span>
<span class="material-icons-round text-sm dark:text-white/40">wifi</span>
<span class="material-icons-round text-sm dark:text-white/40">battery_full</span>
</div>
</div>

</body></html>
