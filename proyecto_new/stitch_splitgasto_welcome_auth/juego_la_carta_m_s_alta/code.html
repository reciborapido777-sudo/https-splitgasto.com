<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>La Carta Más Alta - SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0bdac9",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102221",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .tapete-gradient {
            background: radial-gradient(circle at center, #1a3a38 0%, #102221 100%);
        }
        .card-inner {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col text-white">
<!-- Top Navigation -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-white/5">
<div class="text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-white/10 transition-colors cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">La Carta Más Alta</h2>
</header>
<main class="flex-1 flex flex-col items-center justify-start overflow-y-auto pb-32">
<!-- Headline -->
<div class="w-full max-w-md">
<h2 class="text-white tracking-light text-[28px] font-bold leading-tight px-6 text-center pb-2 pt-8 font-display">
                ¿Quién invita hoy?
            </h2>
<p class="text-white/70 text-base font-normal leading-normal pb-6 px-6 text-center font-display">
                ¡Tira una carta para descubrir quién paga la cuenta!
            </p>
</div>
<!-- Status / Result Display -->
<div class="w-full max-w-md px-4 mb-6">
<div class="flex flex-wrap gap-4">
<div class="flex min-w-[158px] flex-1 flex-col gap-1 rounded-xl p-5 bg-[#1a3a38] border border-primary/20 shadow-lg">
<p class="text-primary text-xs font-bold uppercase tracking-wider">Estado del Juego</p>
<p class="text-white tracking-light text-xl font-bold leading-tight">Esperando selección...</p>
</div>
</div>
</div>
<!-- Game Board (The Tapete) -->
<div class="w-full max-w-md px-4">
<div class="tapete-gradient rounded-3xl p-6 border-4 border-[#283938] grid grid-cols-2 gap-4 shadow-2xl relative overflow-hidden">
<!-- Abstract Pattern Background inside the board -->
<div class="absolute inset-0 opacity-10 pointer-events-none bg-center bg-no-repeat bg-cover" data-alt="Abstract subtle turquoise pattern mimicking a poker table felt texture" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAYTCqYTA9ZKCwdLye65SsLSQbgI4uoGHAtL2uaejLeAggJ2QMrXdisrchbRgbGvm3ka-y6Wl_MyrzkhQk5uwn6vxSR_9tUBQeUoCnHV67Uy4iJe6bkqjIN3yhqdPe5JxHmj3sa1mW0INK8FS0DnFd8SCiJj1GcoOilSZWk6D7Rqx8cIS_YiMX6FZbGSCVYqlGYMqfNoN4qs_5ePovOjONG4xJs4pm0uheDh3IfBHPHcdWvDLzH0u3uK8MOi-BkoABnSFw0NaUUNeq3");'>
</div>
<!-- Card 1 -->
<div class="group cursor-pointer">
<div class="aspect-[3/4] bg-primary/10 rounded-xl border-2 border-primary/30 flex flex-col items-center justify-center p-4 relative card-inner overflow-hidden transition-all hover:scale-105 hover:border-primary/60">
<div class="absolute inset-0 flex items-center justify-center opacity-20">
<span class="material-symbols-outlined text-6xl text-primary">playing_cards</span>
</div>
<div class="z-10 text-center">
<div class="w-12 h-12 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-2 border border-primary/40">
<span class="material-symbols-outlined text-primary">account_circle</span>
</div>
<span class="text-xs font-bold text-white/90">Alex</span>
</div>
</div>
</div>
<!-- Card 2 -->
<div class="group cursor-pointer">
<div class="aspect-[3/4] bg-primary/10 rounded-xl border-2 border-primary/30 flex flex-col items-center justify-center p-4 relative card-inner overflow-hidden transition-all hover:scale-105 hover:border-primary/60">
<div class="absolute inset-0 flex items-center justify-center opacity-20">
<span class="material-symbols-outlined text-6xl text-primary">playing_cards</span>
</div>
<div class="z-10 text-center">
<div class="w-12 h-12 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-2 border border-primary/40">
<span class="material-symbols-outlined text-primary">account_circle</span>
</div>
<span class="text-xs font-bold text-white/90">María</span>
</div>
</div>
</div>
<!-- Card 3 -->
<div class="group cursor-pointer">
<div class="aspect-[3/4] bg-primary/10 rounded-xl border-2 border-primary/30 flex flex-col items-center justify-center p-4 relative card-inner overflow-hidden transition-all hover:scale-105 hover:border-primary/60">
<div class="absolute inset-0 flex items-center justify-center opacity-20">
<span class="material-symbols-outlined text-6xl text-primary">playing_cards</span>
</div>
<div class="z-10 text-center">
<div class="w-12 h-12 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-2 border border-primary/40">
<span class="material-symbols-outlined text-primary">account_circle</span>
</div>
<span class="text-xs font-bold text-white/90">David</span>
</div>
</div>
</div>
<!-- Card 4 -->
<div class="group cursor-pointer">
<div class="aspect-[3/4] bg-primary/10 rounded-xl border-2 border-primary/30 flex flex-col items-center justify-center p-4 relative card-inner overflow-hidden transition-all hover:scale-105 hover:border-primary/60">
<div class="absolute inset-0 flex items-center justify-center opacity-20">
<span class="material-symbols-outlined text-6xl text-primary">playing_cards</span>
</div>
<div class="z-10 text-center">
<div class="w-12 h-12 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-2 border border-primary/40">
<span class="material-symbols-outlined text-primary">account_circle</span>
</div>
<span class="text-xs font-bold text-white/90">Lucía</span>
</div>
</div>
</div>
</div>
</div>
<div class="h-10"></div>
</main>
<!-- Fixed Bottom Actions -->
<footer class="fixed bottom-0 left-0 right-0 p-6 bg-background-light dark:bg-background-dark border-t border-white/5 backdrop-blur-md">
<div class="max-w-md mx-auto flex gap-4">
<button class="flex-1 bg-white/10 hover:bg-white/15 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95">
<span class="material-symbols-outlined">restart_alt</span>
                Reiniciar
            </button>
<button class="flex-[2] bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-primary/20 active:scale-95">
<span class="material-symbols-outlined">receipt_long</span>
                Registrar Gasto
            </button>
</div>
<!-- iPhone indicator padding -->
<div class="h-4"></div>
</footer>
</body></html>
