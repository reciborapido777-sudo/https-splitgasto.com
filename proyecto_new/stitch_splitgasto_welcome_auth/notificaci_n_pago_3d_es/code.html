<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Notificación Pago 3D ES</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2beede",
              "background-light": "#f6f8f8",
              "background-dark": "#102220",
            },
            fontFamily: {
              "display": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .amoled-bg {
            background-color: #000000;
        }
        .notification-gradient {
            background: linear-gradient(135deg, rgba(43, 238, 222, 0.1) 0%, rgba(25, 51, 49, 0.4) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-white overflow-hidden">
<div class="relative flex h-screen w-full flex-col amoled-bg group/design-root overflow-hidden max-w-[430px] mx-auto border-x border-gray-800 shadow-2xl">
<!-- Status Bar Area -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="flex items-center gap-1">
<span class="text-xs font-semibold">Movistar</span>
<span class="material-symbols-outlined text-[14px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[14px]">wifi</span>
</div>
<div class="flex-1"></div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[20px]">battery_full</span>
</div>
</div>
<!-- Lock Screen Header (Time & Date) -->
<div class="mt-12 flex flex-col items-center">
<p class="text-lg font-medium tracking-wide">jueves, 24 de octubre</p>
<h1 class="text-8xl font-bold tracking-tighter mt-1">12:45</h1>
</div>
<!-- Notification Container -->
<div class="flex-1 px-4 mt-12 overflow-y-auto space-y-3">
<!-- Main Push Notification Card -->
<div class="ios-blur notification-gradient rounded-xl p-4 border border-white/10 shadow-lg">
<div class="flex items-start justify-between mb-3">
<div class="flex items-center gap-2">
<div class="bg-primary rounded-lg p-1">
<span class="material-symbols-outlined text-black text-[18px]">account_balance_wallet</span>
</div>
<span class="text-xs font-semibold text-primary uppercase tracking-widest">PAGOS • ahora</span>
</div>
<span class="material-symbols-outlined text-gray-400 text-[18px]">keyboard_arrow_down</span>
</div>
<div class="flex gap-4">
<div class="flex-1">
<h3 class="text-white text-lg font-bold leading-tight flex items-center gap-2">
                            ✅ ¡Cuentas saldadas!
                        </h3>
<p class="text-gray-300 text-sm mt-2 leading-relaxed">
<span class="font-bold text-white">Juan</span> ha recibido tu pago de <span class="text-primary font-bold">45,50€</span>. Tu balance en el grupo <span class="italic">Viaje a Roma</span> ahora está a cero.
                        </p>
<div class="mt-4 flex gap-2">
<button class="flex items-center justify-center rounded-lg bg-primary/20 border border-primary/30 py-2 px-4 text-primary text-xs font-bold gap-1">
<span>Ver detalles</span>
<span class="material-symbols-outlined text-[16px]">chevron_right</span>
</button>
</div>
</div>
<!-- 3D Element Container -->
<div class="w-24 h-24 shrink-0 relative">
<div class="absolute inset-0 bg-primary/10 rounded-full blur-xl animate-pulse"></div>
<div class="relative w-full h-full rounded-xl bg-center bg-cover border border-white/5 shadow-2xl overflow-hidden" data-alt="Moneda 3D metálica plateada y turquesa flotando" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCvgMmuQJZk9muDLr5TtADNzaCzP7empT_nZ85KUcbKoPjuo5S0j8DdcHargLb6hScKoh7JD_6gI-jcO2qmnpAfLx50LcTvBAJ23MTAXMvL7NeIoMw5ZMFAfwB66cQYvWZyKxjjws4L4pUiuLVWjbcvnrxo5I_o9gQWLZ0h13pglidfffjVOA3mBV-T8o6yFzPMz80frYaPtWMLe4CUVg8bBC2QNIsnYYsxTiD3tSFAchE18wLfUmNavp3sf1bh7esAUTkm4LRv2P2U");'>
</div>
</div>
</div>
</div>
<!-- Stacked notification indicator (Visual cue of more notifications) -->
<div class="h-2 mx-4 bg-white/5 rounded-b-xl border-x border-b border-white/10"></div>
</div>
<!-- Bottom Actions (iOS Style) -->
<div class="pb-12 px-10 flex justify-between items-center w-full">
<div class="flex flex-col items-center">
<div class="h-12 w-12 rounded-full bg-white/10 flex items-center justify-center ios-blur cursor-pointer hover:bg-white/20 transition-all">
<span class="material-symbols-outlined text-white">flashlight_on</span>
</div>
</div>
<div class="h-1 w-32 bg-white/30 rounded-full"></div>
<div class="flex flex-col items-center">
<div class="h-12 w-12 rounded-full bg-white/10 flex items-center justify-center ios-blur cursor-pointer hover:bg-white/20 transition-all">
<span class="material-symbols-outlined text-white">photo_camera</span>
</div>
</div>
</div>
</div>
</body></html>
