<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#050a0a", // AMOLED focus
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(16, 35, 33, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(13, 242, 223, 0.2);
        }
        .mesh-gradient {
            background: radial-gradient(circle at 50% 50%, #0df2df 0%, #102321 70%);
        }
        .peak-gradient {
            background: linear-gradient(135deg, #f97316 0%, #a855f7 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between z-20">
<div class="text-white flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Tendencias del Mercado 3D</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 bg-transparent text-white gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<span class="material-symbols-outlined">info</span>
</button>
</div>
</div>
<!-- Tabs -->
<div class="pb-3 bg-background-dark/80 backdrop-blur-md z-20">
<div class="flex border-b border-primary/20 px-4 gap-8 justify-center">
<a class="flex flex-col items-center justify-center border-b-[3px] border-primary text-white pb-[13px] pt-4" href="#">
<p class="text-white text-sm font-bold leading-normal tracking-[0.015em]">EUR</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-white/50 pb-[13px] pt-4" href="#">
<p class="text-white/50 text-sm font-bold leading-normal tracking-[0.015em]">USD</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-white/50 pb-[13px] pt-4" href="#">
<p class="text-white/50 text-sm font-bold leading-normal tracking-[0.015em]">CNY</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-white/50 pb-[13px] pt-4" href="#">
<p class="text-white/50 text-sm font-bold leading-normal tracking-[0.015em]">GBP</p>
</a>
</div>
</div>
<!-- 3D Viewport Simulation -->
<div class="relative flex-1 flex flex-col items-center justify-center overflow-hidden bg-background-dark">
<!-- Perspective Grid -->
<div class="absolute inset-0 opacity-20" style="background-image: linear-gradient(var(--primary) 1px, transparent 1px), linear-gradient(90deg, var(--primary) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg) translateY(100px); transform-origin: top;"></div>
<!-- Central Mesh Chart Visualization -->
<div class="relative z-10 w-full max-w-md h-80 flex items-center justify-center">
<svg class="w-full h-full drop-shadow-[0_0_15px_rgba(13,242,223,0.3)]" viewbox="0 0 400 300">
<!-- Mesh Lines -->
<path d="M50,200 Q100,50 150,180 T250,120 T350,150" fill="none" opacity="0.8" stroke="#0df2df" stroke-width="2"></path>
<path d="M50,220 Q100,70 150,200 T250,140 T350,170" fill="none" opacity="0.4" stroke="#0df2df" stroke-width="1"></path>
<path d="M50,240 Q100,90 150,220 T250,160 T350,190" fill="none" opacity="0.2" stroke="#0df2df" stroke-width="1"></path>
<!-- Vertical Connectors -->
<line opacity="0.3" stroke="#0df2df" stroke-dasharray="4" stroke-width="0.5" x1="100" x2="100" y1="50" y2="250"></line>
<line opacity="0.3" stroke="#0df2df" stroke-dasharray="4" stroke-width="0.5" x1="250" x2="250" y1="120" y2="250"></line>
<!-- Data Points (Picos) -->
<defs>
<radialgradient cx="50%" cy="50%" id="peakGrad" r="50%">
<stop offset="0%" style="stop-color:#f97316;"></stop>
<stop offset="100%" style="stop-color:#a855f7;"></stop>
</radialgradient>
</defs>
<circle class="animate-pulse" cx="100" cy="50" fill="url(#peakGrad)" r="6"></circle>
<circle cx="250" cy="120" fill="url(#peakGrad)" r="5"></circle>
<circle cx="150" fill="#0df2df" r="4" y="180"></circle>
</svg>
<!-- Tooltip Overlay -->
<div class="absolute top-10 left-1/4 glass-card px-3 py-1 rounded-lg border border-primary/40">
<p class="text-[10px] text-primary font-bold uppercase tracking-wider">Pico Detectado</p>
<p class="text-sm font-bold text-white">1.0942 (Volatilidad Máx)</p>
</div>
</div>
<!-- Rotation Hint -->
<div class="absolute bottom-40 w-full text-center px-6">
<p class="text-white/60 text-xs font-medium uppercase tracking-[0.2em] mb-2 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">sync_alt</span>
                    Desliza para rotar malla 3D
                </p>
</div>
<!-- Controls -->
<div class="absolute right-4 top-1/3 flex flex-col gap-3">
<button class="size-10 rounded-full glass-card flex items-center justify-center text-primary border border-primary/30">
<span class="material-symbols-outlined">layers</span>
</button>
<button class="size-10 rounded-full glass-card flex items-center justify-center text-white/70 border border-white/10">
<span class="material-symbols-outlined">center_focus_weak</span>
</button>
<button class="size-10 rounded-full glass-card flex items-center justify-center text-white/70 border border-white/10">
<span class="material-symbols-outlined">videocam</span>
</button>
</div>
</div>
<!-- Glassmorphism Card (Bottom Overlay) -->
<div class="absolute bottom-0 left-0 w-full p-4 z-30">
<div class="glass-card rounded-xl p-5 shadow-2xl border-t border-primary/40">
<div class="flex items-start justify-between mb-4">
<div class="flex flex-col">
<p class="text-primary text-[11px] font-bold tracking-[0.1em] uppercase">Indicador de Mercado</p>
<h3 class="text-white text-3xl font-bold tracking-tight mt-1">EUR / USD</h3>
<div class="flex items-center gap-2 mt-1">
<span class="text-2xl text-white font-light tracking-widest">1.0852</span>
<span class="flex items-center text-emerald-400 text-sm font-bold">
<span class="material-symbols-outlined text-sm">trending_up</span>
                                +0.45%
                            </span>
</div>
</div>
<div class="flex flex-col items-end">
<div class="px-3 py-1 bg-white/5 rounded-full border border-white/10 flex items-center gap-2 mb-2">
<div class="size-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
<span class="text-[10px] font-bold text-white/70 uppercase">En Vivo</span>
</div>
<button class="p-2 glass-card rounded-lg text-primary">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</div>
<!-- Volatility Indicator -->
<div class="space-y-2 mb-6">
<div class="flex justify-between items-center">
<p class="text-white/60 text-xs font-medium">Volatilidad: <span class="text-white">Alta</span></p>
<p class="text-white/40 text-[10px]">Actualizado hace 2s</p>
</div>
<div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden flex">
<div class="h-full bg-primary" style="width: 30%"></div>
<div class="h-full bg-yellow-400" style="width: 40%"></div>
<div class="h-full peak-gradient" style="width: 30%"></div>
</div>
<div class="flex justify-between text-[9px] text-white/30 font-bold uppercase tracking-widest pt-1">
<span>Baja</span>
<span>Media</span>
<span>Crítica</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-12 bg-primary text-background-dark font-bold rounded-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="truncate">ANÁLISIS TÉCNICO AVANZADO</span>
<span class="material-symbols-outlined">analytics</span>
</button>
</div>
</div>
<!-- Bottom Safe Area Spacer -->
<div class="h-8 bg-background-dark"></div>
</div>
</body></html>
