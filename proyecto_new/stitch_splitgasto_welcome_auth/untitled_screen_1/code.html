<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #000000;
        }
        .gradient-btn {
            background: linear-gradient(135deg, #FF8C00 0%, #8A2BE2 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white min-h-screen pb-32">
<!-- TopAppBar -->
<div class="sticky top-0 z-50 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between">
<div class="text-white flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Verificación de Escaneo IA</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 bg-transparent text-white gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<span class="material-symbols-outlined">edit_note</span>
</button>
</div>
</div>
<div class="px-4 py-2">
<div class="flex gap-4">
<!-- Receipt Thumbnail Card (Left side reference) -->
<div class="w-1/3 shrink-0">
<div class="sticky top-20 aspect-[3/4] rounded-xl overflow-hidden border border-primary/30 shadow-[0_0_15px_rgba(13,242,223,0.1)]">
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Recibo de restaurante en blanco y negro con texto nítido" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB6K09m50KKKI789bwh6t6acEpgUVCj2wxtmzKR04HlwEgIK0XqkOv3568eI9gn3SkhluUFxPSnXEZy6AaFqioWGLfvLGGArB_ym9K1FL_uoF3XnklGb1TBi7g2MDHH1YRff0Bp7s_GneUEmN2WcIXKsTq6S4hetgH1qX8p_d6wq47ATFOfdoPsyoVnH7CnH99UfmSUklG7Wytk-fXxtbQc3QhtD8hEmhb6Zb-FqTcnKz9CluOJbLftyoboyesWZTN-T-a2HKFU87WK");'>
</div>
<div class="absolute bottom-2 right-2 bg-primary text-black px-2 py-0.5 rounded-full text-[10px] font-bold">
                        ORIGINAL
                    </div>
</div>
</div>
<!-- Editable Data Form (Right side extraction) -->
<div class="flex-1 space-y-4">
<div class="flex flex-col gap-1">
<label class="flex flex-col flex-1">
<p class="text-primary text-xs font-semibold leading-normal pb-1 uppercase tracking-wider">Establecimiento</p>
<div class="flex w-full flex-1 items-stretch rounded-lg shadow-sm">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-white/10 bg-white/5 h-12 placeholder:text-white/30 p-[12px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal" value="Restaurante La Paz"/>
<div class="text-primary flex border border-white/10 bg-white/5 items-center justify-center pr-[12px] rounded-r-lg border-l-0">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
</div>
</div>
</label>
</div>
<div class="flex gap-3">
<label class="flex flex-col flex-1">
<p class="text-primary text-xs font-semibold leading-normal pb-1 uppercase tracking-wider">Importe Total</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-white/10 bg-white/5 h-12 p-[12px] text-base font-bold leading-normal" value="42.50€"/>
<span class="absolute right-3 top-3 material-symbols-outlined text-primary text-[20px]">verified</span>
</div>
</label>
</div>
<div class="flex gap-3">
<label class="flex flex-col flex-1">
<p class="text-primary text-xs font-semibold leading-normal pb-1 uppercase tracking-wider">Fecha</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-white/10 bg-white/5 h-12 p-[12px] text-base font-normal leading-normal" value="15/10/2023"/>
</label>
</div>
</div>
</div>
<!-- SectionHeader: Line Items -->
<div class="flex items-center justify-between mt-8 mb-2">
<h3 class="text-white text-lg font-bold leading-tight tracking-[-0.015em]">Desglose de Productos</h3>
<span class="text-primary text-xs font-medium bg-primary/10 px-2 py-1 rounded">IA: Confianza 98%</span>
</div>
<!-- Line Item Breakdown -->
<div class="glass-card rounded-xl overflow-hidden divide-y divide-white/5">
<div class="flex items-center justify-between p-4 bg-white/5">
<div class="flex flex-col">
<span class="text-white font-medium">Pizza Margarita</span>
<span class="text-white/50 text-xs">Unidad x1</span>
</div>
<div class="flex items-center gap-3">
<span class="text-white font-bold">12.00€</span>
<span class="material-symbols-outlined text-white/20 text-sm">edit</span>
</div>
</div>
<div class="flex items-center justify-between p-4">
<div class="flex flex-col">
<span class="text-white font-medium">Pasta Carbonara</span>
<span class="text-white/50 text-xs">Unidad x1</span>
</div>
<div class="flex items-center gap-3">
<span class="text-white font-bold">14.50€</span>
<span class="material-symbols-outlined text-white/20 text-sm">edit</span>
</div>
</div>
<div class="flex items-center justify-between p-4">
<div class="flex flex-col">
<span class="text-white font-medium">Vino Tinto Copa</span>
<span class="text-white/50 text-xs">Unidad x2</span>
</div>
<div class="flex items-center gap-3">
<span class="text-white font-bold">10.00€</span>
<span class="material-symbols-outlined text-white/20 text-sm">edit</span>
</div>
</div>
<div class="flex items-center justify-between p-4">
<div class="flex flex-col">
<span class="text-white font-medium">Tiramisú Artesano</span>
<span class="text-white/50 text-xs">Unidad x1</span>
</div>
<div class="flex items-center gap-3">
<span class="text-white font-bold">6.00€</span>
<span class="material-symbols-outlined text-white/20 text-sm">edit</span>
</div>
</div>
</div>
<!-- Add manual item button -->
<button class="w-full mt-4 flex items-center justify-center gap-2 py-3 border border-dashed border-white/20 rounded-xl text-white/50 hover:text-primary hover:border-primary transition-colors">
<span class="material-symbols-outlined">add_circle</span>
<span class="text-sm font-medium">Añadir producto manualmente</span>
</button>
</div>
<!-- Bottom Action Button Container -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black via-black to-transparent pt-10">
<button class="gradient-btn w-full py-4 rounded-xl text-white font-bold text-lg shadow-[0_4px_20px_rgba(138,43,226,0.3)] flex items-center justify-center gap-2">
<span>CONFIRMAR Y DIVIDIR</span>
<span class="material-symbols-outlined">keyboard_double_arrow_right</span>
</button>
<!-- iOS Home Indicator Safe Area -->
<div class="h-4"></div>
</div>
</body></html>
