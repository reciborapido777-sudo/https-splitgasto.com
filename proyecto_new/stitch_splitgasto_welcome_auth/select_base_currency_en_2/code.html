<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The World Deciphered - SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "brand-orange": "#FF8A00",
                        "brand-purple": "#9747FF",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --glow-color: rgba(13, 242, 242, 0.4);
        }
        .text-gradient {
            background: linear-gradient(to right, #FF8A00, #9747FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .globe-container {
            perspective: 1000px;
        }
        .neon-line {
            background: linear-gradient(90deg, transparent, #0df2f2, transparent);
            filter: blur(1px);
        }
        .orbit-symbol {
            text-shadow: 0 0 10px rgba(13, 242, 242, 0.8);
        }
        .glass-overlay {
            background: radial-gradient(circle at center, rgba(13, 242, 242, 0.05) 0%, rgba(0, 0, 0, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white antialiased overflow-hidden">
<div class="relative flex min-h-screen w-full flex-col max-w-[430px] mx-auto bg-background-dark overflow-hidden border-x border-white/5">
<header class="absolute top-0 left-0 w-full z-50 p-6 flex justify-between items-center">
<div class="flex items-center gap-2">
<div class="size-8 bg-gradient-to-br from-brand-orange to-brand-purple rounded-lg flex items-center justify-center shadow-lg shadow-brand-purple/20">
<span class="text-white font-bold text-xl">S</span>
</div>
</div>
<div class="flex gap-2">
<span class="text-[10px] font-bold tracking-widest text-white/40 uppercase">Global Edition</span>
</div>
</header>
<main class="relative flex-1 flex flex-col items-center justify-center px-8">
<div class="relative w-full aspect-square flex items-center justify-center mb-12">
<div class="absolute w-64 h-64 border border-primary/10 rounded-full animate-[spin_20s_linear_infinite]"></div>
<div class="absolute w-80 h-80 border border-primary/5 rounded-full animate-[spin_30s_linear_infinite_reverse]"></div>
<div class="relative size-48 rounded-full bg-zinc-900 overflow-hidden shadow-[inset_0_0_50px_rgba(13,242,242,0.2)] flex items-center justify-center">
<div class="absolute inset-0 opacity-40 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
<div class="absolute h-px w-full bg-primary/40 rotate-45 blur-[0.5px]"></div>
<div class="absolute h-px w-full bg-primary/40 -rotate-45 blur-[0.5px]"></div>
<div class="absolute w-px h-full bg-primary/20 blur-[0.5px]"></div>
<div class="absolute inset-0 bg-gradient-to-tr from-primary/10 to-transparent"></div>
<span class="material-symbols-outlined text-primary/80 text-7xl font-light">public</span>
</div>
<div class="absolute w-full h-full">
<div class="absolute top-10 left-10 orbit-symbol text-primary font-bold text-xl animate-bounce">€</div>
<div class="absolute bottom-20 right-10 orbit-symbol text-primary font-bold text-2xl animate-pulse" style="animation-delay: 1s;">$</div>
<div class="absolute top-1/2 -right-4 orbit-symbol text-primary font-bold text-lg">¥</div>
<div class="absolute bottom-10 left-20 orbit-symbol text-primary font-bold text-xl" style="animation-delay: 0.5s;">£</div>
</div>
<div class="absolute -z-10 size-96 bg-primary/5 blur-[100px] rounded-full"></div>
</div>
<div class="text-center z-10">
<h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4 text-gradient leading-[1.1]">
                    The World,<br/>Deciphered
                </h1>
<p class="text-white/60 text-base md:text-lg font-medium leading-relaxed max-w-[280px] mx-auto">
                    Split expenses, multiply moments. <br/>
<span class="text-primary/90">Now in 170+ languages.</span>
</p>
</div>
<div class="mt-12 w-full">
<button class="w-full h-14 glass-card border border-white/10 rounded-2xl flex items-center justify-between px-6 group active:scale-95 transition-all">
<span class="text-xs font-bold uppercase tracking-[0.2em] text-white/80">Explore Languages</span>
<div class="flex items-center gap-2">
<div class="flex -space-x-2">
<span class="size-6 rounded-full border border-black bg-zinc-800 flex items-center justify-center text-[10px]">EN</span>
<span class="size-6 rounded-full border border-black bg-zinc-800 flex items-center justify-center text-[10px]">ES</span>
<span class="size-6 rounded-full border border-black bg-zinc-800 flex items-center justify-center text-[10px]">FR</span>
</div>
<span class="material-symbols-outlined text-primary group-hover:translate-x-1 transition-transform">arrow_forward</span>
</div>
</button>
</div>
</main>
<footer class="p-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-8 opacity-30">
<span class="text-[10px] font-bold tracking-[0.3em] uppercase">Real-Time Sync</span>
<span class="text-[10px] font-bold tracking-[0.3em] uppercase">AES-256</span>
<span class="text-[10px] font-bold tracking-[0.3em] uppercase">Global Node</span>
</div>
<div class="w-32 h-1 bg-white/10 rounded-full mt-4 overflow-hidden">
<div class="w-1/3 h-full bg-primary/50"></div>
</div>
</footer>
<div class="absolute top-1/4 -left-20 size-64 bg-brand-purple/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 -right-20 size-64 bg-brand-orange/10 blur-[120px] rounded-full"></div>
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 30px 30px;"></div>
</div>

</body></html>
