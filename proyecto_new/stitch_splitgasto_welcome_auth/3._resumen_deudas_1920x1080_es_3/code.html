<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitGasto - Ideal para tus viajes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --primary: #00E5FF;
            --accent: #7000FF;
            --bg-dark: #000000;
        }
        .neon-text-cyan {
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.7), 0 0 30px rgba(0, 229, 255, 0.3);
        }
        .neon-text-purple {
            text-shadow: 0 0 15px rgba(112, 0, 255, 0.7), 0 0 30px rgba(112, 0, 255, 0.3);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .floating-3d {
            transform: perspective(1000px) rotateX(15deg) rotateY(-10deg);
        }
        .currency-badge {
            @apply flex items-center justify-center rounded-full border border-white/20 glass-card;
            width: 80px;
            height: 80px;
            font-size: 2.5rem;
            font-weight: 800;
        }
    </style>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00E5FF",
                        accent: "#7000FF",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1.5rem",
                    },
                },
            },
        };
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<div class="absolute bottom-[-5%] left-[-10%] w-[70%] h-[30%] bg-accent/20 blur-[100px] rounded-full"></div>

                </div>

                </div>

                </div>
</div>

<div class="flex flex-col items-center gap-4">

<div class="text-lg font-bold tracking-tight">SplitGasto<span class="text-[10px] align-top ml-0.5 opacity-50">®</span></div>
