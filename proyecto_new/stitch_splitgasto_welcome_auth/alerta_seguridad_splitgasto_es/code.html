<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f42525",
                        "background-light": "#f8f5f5",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .neon-glow {
            text-shadow: 0 0 10px rgba(244, 37, 37, 0.8), 0 0 20px rgba(244, 37, 37, 0.5);
        }
        .shield-container {
            background: radial-gradient(circle, rgba(244, 37, 37, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- TopAppBar -->
<header class="flex items-center bg-background-dark p-4 pb-2 justify-between">
<div class="text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">arrow_back_ios</span>
</div>
<h2 class="text-white/60 text-xs font-medium uppercase tracking-[0.2em] flex-1 text-center pr-12">SplitGasto ES</h2>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 pb-12">
<!-- Hero Image / Illustration -->
<div class="shield-container w-full aspect-square max-w-[280px] flex items-center justify-center relative mb-8">
<div class="relative flex items-center justify-center">
<!-- Faux 3D Shield using layered icons and glows -->
<span class="material-symbols-outlined text-[160px] text-primary neon-glow" style="font-variation-settings: 'FILL' 1, 'wght' 200;">
                        shield
                    </span>
<span class="material-symbols-outlined absolute text-[60px] text-white font-bold" style="top: 50%; left: 50%; transform: translate(-50%, -40%);">
                        priority_high
                    </span>
</div>
</div>
<!-- HeadlineText -->
<h1 class="text-white tracking-tight text-[32px] font-bold leading-tight px-4 text-center pb-3 neon-glow">
                ¡ALERTA DE SEGURIDAD!
            </h1>
<!-- BodyText -->
<p class="text-white/80 text-base font-normal leading-relaxed pb-8 px-4 text-center max-w-sm">
                Se ha detectado un inicio de sesión desde un dispositivo no reconocido en <span class="text-primary font-bold">Madrid, España</span>.
            </p>
<!-- DescriptionList / Data Card -->
<div class="w-full max-w-sm bg-[#111111] border border-white/10 rounded-xl p-5 mb-10">
<div class="grid grid-cols-[35%_1fr] gap-y-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-white/40 text-sm">smartphone</span>
<p class="text-white/40 text-sm font-normal">Dispositivo</p>
</div>
<p class="text-white text-sm font-medium text-right">Android v12</p>
<div class="border-t border-white/5 col-span-2 pt-4 flex justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-white/40 text-sm">schedule</span>
<p class="text-white/40 text-sm font-normal">Hora</p>
</div>
<p class="text-white text-sm font-medium">Hace 2 minutos</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-sm flex flex-col gap-4">
<button class="w-full bg-gradient-to-r from-[#ff6b00] to-primary py-4 rounded-xl text-white font-bold text-base shadow-[0_0_20px_rgba(244,37,37,0.4)] active:scale-[0.98] transition-transform">
                    NO, BLOQUEAR CUENTA
                </button>
<button class="w-full bg-white/5 hover:bg-white/10 py-4 rounded-xl text-white/60 font-medium text-base transition-colors active:scale-[0.98]">
                    SÍ, HE SIDO YO
                </button>
</div>
</main>
<!-- Footer / Optional Branding -->
<footer class="p-6 text-center">
<p class="text-white/20 text-[10px] tracking-widest uppercase">Seguridad Proactiva SplitGasto</p>
</footer>
</div>
</body></html>
