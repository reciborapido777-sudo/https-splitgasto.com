<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2beede",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-pedestal {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .scanning-ring {
            border: 2px solid transparent;
            background-image: linear-gradient(#000, #000), linear-gradient(to right, #f97316, #a855f7);
            background-origin: border-box;
            background-clip: content-box, border-box;
        }
        .neon-glow {
            filter: drop-shadow(0 0 8px rgba(43, 238, 222, 0.6));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-dark group/design-root">
<!-- Top App Bar Component -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between z-10">
<div class="text-primary flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-3xl">shield_lock</span>
</div>
<h2 class="text-white/80 text-sm font-medium tracking-[0.2em] uppercase flex-1 text-center">Bóveda de Cristal</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-full h-10 w-10 bg-white/5 text-white">
<span class="material-symbols-outlined text-xl">info</span>
</button>
</div>
</div>
<!-- Main Visual Container -->
<div class="flex-1 flex flex-col items-center justify-center px-4 relative">
<!-- Scanning Ring & Fingerprint Area -->
<div class="relative flex items-center justify-center w-72 h-72">
<!-- Circular Scanning Ring -->
<div class="absolute inset-0 rounded-full scanning-ring opacity-80"></div>
<!-- Glassmorphism Pedestal -->
<div class="absolute bottom-4 w-48 h-12 glass-pedestal rounded-[50%] skew-x-[-10deg] opacity-40"></div>
<!-- 3D Fingerprint Representation (Simulated with Icon and Glow) -->
<div class="relative z-10 flex flex-col items-center">
<div class="text-primary neon-glow flex items-center justify-center transition-all duration-1000">
<span class="material-symbols-outlined !text-[120px] font-thin opacity-90">fingerprint</span>
</div>
</div>
<!-- Floating Particles / Filament Effect (Decorative) -->
<div class="absolute top-1/4 left-1/4 w-1 h-1 bg-primary rounded-full blur-[1px]"></div>
<div class="absolute bottom-1/3 right-1/4 w-1.5 h-1.5 bg-primary/60 rounded-full blur-[1px]"></div>
<div class="absolute top-1/2 right-12 w-1 h-1 bg-primary/40 rounded-full blur-[1px]"></div>
</div>
<!-- Content Area -->
<div class="mt-12 w-full max-w-sm">
<!-- HeadlineText Component -->
<h3 class="text-white tracking-[0.15em] text-2xl font-bold leading-tight px-4 text-center pb-2 uppercase">
                    IDENTIFICACIÓN REQUERIDA
                </h3>
<!-- BodyText Component -->
<p class="text-white/60 text-base font-normal leading-relaxed pb-8 pt-1 px-8 text-center">
                    Escanea tu huella para desbloquear tu Bóveda de Cristal
                </p>
<!-- ProgressBar Component -->
<div class="flex flex-col gap-3 px-8">
<div class="flex gap-6 justify-between items-end">
<p class="text-primary text-xs font-bold tracking-widest uppercase leading-none">Biometría 3D activa</p>
<p class="text-white/40 text-xs font-mono leading-none">STANDBY</p>
</div>
<div class="h-1 rounded-full bg-white/10 overflow-hidden">
<div class="h-full rounded-full bg-primary/40" style="width: 30%;"></div>
</div>
</div>
</div>
</div>
<!-- Bottom Security Info -->
<div class="pb-10 pt-4 flex flex-col items-center gap-2">
<div class="flex items-center gap-2 py-2 px-4 rounded-full bg-white/5 border border-white/10">
<span class="material-symbols-outlined text-xs text-primary">verified_user</span>
<span class="text-[10px] text-white/50 tracking-widest uppercase font-medium">SplitGasto Secure Layer v4.0</span>
</div>
<!-- FaceID/TouchID Prompt Hint for iOS -->
<div class="mt-4 flex flex-col items-center opacity-40">
<span class="material-symbols-outlined text-2xl">expand_less</span>
<p class="text-[10px] uppercase tracking-tighter">Desliza para otros métodos</p>
</div>
</div>
<!-- Background Detail Decorations -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-purple-500/10 rounded-full blur-[100px] pointer-events-none"></div>
</div>
</body></html>
