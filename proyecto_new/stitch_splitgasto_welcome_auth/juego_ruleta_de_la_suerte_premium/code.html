<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3df5e6",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102221",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .neon-glow {
            box-shadow: 0 0 15px rgba(61, 245, 230, 0.4);
        }
        .neon-border {
            border: 1px solid rgba(61, 245, 230, 0.3);
        }
        .wheel-gradient {
            background: conic-gradient(
                from 0deg,
                #1e3a38 0deg 60deg,
                #2d4a48 60deg 120deg,
                #1e3a38 120deg 180deg,
                #2d4a48 180deg 240deg,
                #1e3a38 240deg 300deg,
                #2d4a48 300deg 360deg
            );
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-50">
<div class="text-slate-800 dark:text-white flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-slate-800 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Ruleta Premium</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 bg-transparent text-primary gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<span class="material-symbols-outlined">stars</span>
</button>
</div>
</div>
<main class="flex-1 flex flex-col items-center justify-center px-4 relative overflow-hidden">
<!-- HeadlineText Component -->
<div class="w-full">
<h2 class="text-slate-900 dark:text-white tracking-light text-[28px] font-bold leading-tight px-4 text-center pb-2 pt-5">¿Quién paga hoy?</h2>
<p class="text-slate-500 dark:text-[#9cbab7] text-sm font-medium text-center pb-8">Grupo: Cena de Navidad 🎄</p>
</div>
<!-- Roulette Wheel Container -->
<div class="relative w-72 h-72 md:w-96 md:h-96 mb-12 flex items-center justify-center">
<!-- Neon Glow Background -->
<div class="absolute inset-0 rounded-full bg-primary/10 blur-3xl"></div>
<!-- Pointer -->
<div class="absolute -top-4 left-1/2 -translate-x-1/2 z-20 text-primary drop-shadow-lg">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1">arrow_drop_down</span>
</div>
<!-- The Wheel -->
<div class="w-full h-full rounded-full border-8 border-background-dark/50 dark:border-background-light/10 shadow-2xl relative wheel-gradient overflow-hidden flex items-center justify-center">
<!-- Wheel Segments Visual Representation -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-full h-[1px] bg-white/10 rotate-0"></div>
<div class="w-full h-[1px] bg-white/10 rotate-60"></div>
<div class="w-full h-[1px] bg-white/10 rotate-120"></div>
</div>
<!-- Center Logo/Hub -->
<div class="size-20 rounded-full bg-background-dark dark:bg-[#111817] z-10 flex items-center justify-center border-4 border-primary shadow-lg neon-glow">
<div class="text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-4xl">payments</span>
</div>
</div>
<!-- Labels (Mockup positions) -->
<span class="absolute top-10 text-white font-bold text-sm">Juan</span>
<span class="absolute right-10 top-1/2 -translate-y-1/2 text-white/50 font-bold text-sm rotate-90">María</span>
<span class="absolute bottom-10 text-white/50 font-bold text-sm">Carlos</span>
<span class="absolute left-10 top-1/2 -translate-y-1/2 text-white/50 font-bold text-sm -rotate-90">Ana</span>
</div>
</div>
<!-- SectionHeader Component (Winner Reveal) -->
<div class="w-full max-w-sm mb-6">
<div class="bg-primary/10 border border-primary/20 rounded-xl p-4 text-center">
<h4 class="text-primary text-sm font-bold leading-normal tracking-[0.015em] uppercase">¡Resultado!</h4>
<p class="text-white text-2xl font-bold mt-1">¡Hoy invita Juan!</p>
</div>
</div>
<!-- Main Interaction Area -->
<div class="w-full max-w-md flex flex-col gap-3 px-4 pb-10">
<!-- SingleButton Component -->
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-5 bg-primary text-[#111817] text-xl font-bold leading-normal tracking-[0.015em] shadow-lg neon-glow active:scale-95 transition-transform">
<span class="truncate uppercase">¡GIRAR RULETA!</span>
</button>
<!-- Secondary Actions -->
<div class="flex gap-3 w-full">
<button class="flex-1 flex items-center justify-center gap-2 rounded-full h-12 bg-white/5 border border-white/10 text-white/80 text-sm font-semibold hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-lg text-primary">person_remove</span>
                    Eliminar ganador
                </button>
<button class="flex-1 flex items-center justify-center gap-2 rounded-full h-12 bg-white/5 border border-white/10 text-white/80 text-sm font-semibold hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-lg">refresh</span>
                    Reiniciar
                </button>
</div>
</div>
</main>
<!-- Navigation Bar (iOS Style) -->
<div class="flex items-center justify-around bg-background-light dark:bg-background-dark border-t border-white/5 p-4 pb-8">
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Inicio</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">group</span>
<span class="text-[10px] font-medium">Grupos</span>
</div>
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">casino</span>
<span class="text-[10px] font-medium">Juegos</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[10px] font-medium">Gastos</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-medium">Ajustes</span>
</div>
</div>
</body></html>
