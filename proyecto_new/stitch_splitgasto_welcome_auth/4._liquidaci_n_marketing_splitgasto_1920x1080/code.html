<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Liquidación Marketing SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // Adjusted to AMOLED black as per request
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .button-3d-glow {
            box-shadow: 0 0 40px rgba(13, 242, 223, 0.4), 
                        inset 0 -6px 8px rgba(0, 0, 0, 0.3),
                        inset 0 6px 8px rgba(255, 255, 255, 0.2);
            border: 2px solid #0df2df;
        }
        .card-glow {
            filter: drop-shadow(0 0 15px rgba(13, 242, 223, 0.2));
        }
        .text-neon {
            text-shadow: 0 0 10px rgba(13, 242, 223, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white antialiased overflow-hidden">
<div class="relative flex h-[1080px] w-[1920px] flex-col items-center justify-between py-24 bg-background-dark">
<!-- Header Text Section -->
<div class="z-10 text-center space-y-4">
<h1 class="text-[96px] font-black tracking-tighter leading-tight text-white uppercase text-neon">
                PAGA AL INSTANTE
            </h1>
<p class="text-[32px] text-primary/80 font-medium tracking-[0.2em] uppercase">
                Marketing SplitGasto
            </p>
</div>
<!-- Central Interactive Visual Area -->
<div class="relative flex items-center justify-center w-full max-w-6xl px-12">
<!-- Left Card Icon -->
<div class="flex-1 flex justify-center card-glow">
<div class="w-64 h-40 rounded-xl border-2 border-primary/30 bg-primary/5 flex flex-col p-6 justify-between transform -rotate-12">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-primary text-5xl">contactless</span>
<div class="w-12 h-12 rounded-lg bg-primary/20"></div>
</div>
<div class="space-y-2">
<div class="h-2 w-32 bg-primary/40 rounded-full"></div>
<div class="h-2 w-24 bg-primary/20 rounded-full"></div>
</div>
</div>
</div>
<!-- Central 3D Button -->
<div class="relative flex-shrink-0 z-20">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-[100px]"></div>
<button class="relative w-80 h-80 rounded-full bg-primary flex flex-col items-center justify-center button-3d-glow group active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[80px] text-background-dark mb-2">payments</span>
<span class="text-background-dark text-[48px] font-black tracking-widest uppercase">LIQUIDAR</span>
</button>
</div>
<!-- Right Card Icon -->
<div class="flex-1 flex justify-center card-glow">
<div class="w-64 h-40 rounded-xl border-2 border-primary/30 bg-primary/5 flex flex-col p-6 justify-between transform rotate-12">
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-lg bg-primary/20"></div>
<span class="material-symbols-outlined text-primary text-5xl">credit_card</span>
</div>
<div class="space-y-2 flex flex-col items-end">
<div class="h-2 w-32 bg-primary/40 rounded-full"></div>
<div class="h-2 w-24 bg-primary/20 rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- Bottom Footer Branding -->
<div class="z-10 flex flex-col items-center gap-8">
<div class="flex gap-12 items-center opacity-60">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-4xl text-primary">security</span>
<span class="text-xl font-bold uppercase tracking-widest">Seguro</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-4xl text-primary">speed</span>
<span class="text-xl font-bold uppercase tracking-widest">Rápido</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-4xl text-primary">done_all</span>
<span class="text-xl font-bold uppercase tracking-widest">Sin Deudas</span>
</div>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[150px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[150px]"></div>
<!-- Grid Pattern Overlay -->
<div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#0df2df 1px, transparent 1px); background-size: 60px 60px;">
</div>
</div>
</div>
<!-- Hidden Navigation required by component structure but adapted for the high-res marketing image -->
<div class="hidden">
<div class="flex gap-2 border-t border-[#224946] bg-[#183432] px-4 pb-3 pt-2">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-[#90cbc6]" href="#">
<span class="material-symbols-outlined">house</span>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-[#90cbc6]" href="#">
<span class="material-symbols-outlined">account_balance</span>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 rounded-full text-white" href="#">
<span class="material-symbols-outlined">credit_card</span>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-[#90cbc6]" href="#">
<span class="material-symbols-outlined">pie_chart</span>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-[#90cbc6]" href="#">
<span class="material-symbols-outlined">settings</span>
</a>
</div>
</div>
</body></html>
