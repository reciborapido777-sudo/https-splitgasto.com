<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec9213",
                        "background-light": "#f8f7f6",
                        "background-dark": "#000000", // True AMOLED black
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .amoled-card {
            background-color: #000000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo-gradient {
            background: linear-gradient(135deg, #ec9213 0%, #7c3aed 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark flex items-center justify-center min-h-screen">
<!-- Instagram Post Container (Phone Aspect Ratio) -->
<div class="relative w-full max-w-[430px] aspect-[4/5] overflow-hidden shadow-2xl bg-[#181511]">
<!-- Background: Lifestyle Image -->
<div class="absolute inset-0 w-full h-full bg-center bg-cover" data-alt="Group of friends laughing at a modern dinner table with warm lighting" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCjYfJ23nXihBj2eIQJtoCEtpIxm47n_06KlnIAUuY8wjLNETuJOAB5os5beuPWxhS5T0gkiVfmW-SK5-n8XBP1h5YLVvHm51HrkWvKMma_L6G_Rn4dA2dlBMboUq6_EiBugEAg66GU0WFwTbcnTcYEWBuHmjHperi-tBodTFrg8MbrxKIZFuKbcqG5aSVk_CnzCmWmbxovbnkoe3zVz_Ex23-fbddS4yIG8YVsT8-_cV79UMPES5Ru9ir5Tiiq_K9Ay8OP23LmqYbR");'>
<!-- Subtle Dark Gradient for text legibility -->
<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-black/20"></div>
</div>
<!-- Top Header: Logo and Profile -->
<div class="absolute top-0 left-0 w-full p-6 flex justify-between items-start z-10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-cover bg-center border-2 border-primary" data-alt="SplitGasto profile avatar" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBigwoL6drfbuRlTeXyIf99sIjscWo8bWHvnE73IQBilYolX0pS1iMo-9dNS4beRQ1oeuWOkBK339M6YU7P2X_RfLslSReoxoo_NT8xX08Dr-ErRGV5OUj1a7Kb0p88lNPaa6TbqD8o3HYkGJBm4DnkezHnjPZhwA492DDMTdt5XvVxWmqz6Sn-Ej9qkLthVjT_wjnLEw4EL1BCoWNsTOv3micj2SbCCPqazd7JmMlDcsBJj4yU3NVUGuQtlK6eN8OvPX0scbFGSKkB");'></div>
<div>
<p class="text-white text-sm font-bold leading-tight">SplitGasto</p>
<p class="text-white/70 text-xs font-medium">Patrocinado</p>
</div>
</div>
<!-- Minimalist 'S' Logo -->
<div class="logo-gradient w-10 h-10 rounded-xl flex items-center justify-center shadow-lg">
<span class="text-white font-extrabold text-xl">S</span>
</div>
</div>
<!-- Center: Floating AMOLED Card -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none px-8">
<div class="amoled-card p-6 rounded-xl flex items-center gap-4 shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/5 animate-pulse-subtle">
<div class="bg-primary/20 p-3 rounded-full">
<span class="material-symbols-outlined text-primary text-3xl font-bold">check_circle</span>
</div>
<div class="flex flex-col">
<p class="text-white text-xl font-bold tracking-tight">Cuentas cuadradas ✅</p>
<p class="text-white/50 text-sm font-medium">SplitGasto App</p>
</div>
</div>
</div>
<!-- Bottom: Headline Text -->
<div class="absolute bottom-0 left-0 w-full p-8 pb-12">
<h2 class="text-white text-[28px] font-extrabold leading-tight tracking-tight text-center drop-shadow-lg">
                Disfruta del momento,<br/>
<span class="text-primary">nosotros nos encargamos</span> de las cuentas
            </h2>
</div>
<!-- iOS Home Indicator Simulation -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/30 rounded-full"></div>
</div>
<!-- Navigation Control Overlay (Optional/Contextual) -->
<div class="fixed bottom-10 flex gap-6 bg-black/40 backdrop-blur-md p-4 rounded-full border border-white/10">
<button class="text-white/50 hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="favorite" data-weight="regular">favorite</span>
</button>
<button class="text-primary">
<span class="material-symbols-outlined" data-icon="add_box" data-weight="fill">add_box</span>
</button>
<button class="text-white/50 hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="person" data-weight="regular">person</span>
</button>
</div>
</body></html>
