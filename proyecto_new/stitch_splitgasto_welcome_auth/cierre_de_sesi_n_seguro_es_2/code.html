<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cierre de Sesión Seguro - SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .gradient-icon {
            background: linear-gradient(135deg, #FF8C00 0%, #8A2BE2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white min-h-screen flex flex-col">
<!-- Top Navigation -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<div aria-label="Volver" class="text-white flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Seguridad</h2>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center justify-center px-6">
<!-- Animated Style Security Illustration -->
<div class="mb-10 relative">
<div class="absolute inset-0 bg-primary/10 blur-[60px] rounded-full"></div>
<div class="relative flex items-center justify-center w-32 h-32 bg-white/5 rounded-full border border-white/10">
<span class="material-symbols-outlined text-[64px] gradient-icon" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                    lock
                </span>
</div>
</div>
<!-- Headline -->
<h2 class="text-white tracking-tight text-[28px] font-bold leading-tight text-center pb-3">
            ¿Deseas cerrar tu sesión?
        </h2>
<!-- Description -->
<p class="text-gray-400 text-base font-normal leading-relaxed text-center max-w-[320px]">
            Tus grupos y gastos están a salvo y se sincronizarán en cuanto vuelvas.
        </p>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-[480px] mx-auto p-6 pb-12 flex flex-col gap-4">
<!-- Primary Action: Keep Session -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-5 bg-primary text-black text-lg font-extrabold leading-normal tracking-[0.015em] w-full shadow-[0_0_20px_rgba(19,236,236,0.3)] active:scale-[0.98] transition-transform">
<span class="truncate">Mantener Sesión</span>
</button>
<!-- Secondary Action: Logout -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-5 bg-[#1A1A1A] text-gray-400 text-lg font-bold leading-normal tracking-[0.015em] w-full border border-white/5 active:bg-red-900/20 active:text-red-400 transition-colors">
<span class="truncate">Cerrar Sesión</span>
</button>
</div>
<!-- iOS Bottom Indicator Spacer -->
<div class="h-4 bg-background-dark"></div>
</body></html>
