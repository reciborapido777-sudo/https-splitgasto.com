<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // AMOLED Black as requested
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(13, 242, 242, 0.15);
        }
        .confetti-gradient {
            background: radial-gradient(circle, rgba(13, 242, 242, 0.4) 0%, rgba(0, 0, 0, 0) 70%);
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(13, 242, 242, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden">
<div class="relative flex h-screen w-full flex-col items-center justify-between py-8 px-6">
<!-- Top Navigation (Minimalist iOS Style) -->
<div class="w-full flex items-center justify-between z-20">
<div class="p-2 rounded-full bg-white/5">
<span class="material-symbols-outlined text-white">close</span>
</div>
<h2 class="text-white/60 text-sm font-medium tracking-widest uppercase">SplitGasto</h2>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</div>
<!-- 3D Explosion & Checkmark Section -->
<div class="relative w-full flex-1 flex flex-col items-center justify-center">
<!-- Background Glow/Confetti Placeholder Effect -->
<div class="absolute inset-0 flex items-center justify-center overflow-hidden">
<div class="confetti-gradient w-[150%] aspect-square rounded-full opacity-30 animate-pulse"></div>
<!-- Simulated 3D Confetti/Sparks -->
<div class="absolute top-1/4 left-1/4 w-2 h-2 bg-primary rounded-full blur-[1px] rotate-45"></div>
<div class="absolute top-1/3 right-1/4 w-3 h-3 bg-white/40 rounded-sm blur-[1px] -rotate-12"></div>
<div class="absolute bottom-1/3 left-1/2 w-2 h-4 bg-primary/60 rounded-full blur-[2px] rotate-90"></div>
<div class="absolute top-1/2 right-10 w-4 h-1 bg-white/30 rounded-full blur-[1px]"></div>
</div>
<!-- Central 3D Crystal Checkmark -->
<div class="relative group">
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full scale-110"></div>
<div class="relative flex items-center justify-center w-32 h-32 rounded-full border-4 border-primary/30 bg-gradient-to-br from-white/20 to-transparent backdrop-blur-md shadow-[0_0_50px_rgba(13,242,242,0.4)]">
<span class="material-symbols-outlined text-7xl text-primary font-bold drop-shadow-[0_0_15px_rgba(13,242,242,0.8)]" style="font-variation-settings: 'FILL' 1, 'wght' 700;">check_circle</span>
</div>
</div>
<!-- Headline Text -->
<div class="mt-10 text-center z-10">
<h1 class="text-white tracking-[0.1em] text-[36px] font-extrabold leading-tight text-glow">
                    ¡PAGO COMPLETADO!
                </h1>
<p class="text-white/70 text-base font-normal leading-normal mt-2 max-w-[280px]">
                    Tu deuda ha sido saldada con éxito y el balance está en orden.
                </p>
</div>
</div>
<!-- Floating 3D Digital Receipt Card -->
<div class="w-full max-w-sm mb-12 z-20">
<div class="glass-card rounded-xl p-6 relative overflow-hidden group">
<!-- Inner Reflection -->
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-white/10 to-transparent pointer-events-none"></div>
<div class="flex justify-between items-start mb-6">
<div>
<p class="text-primary text-[10px] font-bold tracking-[0.2em] uppercase mb-1">Recibo Digital</p>
<p class="text-white text-xl font-bold">Liquidado</p>
</div>
<div class="bg-primary/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary">receipt_long</span>
</div>
</div>
<div class="space-y-4">
<div class="flex justify-between items-center border-b border-white/10 pb-3">
<span class="text-white/50 text-xs">Amigo</span>
<span class="text-white font-medium">Carlos Ruiz</span>
</div>
<div class="flex justify-between items-center border-b border-white/10 pb-3">
<span class="text-white/50 text-xs">Fecha</span>
<span class="text-white font-medium">15 de Octubre, 2023</span>
</div>
<div class="flex justify-between items-center">
<span class="text-white/50 text-xs">Monto Total</span>
<span class="text-primary font-bold text-lg">$45.00</span>
</div>
</div>
<!-- Abstract card graphic -->
<div class="mt-6 flex justify-center">
<div class="w-full h-1 bg-gradient-to-r from-transparent via-primary/40 to-transparent rounded-full"></div>
</div>
</div>
</div>
<!-- Primary Action Button -->
<div class="w-full px-2 z-20">
<button class="w-full h-16 bg-primary text-background-dark text-lg font-extrabold rounded-full flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span>VOLVER AL INICIO</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center text-white/30 text-[10px] mt-4 uppercase tracking-widest font-bold">Transmisión de datos segura 128-bit</p>
</div>
<!-- Decorative elements to add 3D depth -->
<div class="absolute top-1/4 -right-10 w-24 h-24 bg-primary/5 rounded-full blur-2xl"></div>
<div class="absolute bottom-1/4 -left-10 w-32 h-32 bg-primary/10 rounded-full blur-3xl"></div>
</div>
<!-- Hidden standard component placeholders for structure compliance -->
<div class="hidden">
<div class="p-4" data-alt="Abstract turquoise sparkles and metallic 3D confetti on black background"></div>
<div class="p-4" data-alt="Floating 3D glass receipt card with transaction details"></div>
<div class="p-4" data-alt="Large 3D crystal checkmark with pulse glow"></div>
</div>
</body></html>
