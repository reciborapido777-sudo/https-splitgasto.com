<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&amp;family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8319e6",
                        "background-light": "#f7f6f8",
                        "background-dark": "#000000",
                        "gold": "#D4AF37",
                        "neon-turquoise": "#00f2ff",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif-title": ["Cinzel", "serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .gold-shimmer {
                background: linear-gradient(135deg, #B8860B 0%, #D4AF37 25%, #FFF9E3 50%, #D4AF37 75%, #B8860B 100%);
                background-size: 200% auto;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                text-shadow: 0 0 1px rgba(212, 175, 55, 0.2);
            }
            .wax-seal {
                background: radial-gradient(circle at 30% 30%, #ffd700 0%, #b8860b 60%, #8b6508 100%);
                box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
            }
            .diamond-glow {
                filter: drop-shadow(0 0 15px rgba(131, 25, 230, 0.4));
            }
            .amoled-black {
                background-color: #000000;
            }
        }
        body {
            min-height: 100dvh;
            background-color: #000000;
            margin: 0;
            padding: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white selection:bg-primary/30 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden amoled-black">
<div class="flex items-center bg-black/90 backdrop-blur-xl p-4 pb-2 justify-between sticky top-0 z-50 border-b border-white/5">
<div class="text-white flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-gold">auto_awesome</span>
</div>
<h2 class="text-gold font-serif-title text-sm font-bold leading-tight tracking-[0.2em] flex-1 text-center uppercase">Tarjeta de Socio</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-full h-10 w-10 bg-white/5 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white text-[20px]">ios_share</span>
</button>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center p-6 relative">
<div class="relative w-full max-w-sm aspect-[5/8] rounded-[2.5rem] p-[1px] bg-gradient-to-b from-gold/30 via-transparent to-primary/20 shadow-2xl overflow-hidden">
<div class="absolute inset-0 amoled-black rounded-[2.5rem]"></div>
<div class="relative h-full flex flex-col items-center justify-between py-12 px-8 text-center">
<div class="w-16 h-1 bg-gradient-to-r from-transparent via-gold/40 to-transparent rounded-full"></div>
<div class="space-y-4">
<h1 class="font-serif-title text-2xl md:text-3xl font-bold tracking-widest gold-shimmer uppercase leading-tight">
                            Gracias por ser<br/>Pionero
                        </h1>
<div class="flex items-center justify-center gap-3">
<span class="h-[1px] w-10 bg-gold/20"></span>
<span class="text-[10px] text-gold/80 tracking-[0.4em] font-serif-title font-bold">EST. 2026</span>
<span class="h-[1px] w-10 bg-gold/20"></span>
</div>
</div>
<div class="relative group py-2">
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full scale-110"></div>
<div class="relative w-48 h-48 flex items-center justify-center diamond-glow">
<svg class="w-full h-full" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="s-official-gradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#FF8C00"></stop>
<stop offset="50%" style="stop-color:#E6199C"></stop>
<stop offset="100%" style="stop-color:#8319E6"></stop>
</linearGradient>
<filter id="crisp-shadow">
<fedropshadow dx="0" dy="2" flood-opacity="0.3" stdDeviation="3"></fedropshadow>
</filter>
</defs>
<path d="M72,32 C72,20 62,14 50,14 C34,14 26,24 26,38 C26,56 54,48 54,66 C54,78 46,86 32,86 C20,86 14,78 14,78" fill="none" filter="url(#crisp-shadow)" stroke="url(#s-official-gradient)" stroke-linecap="round" stroke-linejoin="round" stroke-width="12" transform="translate(8, 0)"></path>
<path d="M72,32 C72,20 62,14 50,14 C34,14 26,24 26,38" fill="none" opacity="0.4" stroke="white" stroke-linecap="round" stroke-width="0.5" transform="translate(8, 0)"></path>
</svg>
</div>
</div>
<div class="space-y-4 max-w-[260px]">
<p class="text-white/90 text-sm leading-relaxed font-medium tracking-wide">
                            Formas parte de los primeros <span class="text-gold font-bold">100 socios</span> de Élite
                        </p>
<p class="text-[10px] text-neon-turquoise font-black tracking-[0.25em] uppercase border border-neon-turquoise/30 px-3 py-1.5 rounded-full inline-block">
                            Acceso Concedido
                        </p>
</div>
<div class="relative">
<div class="wax-seal size-20 rounded-full flex flex-col items-center justify-center border border-gold/40 shadow-xl">
<span class="font-serif-title text-[9px] text-black/70 font-black leading-none uppercase tracking-tighter">Edición</span>
<span class="font-serif-title text-xl text-black font-bold leading-none">1/100</span>
</div>
</div>
</div>
</div>
<div class="mt-12 w-full max-w-sm flex flex-col items-center gap-8">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-full shadow-[0_10px_30px_rgba(131,25,230,0.3)] transition-all flex items-center justify-center gap-3 group">
<span class="tracking-wide">Ir a mi cuenta</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div class="flex items-center gap-4 opacity-40">
<div class="h-[1px] w-12 bg-gold"></div>
<span class="text-[10px] tracking-[0.3em] font-bold uppercase text-gold">Socio de Élite</span>
<div class="h-[1px] w-12 bg-gold"></div>
</div>
</div>
</div>
<div class="fixed bottom-6 left-6 size-12 border-b border-l border-white/10 rounded-bl-2xl pointer-events-none"></div>
<div class="fixed top-24 right-6 size-12 border-t border-r border-white/10 rounded-tr-2xl pointer-events-none"></div>
</div>

</body></html>
