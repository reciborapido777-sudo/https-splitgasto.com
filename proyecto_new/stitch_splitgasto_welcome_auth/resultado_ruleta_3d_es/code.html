<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#f48c25",
              "background-light": "#f8f7f5",
              "background-dark": "#0a0a0a",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .amoled-gradient {
            background: radial-gradient(circle at center, #1a140e 0%, #0a0a0a 100%);
        }
        .spotlight-glow {
            box-shadow: 0 0 60px 20px rgba(244, 140, 37, 0.15);
        }
        .confetti-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #f48c25;
            opacity: 0.6;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden">
<div class="relative flex h-screen w-full flex-col amoled-gradient group/design-root overflow-hidden">
<!-- TopAppBar Component -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between z-50">
<div class="text-white flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-white/70 text-sm font-medium leading-tight tracking-[0.1em] uppercase flex-1 text-center">Resultado de la Ruleta</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-lg h-12 bg-transparent text-white p-0">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</div>
<div class="relative flex-1 flex flex-col items-center justify-center px-4 overflow-hidden">
<!-- Background 3D Roulette Effect (Abstracted) -->
<div class="absolute inset-0 flex items-center justify-center opacity-30 pointer-events-none">
<div class="relative w-[500px] h-[500px] rounded-full border-[16px] border-[#221910] flex items-center justify-center rotate-12">
<div class="absolute inset-0 rounded-full border-t-[40px] border-primary spotlight-glow"></div>
<div class="w-full h-[2px] bg-white/10 rotate-45"></div>
<div class="w-full h-[2px] bg-white/10 rotate-90"></div>
<div class="w-full h-[2px] bg-white/10 rotate-[135deg]"></div>
</div>
</div>
<!-- Fake Confetti Particles -->
<div class="absolute inset-0 pointer-events-none">
<div class="confetti-particle rotate-12 top-[10%] left-[20%] bg-primary"></div>
<div class="confetti-particle rotate-45 top-[15%] right-[25%] bg-yellow-400"></div>
<div class="confetti-particle -rotate-12 top-[40%] left-[10%] bg-orange-300"></div>
<div class="confetti-particle rotate-[30deg] top-[60%] right-[15%] bg-primary"></div>
<div class="confetti-particle -rotate-45 top-[80%] left-[30%] bg-yellow-500"></div>
<div class="confetti-particle rotate-12 top-[5%] right-[40%] bg-white/40"></div>
</div>
<!-- HeaderImage / Winner Avatar in 3D Frame -->
<div class="relative z-10 w-full max-w-xs flex flex-col items-center">
<div class="p-1 rounded-xl bg-gradient-to-b from-primary to-[#221910] shadow-2xl spotlight-glow">
<div class="bg-cover bg-center flex flex-col justify-end overflow-hidden rounded-lg w-64 h-64 border-4 border-[#0a0a0a]" data-alt="Close up portrait of a smiling person with a golden spotlight" style='background-image: linear-gradient(0deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0) 40%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuAZDas7MVDQC8DzWa4jYHzcvWmlkeaNB5JTWZpVNZrVe56dYsh-kqVWnT1JJr9XevZ8APITYrNqJ-nDgc1lh-ZDv0PfzYuxRHt_xlT-RqcwqpyqhFkjfL7TMDnws0ujdQu5bb5g_QVWFtkQPJwJI4ffADMVQ2UH-xZMUfkqhuW4JJEwQpL-14OJhThseqrqAVMIlsnDaS04HH76TaO_08V-BsWIQ-XhAas1Et7FQrD0vlmpsxjdK2-_bEKuF4DAi49N-MTWgKeLZJtr");'>
</div>
</div>
<!-- HeadlineText -->
<div class="mt-8">
<h1 class="text-white tracking-tight text-[36px] font-bold leading-tight px-4 text-center uppercase">
                        ¡HOY INVITA <span class="text-primary">CARLOS</span>!
                    </h1>
</div>
<!-- BodyText -->
<p class="text-white/60 text-lg font-normal leading-normal pb-3 pt-2 px-8 text-center">
                    La suerte ha decidido. <br/>¡Es hora de celebrar la victoria!
                </p>
</div>
</div>
<!-- SingleButton Section with Pulse Effect -->
<div class="relative z-20 pb-12 pt-4">
<div class="flex px-8 py-3 max-w-md mx-auto">
<div class="relative w-full">
<!-- Subtle Glow behind button -->
<div class="absolute -inset-1 bg-primary rounded-xl blur opacity-25"></div>
<button class="relative flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-16 px-5 bg-primary text-[#0a0a0a] gap-3 text-lg font-bold leading-normal tracking-wider transition-transform active:scale-95 shadow-xl">
<span class="material-symbols-outlined font-bold">receipt_long</span>
<span class="truncate">REGISTRAR GASTO</span>
</button>
</div>
</div>
<!-- Secondary Action -->
<div class="text-center mt-2">
<button class="text-white/40 text-sm font-medium hover:text-white transition-colors py-2 px-4 uppercase tracking-widest">
                    REINTENTAR
                </button>
</div>
</div>
</div>
</body></html>
