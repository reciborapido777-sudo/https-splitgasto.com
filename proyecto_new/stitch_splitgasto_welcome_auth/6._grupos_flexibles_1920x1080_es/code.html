<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0066FF",
                        "background-light": "#F8FAFC",
                        "background-dark": "#000000",
                        "neon-cyan": "#00F2FF",
                        "neon-pink": "#FF00E5",
                        "neon-purple": "#BC00FF",
                        "neon-green": "#39FF14",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "24px",
                    },
                    boxShadow: {
                        'neon-glow': '0 0 15px rgba(0, 242, 255, 0.4), 0 0 30px rgba(0, 242, 255, 0.2)',
                        'pink-glow': '0 0 15px rgba(255, 0, 229, 0.4), 0 0 30px rgba(255, 0, 229, 0.2)',
                        'green-glow': '0 0 15px rgba(57, 255, 20, 0.4), 0 0 30px rgba(57, 255, 20, 0.2)',
                    }
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        .neon-text-cyan {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.7);
        }
        .neon-border {
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        .floating-delayed {
            animation: float 6s ease-in-out infinite 2s;
        }
        .floating-more-delayed {
            animation: float 6s ease-in-out infinite 4s;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .gradient-bg {
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white w-[1920px] h-[1080px] flex items-center justify-center p-0 m-0">
<div class="relative w-full h-full flex flex-col items-center justify-center gradient-bg overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-neon-purple/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-neon-cyan/10 blur-[120px] rounded-full"></div>
<div class="z-10 text-center mb-20">
<h1 class="text-[100px] font-extrabold tracking-tight mb-4 leading-none neon-text-cyan">
                Grupos para todo
            </h1>
<p class="text-4xl text-slate-400 font-medium tracking-wide">
                Viajes, cenas, piso y más
            </p>
</div>
<div class="relative w-full max-w-6xl h-[500px] flex items-center justify-center gap-16">
<div class="floating-delayed group relative flex flex-col items-center">
<div class="w-64 h-64 bg-slate-900/50 rounded-[40px] neon-border flex items-center justify-center shadow-neon-glow transition-all duration-500 hover:scale-110">
<span class="material-icons-round text-[120px] text-neon-cyan">home</span>
</div>
<span class="mt-8 text-2xl font-bold uppercase tracking-[0.2em] text-neon-cyan/80">Piso</span>
<div class="absolute -inset-4 bg-neon-cyan/5 blur-2xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
<div class="floating group relative flex flex-col items-center -mt-12">
<div class="w-80 h-80 bg-slate-900/50 rounded-[50px] neon-border flex items-center justify-center shadow-pink-glow transition-all duration-500 hover:scale-110 border-pink-500/30">
<span class="material-icons-round text-[160px] text-neon-pink">local_pizza</span>
</div>
<span class="mt-8 text-3xl font-extrabold uppercase tracking-[0.3em] text-neon-pink/80">Cenas</span>
<div class="absolute -inset-6 bg-neon-pink/10 blur-3xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
<div class="floating-more-delayed group relative flex flex-col items-center">
<div class="w-64 h-64 bg-slate-900/50 rounded-[40px] neon-border flex items-center justify-center shadow-green-glow transition-all duration-500 hover:scale-110 border-green-500/30">
<span class="material-icons-round text-[120px] text-neon-green">directions_car</span>
</div>
<span class="mt-8 text-2xl font-bold uppercase tracking-[0.2em] text-neon-green/80">Viajes</span>
<div class="absolute -inset-4 bg-neon-green/5 blur-2xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</div>
<div class="absolute bottom-16 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-white/5 px-8 py-4 rounded-full border border-white/10 backdrop-blur-md">
<div class="w-12 h-12 bg-gradient-to-br from-orange-500 via-pink-500 to-purple-600 rounded-xl flex items-center justify-center text-2xl font-black italic text-white shadow-lg">
                S
            </div>
<span class="text-3xl font-bold tracking-tight">Split<span class="text-primary">Gasto</span></span>
</div>
<div class="absolute top-8 left-1/2 -translate-x-1/2 w-[400px] h-1 bg-white/10 rounded-full"></div>
<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 100px 100px;">
</div>
</div>

</body></html>
