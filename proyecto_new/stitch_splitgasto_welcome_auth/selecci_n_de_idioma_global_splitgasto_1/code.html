<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // AMOLED pure black
                        "glass-border": "rgba(255, 255, 255, 0.1)",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",

                    boxShadow: {

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(13, 242, 223, 0.3);
        }

        .radio-selected {
            border-color: #0df2df !important;
            box-shadow: 0 0 20px rgba(13, 242, 223, 0.3);
            background: rgba(13, 242, 223, 0.05) !important;
        }

        .custom-radio {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #316863;
            border-radius: 50%;
            display: grid;
            place-content: center;
            transition: all 0.2s ease;
        }

        .custom-radio::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            background-color: #0df2df;
            box-shadow: 0 0 10px #0df2df;
        }

        .custom-radio:checked {
            border-color: #0df2df;
        }

        .custom-radio:checked::before {
            transform: scale(1);
        }

        .flag-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>

<!-- Background Decorative Elements (Neon Gradients) -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full -z-10 pointer-events-none"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-[50%] h-[50%] bg-primary/5 blur-[150px] rounded-full -z-10 pointer-events-none"></div>
<script>
        // Simple UI logic for radio selection appearance
        const labels = document.querySelectorAll('label.glass-card');
        const radios = document.querySelectorAll('input[type="radio"]');

        radios.forEach((radio, index) => {
            radio.addEventListener('change', () => {
                labels.forEach(l => {
                    l.classList.remove('radio-selected');
                    const icon = l.querySelector('.material-symbols-outlined:last-child');
                    icon.classList.replace('text-primary', 'text-white/20');
                });
                
                if (radio.checked) {
                    labels[index].classList.add('radio-selected');
                    const icon = labels[index].querySelector('.material-symbols-outlined:last-child');
                    icon.classList.replace('text-white/20', 'text-primary');
                }
            });
        });
    </script>
</body></html>
