<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f42525",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]

        :root {
            --brand-gradient: linear-gradient(135deg, #ff8a00 0%, #da1b60 50%, #8e2de2 100%);
        }
        .text-gradient-rainbow {
            background: linear-gradient(to right, #ff8a00, #da1b60, #8e2de2, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
        }
        .cta-gradient {
            background: var(--brand-gradient);
        }
        .roulette-container {
            perspective: 1000px;
        }
        .roulette-wheel {
            background: conic-gradient(

                #da1b60 45deg 90deg, 
                #8e2de2 90deg 135deg, 
                #00d2ff 135deg 180deg,
                #ff8a00 180deg 225deg,

                #8e2de2 270deg 315deg, 
                #00d2ff 315deg 360deg

        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tiktok-sidebar-icon {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
    </style>
<style>
