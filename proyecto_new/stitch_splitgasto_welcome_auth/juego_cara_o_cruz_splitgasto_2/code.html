<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0bdac9",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102221",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .coin-gradient {
            background: radial-gradient(circle at 30% 30%, #2ae4d3 0%, #0bdac9 50%, #08a69a 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- TopAppBar -->
<header class="w-full max-w-[480px] flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-primary flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-3xl">arrow_back_ios</span>
</div>
<h2 class="text-slate-800 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Cara o Cruz</h2>
</header>
<main class="w-full max-w-[480px] flex flex-col flex-1 px-4">
<!-- HeadlineText -->
<div class="pt-6 pb-2">
<h2 class="text-slate-900 dark:text-white tracking-tight text-[28px] font-extrabold leading-tight text-center">
                ¿Quién paga hoy?
            </h2>
<p class="text-slate-500 dark:text-[#9cbab7] text-center text-sm mt-1">Configura las opciones y lanza la moneda</p>
</div>
<!-- Outcome Configurator (TextFields) -->
<div class="flex flex-col gap-4 py-6">
<div class="flex gap-4">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-white text-sm font-semibold pb-2 px-1">Cara</p>
<div class="relative">
<input class="form-input w-full rounded-xl text-slate-900 dark:text-white border-slate-200 dark:border-[#3b5452] bg-white dark:bg-[#1b2726] focus:border-primary focus:ring-1 focus:ring-primary h-14 p-4 text-base font-medium shadow-sm transition-all" placeholder="Ej: Yo pago" type="text" value="Yo pago"/>
<span class="material-symbols-outlined absolute right-3 top-4 text-primary opacity-50">face</span>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-white text-sm font-semibold pb-2 px-1">Cruz</p>
<div class="relative">
<input class="form-input w-full rounded-xl text-slate-900 dark:text-white border-slate-200 dark:border-[#3b5452] bg-white dark:bg-[#1b2726] focus:border-primary focus:ring-1 focus:ring-primary h-14 p-4 text-base font-medium shadow-sm transition-all" placeholder="Ej: Tú pagas" type="text" value="Tú pagas"/>
<span class="material-symbols-outlined absolute right-3 top-4 text-primary opacity-50">account_balance_wallet</span>
</div>
</label>
</div>
</div>
<!-- 3D Coin Interactive Area -->
<div class="flex-1 flex flex-col items-center justify-center py-8">
<div class="relative group cursor-pointer">
<!-- Outer Glow/Ring for Winner -->
<div class="absolute -inset-4 bg-primary/20 rounded-full blur-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
<!-- Realistic Coin Representation -->
<div class="relative w-48 h-48 rounded-full coin-gradient shadow-[0_10px_40px_rgba(11,218,201,0.3)] border-4 border-white/20 flex items-center justify-center transform hover:scale-105 transition-transform">
<div class="w-40 h-40 rounded-full border-2 border-dashed border-white/30 flex items-center justify-center">
<!-- SplitGasto Icon Side -->
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-white text-7xl font-light">account_balance_wallet</span>
<div class="mt-2 px-3 py-1 bg-white/20 rounded-full">
<span class="text-white text-[10px] font-bold tracking-widest uppercase">SplitGasto</span>
</div>
</div>
</div>
<!-- Edge Ridges Detail -->
<div class="absolute inset-0 rounded-full border-[6px] border-black/10 pointer-events-none"></div>
</div>
</div>
<!-- Winning Indicator / Confetti Placeholder -->
<div class="mt-10 h-8 flex items-center justify-center">
<span class="text-primary font-bold text-xl tracking-wide uppercase opacity-0">¡Cruz gana!</span>
</div>
</div>
<!-- Main Action Button -->
<div class="pb-10 pt-4 w-full flex flex-col gap-3">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-2xl h-16 px-5 bg-primary text-background-dark text-lg font-extrabold leading-normal tracking-[0.05em] shadow-lg shadow-primary/20 hover:brightness-105 active:scale-[0.98] transition-all">
<span class="truncate">¡LANZAR!</span>
</button>
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-2xl h-12 px-5 bg-transparent border border-slate-300 dark:border-[#3b5452] text-slate-600 dark:text-[#9cbab7] text-sm font-bold leading-normal transition-colors hover:bg-slate-100 dark:hover:bg-white/5">
<span class="truncate">REINICIAR</span>
</button>
</div>
</main>
<!-- Visual Polish: Decorative background elements -->
<div class="fixed top-[-10%] left-[-20%] w-[60%] h-[40%] bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-[-10%] right-[-20%] w-[50%] h-[30%] bg-primary/10 rounded-full blur-[100px] -z-10"></div>
</body></html>
