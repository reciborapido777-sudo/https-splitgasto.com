<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .gradient-plane {
            background: linear-gradient(135deg, #FF8C00 0%, #8A2BE2 100%);
        }
        .amoled-card {
            background-color: #121212;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl cursor-pointer">close</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Confirmación</h2>
</div>
<!-- Main Content Container -->
<div class="flex-1 flex flex-col items-center justify-center px-6 py-8 max-w-md mx-auto w-full">
<!-- Animation Placeholder Area (Orange-Purple Gradient) -->
<div class="relative w-full aspect-square max-w-[280px] mb-8 flex items-center justify-center">
<div class="absolute inset-0 gradient-plane opacity-20 blur-3xl rounded-full"></div>
<div class="relative w-48 h-48 gradient-plane rounded-3xl shadow-2xl flex items-center justify-center transform -rotate-12">
<span class="material-symbols-outlined text-white text-8xl" style="font-variation-settings: 'FILL' 1">send</span>
<!-- Subtle PDF icon overlay -->
<div class="absolute top-4 left-4 bg-white/20 p-2 rounded-lg backdrop-blur-sm">
<span class="material-symbols-outlined text-white text-2xl">picture_as_pdf</span>
</div>
</div>
</div>
<!-- Headline -->
<h1 class="text-white tracking-tight text-[32px] font-extrabold leading-tight text-center mb-4">
            ¡Informe en camino!
        </h1>
<!-- Body Text -->
<p class="text-gray-400 text-base font-normal leading-relaxed text-center mb-8 px-2">
            El reporte detallado con las fotos de los tickets ha sido enviado correctamente a los miembros del grupo.
        </p>
<!-- Summary List Component -->
<div class="w-full amoled-card rounded-xl border border-white/10 p-1 mb-8">
<div class="grid grid-cols-[auto_1fr] gap-x-4 items-center border-b border-white/5 p-4">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl">group</span>
</div>
<div class="flex flex-col">
<p class="text-gray-500 text-xs uppercase tracking-wider font-bold">Destinatarios</p>
<p class="text-white text-base font-medium">5 personas</p>
</div>
</div>
<div class="grid grid-cols-[auto_1fr] gap-x-4 items-center p-4">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl">workspace_premium</span>
</div>
<div class="flex flex-col">
<p class="text-gray-500 text-xs uppercase tracking-wider font-bold">Formato</p>
<div class="flex items-center gap-2">
<p class="text-white text-base font-medium">PDF Premium</p>
<span class="bg-primary/20 text-primary text-[10px] px-1.5 py-0.5 rounded font-bold uppercase">PRO</span>
</div>
</div>
</div>
</div>
</div>
<!-- Fixed Bottom Actions -->
<div class="p-6 pb-10 w-full max-w-md mx-auto flex flex-col gap-4">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl transition-all active:scale-[0.98] text-center shadow-lg shadow-primary/20">
            VOLVER AL PANEL
        </button>
<button class="w-full text-gray-400 hover:text-white text-sm font-medium py-2 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">history</span>
            Ver historial de envíos
        </button>
</div>
</body></html>
