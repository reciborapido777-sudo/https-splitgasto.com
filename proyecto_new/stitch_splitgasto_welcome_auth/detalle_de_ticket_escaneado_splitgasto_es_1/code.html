<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Detalle de Ticket Escaneado SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // AMOLED Black as requested
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #000000;
        }
        .ocr-highlight {
            border: 1px solid #0df2df;
            background-color: rgba(13, 242, 223, 0.15);
            box-shadow: 0 0 10px rgba(13, 242, 223, 0.4);
            position: absolute;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- TopAppBar: Floating and Transparent -->
<div class="absolute top-0 left-0 right-0 z-20 flex items-center bg-black/40 backdrop-blur-md p-4 justify-between border-b border-white/10">
<div aria-label="Volver" class="text-white flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Detalle de Ticket</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex size-12 cursor-pointer items-center justify-center rounded-lg bg-transparent text-white">
<span class="material-symbols-outlined">zoom_in</span>
</button>
</div>
</div>
<!-- Main Content: Full Screen Image with OCR Highlights -->
<div class="relative flex-1 w-full bg-black flex items-center justify-center overflow-hidden">
<div class="relative w-full h-full max-w-md mx-auto">
<!-- Scanned Ticket Image -->
<div class="w-full h-full bg-center bg-no-repeat bg-contain" data-alt="Scanned physical receipt from a restaurant" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuANLczPfYKBEDT5P9IfO8LTmtZlRSEotyoEWY5wvc87vYSZHDxi51tu1IqW6SOlSHu6LRNYlaV2lBqgYOaUnnh3Rz26Ta8rXDZlfo2qY8KvWQcSsKg0InBn10qaDQquUj2ZbI17PP37FFn6Pn5C7fcrOjDDaN0JDY13M6cpWgDohDzZn_sJFj_N-pmfdCX1uwhwza7eo9Ryv1SuwvKRhXvRGgvwVg9gSyQ1nm3MKmDloGOAutdSK7qlGPK7n6aIbnsiKokoQzqjxwHp");'>
</div>
<!-- OCR Overlays (Floating Boxes) -->
<!-- Merchant Highlight -->
<div class="ocr-highlight rounded-sm" style="top: 25%; left: 20%; width: 45%; height: 5%;"></div>
<div class="absolute top-[23%] left-[20%] text-[10px] text-primary font-bold uppercase tracking-widest">Comercio</div>
<!-- Date Highlight -->
<div class="ocr-highlight rounded-sm" style="top: 32%; left: 20%; width: 25%; height: 3%;"></div>
<div class="absolute top-[30%] left-[20%] text-[10px] text-primary font-bold uppercase tracking-widest">Fecha</div>
<!-- Total Highlight -->
<div class="ocr-highlight rounded-sm border-2" style="top: 65%; left: 55%; width: 25%; height: 6%;"></div>
<div class="absolute top-[63%] left-[55%] text-[10px] text-primary font-bold uppercase tracking-widest">Total</div>
</div>
</div>
<!-- Bottom Sheet Action Card -->
<div class="relative z-20 bg-background-light dark:bg-[#111111] rounded-t-xl border-t border-white/10 p-6 pb-10 shadow-2xl">
<!-- Handle -->
<div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-6"></div>
<div class="mb-6">
<h3 class="text-[#90cbc6] text-xs font-bold uppercase tracking-wider mb-2">Resumen de IA</h3>
<!-- List Items for Summary -->
<div class="flex items-center gap-4 py-3 border-b border-white/5">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-10">
<span class="material-symbols-outlined">storefront</span>
</div>
<div class="flex flex-col">
<p class="text-white text-base font-medium leading-tight">Restaurante Centro</p>
<p class="text-white/40 text-xs font-normal">Establecimiento reconocido</p>
</div>
</div>
<div class="flex items-center gap-4 py-3">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-10">
<span class="material-symbols-outlined">payments</span>
</div>
<div class="flex flex-col">
<p class="text-primary text-xl font-bold leading-tight">45,50€</p>
<p class="text-white/40 text-xs font-normal">Importe total extraído</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-black h-14 rounded-xl font-bold text-base flex items-center justify-center gap-2 transition-colors">
<span class="material-symbols-outlined">edit</span>
                    Editar Datos
                </button>
<div class="flex gap-3">
<button class="flex-1 bg-white/5 hover:bg-white/10 text-white h-14 rounded-xl font-medium text-sm flex items-center justify-center gap-2 transition-colors">
<span class="material-symbols-outlined">download</span>
                        Descargar Foto
                    </button>
<button aria-label="Eliminar" class="w-14 bg-red-500/10 hover:bg-red-500/20 text-red-500 h-14 rounded-xl flex items-center justify-center transition-colors">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
