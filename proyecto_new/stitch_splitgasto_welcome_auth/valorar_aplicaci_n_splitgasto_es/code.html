<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // Adjusted to pure AMOLED black
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .star-gradient {
            background: linear-gradient(135deg, #FF8C00 0%, #8A2BE2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glow-effect {
            box-shadow: 0 0 20px rgba(19, 236, 236, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen flex flex-col">
<!-- Top Navigation -->
<div class="flex items-center justify-end p-6">
<button class="flex items-center justify-center size-10 rounded-full bg-white/10 backdrop-blur-md">
<span class="material-symbols-outlined text-white text-[24px]">close</span>
</button>
</div>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col items-center justify-center px-8 text-center">
<!-- Hero Illustration: 5 Stars with Orange-Purple Gradient -->
<div class="mb-10 relative">
<div class="flex gap-2 justify-center">
<span class="material-symbols-outlined text-[48px] star-gradient scale-110 drop-shadow-xl" style="font-variation-settings: 'FILL' 1">star</span>
<span class="material-symbols-outlined text-[56px] star-gradient scale-125 drop-shadow-2xl mx-1" style="font-variation-settings: 'FILL' 1">star</span>
<span class="material-symbols-outlined text-[64px] star-gradient scale-150 drop-shadow-2xl mx-2" style="font-variation-settings: 'FILL' 1">star</span>
<span class="material-symbols-outlined text-[56px] star-gradient scale-125 drop-shadow-2xl mx-1" style="font-variation-settings: 'FILL' 1">star</span>
<span class="material-symbols-outlined text-[48px] star-gradient scale-110 drop-shadow-xl" style="font-variation-settings: 'FILL' 1">star</span>
</div>
<!-- Subtle glow behind stars -->
<div class="absolute inset-0 bg-purple-600/20 blur-[60px] rounded-full -z-10"></div>
</div>
<!-- Headline -->
<h1 class="text-white text-[32px] font-bold leading-tight tracking-tight mb-4">
            ¿Te gusta SplitGasto?
        </h1>
<!-- Body Text -->
<p class="text-slate-400 text-lg font-normal leading-relaxed mb-12 max-w-xs">
            Tu valoración nos ayuda a seguir mejorando y a que más grupos disfruten de cuentas claras.
        </p>
<!-- Interactive Rating Selector -->
<div class="w-full max-w-sm mb-12">
<div class="flex justify-between items-center bg-white/5 border border-white/10 p-5 rounded-3xl backdrop-blur-sm">
<div class="flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined text-primary text-[32px]">star</span>
</div>
<div class="flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined text-primary text-[32px]">star</span>
</div>
<div class="flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined text-primary text-[32px]">star</span>
</div>
<div class="flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined text-primary text-[32px]">star</span>
</div>
<div class="flex flex-col items-center gap-1 group cursor-pointer">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1">star</span>
</div>
</div>
</div>
</main>
<!-- Footer Actions -->
<footer class="p-8 flex flex-col gap-6 mb-4">
<!-- Primary CTA -->
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-5 rounded-full text-lg tracking-wide uppercase transition-all glow-effect">
            VALORAR EN TIENDA
        </button>
<!-- Secondary Suggestion Link -->
<button class="text-slate-400 hover:text-white text-base font-medium transition-colors">
            Escribir una sugerencia
        </button>
</footer>
<!-- iOS Home Indicator Spacing -->
<div class="h-6"></div>
</body></html>
