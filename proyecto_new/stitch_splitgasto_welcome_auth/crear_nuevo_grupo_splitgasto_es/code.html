<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Crear Nuevo Grupo - SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13c8ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", /* AMOLED Black */
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .selected-gradient {
            background: linear-gradient(135deg, #FF8C00 0%, #8A2BE2 100%);
        }
        .icon-tile-active {
            border: 2px solid transparent;
            background-image: linear-gradient(#101f22, #101f22), linear-gradient(135deg, #FF8C00, #8A2BE2);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-gray-200 dark:hover:bg-zinc-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Crear Nuevo Grupo</h1>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 px-4 py-6 max-w-lg mx-auto w-full space-y-8">
<!-- TextField Section -->
<section class="space-y-3">
<label class="block">
<span class="text-sm font-semibold uppercase tracking-wider text-primary ml-1">Nombre del grupo</span>
<div class="mt-2 relative flex items-center group">
<input class="block w-full h-16 rounded-xl border-2 border-primary/30 bg-zinc-900/50 dark:bg-zinc-900/50 text-white px-5 pr-14 focus:border-primary focus:ring-0 transition-all placeholder:text-zinc-500 text-lg" placeholder="Ej: Vacaciones 2024" type="text"/>
<div class="absolute right-4 text-primary opacity-70 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined">edit</span>
</div>
</div>
</label>
</section>
<!-- SectionHeader & Grid -->
<section class="space-y-4">
<h3 class="text-lg font-bold leading-tight tracking-tight flex items-center gap-2">
<span class="material-symbols-outlined text-primary">category</span>
                Selecciona un Icono
            </h3>
<!-- TextGrid / Icon Grid -->
<div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
<!-- Item: Hogar (Selected Example) -->
<button class="flex flex-col gap-3 rounded-xl p-5 items-center justify-center transition-all icon-tile-active shadow-lg shadow-purple-500/10 scale-[1.02]">
<div class="p-3 rounded-full selected-gradient shadow-md">
<span class="material-symbols-outlined text-white text-3xl">home</span>
</div>
<span class="text-sm font-bold">Piso compartido</span>
</button>
<!-- Item: Viajes -->
<button class="flex flex-col gap-3 rounded-xl border border-zinc-800 bg-zinc-900/40 p-5 items-center justify-center hover:border-primary/50 transition-all">
<div class="p-3 rounded-full bg-zinc-800">
<span class="material-symbols-outlined text-zinc-300 text-3xl">flight_takeoff</span>
</div>
<span class="text-sm font-semibold text-zinc-400">Viajes</span>
</button>
<!-- Item: Pizza -->
<button class="flex flex-col gap-3 rounded-xl border border-zinc-800 bg-zinc-900/40 p-5 items-center justify-center hover:border-primary/50 transition-all">
<div class="p-3 rounded-full bg-zinc-800">
<span class="material-symbols-outlined text-zinc-300 text-3xl">local_pizza</span>
</div>
<span class="text-sm font-semibold text-zinc-400">Cenas</span>
</button>
<!-- Item: Pareja -->
<button class="flex flex-col gap-3 rounded-xl border border-zinc-800 bg-zinc-900/40 p-5 items-center justify-center hover:border-primary/50 transition-all">
<div class="p-3 rounded-full bg-zinc-800">
<span class="material-symbols-outlined text-zinc-300 text-3xl">favorite</span>
</div>
<span class="text-sm font-semibold text-zinc-400">Pareja</span>
</button>
<!-- Item: Coche -->
<button class="flex flex-col gap-3 rounded-xl border border-zinc-800 bg-zinc-900/40 p-5 items-center justify-center hover:border-primary/50 transition-all">
<div class="p-3 rounded-full bg-zinc-800">
<span class="material-symbols-outlined text-zinc-300 text-3xl">directions_car</span>
</div>
<span class="text-sm font-semibold text-zinc-400">Roadtrip</span>
</button>
<!-- Item: Regalo -->
<button class="flex flex-col gap-3 rounded-xl border border-zinc-800 bg-zinc-900/40 p-5 items-center justify-center hover:border-primary/50 transition-all">
<div class="p-3 rounded-full bg-zinc-800">
<span class="material-symbols-outlined text-zinc-300 text-3xl">featured_seasonal_and_gifts</span>
</div>
<span class="text-sm font-semibold text-zinc-400">Eventos</span>
</button>
</div>
</section>
</main>
<!-- Footer / SingleButton -->
<footer class="p-6 sticky bottom-0 bg-gradient-to-t from-background-dark via-background-dark to-transparent pt-12">
<div class="max-w-lg mx-auto">
<button class="w-full bg-primary text-black h-16 rounded-2xl text-lg font-extrabold tracking-wide hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-[0_10px_30px_-10px_rgba(19,200,236,0.5)]">
<span class="material-symbols-outlined">group_add</span>
                Crear Grupo
            </button>
<!-- Bottom Indicator for iOS -->
<div class="mt-4 h-1 w-32 bg-zinc-800 rounded-full mx-auto opacity-50"></div>
</div>
</footer>
</body></html>
