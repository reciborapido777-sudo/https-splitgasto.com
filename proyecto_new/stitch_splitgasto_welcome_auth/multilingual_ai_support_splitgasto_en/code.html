<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a60df2",
                        "background-light": "#f7f5f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>SplitGasto AI Support</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-[430px] mx-auto border-x border-white/5 shadow-2xl">
<!-- Top App Bar -->
<div class="flex items-center bg-transparent p-6 pb-2 justify-between z-10">
<div class="text-white flex size-12 shrink-0 items-center">
<span class="material-symbols-outlined cursor-pointer">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">AI Support</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 bg-transparent text-white gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</div>
<!-- Language Indicator Pill -->
<div class="flex justify-center px-6 py-2 z-10">
<div class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white/10 backdrop-blur-md border border-white/10 pl-3 pr-5">
<span class="material-symbols-outlined text-primary text-[20px]">translate</span>
<p class="text-white text-xs font-medium tracking-wide">Auto-detecting 170+ languages</p>
<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
</div>
</div>
<!-- Central 3D Asset Area -->
<div class="relative flex-1 flex flex-col items-center justify-center -mt-10">
<!-- Background Glow -->
<div class="absolute w-64 h-64 bg-primary/20 rounded-full blur-[80px]"></div>
<!-- Holographic Brain Representation -->
<div class="relative w-64 h-64 flex items-center justify-center">
<div class="absolute inset-0 bg-gradient-to-tr from-[#f26a0d] to-primary rounded-full opacity-20 animate-pulse"></div>
<div class="z-20 scale-150">
<span class="material-symbols-outlined text-8xl text-transparent bg-clip-text bg-gradient-to-br from-[#f26a0d] via-primary to-purple-400" style="font-variation-settings: 'FILL' 1, 'wght' 200;">
                        neurology
                    </span>
</div>
<!-- Orbiting Rings -->
<div class="absolute w-72 h-72 border border-white/5 rounded-full"></div>
<div class="absolute w-80 h-80 border border-white/5 rounded-full rotate-45"></div>
</div>
<!-- Headline Text -->
<h1 class="text-white tracking-tight text-[28px] font-bold leading-tight px-8 text-center pt-8 pb-4">
                Ask anything in your <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#f26a0d] to-primary">native language</span>
</h1>
</div>
<!-- Translation Interface Simulation -->
<div class="px-6 space-y-4 pb-8 z-10">
<!-- Source Message (Chinese) -->
<div class="flex items-end gap-3 opacity-70">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full w-8 shrink-0 border border-white/20" data-alt="User profile avatar icon" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB4N6sm3matY-quOOXFDkABUajOEQqupPNtpDMPV8YGV6ciuY0pSOM7Zq4MUj-xc5oAkHc3rmxfitgF-aSnSfqsFhldS6z2dbHj1tx10keN4LnhPJZoANB4W83Y4V-YLBq3_jHZF1S4fUIo0YQZc9VyK6QGjlp-Cf9qYMz87BNkl61LLwqXFcwZgabQLZnP3Vj5CBEzij_b5uiBC64fOjfNjEb3IFGDGKNmu9ivLDfPrGwM-tJlnQBHa-nJAkF31SQ8HSs7SjiCm6nw");'></div>
<div class="flex flex-1 flex-col gap-1 items-start">
<p class="text-white/50 text-[11px] font-medium tracking-wider uppercase">Incoming Chinese</p>
<p class="text-sm font-normal leading-normal flex max-w-[280px] rounded-2xl rounded-bl-none px-4 py-3 bg-[#1a1a1a] border border-white/10 text-white/90">
                        这个账单怎么分？
                    </p>
</div>
</div>
<!-- Translated Message (English) -->
<div class="flex items-end gap-3 translate-y-[-8px]">
<div class="bg-gradient-to-br from-[#f26a0d] to-primary aspect-square rounded-full w-8 shrink-0 flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[18px] text-white">auto_awesome</span>
</div>
<div class="flex flex-1 flex-col gap-1 items-start">
<div class="flex items-center gap-1.5">
<p class="text-primary text-[11px] font-bold tracking-wider uppercase">AI Assistant</p>
<span class="bg-primary/20 text-primary text-[9px] px-1.5 py-0.5 rounded uppercase font-bold">Live</span>
</div>
<div class="relative group">
<p class="text-base font-medium leading-normal flex max-w-[280px] rounded-2xl rounded-bl-none px-4 py-3 bg-gradient-to-br from-[#3c2249] to-[#1c1022] border border-primary/30 text-white shadow-xl">
                            How should this bill be split?
                        </p>
<div class="mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[12px] text-white/40">verified</span>
<span class="text-[10px] text-white/40 italic">Translated by SplitGasto AI</span>
</div>
</div>
</div>
</div>
</div>
<!-- Action Buttons Footer -->
<div class="px-6 pb-12 space-y-3 z-10">
<button class="w-full h-14 bg-primary hover:bg-primary/90 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-xl shadow-primary/20">
<span class="material-symbols-outlined">mic</span>
<span class="font-bold text-lg">Start Voice Chat</span>
</button>
<button class="w-full h-14 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-bold text-lg">Text Support</span>
</button>
</div>
<!-- iOS Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/20 rounded-full"></div>
</div>
</body></html>
