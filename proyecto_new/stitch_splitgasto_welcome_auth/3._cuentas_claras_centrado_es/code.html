<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cuentas Claras - Resumen de Deudas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // AMOLED Black as requested
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #000000;
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(13, 204, 242, 0.3);
        }
        .neon-border {
            border: 1px solid rgba(13, 204, 242, 0.5);
        }
        /* Custom layout for 1920x1080 canvas aspect ratio simulation */
        .marketing-container {
            width: 100%;
            max-width: 1920px;
            height: 1080px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white">
<div class="marketing-container bg-background-dark flex flex-col items-center justify-between py-16 px-8">
<!-- TopAppBar Style Header -->
<div class="w-full max-w-4xl flex flex-col items-center">
<div class="flex items-center justify-center w-full mb-4">
<span class="material-symbols-outlined text-primary text-4xl mr-3" style="font-variation-settings: 'FILL' 1">payments</span>
<h2 class="text-primary text-4xl font-bold tracking-[0.2em] uppercase">CUENTAS CLARAS</h2>
</div>
<div class="h-1 w-32 bg-primary rounded-full opacity-50"></div>
</div>
<!-- Central Composition -->
<div class="flex-1 flex flex-col justify-center items-center w-full max-w-6xl">
<!-- Headline Text -->
<div class="text-center mb-16">
<h1 class="text-white text-7xl font-bold tracking-tight leading-tight mb-4">Resumen de Deudas</h1>
<p class="text-gray-400 text-2xl font-medium">Control total de tus finanzas compartidas</p>
</div>
<!-- Symmetric Floating Cards -->
<div class="flex flex-row gap-12 w-full justify-center items-stretch">
<!-- "Te deben" Card -->
<div class="flex-1 max-w-md bg-[#111111] neon-border neon-glow rounded-xl p-10 flex flex-col items-center justify-center transform hover:scale-105 transition-transform duration-300">
<div class="bg-primary/20 p-4 rounded-full mb-6">
<span class="material-symbols-outlined text-primary text-5xl">trending_up</span>
</div>
<p class="text-gray-400 text-2xl font-medium mb-2">Te deben</p>
<p class="text-white text-7xl font-bold tracking-tight">€450.00</p>
<div class="mt-6 flex items-center gap-2 text-[#0bda54] bg-[#0bda54]/10 px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-xl">arrow_upward</span>
<span class="text-xl font-bold">+12% este mes</span>
</div>
</div>
<!-- Central Divider Visual -->
<div class="flex items-center justify-center">
<div class="h-40 w-[2px] bg-gradient-to-b from-transparent via-primary to-transparent opacity-30"></div>
</div>
<!-- "Debes" Card -->
<div class="flex-1 max-w-md bg-[#111111] border border-gray-800 rounded-xl p-10 flex flex-col items-center justify-center transform hover:scale-105 transition-transform duration-300">
<div class="bg-red-500/20 p-4 rounded-full mb-6">
<span class="material-symbols-outlined text-red-500 text-5xl">trending_down</span>
</div>
<p class="text-gray-400 text-2xl font-medium mb-2">Debes</p>
<p class="text-white text-7xl font-bold tracking-tight">€125.50</p>
<div class="mt-6 flex items-center gap-2 text-red-400 bg-red-400/10 px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-xl">arrow_downward</span>
<span class="text-xl font-bold">-5% este mes</span>
</div>
</div>
</div>
<!-- Summary Chart Section -->
<div class="w-full max-w-4xl mt-16 bg-[#111111] rounded-xl p-8 border border-gray-900">
<div class="flex justify-between items-end gap-8 h-48 px-4">
<div class="flex-1 flex flex-col items-center gap-3">
<div class="w-full bg-primary/20 rounded-t-lg" style="height: 40%"></div>
<span class="text-gray-500 text-sm font-bold">LUN</span>
</div>
<div class="flex-1 flex flex-col items-center gap-3">
<div class="w-full bg-primary/40 rounded-t-lg" style="height: 65%"></div>
<span class="text-gray-500 text-sm font-bold">MAR</span>
</div>
<div class="flex-1 flex flex-col items-center gap-3">
<div class="w-full bg-primary/30 rounded-t-lg" style="height: 50%"></div>
<span class="text-gray-500 text-sm font-bold">MIE</span>
</div>
<div class="flex-1 flex flex-col items-center gap-3">
<div class="w-full bg-primary/80 rounded-t-lg" style="height: 85%"></div>
<span class="text-gray-500 text-sm font-bold">JUE</span>
</div>
<div class="flex-1 flex flex-col items-center gap-3">
<div class="w-full bg-primary/50 rounded-t-lg" style="height: 60%"></div>
<span class="text-gray-500 text-sm font-bold">VIE</span>
</div>
<div class="flex-1 flex flex-col items-center gap-3">
<div class="w-full bg-primary rounded-t-lg" style="height: 100%"></div>
<span class="text-primary text-sm font-bold">SAB</span>
</div>
<div class="flex-1 flex flex-col items-center gap-3">
<div class="w-full bg-primary/40 rounded-t-lg" style="height: 55%"></div>
<span class="text-gray-500 text-sm font-bold">DOM</span>
</div>
</div>
</div>
</div>
<!-- Footer Card Style -->
<div class="w-full max-w-4xl">
<div class="bg-gradient-to-r from-[#111111] to-[#1a1a1a] p-8 rounded-2xl flex items-center justify-between border border-gray-800">
<div class="flex flex-col">
<p class="text-primary text-xl font-bold mb-1">Balance Neto</p>
<p class="text-white text-4xl font-bold">+€324.50</p>
</div>
<div class="flex gap-4">
<button class="bg-primary text-black px-8 py-4 rounded-xl font-bold text-xl hover:bg-white transition-colors flex items-center gap-2">
<span class="material-symbols-outlined">visibility</span>
                        Ver detalles
                    </button>
</div>
</div>
</div>
<!-- Decorative background elements -->
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary opacity-[0.03] blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary opacity-[0.05] blur-[120px] rounded-full pointer-events-none"></div>
</div>
</body></html>
