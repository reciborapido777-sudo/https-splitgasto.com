<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ruleta Apple Watch SplitGasto ES</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#25f4f4",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102222",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .roulette-container {
            aspect-ratio: 1/1;
            position: relative;
        }
        .segment-text {
            position: absolute;
            transform-origin: 50% 100%;
            height: 50%;
            width: 40px;
            left: calc(50% - 20px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- TopAppBar Component -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between z-10">
<div class="text-white flex size-12 shrink-0 items-center justify-center cursor-pointer" data-icon="ArrowBack">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">Ruleta Rápida</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 bg-transparent text-white p-0">
<span class="material-symbols-outlined" data-icon="Settings">settings</span>
</button>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-6 relative">
<!-- HeadlineText Component -->
<div class="mb-8 z-10">
<h2 class="text-white tracking-tight text-[28px] font-bold leading-tight text-center">¿Quién invita hoy?</h2>
<p class="text-white/60 text-sm font-normal leading-normal text-center mt-2">Toca el logo para girar la suerte</p>
</div>
<!-- Custom 3D-Like Roulette Component -->
<div class="relative w-full max-w-[340px] roulette-container flex items-center justify-center">
<!-- Outer Glow Ring -->
<div class="absolute inset-0 rounded-full border-4 border-primary/20 shadow-[0_0_40px_rgba(37,244,244,0.15)]"></div>
<!-- The Wheel -->
<div class="absolute inset-4 rounded-full border-2 border-white/10 bg-gradient-to-br from-white/5 to-transparent backdrop-blur-sm overflow-hidden">
<!-- Example Segments (Visual representation) -->
<div class="segment-text rotate-[0deg]"><span class="rotate-[-0deg] font-bold text-xs uppercase tracking-widest text-primary">Juan</span></div>
<div class="segment-text rotate-[45deg]"><span class="rotate-[-45deg] font-bold text-xs uppercase tracking-widest opacity-40">Maria</span></div>
<div class="segment-text rotate-[90deg]"><span class="rotate-[-90deg] font-bold text-xs uppercase tracking-widest opacity-40">Carlos</span></div>
<div class="segment-text rotate-[135deg]"><span class="rotate-[-135deg] font-bold text-xs uppercase tracking-widest opacity-40">Elena</span></div>
<div class="segment-text rotate-[180deg]"><span class="rotate-[-180deg] font-bold text-xs uppercase tracking-widest opacity-40">Pablo</span></div>
<div class="segment-text rotate-[225deg]"><span class="rotate-[-225deg] font-bold text-xs uppercase tracking-widest opacity-40">Lucia</span></div>
<div class="segment-text rotate-[270deg]"><span class="rotate-[-270deg] font-bold text-xs uppercase tracking-widest opacity-40">Dani</span></div>
<div class="segment-text rotate-[315deg]"><span class="rotate-[-315deg] font-bold text-xs uppercase tracking-widest opacity-40">Sofi</span></div>
<!-- Inner Dividers -->
<div class="absolute inset-0 opacity-10">
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-white rotate-0"></div>
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-white rotate-45"></div>
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-white rotate-90"></div>
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-white rotate-135"></div>
</div>
</div>
<!-- Center "S" Button -->
<div class="relative z-20 size-24 bg-background-dark rounded-full flex items-center justify-center border-4 border-primary shadow-[0_0_30px_rgba(37,244,244,0.4)] cursor-pointer active:scale-95 transition-transform duration-75">
<div class="bg-primary size-16 rounded-full flex items-center justify-center overflow-hidden" data-alt="Logotipo de SplitGasto letra S central">
<span class="text-background-dark text-3xl font-black italic">S</span>
</div>
</div>
<!-- Winning Pointer -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 -mt-2 z-30">
<div class="w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-t-[18px] border-t-primary drop-shadow-[0_2px_10px_rgba(37,244,244,0.5)]"></div>
</div>
</div>
<!-- HeadlineText (Result State Example) -->
<div class="mt-10 opacity-0 animate-pulse transition-opacity">
<h1 class="text-primary tracking-tighter text-[36px] font-black leading-tight px-4 text-center drop-shadow-[0_0_10px_rgba(37,244,244,0.6)]">¡INVITA JUAN!</h1>
</div>
<!-- BodyText (Helper) -->
<div class="absolute bottom-10 w-full px-6">
<div class="bg-white/5 backdrop-blur-md rounded-2xl p-4 border border-white/10 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="Group">group</span>
</div>
<div>
<p class="text-xs text-white/50 uppercase font-bold tracking-widest">Participantes</p>
<p class="text-sm font-bold">8 Amigos listos</p>
</div>
</div>
<button class="bg-primary/10 hover:bg-primary/20 text-primary px-4 py-2 rounded-full text-sm font-bold transition-colors">
                        Editar
                    </button>
</div>
</div>
</div>
<!-- Background Decor -->
<div class="absolute -bottom-20 -left-20 size-64 bg-primary/5 blur-[100px] rounded-full"></div>
<div class="absolute -top-20 -right-20 size-64 bg-primary/5 blur-[100px] rounded-full"></div>
</div>
</body></html>
