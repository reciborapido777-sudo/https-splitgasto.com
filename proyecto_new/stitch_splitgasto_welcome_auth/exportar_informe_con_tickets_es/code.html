<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Exportar Informe con Tickets ES</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // AMOLED Black
                        "surface-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .cta-gradient {
            background: linear-gradient(135deg, #FF8C00 0%, #A020F0 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between border-b border-white/10">
<div class="flex items-center gap-3">
<button class="p-1 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-white">arrow_back_ios</span>
</button>
</div>
<div class="flex items-center gap-2">
<div class="bg-primary/20 p-1.5 rounded-lg">
<span class="material-symbols-outlined text-primary text-xl">payments</span>
</div>
<h1 class="text-white text-lg font-bold tracking-tight">Exportar Informe</h1>
</div>
<div class="w-10 flex justify-end">
<span class="text-primary font-black text-xl italic">S</span>
</div>
</header>
<main class="flex-1 overflow-y-auto pb-32">
<!-- Formato del Archivo Section -->
<section class="mt-6 px-4">
<h3 class="text-white/60 text-xs font-bold uppercase tracking-widest mb-3 px-1">Formato del archivo</h3>
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-white/5 p-1.5 border border-white/10">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:text-black text-white/60 text-sm font-bold transition-all">
<span class="truncate">PDF</span>
<input checked="" class="invisible w-0" name="format" type="radio" value="PDF"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:text-black text-white/60 text-sm font-bold transition-all">
<span class="truncate">EXCEL</span>
<input class="invisible w-0" name="format" type="radio" value="Excel"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:text-black text-white/60 text-sm font-bold transition-all">
<span class="truncate">CSV</span>
<input class="invisible w-0" name="format" type="radio" value="CSV"/>
</label>
</div>
</section>
<!-- Configuración Section -->
<section class="mt-8 px-4">
<h3 class="text-white/60 text-xs font-bold uppercase tracking-widest mb-3 px-1">Configuración del Reporte</h3>
<div class="flex flex-col gap-px bg-white/10 rounded-xl overflow-hidden border border-white/10">
<!-- Group Selection -->
<button class="flex items-center gap-4 bg-white/5 hover:bg-white/10 px-4 min-h-[72px] transition-colors">
<div class="text-primary flex items-center justify-center rounded-xl bg-primary/10 shrink-0 size-12">
<span class="material-symbols-outlined">group</span>
</div>
<div class="flex flex-col text-left flex-1">
<p class="text-white text-base font-semibold leading-normal">Seleccionar Grupo</p>
<p class="text-white/50 text-sm font-normal leading-normal">Viaje Madrid 2024</p>
</div>
<span class="material-symbols-outlined text-white/30">chevron_right</span>
</button>
<!-- Date Range Selection -->
<button class="flex items-center gap-4 bg-white/5 hover:bg-white/10 px-4 min-h-[72px] transition-colors">
<div class="text-primary flex items-center justify-center rounded-xl bg-primary/10 shrink-0 size-12">
<span class="material-symbols-outlined">calendar_today</span>
</div>
<div class="flex flex-col text-left flex-1">
<p class="text-white text-base font-semibold leading-normal">Rango de Fechas</p>
<p class="text-white/50 text-sm font-normal leading-normal">Todo el historial</p>
</div>
<span class="material-symbols-outlined text-white/30">chevron_right</span>
</button>
</div>
</section>
<!-- Advanced Toggle -->
<section class="mt-8 px-4">
<div class="bg-white/5 rounded-xl border border-white/10 p-4 flex items-center justify-between">
<div class="flex flex-col gap-0.5 max-w-[70%]">
<p class="text-white text-base font-bold">Incluir fotografías de los tickets</p>
<p class="text-white/50 text-xs">Añade el respaldo visual de cada gasto al final del reporte.</p>
</div>
<!-- Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-white/20 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</section>
<!-- Preview Section -->
<section class="mt-8 px-4">
<h3 class="text-white/60 text-xs font-bold uppercase tracking-widest mb-3 px-1 text-center">Vista previa del Informe</h3>
<div class="relative bg-white/5 rounded-2xl border border-white/10 p-4 overflow-hidden">
<!-- PDF Page Mockup -->
<div class="bg-white rounded shadow-2xl flex min-h-[220px] overflow-hidden">
<!-- Left Column: Data -->
<div class="w-1/2 p-3 border-r border-slate-100 flex flex-col gap-2">
<div class="h-3 w-16 bg-slate-200 rounded"></div>
<div class="space-y-1.5 mt-2">
<div class="flex justify-between">
<div class="h-2 w-12 bg-slate-100 rounded"></div>
<div class="h-2 w-6 bg-slate-100 rounded"></div>
</div>
<div class="flex justify-between">
<div class="h-2 w-10 bg-slate-100 rounded"></div>
<div class="h-2 w-8 bg-slate-100 rounded"></div>
</div>
<div class="h-px w-full bg-slate-50 my-1"></div>
<div class="flex justify-between">
<div class="h-2 w-14 bg-slate-200 rounded"></div>
<div class="h-2 w-8 bg-primary/20 rounded"></div>
</div>
</div>
<div class="mt-auto">
<div class="h-1.5 w-full bg-slate-100 rounded-full"></div>
<div class="h-1.5 w-2/3 bg-slate-100 rounded-full mt-1"></div>
</div>
</div>
<!-- Right Column: Ticket Image -->
<div class="w-1/2 relative bg-slate-50 flex items-center justify-center p-2">
<div class="w-full h-full rounded border-2 border-dashed border-slate-200 flex flex-col items-center justify-center overflow-hidden relative">
<img alt="Preview receipt image" class="absolute inset-0 w-full h-full object-cover opacity-60 grayscale" data-alt="Black and white receipt document preview" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUp_7NvRbE6U9kpPjoQ-G2ezwNeOIrbb4wxV49qhxuiKVO8KZyLqMcy2o3ea0vUC5_iMszfUJ6X2HN2si43FPZmQf5nOSsmODntrwfwGGYuSY9duxABFbf98gjLIM6eGny-lSn4PJE78DZ5fb73hjWwzpl-QFNjyFCIYi_LZ0l_H087kngUqD-LJry-O9DeuuEUXRGd2fvAorBCpqJ6MOALEkzNDPN-h_rYa2Ef7LUsTh7sJ6DbbCEBZnxEnskeBLlMB7biDB0gETJ"/>
<span class="material-symbols-outlined text-slate-300 relative z-10 text-4xl">image</span>
</div>
</div>
</div>
<!-- Overlay Gradient to show it's a preview -->
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 via-transparent to-transparent pointer-events-none"></div>
<div class="absolute bottom-4 left-0 right-0 text-center">
<span class="text-[10px] font-bold text-white/40 bg-white/10 px-2 py-1 rounded-full uppercase tracking-tighter">Ejemplo de página con comprobante</span>
</div>
</div>
</section>
</main>
<!-- Bottom Action Button -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-dark via-background-dark to-transparent">
<button class="cta-gradient w-full h-16 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-primary/10 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-white">send</span>
<span class="text-white text-base font-extrabold tracking-tight">GENERAR Y ENVIAR INFORME</span>
</button>
<p class="text-center text-white/30 text-[10px] mt-4 font-medium">Se enviará una copia a admin@splitgasto.com</p>
</div>
</body></html>
