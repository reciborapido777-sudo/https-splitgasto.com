<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nuevo Tema Desbloqueado - SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#000000", // AMOLED Black
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .amoled-gradient {
            background: radial-gradient(circle at top right, rgba(127, 19, 236, 0.4) 0%, rgba(0, 0, 0, 1) 70%);
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(127, 19, 236, 0.5);
        }
        .particle-overlay {
            background-image: radial-gradient(circle, #ffffff 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen flex items-center justify-center p-4">
<!-- Notification Container -->
<div class="relative w-full max-w-[400px] overflow-hidden rounded-xl border border-white/10 amoled-gradient shadow-2xl">
<!-- Festive Particles Overlay -->
<div class="absolute inset-0 particle-overlay pointer-events-none"></div>
<!-- Top Navigation Area (Mock) -->
<div class="flex items-center justify-between p-4 relative z-10">
<div class="flex items-center gap-2 bg-primary/20 px-3 py-1 rounded-full border border-primary/30">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1">stars</span>
<span class="text-xs font-bold uppercase tracking-wider text-primary">Nivel 3</span>
</div>
<button class="text-white/40 hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Main Content -->
<div class="px-6 pt-4 pb-8 flex flex-col items-center text-center relative z-10">
<!-- Hero Image / Visual Representation -->
<div class="relative mb-6">
<!-- Preview Circle -->
<div class="w-32 h-32 rounded-full border-4 border-primary p-1 bg-black overflow-hidden flex items-center justify-center shadow-[0_0_30px_rgba(127,19,236,0.4)]">
<div class="w-full h-full rounded-full bg-cover bg-center flex flex-col items-center justify-center" data-alt="Close up of a purple UI interface with buttons" style="background-image: linear-gradient(135deg, #7f13ec 0%, #191022 100%);">
<div class="bg-white/20 w-16 h-4 rounded-full mb-2"></div>
<div class="bg-primary w-20 h-6 rounded-full shadow-lg border border-white/20"></div>
</div>
</div>
<!-- Sparkle Icons -->
<span class="material-symbols-outlined absolute -top-2 -right-2 text-primary animate-pulse" style="font-size: 32px;">auto_awesome</span>
<span class="material-symbols-outlined absolute -bottom-4 -left-2 text-primary/60" style="font-size: 24px;">flare</span>
</div>
<!-- Header -->
<h1 class="text-2xl md:text-3xl font-extrabold tracking-tight leading-tight mb-3">
                ¡NUEVO TEMA <br/><span class="text-primary">DESBLOQUEADO!</span>
</h1>
<!-- Subtext -->
<p class="text-white/70 text-base font-normal leading-relaxed mb-8 px-2">
                Has alcanzado el <span class="text-white font-semibold">Nivel 3</span>. Ya puedes usar el estilo <span class="text-primary font-bold italic">Estratega</span> en toda la app.
            </p>
<!-- Preview Card (Mock UI Snippet) -->
<div class="w-full bg-white/5 border border-white/10 rounded-lg p-4 mb-8 flex items-center gap-4">
<div class="flex-1 text-left">
<div class="h-2 w-24 bg-white/20 rounded mb-2"></div>
<div class="h-2 w-16 bg-white/10 rounded"></div>
</div>
<div class="bg-primary px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest glow-button">
                    Preview
                </div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-full transition-all glow-button flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">palette</span>
                    APLICAR AHORA
                </button>
<button class="w-full bg-transparent hover:bg-white/5 text-white/50 font-medium py-3 rounded-full transition-all">
                    Más tarde
                </button>
</div>
</div>
<!-- Background Accent Glows -->
<div class="absolute -bottom-20 -left-20 w-40 h-40 bg-primary/20 blur-[80px] rounded-full"></div>
<div class="absolute -top-20 -right-20 w-40 h-40 bg-primary/10 blur-[60px] rounded-full"></div>
</div>
</body></html>
