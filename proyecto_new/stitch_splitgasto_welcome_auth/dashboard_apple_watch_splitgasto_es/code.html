<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard Apple Watch SplitGasto ES</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f20db9",
                        "background-light": "#000000",
                        "background-dark": "#000000",
                        "turquoise": "#00f5d4",
                        "neon-orange": "#ff5f1f",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #000000;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .amoled-black {
            background-color: #000000;
        }
        .glow-s {
            background: linear-gradient(135deg, #f20db9 0%, #ff5f1f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(242, 13, 185, 0.4));
        }
        .watch-container {
            width: 320px;
            height: 390px;
            margin: auto;
            position: relative;
            overflow: hidden;
            border: 4px solid #1a1a1a;
            border-radius: 4.5rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display flex items-center justify-center min-h-screen">
<!-- Apple Watch Simulation Frame -->
<div class="watch-container amoled-black flex flex-col items-center justify-between p-4 py-8">
<!-- TopAppBar (Simulated Watch Header) -->
<div class="w-full flex justify-between items-center px-4 pt-2">
<span class="text-white text-xs font-bold">10:09</span>
<div class="flex gap-1">
<span class="material-symbols-outlined text-turquoise text-[14px]">wifi</span>
<span class="material-symbols-outlined text-primary text-[14px]">battery_full</span>
</div>
</div>
<!-- Central Logo S -->
<div class="flex flex-col items-center justify-center mt-2">
<h1 class="text-4xl font-extrabold glow-s tracking-tighter">S</h1>
</div>
<!-- Stats: Balance Rápido -->
<div class="w-full flex flex-col gap-1 items-center justify-center">
<div class="flex flex-col items-center">
<span class="text-[10px] uppercase tracking-[0.1em] text-turquoise/80 font-bold">Te deben</span>
<span class="text-turquoise text-2xl font-extrabold leading-tight tracking-tight">+150,00€</span>
</div>
<!-- Minimal Spacer -->
<div class="h-[1px] w-12 bg-white/10 my-1"></div>
<div class="flex flex-col items-center">
<span class="text-neon-orange text-2xl font-extrabold leading-tight tracking-tight">-45,20€</span>
<span class="text-[10px] uppercase tracking-[0.1em] text-neon-orange/80 font-bold">Debes</span>
</div>
</div>
<!-- ActionsBar: Quick Buttons -->
<div class="w-full px-2 mb-2">
<div class="flex justify-between items-end gap-2">
<!-- Ruleta Rápida -->
<button class="flex flex-col items-center gap-1 group">
<div class="rounded-full bg-[#1a1a1a] p-3 border border-white/5 active:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-white text-[24px]">casino</span>
</div>
<span class="text-white text-[9px] font-medium opacity-70">Ruleta</span>
</button>
<!-- Pagar NFC -->
<button class="flex flex-col items-center gap-1 group">
<div class="rounded-full bg-primary p-4 shadow-[0_0_15px_rgba(242,13,185,0.4)] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white text-[28px]">contactless</span>
</div>
<span class="text-white text-[9px] font-bold">NFC</span>
</button>
<!-- Dictar Gasto -->
<button class="flex flex-col items-center gap-1 group">
<div class="rounded-full bg-[#1a1a1a] p-3 border border-white/5 active:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-white text-[24px]">mic</span>
</div>
<span class="text-white text-[9px] font-medium opacity-70">Dictar</span>
</button>
</div>
</div>
<!-- Bottom Navigation Pill (Watch UI handle) -->
<div class="w-12 h-1 bg-white/20 rounded-full mb-1"></div>
</div>
<!-- Background Decorative Elements (Desktop Preview) -->
<div class="fixed inset-0 -z-10 bg-gradient-to-tr from-[#1a1018] to-black"></div>
<!-- Hidden Image References for UI consistency -->
<div class="hidden">
<div class="bg-primary" data-alt="Abstract purple and orange gradient burst on black background"></div>
<div class="bg-neon-orange" data-alt="Futuristic neon icons for mobile payment"></div>
</div>
</body></html>
