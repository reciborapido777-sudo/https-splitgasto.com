<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#25f4f4",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // AMOLED Black
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .amoled-card {
            background-color: #121212;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white flex items-center justify-center min-h-screen p-4">
<!-- Apple Watch Screen Container -->
<div class="relative w-full max-w-[320px] aspect-[4/5] bg-background-dark rounded-[40px] border-[8px] border-[#1c1c1c] shadow-2xl overflow-hidden flex flex-col group/design-root">
<!-- TopAppBar / Header Section -->
<div class="flex flex-col items-center pt-6 pb-2 px-4 gap-1">
<div class="flex items-center justify-center gap-1.5">
<div class="bg-primary/20 p-1.5 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'FILL' 1">check_circle</span>
</div>
<h2 class="text-white text-[13px] font-bold tracking-tight uppercase opacity-80">SplitGasto</h2>
</div>
</div>
<!-- HeadlineText / Notification Content -->
<div class="px-4 py-2">
<h2 class="text-white tracking-tight text-[22px] font-bold leading-tight text-center">
                ¡Has recibido 15,00€ de Carlos!
            </h2>
</div>
<!-- Card Section / Contextual Balance -->
<div class="px-4 py-3 flex-grow">
<div class="amoled-card p-4 rounded-xl border border-white/5 flex flex-col items-center gap-2 shadow-lg">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary/80 text-[18px]">group</span>
<p class="text-gray-400 text-[13px] font-medium uppercase tracking-wider">Balance en Cenas</p>
</div>
<div class="flex flex-col items-center">
<span class="text-primary text-[32px] font-bold leading-none tracking-tight">
                        +45,50€
                    </span>
<p class="text-gray-500 text-[11px] mt-1 font-normal">Actualizado ahora mismo</p>
</div>
<!-- Simple Abstract Decoration -->
<div class="w-full h-1 bg-gradient-to-r from-transparent via-primary/30 to-transparent mt-2 rounded-full"></div>
</div>
</div>
<!-- SingleButton / Quick Action -->
<div class="px-4 pb-8">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-[#000000] text-base font-bold leading-normal tracking-[0.015em] hover:opacity-90 active:scale-95 transition-all">
<span class="truncate">👍 ¡Gracias!</span>
</button>
</div>
<!-- Navigation bar simulation (watchOS pill) -->
<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-16 h-1 bg-white/20 rounded-full"></div>
</div>
</body></html>
