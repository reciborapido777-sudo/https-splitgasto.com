<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2b90d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom golden gradient for text and icons */
        .gold-text {
            background: linear-gradient(135deg, #f2b90d 0%, #ffffff 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gold-icon {
            background: linear-gradient(135deg, #f2b90d 0%, #ffffff 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Subtle particles simulation using radial gradients */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(242, 185, 13, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 80% 20%, rgba(242, 185, 13, 0.1) 2px, transparent 2px),
                radial-gradient(circle at 40% 70%, rgba(242, 185, 13, 0.12) 1.5px, transparent 1.5px),
                radial-gradient(circle at 10% 85%, rgba(242, 185, 13, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 90% 90%, rgba(242, 185, 13, 0.1) 2px, transparent 2px),
                radial-gradient(circle at 50% 50%, rgba(242, 185, 13, 0.05) 100px, transparent 200px);
            pointer-events: none;
        }
        .glow {
            filter: drop-shadow(0 0 15px rgba(242, 185, 13, 0.4));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white flex items-center justify-center w-[1920px] h-[1080px] overflow-hidden relative">
<!-- Subtle Golden Particles Background -->
<div class="particles"></div>
<!-- Main Content Container -->
<div class="relative z-10 flex flex-col items-center justify-center w-full max-w-4xl px-12">
<!-- Top App Bar - Stylized for Marketing -->
<div class="mb-16">
<h2 class="text-primary text-2xl font-bold leading-tight tracking-[0.3em] uppercase glow">
                EXPERIENCIA PREMIUM
            </h2>
</div>
<!-- Central Icons (Crown & AI) -->
<div class="flex items-center justify-center gap-24 mb-16">
<!-- Socio Fundador Crown -->
<div class="flex flex-col items-center gap-6">
<div class="relative">
<span class="material-symbols-outlined text-[180px] gold-icon glow" style="font-variation-settings: 'FILL' 1, 'wght' 200;">
                        workspace_premium
                    </span>
</div>
<div class="bg-primary/10 border border-primary/30 px-6 py-2 rounded-full">
<p class="text-primary text-xl font-semibold tracking-widest uppercase">Socio Fundador</p>
</div>
</div>
<!-- AI Brain Icon -->
<div class="flex flex-col items-center gap-6">
<div class="relative">
<span class="material-symbols-outlined text-[180px] gold-icon glow" style="font-variation-settings: 'FILL' 1, 'wght' 200;">
                        psychology
                    </span>
</div>
<div class="bg-primary/10 border border-primary/30 px-6 py-2 rounded-full">
<p class="text-primary text-xl font-semibold tracking-widest uppercase">IA Avanzada</p>
</div>
</div>
</div>
<!-- Headline Text -->
<div class="text-center max-w-3xl">
<h1 class="text-white tracking-tight text-6xl font-bold leading-tight pb-6">
                Socio Fundador &amp; <span class="gold-text">IA Inteligente</span>
</h1>
<!-- Body Text -->
<p class="text-white/70 text-2xl font-normal leading-relaxed max-w-2xl mx-auto">
                Desbloquea el máximo potencial de SplitGasto con lujo, exclusividad y automatización total.
            </p>
</div>
<!-- Stats / Badge Section -->
<div class="flex gap-8 mt-16">
<div class="flex min-w-[240px] flex-col items-center gap-2 rounded-xl p-8 bg-[#493f22]/30 border border-primary/20 backdrop-blur-sm">
<p class="text-primary/80 text-lg font-medium tracking-wider uppercase">Estatus Exclusivo</p>
<p class="text-white tracking-tighter text-4xl font-bold leading-tight">PREMIUM</p>
</div>
<div class="flex min-w-[240px] flex-col items-center gap-2 rounded-xl p-8 bg-[#493f22]/30 border border-primary/20 backdrop-blur-sm">
<p class="text-primary/80 text-lg font-medium tracking-wider uppercase">Acceso</p>
<p class="text-white tracking-tighter text-4xl font-bold leading-tight">ILIMITADO</p>
</div>
</div>
</div>
<!-- Decorative Gradient Corner -->
<div class="absolute bottom-0 right-0 w-[600px] h-[600px] bg-gradient-to-tl from-primary/10 to-transparent rounded-full blur-[120px] -mr-48 -mb-48"></div>
<div class="absolute top-0 left-0 w-[600px] h-[600px] bg-gradient-to-br from-primary/5 to-transparent rounded-full blur-[120px] -ml-48 -mt-48"></div>
<!-- Visual Image Grid Overlay (Abstract representation of premium UI elements) -->
<div class="absolute inset-0 pointer-events-none opacity-20 flex justify-between px-20 items-center">
<div class="w-64 h-96 bg-primary/20 rounded-xl rotate-[-12deg] border border-primary/40 backdrop-blur-md" data-alt="Abstract premium interface card floating"></div>
<div class="w-64 h-96 bg-primary/20 rounded-xl rotate-[12deg] border border-primary/40 backdrop-blur-md" data-alt="Abstract smart stats interface floating"></div>
</div>
</body></html>
