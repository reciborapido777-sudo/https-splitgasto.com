<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13c8ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // Adjusted for AMOLED effect
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gold-shimmer {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }
        .card-metallic {
            background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%);
            border: 1px solid rgba(191, 149, 63, 0.4);
            box-shadow: 0 0 30px rgba(19, 200, 236, 0.15);
        }
        .particle-overlay {
            background-image: radial-gradient(circle at center, rgba(191, 149, 63, 0.15) 0%, transparent 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<!-- TopAppBar -->
<div class="flex items-center p-4 pb-2 justify-end z-20">
<div class="flex w-12 items-center justify-end">
<button class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 bg-white/10 backdrop-blur-md text-white gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0 w-12 border border-white/10">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
<!-- Success Explosion & Card Section -->
<div class="relative @container flex flex-col items-center justify-center pt-8 pb-4">
<!-- Particle Explosion Background Effect -->
<div class="absolute inset-0 particle-overlay pointer-events-none overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] bg-[radial-gradient(circle,_rgba(191,149,63,0.3)_0%,_transparent_40%)] opacity-40"></div>
<!-- Simulated Particles using Divs -->
<div class="absolute top-1/4 left-1/4 w-1 h-1 bg-yellow-400 rounded-full blur-[1px]"></div>
<div class="absolute top-1/3 right-1/4 w-2 h-2 bg-yellow-200 rounded-full blur-[1px]"></div>
<div class="absolute bottom-1/4 left-1/3 w-1.5 h-1.5 bg-yellow-500 rounded-full blur-[1px]"></div>
<div class="absolute top-2/3 right-1/3 w-1 h-1 bg-white rounded-full blur-[1px]"></div>
<div class="absolute top-1/2 right-10 w-2 h-2 bg-yellow-600 rounded-full blur-[1px]"></div>
</div>
<!-- Virtual Card -->
<div class="relative z-10 px-6 py-8 w-full max-w-[340px]">
<div class="card-metallic rounded-xl aspect-[1.6/1] w-full p-6 flex flex-col justify-between overflow-hidden relative group">
<!-- Card Glow -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 blur-[60px]"></div>
<div class="flex justify-between items-start relative z-10">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest text-primary font-bold">Membresía Elite</span>
<span class="text-lg font-bold text-white tracking-tight">Socio Fundador</span>
</div>
<div class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center border border-white/10">
<span class="material-symbols-outlined text-primary">verified</span>
</div>
</div>
<div class="relative z-10">
<p class="text-[10px] text-white/40 uppercase tracking-tighter mb-1">Nombre del Socio</p>
<p class="text-xl font-semibold tracking-wide gold-shimmer bg-clip-text text-transparent">Alejandro García</p>
</div>
<!-- Card Chip & Decoration -->
<div class="absolute bottom-6 right-6 w-12 h-8 bg-gradient-to-br from-yellow-600/20 to-yellow-200/20 rounded-md border border-yellow-500/30 flex items-center justify-center">
<div class="grid grid-cols-2 gap-1">
<div class="w-3 h-2 bg-yellow-500/40 rounded-sm"></div>
<div class="w-3 h-2 bg-yellow-500/40 rounded-sm"></div>
<div class="w-3 h-2 bg-yellow-500/40 rounded-sm"></div>
<div class="w-3 h-2 bg-yellow-500/40 rounded-sm"></div>
</div>
</div>
</div>
</div>
</div>
<!-- HeadlineText -->
<div class="flex flex-col items-center z-10">
<div class="flex items-center gap-2 mb-2 bg-primary/10 px-4 py-1 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-primary text-sm">check_circle</span>
<span class="text-primary text-xs font-bold uppercase tracking-wider">Pago completado con éxito</span>
</div>
<h1 class="text-white tracking-tight text-[32px] font-bold leading-tight px-6 text-center pb-3 pt-2">
                ¡Bienvenido al Club, Alejandro!
            </h1>
</div>
<!-- BodyText -->
<div class="z-10">
<p class="text-white/70 text-base font-normal leading-relaxed pb-8 pt-1 px-8 text-center max-w-[480px] mx-auto">
                Tu estatus de <span class="text-white font-bold">Socio Fundador</span> ya está activo en tu app. Revisa tu correo para ver tu certificado oficial.
            </p>
</div>
<!-- SingleButton Section -->
<div class="flex flex-col gap-4 px-6 py-6 mt-auto z-10 w-full max-w-[480px] mx-auto">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 flex-1 bg-primary text-[#101f22] text-base font-extrabold leading-normal tracking-[0.02em] shadow-[0_0_20px_rgba(19,200,236,0.3)] active:scale-95 transition-transform">
<span class="truncate">Ir a mi Perfil Fundador</span>
</button>
<button class="flex items-center justify-center h-12 bg-transparent text-white/50 text-sm font-medium hover:text-white transition-colors">
<span class="material-symbols-outlined mr-2 text-lg">share</span>
                Compartir mi logro
            </button>
</div>
<!-- Bottom Spacer for iOS -->
<div class="h-8 bg-background-dark"></div>
</div>
</body></html>
