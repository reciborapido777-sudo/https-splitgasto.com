<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-button {
            background: rgba(13, 242, 242, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(13, 242, 242, 0.3);
            box-shadow: 0 0 20px rgba(13, 242, 242, 0.2);
        }
        .neon-text {
            text-shadow: 0 0 8px rgba(13, 242, 242, 0.8);
        }
        .roulette-3d-container {
            perspective: 1200px;
        }
        .roulette-wheel {
            transform: rotateX(45deg) rotateZ(0deg);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .metallic-gradient {
            background: radial-gradient(circle at center, #2a2a2a 0%, #1a1a1a 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-transparent p-6 justify-between z-10">
<div class="text-white flex size-10 shrink-0 items-center justify-center rounded-full bg-white/5 backdrop-blur-md">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</div>
<div class="flex flex-col items-center">
<h2 class="text-white text-lg font-bold leading-tight tracking-tight uppercase tracking-[0.2em]">Ruleta 3D</h2>
<span class="text-primary text-[10px] font-bold tracking-widest opacity-80">SPLITGASTO ES</span>
</div>
<div class="flex size-10 items-center justify-center rounded-full bg-white/5 backdrop-blur-md">
<button class="flex cursor-pointer items-center justify-center text-white">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</div>
<!-- Main Content (Immersive Scene) -->
<div class="flex-1 flex flex-col items-center justify-center relative overflow-hidden">
<!-- Context Text -->
<div class="absolute top-4 w-full text-center z-10">
<p class="text-white/60 text-xs uppercase tracking-widest mb-1">Total a pagar</p>
<h1 class="text-white text-3xl font-bold neon-text tracking-tighter">45,50 €</h1>
</div>
<!-- Virtual Stage Backdrop -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(13,242,242,0.05)_0%,_transparent_70%)] pointer-events-none"></div>
<div class="absolute bottom-0 w-full h-[300px] bg-gradient-to-t from-background-dark to-transparent opacity-80 pointer-events-none"></div>
<!-- 3D Roulette Scene -->
<div class="roulette-3d-container relative flex items-center justify-center w-full max-w-sm aspect-square">
<!-- The Wheel -->
<div class="roulette-wheel w-[340px] h-[340px] rounded-full border-[8px] border-[#1a1a1a] metallic-gradient relative flex items-center justify-center">
<!-- Slices Grid (Visual placeholder for 3D slices) -->
<div class="absolute inset-0 rounded-full overflow-hidden">
<div class="absolute inset-0" style="background: conic-gradient(from 0deg, #111 0deg 60deg, #181818 60deg 120deg, #111 120deg 180deg, #181818 180deg 240deg, #111 240deg 300deg, #181818 300deg 360deg);"></div>
<!-- Participant Names (Neon Labels) -->
<div class="absolute inset-0 flex items-center justify-center">
<!-- Carlos -->
<div class="absolute transform -translate-y-24 rotate-[30deg]">
<span class="text-primary font-bold text-sm tracking-widest neon-text">CARLOS</span>
</div>
<!-- Elena -->
<div class="absolute transform -translate-y-24 rotate-[90deg]">
<span class="text-white/40 font-bold text-sm tracking-widest">ELENA</span>
</div>
<!-- Pablo -->
<div class="absolute transform -translate-y-24 rotate-[150deg]">
<span class="text-white/40 font-bold text-sm tracking-widest">PABLO</span>
</div>
<!-- Maria -->
<div class="absolute transform -translate-y-24 rotate-[210deg]">
<span class="text-white/40 font-bold text-sm tracking-widest">MARÍA</span>
</div>
<!-- Tu -->
<div class="absolute transform -translate-y-24 rotate-[270deg]">
<span class="text-white/40 font-bold text-sm tracking-widest">TÚ</span>
</div>
<!-- Sofia -->
<div class="absolute transform -translate-y-24 rotate-[330deg]">
<span class="text-white/40 font-bold text-sm tracking-widest">SOFÍA</span>
</div>
</div>
</div>
<!-- Central Hub / Axis -->
<div class="relative z-20 w-16 h-16 rounded-full bg-[#102222] border-2 border-primary/20 shadow-[0_0_30px_rgba(255,100,255,0.2)] flex items-center justify-center overflow-hidden">
<!-- Logo Background Glow -->
<div class="absolute inset-0 bg-gradient-to-tr from-[#9333ea] to-[#f97316] opacity-40 animate-pulse"></div>
<span class="relative text-white font-bold text-2xl tracking-tighter">S</span>
</div>
<!-- Indicator / Arrow -->
<div class="absolute -top-4 z-30 flex flex-col items-center">
<div class="w-1 h-8 bg-primary shadow-[0_0_15px_#0df2f2] rounded-full"></div>
<span class="material-symbols-outlined text-primary -mt-2">arrow_drop_down</span>
</div>
</div>
</div>
<!-- Action Area -->
<div class="w-full px-8 pb-12 pt-4 relative z-10">
<div class="flex flex-col items-center gap-6">
<p class="text-white/40 text-sm font-medium">Pulsa para decidir quién paga</p>
<button class="group relative w-full max-w-[280px]">
<!-- Glow Layer -->
<div class="absolute -inset-1 bg-primary rounded-xl opacity-20 blur-xl group-active:opacity-40 transition-opacity"></div>
<!-- Main Button Content -->
<div class="glass-button flex items-center justify-center h-16 rounded-xl relative">
<span class="text-primary text-xl font-bold tracking-[0.3em] uppercase pl-1">Girar</span>
<div class="ml-4 flex h-6 w-6 items-center justify-center rounded-full bg-primary text-background-dark">
<span class="material-symbols-outlined text-sm font-bold">play_arrow</span>
</div>
</div>
</button>
<div class="flex items-center gap-2 text-white/30 text-[10px] tracking-[0.2em] uppercase font-bold">
<span class="material-symbols-outlined text-sm">bolt</span>
<span>Motor de física 3D activo</span>
</div>
</div>
</div>
</div>
<!-- Background Image/Texture Decoration -->
<div class="absolute top-1/4 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-1/4 -left-20 w-64 h-64 bg-[#9333ea]/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Perspective Grid -->
<div class="absolute bottom-0 w-full h-1/3 opacity-10 pointer-events-none" style="background-image: linear-gradient(#0df2f2 1px, transparent 1px), linear-gradient(90deg, #0df2f2 1px, transparent 1px); background-size: 40px 40px; transform: perspective(100px) rotateX(60deg);">
</div>
</div>
</body></html>
