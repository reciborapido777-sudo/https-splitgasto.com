<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecda",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // AMOLED Black
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .confetti-pattern {
            background-image: radial-gradient(circle, #13ecda 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
        }
        .gold-glow {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            border: 2px solid #d4af37;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden">
<div class="relative flex min-h-screen w-full flex-col max-w-[430px] mx-auto overflow-hidden shadow-2xl">
<!-- Background Decorations (Confetti Effect) -->
<div class="absolute inset-0 confetti-pattern pointer-events-none"></div>
<div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Top App Bar -->
<div class="relative z-10 flex items-center p-6 pb-2 justify-between">
<div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-white/5 backdrop-blur-md">
<span class="material-symbols-outlined text-white text-[24px]">close</span>
</div>
<h2 class="text-white text-sm font-bold uppercase tracking-widest flex-1 text-center pr-10">Éxito</h2>
</div>
<!-- Main Content Scrollable Area -->
<div class="flex-1 overflow-y-auto px-6 pt-8 pb-32 flex flex-col items-center">
<!-- Headline Section -->
<div class="text-center mb-8">
<h1 class="text-white text-[40px] font-extrabold leading-tight mb-2">¡Felicidades!</h1>
<p class="text-white/70 text-base font-medium leading-relaxed max-w-[280px] mx-auto">
                    Tus recompensas ya están disponibles en tu perfil.
                </p>
</div>
<!-- Socio Fundador Card -->
<div class="w-full mb-10 group relative">
<div class="absolute -inset-0.5 bg-gradient-to-r from-primary to-blue-500 rounded-xl blur opacity-30"></div>
<div class="relative bg-zinc-900/80 backdrop-blur-xl border border-white/10 rounded-xl overflow-hidden shadow-2xl">
<div class="bg-cover bg-center h-48 flex flex-col justify-between p-6" data-alt="Abstract dark geometric patterns with turquoise highlights" style='background-image: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuA_KW3VuNUOrDwmvgwG4wsXIiP_UDxlFKREr2Ro10bgF82hXeKDgoyhoQiXF1mBQ811A38Ta4mGoMB-eHNfB48iC8kKmNv9f2Eh6BTpVO_4-YhF6FVkjssD87x__9sZsUDZcI2z-LN-c6TKUsaX0BLKc6xxzXlra22h32OvXsxYY2YKpoR78d4q9qFaOgs6OFasJpjvkNUQO9JpwO3xJxdBHnLxk8Qc-4pjZL2xYNq0fhUixV6YwXKugpSWHujRdnqQX-7RX5zWQvfy");'>
<div class="flex justify-between items-start">
<div class="bg-white/20 backdrop-blur-md px-3 py-1 rounded-full border border-white/20">
<span class="text-[10px] font-bold tracking-[0.2em] text-white">VIP MEMBER</span>
</div>
<span class="material-symbols-outlined text-primary">contactless</span>
</div>
<div class="flex flex-col gap-1">
<p class="text-primary text-[10px] font-bold uppercase tracking-[0.2em]">Nivel Actualizado</p>
<p class="text-white text-2xl font-extrabold tracking-tight">Socio Fundador</p>
<div class="flex items-center gap-2">
<span class="text-white/90 text-lg font-medium">2,500 pts</span>
<span class="text-primary text-xs font-bold">+500 bonus</span>
</div>
</div>
</div>
</div>
</div>
<!-- Reward Unlock Section -->
<div class="flex flex-col items-center gap-4 mb-8">
<p class="text-primary text-[10px] font-extrabold tracking-[0.2em] uppercase">Recompensa Desbloqueada</p>
<div class="relative">
<!-- Glow effect -->
<div class="absolute inset-0 bg-yellow-500/20 blur-2xl rounded-full"></div>
<!-- Icon Container -->
<div class="gold-glow size-24 rounded-full flex items-center justify-center bg-zinc-900 relative z-10 overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-yellow-600/20 to-transparent"></div>
<span class="material-symbols-outlined text-4xl text-[#d4af37]" style="font-variation-settings: 'FILL' 1;">groups</span>
</div>
<!-- Badge -->
<div class="absolute -bottom-2 -right-2 bg-primary text-black font-bold text-[10px] px-2 py-1 rounded-lg z-20 shadow-lg">
                        NUEVO
                    </div>
</div>
<p class="text-white font-bold text-center">Nuevo icono de grupo<br/><span class="text-white/50 font-normal">"Élite Splitter"</span></p>
</div>
</div>
<!-- Action Buttons (Sticky Bottom) -->
<div class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto p-6 bg-gradient-to-t from-black via-black/90 to-transparent pt-10">
<div class="flex flex-col gap-3">
<button class="w-full bg-primary text-black font-bold py-4 rounded-full text-base active:scale-[0.98] transition-all">
                    Ir a mi Perfil
                </button>
<button class="w-full bg-white/5 text-primary border border-primary/30 font-bold py-4 rounded-full text-base flex items-center justify-center gap-2 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-[20px]">ios_share</span>
                    Compartir mi Logro
                </button>
</div>
<!-- Home Indicator Space -->
<div class="h-4"></div>
</div>
</div>
</body></html>
