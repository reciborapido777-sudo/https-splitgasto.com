<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitGasto - Resumen de Deudas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --primary: #00E5FF;
            --secondary: #FF8A00;
            --background: #000000;
        }
        @layer components {
            .glass-card {
                @apply bg-white/[0.03] backdrop-blur-xl border border-white/10;
            }
            .neon-shadow-cyan {
                box-shadow: 0 0 30px rgba(0, 229, 255, 0.2), inset 0 0 10px rgba(0, 229, 255, 0.1);
            }
            .neon-shadow-orange {
                box-shadow: 0 0 30px rgba(255, 138, 0, 0.2), inset 0 0 10px rgba(255, 138, 0, 0.1);
            }
            .floating-3d-left {
                transform: perspective(1200px) rotateY(15deg) rotateX(5deg) translateZ(20px);
            }
            .floating-3d-right {
                transform: perspective(1200px) rotateY(-15deg) rotateX(5deg) translateZ(40px);
            }
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            }
        }
    </style>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00E5FF",
                        secondary: "#FF8A00",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1.5rem",
                    }
                },
            },
        };
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white min-h-screen flex items-center justify-center overflow-hidden">
<div class="relative w-full max-w-[430px] h-full min-h-screen aspect-[9/19.5] flex flex-col items-center justify-between p-8 overflow-hidden bg-black">
<div class="absolute top-[-5%] left-[-10%] w-[80%] h-[40%] bg-primary/10 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[10%] right-[-10%] w-[80%] h-[40%] bg-secondary/10 blur-[100px] rounded-full"></div>
<header class="w-full text-center z-10 pt-16">
<h1 class="text-4xl font-extrabold tracking-tight leading-tight text-white mb-2">
                Cuentas claras <br/>
<span class="text-primary">al instante</span>
</h1>
<div class="w-12 h-1 bg-gradient-to-r from-primary to-secondary mx-auto rounded-full"></div>
</header>
<div class="relative w-full flex flex-col items-center justify-center gap-6 z-10 py-12">
<div class="glass-card w-full p-8 rounded-[2.5rem] floating-3d-right neon-shadow-cyan border-primary/30 relative">
<div class="flex items-center gap-4 mb-4">
<div class="w-12 h-12 rounded-2xl bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">account_balance_wallet</span>
</div>
<span class="text-primary/80 font-bold uppercase tracking-widest text-xs">Balance a favor</span>
</div>
<div class="space-y-1">
<p class="text-slate-400 text-lg font-medium">Te deben</p>
<p class="text-5xl font-black text-white tracking-tighter">45,00<span class="text-primary ml-1">€</span></p>
</div>
<div class="absolute -top-3 -right-3 bg-primary text-black text-xs font-black px-3 py-1 rounded-full">
                    +3 PAGOS
                </div>
</div>
<div class="flex flex-col items-center gap-2 opacity-40">
<span class="material-symbols-outlined text-white text-3xl">expand_more</span>
</div>
<div class="glass-card w-full p-8 rounded-[2.5rem] floating-3d-left neon-shadow-orange border-secondary/30 relative">
<div class="flex items-center gap-4 mb-4">
<div class="w-12 h-12 rounded-2xl bg-secondary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-3xl">payments</span>
</div>
<span class="text-secondary/80 font-bold uppercase tracking-widest text-xs">Saldo pendiente</span>
</div>
<div class="space-y-1">
<p class="text-slate-400 text-lg font-medium">Debes</p>
<p class="text-5xl font-black text-white tracking-tighter">12,00<span class="text-secondary ml-1">€</span></p>
</div>
</div>
</div>
<footer class="w-full flex flex-col items-center gap-8 z-10 pb-12">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-gradient-to-tr from-primary to-accent rounded-xl flex items-center justify-center font-black text-black text-xl">S</div>
<div class="text-xl font-bold tracking-tight text-white/90">SplitGasto<span class="text-[10px] align-top">®</span></div>
</div>
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-white/20"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
<div class="w-6 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
</div>
</footer>
<div class="absolute bottom-2 w-32 h-1 bg-white/20 rounded-full left-1/2 -translate-x-1/2"></div>
</div>

</body></html>
