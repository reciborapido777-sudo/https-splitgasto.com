<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Resumen Deudas Marketing SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // Forced AMOLED black for marketing
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #000000;
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(13, 242, 223, 0.3);
            border: 1px solid rgba(13, 242, 223, 0.5);
        }
        .neon-text {
            text-shadow: 0 0 8px rgba(13, 242, 223, 0.6);
        }
        .marketing-container {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white">
<!-- Main Marketing Container 1920x1080 -->
<div class="marketing-container mx-auto">
<!-- TopAppBar Style Header (Centered) -->
<div class="absolute top-20 w-full flex flex-col items-center">
<h2 class="text-primary text-2xl font-bold tracking-[0.2em] uppercase neon-text mb-4">SplitGasto</h2>
<h1 class="text-white text-7xl font-bold leading-tight tracking-tight px-4 text-center">CUENTAS CLARAS</h1>
</div>
<!-- Central Content Area (Safe Zone) -->
<div class="flex flex-col gap-12 w-full max-w-4xl items-center px-20">
<!-- Headline Text Subtitle -->
<div class="text-center mb-4">
<p class="text-gray-400 text-3xl font-medium">Resumen de Deudas</p>
</div>
<!-- Stats Components (Large & Centered) -->
<div class="flex flex-row gap-8 w-full">
<!-- Te Deben Card -->
<div class="flex-1 flex flex-col gap-6 rounded-xl p-10 bg-[#102221] neon-border transition-transform hover:scale-105">
<div class="flex items-center justify-between">
<p class="text-primary text-2xl font-semibold leading-normal">Te deben</p>
<span class="material-symbols-outlined text-primary text-4xl">account_balance_wallet</span>
</div>
<p class="text-white tracking-tight text-7xl font-bold leading-tight">$1.250</p>
<div class="flex items-center gap-2 text-primary/80">
<span class="material-symbols-outlined text-sm">trending_up</span>
<p class="text-lg">Pendiente de cobro</p>
</div>
</div>
<!-- Debes Card -->
<div class="flex-1 flex flex-col gap-6 rounded-xl p-10 bg-[#181818] border border-white/10 transition-transform hover:scale-105">
<div class="flex items-center justify-between">
<p class="text-gray-400 text-2xl font-semibold leading-normal">Debes</p>
<span class="material-symbols-outlined text-gray-400 text-4xl">payments</span>
</div>
<p class="text-white tracking-tight text-7xl font-bold leading-tight">$450</p>
<div class="flex items-center gap-2 text-gray-500">
<span class="material-symbols-outlined text-sm">schedule</span>
<p class="text-lg">Por pagar</p>
</div>
</div>
</div>
<!-- Detailed Cards Section (Minimalist Layout) -->
<div class="grid grid-cols-2 gap-8 w-full mt-4">
<!-- Mini Card 1 -->
<div class="flex items-center justify-between gap-6 rounded-lg bg-[#102221]/50 p-6 border border-white/5">
<div class="flex flex-col gap-1">
<p class="text-primary text-sm font-medium uppercase tracking-wider">Último ingreso</p>
<p class="text-white text-2xl font-bold leading-tight">Cena Grupo</p>
<p class="text-primary/60 text-lg font-normal">+$150.00</p>
</div>
<div class="size-20 bg-primary/20 rounded-lg flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary text-3xl">restaurant</span>
</div>
</div>
<!-- Mini Card 2 -->
<div class="flex items-center justify-between gap-6 rounded-lg bg-[#102221]/50 p-6 border border-white/5">
<div class="flex flex-col gap-1">
<p class="text-gray-500 text-sm font-medium uppercase tracking-wider">Pendiente</p>
<p class="text-white text-2xl font-bold leading-tight">Viaje Playa</p>
<p class="text-gray-400 text-lg font-normal">-$85.00</p>
</div>
<div class="size-20 bg-white/5 rounded-lg flex items-center justify-center border border-white/10">
<span class="material-symbols-outlined text-white/40 text-3xl">flight</span>
</div>
</div>
</div>
</div>
<!-- Footer Decoration (Floating effect) -->
<div class="absolute bottom-20 w-full text-center">
<p class="text-primary/40 text-xl font-light tracking-[0.5em] uppercase">Simplicidad en cada gasto</p>
<div class="mt-8 flex justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-white/20"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
<div class="w-8 h-2 rounded-full bg-primary shadow-[0_0_10px_#0df2df]"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
<div class="w-2 h-2 rounded-full bg-white/20"></div>
</div>
</div>
<!-- Background subtle glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] -z-10"></div>
</div>
</body></html>
