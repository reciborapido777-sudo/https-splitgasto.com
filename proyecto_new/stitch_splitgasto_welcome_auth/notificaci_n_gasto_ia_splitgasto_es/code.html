<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // True AMOLED black
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(24, 52, 52, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(13, 242, 242, 0.15);
        }
        .neon-glow {
            text-shadow: 0 0 10px rgba(13, 242, 242, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white antialiased">
<!-- iOS Lock Screen Container -->
<div class="relative flex min-h-screen w-full flex-col justify-between overflow-hidden">
<!-- Header: Time and Status -->
<div class="flex flex-col items-center pt-16">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-white/60 text-sm">lock</span>
</div>
<h1 class="text-7xl font-light tracking-tight text-white/90">21:42</h1>
<h2 class="text-xl font-medium text-white/80 mt-1">Lunes, 14 de julio</h2>
</div>
<!-- Notification Area -->
<div class="flex flex-col gap-4 px-4 py-8 flex-1 justify-start mt-8">
<!-- Push Notification Card -->
<div class="glass-card flex flex-col gap-4 rounded-3xl p-5 shadow-2xl">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="flex h-6 w-6 items-center justify-center rounded-lg bg-primary/20 p-1">
<span class="material-symbols-outlined text-primary text-xs" style="font-variation-settings: 'FILL' 1">account_balance_wallet</span>
</div>
<span class="text-xs font-semibold uppercase tracking-widest text-white/50">SplitGasto</span>
</div>
<span class="text-xs text-white/40">ahora</span>
</div>
<div class="flex gap-4">
<div class="flex flex-col gap-2 flex-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary neon-glow" data-icon="auto_awesome">auto_awesome</span>
<h3 class="text-lg font-bold leading-tight text-white">¡Magia de IA!</h3>
</div>
<p class="text-sm leading-relaxed text-white/80">
                            Hemos detectado un ticket de <span class="text-primary font-bold">45,50€</span> en <span class="font-semibold text-white">Restaurante La Paz</span>. Entra para confirmar el desglose y dividir la cuenta.
                        </p>
</div>
<div class="h-20 w-20 shrink-0 overflow-hidden rounded-2xl border border-white/10">
<div class="h-full w-full bg-cover bg-center" data-alt="Gasto de comida en un restaurante moderno" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBwxns165NUxk8zPoQsh3-J2kp7eOGByb91SOFCst08bKh-ATjilRus7X6N6YPf-nXYc773U4XqbAKhMVQMfRBqSyhACBckSaVIuCNYsR-XBfnlbOnKSzhIo1rzCVbYr5tWAlSnEFP-5K8VcllEcBxcdKCmV8l-bm-41yoQCRC5mZNL02nKwtfTbp-etl1nthbnAWEBUVLGoYN4MzakZi-usWtqpsRAjoxQ72tYaqcODh7IvodGCc7uURm5bXTyHGC_qLNqumzGfgg4");'>
</div>
</div>
</div>
<!-- Action Button -->
<button class="flex w-full items-center justify-center gap-2 rounded-xl bg-primary py-3 text-sm font-bold uppercase tracking-wider text-black">
<span class="material-symbols-outlined text-lg">bolt</span>
                    REVISAR AHORA
                </button>
</div>
<!-- Optional secondary stacked notification hint -->
<div class="mx-2 -mt-2 h-2 rounded-2xl bg-white/5 backdrop-blur-md border border-white/5"></div>
</div>
<!-- Footer: iOS Controls -->
<div class="flex flex-col items-center gap-8 pb-10">
<div class="flex w-full items-center justify-between px-10">
<div class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 backdrop-blur-xl">
<span class="material-symbols-outlined text-white">flashlight_on</span>
</div>
<div class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 backdrop-blur-xl">
<span class="material-symbols-outlined text-white">photo_camera</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<div class="h-1.5 w-32 rounded-full bg-white/30"></div>
<p class="text-xs font-medium tracking-wide text-white/40 uppercase">Desliza hacia arriba para abrir</p>
</div>
</div>
</div>
</body></html>
