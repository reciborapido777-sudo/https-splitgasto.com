<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c025",
                        "background-light": "#f8f8f5",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glow-cyan {
            box-shadow: 0 0 60px 10px rgba(0, 206, 209, 0.25);
        }
        .medal-shimmer {
            background: linear-gradient(135deg, #f4c025 0%, #ffffff 50%, #f4c025 100%);
            background-size: 200% 200%;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #f4c025;
            border-radius: 50%;
            opacity: 0.6;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden">
<div class="relative flex h-screen w-full flex-col items-center justify-end overflow-hidden">
<!-- Ambient Background Effects -->
<div class="absolute inset-0 z-0">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-cyan-500/10 rounded-full blur-[100px]"></div>
<div class="absolute top-1/3 left-1/4 w-40 h-40 bg-primary/10 rounded-full blur-[80px]"></div>
<!-- Static Particles Representation -->
<div class="particle top-[20%] left-[15%]"></div>
<div class="particle top-[40%] right-[10%]"></div>
<div class="particle top-[70%] left-[25%]"></div>
<div class="particle top-[15%] right-[30%] w-2 h-2"></div>
<div class="particle bottom-[30%] right-[20%] w-3 h-3"></div>
</div>
<!-- Bottom Sheet Container (Modal-like) -->
<div class="relative z-10 w-full max-w-md flex flex-col items-center px-6 pb-12 pt-4">
<!-- BottomSheetHandle Style Element -->
<div class="w-full flex justify-center mb-8">
<div class="h-1.5 w-12 rounded-full bg-white/20"></div>
</div>
<!-- Medal Visual Area -->
<div class="relative mb-10 group">
<!-- Outer Glow -->
<div class="absolute inset-0 bg-primary/20 blur-[50px] rounded-full"></div>
<!-- The Medal -->
<div class="relative w-48 h-48 rounded-full border-4 border-primary/50 flex items-center justify-center p-2 bg-gradient-to-br from-primary/30 to-black overflow-hidden shadow-[0_0_40px_rgba(244,192,37,0.4)]">
<div class="w-full h-full rounded-full bg-gradient-to-b from-primary to-[#b38a00] flex flex-col items-center justify-center shadow-inner">
<span class="text-black font-black text-6xl tracking-tighter mb-[-8px]">S</span>
<span class="material-symbols-outlined text-black text-3xl" style="font-variation-settings: 'FILL' 1">mic</span>
</div>
<!-- Cyan Backlight Detail -->
<div class="absolute -bottom-4 w-full h-1/2 bg-cyan-400/20 blur-xl"></div>
</div>
<!-- Floating Icons/Particles -->
<div class="absolute -top-4 -right-2 bg-primary p-2 rounded-full text-black shadow-lg">
<span class="material-symbols-outlined text-xl font-bold">star</span>
</div>
</div>
<!-- Text Content (Headline, Title, Body) -->
<div class="text-center w-full space-y-2">
<h2 class="text-primary font-bold uppercase tracking-[0.2em] text-xs">Logro Desbloqueado</h2>
<h1 class="text-white text-4xl font-bold leading-tight tracking-tight">Voz de Fundador</h1>
<p class="text-white/70 text-lg font-normal leading-relaxed pt-4 max-w-[280px] mx-auto">
                    ¡Gracias por tu feedback! Has ganado este logro por ayudarnos a decidir el futuro de <span class="text-primary font-semibold">SplitGasto</span>.
                </p>
</div>
<!-- CTA Section -->
<div class="w-full pt-12 flex flex-col gap-4">
<button class="w-full bg-primary hover:bg-primary/90 text-black font-bold py-5 rounded-full text-lg shadow-[0_10px_20px_rgba(244,192,37,0.3)] transition-all active:scale-95">
                    Ver mi Medalla
                </button>
<button class="w-full bg-white/5 hover:bg-white/10 text-white/60 font-medium py-3 rounded-full text-sm transition-all">
                    Cerrar
                </button>
</div>
</div>
<!-- HeaderImage Decor (Abstract representation) -->
<div class="absolute top-0 left-0 w-full h-40 bg-gradient-to-b from-primary/10 to-transparent pointer-events-none"></div>
</div>
</body></html>
