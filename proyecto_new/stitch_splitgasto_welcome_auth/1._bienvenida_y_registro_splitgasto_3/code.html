<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0fbdab",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102220",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .bg-mesh {
            background: radial-gradient(circle at 50% 0%, rgba(15, 189, 171, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(15, 189, 171, 0.1) 0%, transparent 40%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white min-h-screen font-display">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden bg-mesh">
<!-- TopAppBar -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-white flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">close</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">SplitGasto</h2>
</div>
<div class="flex-1 flex flex-col justify-center max-w-[480px] mx-auto w-full">
<!-- Header Image / Logo Section -->
<div class="@container px-4 py-6">
<div class="relative w-full aspect-square max-h-64 mx-auto flex items-center justify-center">
<!-- Abstract Modern Graphic for Connection -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-3xl"></div>
<div class="z-10 bg-gradient-to-br from-primary to-[#087a6e] p-8 rounded-full shadow-2xl shadow-primary/20">
<span class="material-symbols-outlined text-[80px] text-[#102220]" style="font-variation-settings: 'FILL' 1">payments</span>
</div>
</div>
</div>
<!-- HeadlineText -->
<div class="px-4">
<h1 class="text-white tracking-tight text-[32px] font-extrabold leading-tight text-center pb-2 pt-4">
                    Divide gastos, multiplica momentos
                </h1>
<!-- BodyText -->
<p class="text-gray-400 text-base font-normal leading-relaxed pb-8 pt-1 text-center max-w-sm mx-auto">
                    La forma más fácil y moderna de compartir gastos con amigos, pareja y familiares sin complicaciones.
                </p>
</div>
<!-- ButtonGroup -->
<div class="flex justify-center">
<div class="flex flex-1 gap-4 flex-col items-stretch px-6 py-3">
<!-- Social Login Buttons -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center gap-3 overflow-hidden rounded-full h-14 px-5 bg-white/5 border border-white/10 text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">brand_family</span>
<span class="truncate">Continuar con Google</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center gap-3 overflow-hidden rounded-full h-14 px-5 bg-white/5 border border-white/10 text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">ios</span>
<span class="truncate">Continuar con Apple</span>
</button>
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-white/10"></div>
<span class="text-xs text-gray-500 uppercase font-bold tracking-widest">o</span>
<div class="h-[1px] flex-1 bg-white/10"></div>
</div>
<!-- Primary Action -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 px-5 bg-primary text-background-dark text-base font-bold leading-normal tracking-[0.015em] shadow-lg shadow-primary/20 active:scale-95 transition-transform">
<span class="truncate">Registrarse con correo</span>
</button>
</div>
</div>
<!-- Secondary Action / Footer -->
<div class="pb-10 pt-4 text-center">
<p class="text-gray-400 text-sm">
                    ¿Ya tienes una cuenta? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Inicia sesión</a>
</p>
</div>
</div>
<!-- iOS Home Indicator Safe Area spacing -->
<div class="h-8"></div>
</div>
</body></html>
