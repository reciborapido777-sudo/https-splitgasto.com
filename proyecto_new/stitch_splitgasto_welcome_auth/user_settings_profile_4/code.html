<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitGasto - Añadir Gasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecd6",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // AMOLED Black
                        "surface-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white overflow-x-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-dark max-w-[430px] mx-auto shadow-2xl">
<div class="flex items-center p-4 pt-6 justify-between">
<div class="text-white flex size-12 shrink-0 items-center">
<span class="material-symbols-outlined cursor-pointer">close</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">Añadir Gasto</h2>
<div class="flex w-12 items-center justify-end">
<button class="text-primary font-bold text-base">
<span class="material-symbols-outlined">check</span>
</button>
</div>
</div>
<div class="flex-1 overflow-y-auto px-4 pb-10">
<div class="mt-6 flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="text-slate-400 text-sm font-medium ml-1">Descripción</label>
<div class="flex items-center gap-3 bg-surface-dark rounded-xl p-4 border border-white/10 focus-within:border-primary/50 transition-all">
<span class="material-symbols-outlined text-slate-400">description</span>
<input class="bg-transparent border-none p-0 focus:ring-0 text-white placeholder:text-slate-600 w-full text-base" placeholder="¿Qué has pagado?" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-400 text-sm font-medium ml-1">Importe</label>
<div class="flex items-center gap-3 bg-surface-dark rounded-xl p-4 border border-white/10 focus-within:border-primary/50 transition-all">
<span class="material-symbols-outlined text-primary font-bold">payments</span>
<div class="flex items-center gap-1">
<span class="text-2xl font-bold text-white">€</span>
<input class="bg-transparent border-none p-0 focus:ring-0 text-white placeholder:text-slate-600 w-full text-3xl font-bold" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
</div>
<div class="flex flex-col gap-2 mt-2">
<label class="text-slate-400 text-sm font-medium ml-1">Pagado por</label>
<div class="flex items-center justify-between bg-surface-dark rounded-xl p-4 border border-white/10 active:bg-white/5 transition-all">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold text-xs border border-primary/30">
                                YO
                            </div>
<span class="text-white font-medium">Tú</span>
</div>
<span class="material-symbols-outlined text-slate-500">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-4 mt-2">
<div class="flex items-center justify-between px-1">
<span class="text-white font-semibold">Dividir a partes iguales</span>
<div class="relative inline-flex items-center cursor-pointer">
<div class="w-12 h-6 bg-primary rounded-full"></div>
<div class="absolute right-[2px] top-[2px] bg-white rounded-full h-5 w-5 transition-all"></div>
</div>
</div>
<div class="grid grid-cols-4 gap-3">
<div class="flex flex-col items-center gap-2">
<div class="size-12 rounded-full border-2 border-primary bg-primary/10 flex items-center justify-center">
<span class="text-xs font-bold">Tú</span>
</div>
<span class="text-[10px] text-slate-400">Seleccionado</span>
</div>
<div class="flex flex-col items-center gap-2 opacity-60">
<div class="size-12 rounded-full border border-white/20 bg-surface-dark flex items-center justify-center">
<span class="text-xs font-bold text-slate-500">AT</span>
</div>
<span class="text-[10px] text-slate-500">Alex</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="size-12 rounded-full border-2 border-primary bg-primary/10 flex items-center justify-center">
<span class="text-xs font-bold">MJ</span>
</div>
<span class="text-[10px] text-slate-400">Maria</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="size-12 rounded-full border border-white/20 bg-surface-dark flex items-center justify-center">
<span class="material-symbols-outlined text-slate-500">add</span>
</div>
<span class="text-[10px] text-slate-500">Añadir</span>
</div>
</div>
</div>
<div class="flex items-center gap-3 mt-2 px-1">
<span class="material-symbols-outlined text-slate-500 text-xl">calendar_today</span>
<span class="text-slate-400 text-sm">Hoy, 24 Mayo 2024</span>
</div>
</div>
</div>
<div class="p-6 bg-background-dark/80 backdrop-blur-md border-t border-white/5">
<button class="w-full bg-primary hover:bg-primary/90 text-black font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 text-lg">
                Guardar Gasto
            </button>
</div>
<div class="h-8 flex items-end justify-center pb-2">
<div class="w-32 h-1.5 bg-white/20 rounded-full"></div>
</div>
</div>

</body></html>
