<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#25f4f4",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102222",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .glass-card {
            background: rgba(24, 52, 52, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(37, 244, 244, 0.3);
        }
        .glow-shadow {
            box-shadow: 0 0 20px rgba(37, 244, 244, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Main Container -->
<div class="relative flex h-full min-h-screen w-full max-w-[430px] flex-col bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden">
<!-- Top App Bar / Header -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-primary flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-3xl">close</span>
</div>
<h2 class="text-white text-sm font-bold leading-tight tracking-widest flex-1 text-center pr-12 uppercase opacity-60">SplitGasto® 2026</h2>
</div>
<!-- Slide Content -->
<div class="flex flex-col flex-1 px-6 pt-8 text-center">
<!-- Main Title -->
<h1 class="text-white tracking-tight text-[36px] font-bold leading-[1.1] mb-4">
                Nuestra Solución: <span class="text-primary">Inteligente e Inmersiva</span>
</h1>
<!-- Subtitle -->
<p class="text-primary/80 text-base font-normal leading-normal mb-8 px-4">
                Justicia a través de la transparencia y la tecnología
            </p>

<div class="relative flex justify-center items-center w-full my-4">

<div class="absolute w-64 h-64 bg-primary/10 rounded-full blur-[80px]"></div>

<div class="relative z-10 w-[240px] h-[480px] bg-[#081111] rounded-[3rem] border-[6px] border-[#1c3838] overflow-hidden shadow-2xl flex flex-col items-center">

<div class="w-full h-full bg-background-dark flex flex-col p-4 pt-10">
<div class="w-full h-4 bg-primary/20 rounded-full mb-6"></div>
<div class="grid grid-cols-2 gap-2 mb-6">
<div class="h-20 bg-primary/10 rounded-lg"></div>
<div class="h-20 bg-primary/10 rounded-lg"></div>
</div>
<!-- UI Wheel Representation -->
<div class="w-full aspect-square border-4 border-dashed border-primary/30 rounded-full flex items-center justify-center relative">
<div class="w-3/4 h-3/4 border-2 border-primary/40 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">autorenew</span>
</div>
<div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-4 bg-primary rounded-full shadow-[0_0_10px_#25f4f4]"></div>
</div>
<div class="mt-auto w-full h-12 bg-primary rounded-lg"></div>
</div>
</div>

<div class="absolute -left-4 top-1/4 z-20 w-[140px]">

<span class="material-symbols-outlined text-primary text-2xl">document_scanner</span>
</div>
<div class="flex flex-col">
<h3 class="text-white text-xs font-bold uppercase tracking-tight">Auto-Escaneo</h3>

</div>
</div>
</div>
<!-- Floating Feature 2: Right -->
<div class="absolute -right-4 bottom-1/4 z-20 w-[140px]">
<div class="glass-card p-3 rounded-xl glow-shadow flex flex-col gap-2 items-center text-center">
<div class="bg-primary/20 p-2 rounded-full">
<span class="material-symbols-outlined text-primary text-2xl">view_in_ar</span>
</div>
<div class="flex flex-col">
<h3 class="text-white text-xs font-bold uppercase tracking-tight">Ruleta 3D</h3>
<p class="text-primary text-[10px] font-medium">Experiencia Inmersiva</p>

</div>
</div>
</div>

<div class="mt-auto pb-10 pt-6">
<div class="flex flex-col gap-3">
<div class="flex items-center justify-center gap-2">
<div class="h-[1px] w-8 bg-primary/30"></div>
<span class="text-primary/60 text-[10px] uppercase font-bold tracking-[0.2em]">SplitGasto Ecosystem</span>
<div class="h-[1px] w-8 bg-primary/30"></div>
</div>
<div class="grid grid-cols-2 gap-4 px-4 mt-2">
<div class="flex flex-col items-center">
<span class="text-primary font-bold text-lg">99%</span>
<span class="text-white/40 text-[10px] uppercase">Precisión IA</span>
</div>
<div class="flex flex-col items-center">
<span class="text-primary font-bold text-lg">Instant</span>
<span class="text-white/40 text-[10px] uppercase">Sincronización</span>
</div>
</div>
</div>
</div>
</div>
<!-- Visual Decoration Background Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20 overflow-hidden">
<div class="absolute top-[-10%] right-[-20%] w-[300px] h-[300px] bg-primary rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-20%] w-[300px] h-[300px] bg-primary rounded-full blur-[120px]"></div>
</div>
</div>
</body></html>
