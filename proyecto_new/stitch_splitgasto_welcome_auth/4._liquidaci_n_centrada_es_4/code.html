<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "amoled": "#000000"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --neon-primary: #0dccf2;
        }
        body {
            font-family: "Space Grotesk", sans-serif;
            background-color: #000000;
        }
        .glass-button {
            background: linear-gradient(135deg, rgba(13, 204, 242, 0.4) 0%, rgba(13, 204, 242, 0.1) 100%);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(13, 204, 242, 0.5);
            box-shadow: 
                0 0 50px rgba(13, 204, 242, 0.4),
                inset 0 0 20px rgba(13, 204, 242, 0.3),
                0 15px 35px rgba(0, 0, 0, 0.5);
        }
        .glass-reflection {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
        }
        .main-canvas {
            width: 1920px;
            height: 1080px;
            background-color: #000000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="m-0 p-0 flex items-center justify-center overflow-hidden bg-black h-screen">
<div class="main-canvas relative flex flex-col items-center justify-between py-32 px-24">
<div class="z-20 text-center w-full max-w-5xl">
<h1 class="text-primary text-[110px] font-bold tracking-[0.1em] leading-tight uppercase">
                REEMBOLSO JUSTO
            </h1>
</div>
<div class="relative flex items-center justify-center">
<div class="absolute w-[800px] h-[800px] bg-primary/15 rounded-full blur-[150px]"></div>
<div class="glass-button relative w-[520px] h-[520px] rounded-full flex items-center justify-center overflow-hidden border-b-[12px] border-primary/60">
<div class="glass-reflection absolute top-4 left-1/2 -translate-x-1/2 w-4/5 h-1/3 rounded-full opacity-60"></div>
<span class="text-white text-[90px] font-bold tracking-widest drop-shadow-2xl z-10">
                    PAGAR
                </span>
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-transparent"></div>
</div>
</div>
<div class="z-20 text-center w-full max-w-5xl mb-12">
<p class="text-white text-[56px] font-light tracking-wide opacity-90">
                Paga con un solo clic
            </p>
<div class="mt-12 flex items-center justify-center gap-6 opacity-30">
<div class="h-[2px] w-48 bg-gradient-to-r from-transparent to-primary"></div>
<span class="material-symbols-outlined text-4xl text-primary">verified_user</span>
<div class="h-[2px] w-48 bg-gradient-to-l from-transparent to-primary"></div>
</div>
</div>
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-20 left-20 border-l-2 border-t-2 border-primary/10 w-32 h-32"></div>
<div class="absolute top-20 right-20 border-r-2 border-t-2 border-primary/10 w-32 h-32"></div>
<div class="absolute bottom-20 left-20 border-l-2 border-b-2 border-primary/10 w-32 h-32"></div>
<div class="absolute bottom-20 right-20 border-r-2 border-b-2 border-primary/10 w-32 h-32"></div>
</div>
</div>

</body></html>
