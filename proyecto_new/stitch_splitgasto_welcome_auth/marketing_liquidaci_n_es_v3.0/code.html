<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#f48c25",
              "background-light": "#f8f7f5",
              "background-dark": "#000000", // AMOLED Absolute Black
              "accent-neon": "#40E0D0",
              "deep-purple": "#6b21a8"

            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .premium-gradient {
        background: linear-gradient(135deg, #f48c25 0%, #6b21a8 100%);
      }
      .neon-glow {
        filter: drop-shadow(0 0 15px rgba(64, 224, 208, 0.6));
      }
      .button-shadow {
        box-shadow: 0 20px 50px rgba(244, 140, 37, 0.3);
      }
      .floating-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-dark font-display text-white selection:bg-primary/30 overflow-hidden">
<!-- Main Marketing Canvas (Simulating 1920x1080 Aspect Ratio) -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-between py-16 px-8 bg-background-dark overflow-hidden">
<!-- Header Section -->
<div class="z-20 w-full max-w-4xl text-center">
<h1 class="text-white tracking-tight text-[48px] md:text-[72px] font-extrabold leading-tight uppercase">
                LIQUIDA TUS DEUDAS
            </h1>
</div>
<!-- Central 3D Composition Section -->
<div class="relative flex items-center justify-center w-full h-full flex-grow">
<!-- Symmetrical Floating Bank Cards (Left) -->
<div class="absolute left-1/2 -translate-x-[350px] rotate-[-12deg] z-10 hidden md:block">
<div class="floating-card w-48 h-32 rounded-xl p-4 flex flex-col justify-between opacity-80">
<div class="flex justify-between items-start">
<div class="w-8 h-6 bg-white/20 rounded-md"></div>
<span class="material-symbols-outlined text-white/40">contactless</span>
</div>
<div class="space-y-1">
<div class="h-2 w-full bg-white/10 rounded"></div>
<div class="h-2 w-2/3 bg-white/10 rounded"></div>
</div>
</div>
</div>
<!-- Main Central Button Composition -->
<div class="relative z-20 group">
<!-- Outer Glow and Ring -->
<div class="absolute -inset-8 premium-gradient opacity-20 blur-3xl rounded-full"></div>
<!-- The 3D Pagar Button -->
<div class="relative flex items-center justify-center">
<button class="premium-gradient button-shadow w-64 h-64 rounded-full flex flex-col items-center justify-center transition-transform hover:scale-105 active:scale-95 border-b-8 border-black/20">
<span class="text-[32px] font-extrabold tracking-widest text-white mb-2">PAGAR</span>
<div class="w-12 h-1.5 bg-white/30 rounded-full"></div>
</button>
<!-- Neon Success Check (Floating near the button) -->
<div class="absolute -top-4 -right-4 w-20 h-20 bg-background-dark border-4 border-accent-neon rounded-full flex items-center justify-center neon-glow">
<span class="material-symbols-outlined text-accent-neon text-[40px] font-bold">check</span>
</div>
</div>
</div>
<!-- Symmetrical Floating Bank Cards (Right) -->
<div class="absolute left-1/2 translate-x-[150px] rotate-[15deg] z-10 hidden md:block">
<div class="floating-card w-48 h-32 rounded-xl p-4 flex flex-col justify-between opacity-80 translate-y-20">
<div class="flex justify-between items-start">
<div class="w-8 h-6 bg-white/20 rounded-md"></div>
<span class="material-symbols-outlined text-white/40">credit_card</span>
</div>
<div class="space-y-1">
<div class="h-2 w-full bg-white/10 rounded"></div>
<div class="h-2 w-1/2 bg-white/10 rounded"></div>
</div>
</div>
</div>
<!-- Abstract Background Shapes -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Footer Section -->
<div class="z-20 w-full max-w-4xl text-center">
<p class="text-white/80 text-[24px] md:text-[32px] font-medium leading-normal">
                Saldar cuentas ahora es rápido y seguro
            </p>
<!-- Store Metadata (Optional but adds to marketing aesthetic) -->
<div class="flex justify-center gap-6 mt-8 opacity-60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">shield</span>
<span class="text-sm uppercase tracking-widest">Encriptado SSL</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">speed</span>
<span class="text-sm uppercase tracking-widest">Liquidación Instantánea</span>
</div>
</div>
</div>
<!-- Grid Pattern Overlay for Texture -->
<div class="absolute inset-0 z-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 40px 40px;">
</div>
