<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitGasto - Notificación Informe Listo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2b90d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(34, 30, 16, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white overflow-hidden">
<!-- Smartphone Lock Screen Container -->
<div class="relative flex h-screen w-full flex-col items-center justify-start overflow-hidden pt-20 px-6">
<!-- Status Bar Mockup -->
<div class="absolute top-0 left-0 w-full flex justify-between items-center px-8 py-4 opacity-80">
<div class="text-sm font-bold">9:41</div>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-sm">signal_cellular_alt</span>
<span class="material-symbols-outlined text-sm">wifi</span>
<span class="material-symbols-outlined text-sm">battery_full</span>
</div>
</div>
<!-- Clock Mockup -->
<div class="flex flex-col items-center mt-10 mb-12 opacity-90">
<h1 class="text-7xl font-light tracking-tight">Martes</h1>
<h2 class="text-2xl font-medium -mt-2">23 de mayo</h2>
</div>
<!-- Notification Center Area -->
<div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- SplitGasto Notification Card -->
<div class="p-1">
<div class="glass-effect rounded-xl overflow-hidden shadow-2xl">
<div class="p-4 flex flex-col gap-3">
<!-- App Header -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="bg-primary flex size-6 items-center justify-center rounded-lg">
<span class="material-symbols-outlined text-background-dark text-xs font-bold">account_balance_wallet</span>
</div>
<p class="text-white/60 text-xs font-semibold tracking-wider uppercase">SPLITGASTO</p>
</div>
<p class="text-white/40 text-xs">ahora</p>
</div>
<!-- Content Layout -->
<div class="flex gap-4">
<div class="flex flex-1 flex-col gap-1.5">
<p class="text-white text-base font-bold leading-tight">📄 ¡Informe generado con éxito!</p>
<p class="text-[#cbbc90] text-sm font-normal leading-relaxed">
                                    Tu resumen de gastos de Mayo ya está listo para descargar y compartir.
                                </p>
</div>
<!-- Icon / Visual Indicator -->
<div class="flex size-14 shrink-0 items-center justify-center rounded-xl bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary text-3xl">analytics</span>
</div>
</div>
<!-- Action Button -->
<div class="mt-1 flex justify-end">
<button class="flex min-w-[100px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-9 px-4 bg-primary text-background-dark gap-2 text-sm font-bold transition-transform active:scale-95">
<span class="material-symbols-outlined text-[18px]">picture_as_pdf</span>
<span class="truncate">VER PDF</span>
</button>
</div>
</div>
</div>
</div>
<!-- Subtle Swipe Up Indicator (iOS style) -->
<div class="mt-8 flex justify-center opacity-30">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-xs">keyboard_double_arrow_up</span>
<p class="text-[10px] font-bold uppercase tracking-widest">Abrir para ver detalles</p>
</div>
</div>
</div>
<!-- Lock Screen Bottom Shortcuts -->
<div class="absolute bottom-12 w-full flex justify-between px-12 items-center">
<div class="size-12 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/10">
<span class="material-symbols-outlined text-white">flashlight_on</span>
</div>
<div class="size-12 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/10">
<span class="material-symbols-outlined text-white">photo_camera</span>
</div>
</div>
<!-- Home Indicator Bar -->
<div class="absolute bottom-2 w-32 h-1.5 bg-white/30 rounded-full"></div>
</div>
<!-- Background Decoration (Optional subtle glow) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10">
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[120%] h-[120%] bg-gradient-to-b from-primary/5 via-transparent to-transparent opacity-40"></div>
</div>
</body></html>
