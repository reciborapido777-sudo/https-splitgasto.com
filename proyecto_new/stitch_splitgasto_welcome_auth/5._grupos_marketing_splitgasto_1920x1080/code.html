<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // Pure AMOLED Black as requested
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Space Grotesk", sans-serif;
            background-color: #000000;
        }
        .glow-effect {
            box-shadow: 0 0 50px -10px rgba(13, 242, 223, 0.3);
        }
        .icon-gradient {
            background: linear-gradient(135deg, #0df2df 0%, #089185 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white overflow-hidden">
<!-- Marketing Screen Container (1920x1080 Aspect Ratio Simulation) -->
<div class="relative flex h-screen w-full flex-col items-center justify-center bg-background-dark overflow-hidden">
<!-- Background Ambient Glows -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-primary/10 rounded-full blur-[100px]"></div>
<!-- Headline Section -->
<div class="z-10 text-center mb-16">
<h1 class="text-white tracking-[0.15em] text-[64px] font-bold leading-tight uppercase">
                GRUPOS PARA <span class="text-primary">TODO</span>
</h1>
<div class="h-1.5 w-32 bg-primary mx-auto mt-4 rounded-full"></div>
</div>
<!-- 3D Icon Grid Simulation -->
<div class="z-10 flex items-center justify-center gap-16 px-10">
<!-- Icon 1: House (Home/Rent) -->
<div class="flex flex-col items-center group">
<div class="relative w-64 h-64 flex items-center justify-center bg-white/5 border border-white/10 rounded-xl glow-effect backdrop-blur-sm">
<span class="material-symbols-outlined !text-[120px] text-primary fill-1" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                        home
                    </span>
<div class="absolute -bottom-4 bg-primary text-black font-bold px-6 py-2 rounded-full text-xl shadow-lg shadow-primary/20">
                        CASA
                    </div>
</div>
</div>
<!-- Icon 2: Plane (Travel) -->
<div class="flex flex-col items-center group">
<div class="relative w-80 h-80 flex items-center justify-center bg-white/10 border border-primary/30 rounded-xl glow-effect backdrop-blur-sm scale-110">
<span class="material-symbols-outlined !text-[160px] text-primary fill-1" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                        flight_takeoff
                    </span>
<div class="absolute -bottom-5 bg-primary text-black font-bold px-8 py-3 rounded-full text-2xl shadow-xl shadow-primary/40">
                        VIAJES
                    </div>
<!-- Decorative accents -->
<div class="absolute -top-3 -right-3 w-12 h-12 border-t-4 border-r-4 border-primary rounded-tr-xl"></div>
</div>
</div>
<!-- Icon 3: Pizza (Leisure/Food) -->
<div class="flex flex-col items-center group">
<div class="relative w-64 h-64 flex items-center justify-center bg-white/5 border border-white/10 rounded-xl glow-effect backdrop-blur-sm">
<span class="material-symbols-outlined !text-[120px] text-primary fill-1" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                        local_pizza
                    </span>
<div class="absolute -bottom-4 bg-primary text-black font-bold px-6 py-2 rounded-full text-xl shadow-lg shadow-primary/20">
                        OCIO
                    </div>
</div>
</div>
</div>
<!-- Bottom Body Text -->
<div class="z-10 mt-24 max-w-2xl">
<p class="text-white/60 text-2xl font-normal leading-relaxed text-center tracking-wide">
                Organiza tus gastos compartidos por categorías con una interfaz vibrante y fácil de usar.
            </p>
</div>
<!-- Footer Branding/Accents -->
<div class="absolute bottom-12 flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-primary/30"></div>
<div class="w-2 h-2 rounded-full bg-primary/60"></div>
<div class="w-12 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary/60"></div>
<div class="w-2 h-2 rounded-full bg-primary/30"></div>
</div>
<!-- Image Previews for Context (Grid used as texture) -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none">
<div class="grid grid-cols-6 gap-8 p-10">
<div class="aspect-square bg-primary rounded-xl" data-alt="Abstract geometric pattern with turquoise highlights"></div>
<div class="aspect-square bg-white rounded-xl" data-alt="Abstract white minimalist pattern"></div>
<div class="aspect-square bg-primary rounded-xl" data-alt="Modern turquoise design element"></div>
<div class="aspect-square bg-white rounded-xl" data-alt="Abstract minimalist texture"></div>
<div class="aspect-square bg-primary rounded-xl" data-alt="Geometric shape in primary color"></div>
<div class="aspect-square bg-white rounded-xl" data-alt="Clean white architectural detail"></div>
<!-- Row 2 -->
<div class="aspect-square bg-white rounded-xl"></div>
<div class="aspect-square bg-primary rounded-xl"></div>
<div class="aspect-square bg-white rounded-xl"></div>
<div class="aspect-square bg-primary rounded-xl"></div>
<div class="aspect-square bg-white rounded-xl"></div>
<div class="aspect-square bg-primary rounded-xl"></div>
</div>
</div>
</div>
</body></html>
