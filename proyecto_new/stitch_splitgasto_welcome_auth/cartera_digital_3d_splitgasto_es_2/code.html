<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cartera Digital 3D SplitGasto ES</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ad2bee",
                        "background-light": "#f7f6f8",
                        "background-dark": "#000000", // Absolute AMOLED as requested
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #000000;
        }
        /* Custom Glossy/Glass effect for the card */
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(173, 43, 238, 0.3);
        }
        .card-texture-metal {
            background: linear-gradient(135deg, #ad2bee 0%, #f97316 100%);
            position: relative;
            overflow: hidden;
        }
        .card-texture-metal::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.2) 50%, transparent 55%);
            background-size: 200% 200%;
            pointer-events: none;
        }
        /* Glassmorphism for button */
        .glass-button {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-button:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.15);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white antialiased">
<!-- Main Container -->
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- TopAppBar -->
<div class="flex items-center p-6 pb-2 justify-between z-10">
<div class="text-white flex size-12 items-center cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold tracking-tight flex-1 text-center font-display uppercase tracking-widest">Mis Tarjetas</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex items-center justify-center rounded-xl h-12 bg-transparent text-white p-0">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</div>
</div>
<!-- 3D Environment Content -->
<div class="flex-1 flex flex-col justify-center relative">
<!-- Background Halo/Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-primary/20 blur-[100px] rounded-full"></div>
<!-- Carousel Section -->
<div class="flex overflow-x-auto hide-scrollbar snap-x snap-mandatory">
<div class="flex items-center px-8 gap-8 py-10">
<!-- Main 3D Styled Card (SplitGasto Metal) -->
<div class="snap-center shrink-0 w-[85vw] max-w-[340px] aspect-[1.586/1] card-texture-metal rounded-2xl p-6 flex flex-col justify-between shadow-2xl relative border border-white/20 transform rotate-1 perspective-1000">
<!-- Glass Border Effect -->
<div class="absolute inset-0 rounded-2xl border-[1px] border-white/30 pointer-events-none"></div>
<div class="flex justify-between items-start">
<div class="bg-black/20 p-2 rounded-lg backdrop-blur-md border border-white/10">
<!-- Logo 'S' Relieve Dorado -->
<div class="w-8 h-8 flex items-center justify-center font-bold text-2xl text-yellow-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">S</div>
</div>
<span class="text-xs font-bold tracking-[0.2em] uppercase opacity-80">SplitGasto Metal</span>
</div>
<div class="mt-auto">
<div class="flex flex-col gap-1">
<p class="text-lg font-medium tracking-[0.25em] drop-shadow-md">•••• •••• •••• 8829</p>
<div class="flex justify-between items-end mt-4">
<div class="flex flex-col">
<span class="text-[10px] uppercase opacity-60 font-bold">Titular</span>
<p class="text-sm font-medium tracking-wide">ALEX RIVERA</p>
</div>
<div class="flex flex-col text-right">
<span class="text-[10px] uppercase opacity-60 font-bold">Expira</span>
<p class="text-sm font-medium">12/28</p>
</div>
</div>
</div>
</div>
</div>
<!-- Mastercard Card -->
<div class="snap-center shrink-0 w-[85vw] max-w-[340px] aspect-[1.586/1] bg-gradient-to-br from-zinc-800 to-black rounded-2xl p-6 flex flex-col justify-between shadow-2xl relative border border-white/10 opacity-60 scale-95">
<div class="flex justify-between items-start">
<div class="w-10 h-6 flex relative">
<div class="w-6 h-6 rounded-full bg-red-600 opacity-90"></div>
<div class="w-6 h-6 rounded-full bg-orange-500 opacity-90 -ml-3"></div>
</div>
<span class="text-xs font-bold tracking-[0.2em] uppercase opacity-40">Gold Reserve</span>
</div>
<div class="mt-auto">
<p class="text-lg font-medium tracking-[0.25em] opacity-80">•••• •••• •••• 4431</p>
</div>
</div>
<!-- Visa Card -->
<div class="snap-center shrink-0 w-[85vw] max-w-[340px] aspect-[1.586/1] bg-gradient-to-br from-blue-900 to-indigo-950 rounded-2xl p-6 flex flex-col justify-between shadow-2xl relative border border-white/10 opacity-60 scale-95">
<div class="flex justify-between items-start">
<div class="italic font-black text-xl text-white">VISA</div>
<span class="text-xs font-bold tracking-[0.2em] uppercase opacity-40">Infinite</span>
</div>
<div class="mt-auto">
<p class="text-lg font-medium tracking-[0.25em] opacity-80">•••• •••• •••• 1092</p>
</div>
</div>
</div>
</div>
<!-- Page Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-4">
<div class="h-1.5 w-6 rounded-full bg-primary shadow-[0_0_10px_rgba(173,43,238,0.8)]"></div>
<div class="h-1.5 w-1.5 rounded-full bg-zinc-700"></div>
<div class="h-1.5 w-1.5 rounded-full bg-zinc-700"></div>
</div>
<!-- Stats Overlay -->
<div class="px-6 mt-4">
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1 rounded-2xl p-5 bg-white/5 border border-white/10">
<p class="text-zinc-400 text-xs font-medium uppercase tracking-wider">Saldo Disponible</p>
<p class="text-white text-xl font-bold font-display">2.450,00 €</p>
</div>
<div class="flex flex-col gap-1 rounded-2xl p-5 bg-white/5 border border-white/10">
<p class="text-zinc-400 text-xs font-medium uppercase tracking-wider">Gastos Mayo</p>
<p class="text-white text-xl font-bold font-display">840,50 €</p>
</div>
</div>
</div>
</div>
<!-- Floating Footer Action -->
<div class="p-6 pb-12">
<button class="glass-button w-full h-16 rounded-2xl flex items-center justify-center gap-3 text-white font-bold tracking-wide uppercase text-sm border border-white/20">
<span class="material-symbols-outlined text-primary">add_circle</span>
<span>Añadir nueva tarjeta</span>
</button>
<!-- Quick Actions -->
<div class="flex justify-around items-center mt-8">
<div class="flex flex-col items-center gap-2 opacity-60">
<div class="size-10 flex items-center justify-center rounded-full bg-zinc-900 border border-white/10">
<span class="material-symbols-outlined">payments</span>
</div>
<span class="text-[10px] uppercase font-bold tracking-tighter">Pagar</span>
</div>
<div class="flex flex-col items-center gap-2 opacity-100">
<div class="size-12 flex items-center justify-center rounded-full bg-primary border border-white/20 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">credit_card</span>
</div>
<span class="text-[10px] uppercase font-bold tracking-tighter text-primary">Tarjetas</span>
</div>
<div class="flex flex-col items-center gap-2 opacity-60">
<div class="size-10 flex items-center justify-center rounded-full bg-zinc-900 border border-white/10">
<span class="material-symbols-outlined">analytics</span>
</div>
<span class="text-[10px] uppercase font-bold tracking-tighter">Análisis</span>
</div>
</div>
</div>
</div>
</body></html>
