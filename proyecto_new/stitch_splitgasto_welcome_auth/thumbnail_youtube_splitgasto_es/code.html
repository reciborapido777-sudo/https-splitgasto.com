<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#7f19e6",
                "background-light": "#f7f6f8",
                "background-dark": "#000000", /* AMOLED Black */
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .glow-s {
            filter: drop-shadow(0 0 30px rgba(127, 25, 230, 0.6)) drop-shadow(0 0 60px rgba(255, 126, 0, 0.3));
        }
        .neon-glow-turquoise {
            filter: drop-shadow(0 0 15px rgba(64, 224, 208, 0.5));
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .floating-particles {
            background-image: radial-gradient(circle, white 1px, transparent 1px);
            background-size: 100px 100px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-dark font-display overflow-hidden antialiased">
<!-- Main Thumbnail Container (1280x720 aspect ratio simulated via container-queries / flex) -->
<div class="relative w-full h-screen max-h-[720px] aspect-[16/9] mx-auto overflow-hidden bg-background-dark flex items-center justify-center border-4 border-[#1a1122]">

<div class="absolute inset-0 z-0">
<div class="absolute top-1/2 left-1/4 -translate-y-1/2 w-[500px] h-[500px] bg-primary/20 rounded-full blur-[120px]"></div>
<div class="absolute top-1/2 right-1/4 -translate-y-1/2 w-[400px] h-[400px] bg-orange-500/10 rounded-full blur-[100px]"></div>
<div class="absolute inset-0 opacity-20 floating-particles"></div>
</div>
<!-- Layout Wrapper (Rule of Thirds) -->
<div class="relative z-10 w-full h-full grid grid-cols-12 gap-4 px-12 items-center">
<!-- Left Side: Large 3D S Logo -->
<div class="col-span-4 flex justify-center items-center">
<div class="glow-s transform -rotate-12 hover:rotate-0 transition-transform duration-700">

<div class="w-64 h-64 relative">
<div class="absolute inset-0 bg-gradient-to-tr from-orange-500 via-primary to-[#ff00ff] rounded-3xl opacity-90 flex items-center justify-center transform skew-x-3 skew-y-3 shadow-2xl">
<span class="text-[140px] font-black text-white drop-shadow-2xl">S</span>
</div>
<div class="absolute inset-0 border-4 border-white/20 rounded-3xl transform -translate-x-2 -translate-y-2"></div>
</div>
</div>
</div>
<!-- Center: Bold Typography -->
<div class="col-span-4 text-center flex flex-col items-center justify-center space-y-4">
<div class="bg-primary/20 px-4 py-1 rounded-full border border-primary/30 mb-2">
<span class="text-primary text-sm font-bold tracking-widest uppercase">SplitGasto 2026</span>
</div>
<h1 class="text-white text-6xl md:text-7xl font-black leading-[1.1] tracking-tighter drop-shadow-[0_5px_15px_rgba(0,0,0,0.8)]">
                    ¡FINANZAS<br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-primary">EN 3D!</span> 🚀
                </h1>
<p class="text-white/80 text-xl font-medium tracking-tight bg-black/40 backdrop-blur-sm px-4 py-2 rounded-lg border border-white/10">
                    La App que divide tus gastos con IA
                </p>
</div>
<!-- Right Side: 3D Elements (Roulette & Glass Receipt) -->
<div class="col-span-4 flex flex-col items-center space-y-8 relative">
<!-- 3D Roulette Component -->
<div class="relative w-48 h-48 group">
<div class="absolute inset-0 bg-gradient-to-b from-turquoise-400 to-blue-500 rounded-full opacity-20 blur-xl neon-glow-turquoise"></div>
<div class="w-full h-full glass-effect rounded-full border-2 border-turquoise-400/50 flex items-center justify-center relative overflow-hidden transform rotate-45 group-hover:rotate-[225deg] transition-transform duration-1000">
<div class="absolute w-full h-1 bg-white/20 top-1/2 -translate-y-1/2"></div>
<div class="absolute h-full w-1 bg-white/20 left-1/2 -translate-x-1/2"></div>
<span class="material-symbols-outlined text-turquoise-300 text-6xl">account_balance_wallet</span>
</div>
<div class="absolute -top-2 -right-2 bg-turquoise-500 text-black font-bold text-xs px-2 py-1 rounded-full shadow-lg">
                        MODO IA
                    </div>
</div>
<!-- 3D Glass Receipt -->
<div class="w-56 h-32 glass-effect rounded-xl border border-white/20 p-4 shadow-2xl transform -rotate-6 relative neon-glow-turquoise">
<div class="flex justify-between items-start mb-2">
<div class="w-8 h-8 rounded bg-white/10 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm">receipt_long</span>
</div>
<div class="text-right">
<div class="text-[10px] text-white/50">TOTAL</div>
<div class="text-lg font-bold text-white leading-none">€1.240,00</div>
</div>
</div>
<div class="space-y-2 mt-4">
<div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/3"></div>
</div>
<div class="flex justify-between text-[10px] text-white/70 font-semibold uppercase tracking-wider">
<span>Sincronizado</span>
<span class="text-turquoise-400">Escaneando...</span>
</div>
</div>
</div>
</div>
</div>
<!-- Premium Overlays -->
<div class="absolute inset-0 pointer-events-none z-20">
<!-- Vignette -->
<div class="absolute inset-0 shadow-[inset_0_0_150px_rgba(0,0,0,0.9)]"></div>
<!-- Bottom Brand Bar -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
</div>
<!-- Floating Particles (Repeat for depth) -->
<div class="absolute top-10 left-20 text-primary/30">
<span class="material-symbols-outlined text-4xl">blur_on</span>
</div>
<div class="absolute bottom-20 right-40 text-orange-500/20">
<span class="material-symbols-outlined text-2xl">colors_spark</span>
</div>
<div class="absolute top-1/4 right-1/4 text-turquoise-500/20">
<span class="material-symbols-outlined text-3xl">motion_blur</span>
</div>
</div>
<!-- Components List Usage (Hidden/Auxiliary for structure) -->
<div class="hidden">
<header class="relative flex h-auto min-h-screen w-full flex-col bg-background-dark dark group/design-root overflow-x-hidden font-display">

<div class="bg-cover bg-center flex flex-col justify-end overflow-hidden bg-background-dark @[480px]:rounded-lg min-h-80" data-alt="Abstract purple and orange gradient backdrop" style='background-image: linear-gradient(0deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0) 25%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuACkX1NRV39YddsjfXvzv4mUvOWilJ0DzySgNwrN6jGZUCfhjKdPkKkJwLBfRtvZRfk-CPEAgPtRC-pbHkFpV0ViGMQtivQDsNHs8u3IKYQdoVvFV63x8rSScGmVWs3pxfqPEzJd7F-VnC9s8AatW2RkRUUixm3HeD-1CJxQI7fUtVMKwrRghaLc68A5YB0huH-g2pbPZ5cjZ4GB2nKgNt8-e3k2fymMdtTP8SvBAALpXCDWRawVGgejg5K9yRWCAGqct1BTiD7hmjK");'>
</div>
</div>
</div>

</div>
