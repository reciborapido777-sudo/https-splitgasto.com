<!DOCTYPE html>

<html class="dark" lang="zh-Hans"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec13ec",
                        "background-light": "#f8f6f8",
                        "background-dark": "#000000", // AMOLED Black
                    },
                    fontFamily: {
                        "display": ["Manrope", "PingFang SC", "Microsoft YaHei", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .logo-gradient {
            background: linear-gradient(135deg, #ff8a00 0%, #ec13ec 100%);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-between px-6 py-12 overflow-x-hidden">
<!-- Top App Bar Space (Empty for minimalist look) -->
<div class="w-full flex justify-between items-center h-12">
<span class="material-symbols-outlined text-white/50 cursor-pointer">language</span>
<span class="text-white/50 text-sm font-medium">帮助</span>
</div>
<!-- Central Branding Section -->
<div class="flex flex-col items-center justify-center flex-grow w-full max-w-[480px]">
<!-- Logo Container -->
<div class="mb-12 relative">
<!-- Subtle glow effect behind logo -->
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full"></div>
<div class="relative w-28 h-28 logo-gradient rounded-[2.5rem] flex items-center justify-center shadow-2xl rotate-12">
<span class="text-white text-6xl font-extrabold -rotate-12 select-none">S</span>
</div>
</div>
<!-- Headline and Slogan -->
<div class="text-center space-y-4">
<h1 class="text-white tracking-tight text-5xl font-extrabold leading-tight">
                    SplitGasto
                </h1>
<p class="text-white/70 text-lg font-light leading-relaxed tracking-wide px-4">
                    简单、公平的账单分摊
                </p>
</div>
</div>
<!-- Action Buttons Section -->
<div class="w-full max-w-[480px] space-y-4 mt-8">
<div class="flex flex-col gap-4">
<!-- Primary Action -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-5 bg-primary text-white text-lg font-bold leading-normal tracking-wide w-full transition-transform active:scale-95 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined mr-2">mail</span>
<span class="truncate">通过邮箱继续</span>
</button>
<!-- Secondary Action -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-5 glass-button text-white text-lg font-bold leading-normal tracking-wide w-full transition-transform active:scale-95">
<div class="mr-2 h-6 w-6 flex items-center justify-center">
<svg class="h-5 w-5 fill-current" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</div>
<span class="truncate">通过Google继续</span>
</button>
</div>
<!-- Footer Links -->
<div class="pt-6 text-center">
<p class="text-white/40 text-xs font-normal leading-normal px-8">
                    继续使用即表示您同意我们的 
                    <a class="text-white/60 underline decoration-white/20" href="#">服务条款</a> 
                    和 
                    <a class="text-white/60 underline decoration-white/20" href="#">隐私政策</a>
</p>
</div>
</div>
<!-- Safe Area Spacer for iOS -->
<div class="h-8 bg-transparent"></div>
</div>
<!-- Decorative Elements (Abstract Background) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-20">
<div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] rounded-full bg-primary/30 blur-[100px]" data-alt="Abstract magenta circular gradient background"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[250px] h-[250px] rounded-full bg-orange-500/10 blur-[80px]" data-alt="Abstract orange circular gradient background"></div>
</div>
</body></html>
