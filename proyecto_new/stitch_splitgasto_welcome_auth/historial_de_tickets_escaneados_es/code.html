<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bóveda de Tickets - SplitGasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2df",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", // AMOLED mode as requested
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .amoled-gradient {
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-white/10">
<div class="flex items-center p-4 justify-between max-w-md mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary cursor-pointer">arrow_back_ios</span>
<h2 class="text-xl font-bold tracking-tight">Bóveda de Tickets</h2>
</div>
<div class="flex items-center gap-2">
<button class="size-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-white/10">
<span class="material-symbols-outlined text-primary">add_a_photo</span>
</button>
</div>
</div>
</header>
<main class="max-w-md mx-auto pb-24">
<!-- Search Bar -->
<div class="px-4 py-4">
<label class="flex flex-col w-full">
<div class="flex w-full items-stretch rounded-xl h-12 bg-slate-100 dark:bg-white/5 border border-transparent focus-within:border-primary/50 transition-all">
<div class="flex items-center justify-center pl-4">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500">search</span>
</div>
<input class="flex w-full bg-transparent border-none focus:ring-0 text-base placeholder:text-slate-500 dark:placeholder:text-slate-600 px-3" placeholder="Buscar por establecimiento o fecha" type="text"/>
</div>
</label>
</div>
<!-- Filter Chips -->
<div class="flex gap-2 px-4 overflow-x-auto no-scrollbar pb-2">
<button class="flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-primary px-4">
<span class="text-black text-sm font-bold">Todo</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-slate-100 dark:bg-white/10 px-4">
<span class="text-sm font-medium">Recientes</span>
<span class="material-symbols-outlined text-xs">expand_more</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-slate-100 dark:bg-white/10 px-4">
<span class="text-sm font-medium">Categoría</span>
<span class="material-symbols-outlined text-xs">expand_more</span>
</button>
</div>
<!-- Section: Today -->
<div class="mt-6 px-4">
<div class="flex justify-between items-end mb-4">
<h3 class="text-lg font-bold">Hoy</h3>
<span class="text-xs text-slate-500 font-medium">3 tickets</span>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Ticket Item 1 -->
<div class="group relative aspect-[3/4] rounded-xl overflow-hidden bg-slate-200 dark:bg-white/5 border border-white/5">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Close up of a grocery receipt from Starbucks" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC3iJ4USUG_3W2azv4WWoumwDT0cFcftLzOEOqJeoaqj5dr9LfRGe2Rnbyu8Wu44ev3lD9sz5aQiv_9OU7C94BMOVYSkP7VECk4LQWY1va7_7JuwYFYGd5hwBwc9O7YQO8tygu1Dugx98qAEaZh_tqjKrs_qBy2htqLeMN5xJl3CEksaQmxQU0IKB95Kv9kh0IyZbODG-odpnKOLBK_SLvTLA4XxZ3qwDQwj_uLajRJrzo_sZEFI0DkwWg-Ne-ceqgCaThtNRjrcmg3');"></div>
<div class="absolute inset-0 amoled-gradient"></div>
<!-- IA Status Tag -->
<div class="absolute top-2 right-2 size-6 bg-green-500 rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-[16px] font-bold">check</span>
</div>
<!-- Content Overlay -->
<div class="absolute bottom-3 left-3 right-3">
<div class="bg-primary px-2 py-1 rounded w-fit mb-1">
<span class="text-black text-xs font-black">$45.50</span>
</div>
<p class="text-white text-sm font-bold truncate">Starbucks Coffee</p>
<p class="text-slate-300 text-[10px] uppercase tracking-wider">Hace 2 horas</p>
</div>
</div>
<!-- Ticket Item 2 -->
<div class="group relative aspect-[3/4] rounded-xl overflow-hidden bg-slate-200 dark:bg-white/5 border border-white/5">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Paper receipt from a supermarket store" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC2vE7z1JOZBJtHCTAJUqhC5uw3JnTmm5bCMxE_yNzLkHmiPpjkIht9CUuZsm0sIoJvqTZm7K3e6DfblrUzhhtjggkP105T-jKv71FD4eUqZo6QMk-k-aOSshVOlnZlfvv2OClHTDbtGmLiEEHYJF1tlszU1sdg03Zi1iJ6jiVG244Lx1SMa8gMq6So8zjWVH4A5qmFcjYGq-1U5A5oHyiEd8Us9-_YO4KvLZTn5TEttUmviQwLLEfU90p3ui8GXXNPouwkBTVOJ0qo');"></div>
<div class="absolute inset-0 amoled-gradient"></div>
<div class="absolute top-2 right-2 size-6 bg-green-500 rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-[16px] font-bold">check</span>
</div>
<div class="absolute bottom-3 left-3 right-3">
<div class="bg-primary px-2 py-1 rounded w-fit mb-1">
<span class="text-black text-xs font-black">$128.00</span>
</div>
<p class="text-white text-sm font-bold truncate">Walmart Supercenter</p>
<p class="text-slate-300 text-[10px] uppercase tracking-wider">Hace 5 horas</p>
</div>
</div>
</div>
</div>
<!-- Section: Yesterday -->
<div class="mt-8 px-4">
<div class="flex justify-between items-end mb-4">
<h3 class="text-lg font-bold">Ayer</h3>
<span class="text-xs text-slate-500 font-medium">2 tickets</span>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Ticket Item 3 -->
<div class="group relative aspect-[3/4] rounded-xl overflow-hidden bg-slate-200 dark:bg-white/5 border border-white/5">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Restaurant dining receipt on a dark table" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCJeUwFHWXdpWm6_R1e-eueSYh6j17K-_afITq6Yk0A-cfcVMlXAY6wILINChTHC3QiMz8qWujItb-06wU90h_y8xHmZePxVZx-0kHU0C2l2wR38PpUwUrtIqWb9XJd3gqtzBno6p8VKuSl0i5-G5e6cKuCik2LZSyKi2LwASoGzFOpMMcM0rC_g-GSUmdLPfhT6N2D4I5RFMi0EnwNxxT-UjYYiVKUP24EOfaJgzBz7qW64NHb1kUSEPl60nd_9FGsEOx8ct7dmu1g');"></div>
<div class="absolute inset-0 amoled-gradient"></div>
<div class="absolute top-2 right-2 size-6 bg-green-500 rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-[16px] font-bold">check</span>
</div>
<div class="absolute bottom-3 left-3 right-3">
<div class="bg-primary px-2 py-1 rounded w-fit mb-1">
<span class="text-black text-xs font-black">$2,410.00</span>
</div>
<p class="text-white text-sm font-bold truncate">La Mar Restaurante</p>
<p class="text-slate-300 text-[10px] uppercase tracking-wider">14 Oct, 20:15</p>
</div>
</div>
<!-- Ticket Item 4 -->
<div class="group relative aspect-[3/4] rounded-xl overflow-hidden bg-slate-200 dark:bg-white/5 border border-white/5">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Receipt from a gas station or shop" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCc1ei0VmUb3_FgV6tlt52z69DjUZWz0Sd0Hu9sH_hKnTgg6u3wYwZXw-fWkQnmQybqHbIv7xz69W5rqfPo6miCZO4dAHnfpbravS4PMiQcxtGxkXSrh9Mm2x239R1MFo7dXWttT3hqViLQmEnZGX9EdEnN99ca9lYvA6LnLbZmEATwYuLEQXhQKmQynlF6oZHwAt4lvU-8WUaoCZPas3Pqq2jbBZTnS5P2NAnfIxkYIe23czWAkikqgChG-S8eeJqqeh9jPjYE3cnE');"></div>
<div class="absolute inset-0 amoled-gradient"></div>
<div class="absolute top-2 right-2 size-6 bg-green-500 rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-[16px] font-bold">check</span>
</div>
<div class="absolute bottom-3 left-3 right-3">
<div class="bg-primary px-2 py-1 rounded w-fit mb-1">
<span class="text-black text-xs font-black">$850.00</span>
</div>
<p class="text-white text-sm font-bold truncate">Shell Gas Station</p>
<p class="text-slate-300 text-[10px] uppercase tracking-wider">14 Oct, 09:30</p>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (iOS Style) -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-xl border-t border-slate-200 dark:border-white/10 pb-8 pt-2">
<div class="max-w-md mx-auto flex justify-around items-center">
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Inicio</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">receipt_long</span>
<span class="text-[10px] font-medium">Bóveda</span>
</button>
<button class="relative -top-6 size-14 bg-primary rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(13,242,223,0.3)]">
<span class="material-symbols-outlined text-black text-3xl">scan_delete</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined">group</span>
<span class="text-[10px] font-medium">Grupos</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Perfil</span>
</button>
</div>
</nav>
</body></html>
