<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#000000", // Adjusted to AMOLED black for the request
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .story-container {
            aspect-ratio: 9 / 16;
            max-height: 100vh;
            margin: 0 auto;
            position: relative;
        }
        .halo-glow {
            background: radial-gradient(circle, rgba(19, 236, 236, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
        }
        .metal-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(19, 236, 236, 0.1);
        }
        .logo-gradient {
            background: linear-gradient(135deg, #ff8c00 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<div class="story-container flex flex-col bg-background-dark text-white overflow-hidden">
<!-- Top App Bar - Modified for Story Style -->
<div class="flex items-center p-6 pt-12 justify-between z-10">
<div class="text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-3xl">close</span>
</div>
<h2 class="text-primary text-xl font-extrabold leading-tight tracking-[0.1em] flex-1 text-center drop-shadow-[0_0_10px_rgba(19,236,236,0.5)]">
                ¡ORGULLO FUNDADOR!
            </h2>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-full h-12 bg-transparent text-white">
<span class="material-symbols-outlined text-3xl">share</span>
</button>
</div>
</div>
<!-- Main Content Area with Halo -->
<div class="relative flex-1 flex flex-col items-center justify-center px-6">
<!-- Background Halo -->
<div class="absolute inset-0 halo-glow z-0"></div>
<!-- Founder's Card -->
<div class="metal-card w-full aspect-[1.58/1] rounded-xl p-8 flex flex-col justify-between relative z-10 overflow-hidden">
<!-- Subtle texture overlay -->
<div class="absolute inset-0 opacity-10 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/brushed-alum.png')]"></div>
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="text-primary font-bold tracking-widest text-xs uppercase mb-1">Status</span>
<div class="bg-primary/20 border border-primary/30 px-3 py-1 rounded-full">
<span class="text-primary font-bold text-sm">SOCIO FUNDADOR</span>
</div>
</div>
<div class="text-right">
<span class="text-white/40 font-bold text-xs uppercase block">Serial</span>
<span class="text-primary font-mono text-2xl font-bold tracking-tighter">#042</span>
</div>
</div>
<div class="flex items-center gap-4 mt-4">
<div class="size-16 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
<!-- Logo 'S' with orange-purple gradient -->
<span class="logo-gradient text-5xl font-black">S</span>
</div>
<div class="flex flex-col">
<h3 class="text-2xl font-bold text-white leading-none">ALEX RIVERA</h3>
<p class="text-white/50 text-sm mt-1">SplitGasto Premium Member</p>
</div>
</div>
<div class="flex justify-between items-end mt-4">
<div class="text-[10px] text-white/30 uppercase tracking-[0.2em] font-medium">
                        Since 2024 • Verified Identity
                    </div>
<div class="flex -space-x-2">
<div class="size-6 rounded-full bg-primary/20 border border-primary/50"></div>
<div class="size-6 rounded-full bg-white/10 border border-white/20"></div>
</div>
</div>
</div>
<!-- Motivational Text -->
<div class="mt-12 z-10">
<h2 class="text-white tracking-light text-[24px] font-bold leading-tight text-center px-4">
                    Soy uno de los primeros <span class="text-primary">1.000 socios</span> de SplitGasto®
                </h2>
</div>
</div>
<!-- Lower Section for Stickers & Interaction -->
<div class="p-6 pb-20 z-10 flex flex-col gap-4">
<!-- Placeholder for Instagram "Add Yours" or Link Sticker -->
<div class="w-full h-16 border-2 border-dashed border-white/20 rounded-2xl flex items-center justify-center bg-white/5">
<span class="text-white/40 font-medium text-sm">Espacio para sticker de mención</span>
</div>
<!-- Share Button Component -->
<div class="flex py-3">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 px-5 flex-1 bg-primary text-background-dark gap-3 text-base font-extrabold leading-normal tracking-wide shadow-[0_0_20px_rgba(19,236,236,0.4)]">
<span class="material-symbols-outlined">social_leaderboard</span>
<span class="truncate">COMPARTIR EN INSTAGRAM</span>
</button>
</div>
</div>
<!-- Decorative elements for luxury feel -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
</div>
</body></html>
