<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102222",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanning-beam {
            background: linear-gradient(to bottom, transparent, #0df2f2, transparent);
            height: 100px;
            width: 100%;
            position: absolute;
            top: 20%;
            opacity: 0.4;
        }
        .neon-border {
            box-shadow: 0 0 10px #0df2f2, inset 0 0 5px #0df2f2;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30">
<div class="relative flex h-screen w-full flex-col overflow-hidden bg-black">
<!-- Top App Bar -->
<div class="z-50 flex items-center bg-transparent p-6 justify-between w-full absolute top-0">
<button class="flex size-10 items-center justify-center rounded-full bg-black/40 backdrop-blur-md text-white border border-white/10">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
<div class="flex flex-col items-center">
<h2 class="text-white text-xs font-bold tracking-[0.2em] uppercase opacity-70">SplitGasto IA</h2>
<h2 class="text-primary text-lg font-bold leading-tight tracking-tight">Escáner v4.0</h2>
</div>
<button class="flex size-10 items-center justify-center rounded-full bg-black/40 backdrop-blur-md text-white border border-white/10">
<span class="material-symbols-outlined">history</span>
</button>
</div>
<!-- Camera Viewport / Main Container -->
<div class="relative flex-1 flex flex-col items-center justify-center overflow-hidden">
<!-- Simulated Camera Feed -->
<div class="absolute inset-0 z-0">
<img class="h-full w-full object-cover opacity-60 grayscale-[0.3]" data-alt="A retail receipt being held under bright lights for scanning" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmTN4ICvZGFK0tvuK4Vzr3xS8ILFA5f8lc9owgq8H2XTqSSc1e9CQs1IHqTeEwgObzEeN9olt2tc51MAUq7-Gxof2QwSRy1szJxucCbLh9cF7j0dsGVoJDjhydeAlrWokOm7bJMylMR4hLUhxP-UeWuenskZg7FzQDOTsibHb8uJrPBEsNHPVcDDDXyeHnQR1bId6h6tg-STSMkd83sC6IBSoGiXKS9-Jc8-eWKWu6YqNBeyuttxEda1nHpFNiEl3lprTwH41k8Yl5"/>
</div>
<!-- Scanning Beam Overlay -->
<div class="scanning-beam z-10"></div>
<!-- Viewfinder Brackets -->
<div class="relative z-20 w-72 h-[450px] border-2 border-white/10 rounded-2xl">
<!-- Corner Brackets -->
<div class="absolute -top-1 -left-1 size-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute -top-1 -right-1 size-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute -bottom-1 -left-1 size-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute -bottom-1 -right-1 size-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<!-- AI Detection Overlays -->
<!-- Merchant detection -->
<div class="absolute top-12 left-6 right-6 border border-primary/60 bg-primary/10 rounded-md p-1 neon-border">
<div class="absolute -top-5 left-0 text-[10px] font-bold text-primary uppercase tracking-widest bg-black px-1.5 py-0.5 rounded">Comercio</div>
<div class="h-6 w-full bg-primary/20 animate-pulse"></div>
</div>
<!-- Date detection -->
<div class="absolute top-28 left-6 w-32 border border-primary/60 bg-primary/10 rounded-md p-1 neon-border">
<div class="absolute -top-5 left-0 text-[10px] font-bold text-primary uppercase tracking-widest bg-black px-1.5 py-0.5 rounded">Fecha</div>
<div class="h-4 w-full bg-primary/20"></div>
</div>
<!-- Total detection -->
<div class="absolute bottom-12 right-6 w-40 border-2 border-primary bg-primary/20 rounded-lg p-2 neon-border">
<div class="absolute -top-6 right-0 text-[12px] font-black text-primary uppercase tracking-widest bg-black px-2 py-0.5 rounded border border-primary/30">Total Detectado</div>
<div class="h-8 w-full flex items-center justify-end">
<span class="text-xl font-bold text-white tracking-tight">€ --,--</span>
</div>
</div>
</div>
<!-- Status Text -->
<div class="z-30 mt-8 flex flex-col items-center gap-2">
<div class="flex items-center gap-2">
<div class="size-2 rounded-full bg-primary animate-ping"></div>
<h3 class="text-white tracking-wide text-xl font-medium leading-tight px-4 text-center">Detectando importes...</h3>
</div>
<p class="text-white/50 text-xs font-light tracking-wider">MANTÉN EL TICKET DENTRO DEL MARCO</p>
</div>
</div>
<!-- Camera Controls -->
<div class="relative z-40 bg-black/80 backdrop-blur-xl px-8 pt-8 pb-12">
<div class="flex items-center justify-between gap-6 max-w-sm mx-auto">
<button class="flex flex-col items-center gap-1 group">
<div class="flex shrink-0 items-center justify-center rounded-full size-12 bg-white/5 text-white border border-white/10 group-active:scale-95 transition-transform">
<span class="material-symbols-outlined">image</span>
</div>
<span class="text-[10px] uppercase font-bold tracking-tighter opacity-50">Galería</span>
</button>
<div class="relative flex items-center justify-center">
<!-- Outer glow for shutter -->
<div class="absolute size-24 bg-primary/20 rounded-full blur-xl"></div>
<button class="relative flex shrink-0 items-center justify-center rounded-full size-20 border-4 border-white bg-transparent p-1 transition-all hover:scale-105 active:scale-90">
<div class="size-full bg-white rounded-full"></div>
</button>
</div>
<button class="flex flex-col items-center gap-1 group">
<div class="flex shrink-0 items-center justify-center rounded-full size-12 bg-white/5 text-white border border-white/10 group-active:scale-95 transition-transform">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<span class="text-[10px] uppercase font-bold tracking-tighter opacity-50">Auto-Fill</span>
</button>
</div>
</div>
<!-- Navigation Bar -->
<div class="z-50 flex gap-2 border-t border-white/5 bg-black/95 px-6 pb-8 pt-4">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-[28px] !fill-1">photo_camera</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Escáner</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-white/40" href="#">
<span class="material-symbols-outlined text-[28px]">receipt_long</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Gastos</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-white/40" href="#">
<span class="material-symbols-outlined text-[28px]">group</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Grupos</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-white/40" href="#">
<span class="material-symbols-outlined text-[28px]">settings</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Ajustes</span>
</a>
</div>
</div>
</body></html>
