<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#000000", /* AMOLED Black */
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(24, 52, 52, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(144, 203, 203, 0.1);
        }
        .ai-gradient-icon {
            background: linear-gradient(135deg, #f97316 0%, #a855f7 100%);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-dark text-white selection:bg-primary/30">
<!-- iOS Simulation Wrapper -->
<div class="relative flex h-screen w-full flex-col items-center justify-start overflow-hidden bg-background-dark">
<!-- TopAppBar (iOS Status Bar) -->
<div class="flex w-full items-center px-8 pt-4 pb-2 justify-between">
<div class="text-white flex items-center gap-1.5" style="font-size: 14px;">
<span class="material-symbols-outlined !text-[20px]">signal_cellular_alt</span>
<span class="font-medium">Red</span>
<span class="material-symbols-outlined !text-[18px]">wifi</span>
</div>
<h2 class="text-white text-[17px] font-semibold leading-tight tracking-tight">12:45</h2>
<div class="flex items-center gap-1.5" style="font-size: 14px;">
<span class="font-medium">100%</span>
<span class="material-symbols-outlined !text-[24px]">battery_full</span>
</div>
</div>
<!-- Lock Screen Date/Clock -->
<div class="mt-12 flex flex-col items-center gap-1">
<p class="text-[#90cbcb] text-xl font-medium">miércoles, 24 de mayo</p>
<h1 class="text-8xl font-bold tracking-tight text-white/90">12:45</h1>
</div>
<!-- Notification Center -->
<div class="mt-20 w-full max-w-md px-4 @container">
<!-- Push Notification Card -->
<div class="glass-effect flex flex-col items-stretch justify-start rounded-xl p-4 shadow-2xl">
<!-- Header -->
<div class="flex items-center justify-between mb-3">
<div class="flex items-center gap-2">
<div class="flex h-7 w-7 items-center justify-center rounded-lg bg-primary text-[#102323]">
<span class="material-symbols-outlined !text-[18px]">receipt_long</span>
</div>
<span class="text-xs font-bold tracking-[0.1em] text-[#90cbcb] uppercase">SplitGasto • ahora</span>
</div>
<span class="material-symbols-outlined text-white/40 !text-[18px]">expand_more</span>
</div>
<!-- Content Area -->
<div class="flex gap-4">
<!-- Tech Brain Icon -->
<div class="ai-gradient-icon flex h-14 w-14 shrink-0 items-center justify-center rounded-xl text-white">
<span class="material-symbols-outlined !text-[32px]">psychology</span>
</div>
<div class="flex flex-col gap-1">
<p class="text-white text-lg font-bold leading-tight tracking-tight">🤖 ¡Análisis Completado!</p>
<p class="text-[#90cbcb] text-sm font-normal leading-relaxed">
                            Hemos procesado tu ticket de <span class="text-white font-semibold">Restaurante La Paz (42,50€)</span>. Ya puedes repartir el gasto entre tus amigos.
                        </p>
</div>
</div>
<!-- Action Button -->
<div class="mt-4 flex justify-end">
<button class="flex min-w-[140px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-5 bg-primary text-[#102222] gap-2 text-sm font-bold shadow-[0_0_15px_rgba(13,242,242,0.3)] transition-transform active:scale-95">
<span class="truncate">VER RESULTADOS</span>
<span class="material-symbols-outlined !text-[18px]">chevron_right</span>
</button>
</div>
</div>
<!-- Stacked Shadow Effect for Notification Depth -->
<div class="mx-4 h-1 rounded-b-xl bg-white/5 backdrop-blur-sm"></div>
</div>
<!-- Bottom Controls -->
<div class="absolute bottom-12 w-full flex justify-between px-12">
<div class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 backdrop-blur-md">
<span class="material-symbols-outlined text-white">flashlight_on</span>
</div>
<div class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 backdrop-blur-md">
<span class="material-symbols-outlined text-white">photo_camera</span>
</div>
</div>
<!-- Swipe Indicator -->
<div class="absolute bottom-3 px-4 py-3 w-full flex flex-col items-center">
<div class="h-1 w-32 rounded-full bg-white/30 mb-4"></div>
<button class="flex items-center justify-center bg-transparent text-white/60 gap-2 text-sm font-medium tracking-wide">
<span class="material-symbols-outlined !text-[20px]">lock_open</span>
<span class="truncate">Desliza para abrir</span>
</button>
</div>
<!-- Abstract Tech Background (Visible in dark mode highlights) -->
<div class="absolute -z-10 top-0 left-0 w-full h-full opacity-20 pointer-events-none">
<div class="absolute top-1/4 right-0 w-96 h-96 bg-primary/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 left-0 w-96 h-96 bg-purple-600/10 rounded-full blur-[120px]"></div>
</div>
</div>
</body></html>
