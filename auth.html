<!DOCTYPE html>
<html lang="es" style="background-color:#000">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Acceso Alpha | SplitGasto 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#13ecd6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SplitGasto">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="engine/global.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@700;900&display=swap');
        html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;margin:0;padding:0;overscroll-behavior:none}
        .auth-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px 20px;color:#fff;font-size:14px;font-weight:600;outline:none;transition:all .3s;box-sizing:border-box}
        .auth-input:focus{border-color:rgba(19,236,214,.4);background:rgba(19,236,214,.04);box-shadow:0 0 0 3px rgba(19,236,214,.1)}
        .auth-input::placeholder{color:#4a4a4a;font-weight:400}
        .auth-btn{width:100%;background:linear-gradient(135deg,#13ecd6,#10b981);border:none;border-radius:16px;padding:18px;color:#000;font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;cursor:pointer;transition:all .3s;outline:none}
        .auth-btn:active{transform:scale(.98)}
        .auth-btn:hover{box-shadow:0 0 30px rgba(19,236,214,.4)}
        .glass-card{background:rgba(255,255,255,.02);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:32px}
        .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
        label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.25em;color:#4a4a4a;display:block;margin-bottom:8px}
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center px-4 py-8 relative overflow-hidden">

    <!-- Ambient orbs -->
    <div class="orb" style="width:300px;height:300px;top:-80px;right:-80px;background:rgba(19,236,214,.08)"></div>
    <div class="orb" style="width:200px;height:200px;bottom:20%;left:-60px;background:rgba(168,85,247,.06)"></div>

    <div class="w-full max-w-sm relative z-10 space-y-6">

        <!-- Back button -->
        <button onclick="SGRouter.back()" class="flex items-center gap-2 text-zinc-500 hover:text-zinc-300 transition-colors active:scale-95">
            <span class="material-icons-round text-lg">arrow_back_ios</span>
            <span class="text-[10px] font-black uppercase tracking-widest">Volver</span>
        </button>

        <!-- Logo + title -->
        <div class="text-center space-y-3">
            <div class="inline-flex size-16 rounded-2xl bg-gradient-to-br from-[#13ecd6]/20 to-[#10b981]/10 border border-[#13ecd6]/20 items-center justify-center mx-auto">
                <span class="material-icons-round text-[#13ecd6] text-3xl">fingerprint</span>
            </div>
            <div>
                <p class="text-[9px] font-black text-zinc-600 uppercase tracking-[.4em] mb-1">Plataforma Alpha 2026</p>
                <h1 class="text-2xl font-black font-['Space_Grotesk'] italic uppercase tracking-tighter">Acceso Fundador</h1>
            </div>
        </div>

        <!-- Form card -->
        <div class="glass-card p-6 space-y-5">
            <div>
                <label for="email">ID de Socio / Email</label>
                <input id="email" type="email" class="auth-input" placeholder="tu@email.com" autocomplete="email" inputmode="email">
            </div>
            <div>
                <label for="password">Código Alpha</label>
                <div class="relative">
                    <input id="password" type="password" class="auth-input" placeholder="••••••••" autocomplete="current-password">
                    <button type="button" onclick="togglePwd()" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-600 hover:text-zinc-400 transition-colors">
                        <span class="material-icons-round text-lg" id="eye-icon">visibility</span>
                    </button>
                </div>
            </div>

            <!-- Forgot -->
            <div class="text-right -mt-2">
                <button class="text-[10px] text-zinc-500 hover:text-[#13ecd6] transition-colors font-bold uppercase tracking-wider">
                    Olvidé mi código
                </button>
            </div>

            <button class="auth-btn" onclick="doLogin()">
                Sincronizar Nodo
            </button>
        </div>

        <!-- Social divider -->
        <div class="flex items-center gap-3">
            <div class="flex-1 h-px bg-white/5"></div>
            <span class="text-[9px] text-zinc-600 uppercase tracking-widest font-bold">o continúa con</span>
            <div class="flex-1 h-px bg-white/5"></div>
        </div>

        <!-- Social buttons -->
        <div class="grid grid-cols-2 gap-3">
            <button class="flex items-center justify-center gap-2 py-3 rounded-2xl bg-white/4 border border-white/8 hover:bg-white/8 transition-all active:scale-95 text-sm font-bold text-zinc-300">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </button>
            <button class="flex items-center justify-center gap-2 py-3 rounded-2xl bg-white/4 border border-white/8 hover:bg-white/8 transition-all active:scale-95 text-sm font-bold text-zinc-300">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                Apple
            </button>
        </div>

        <!-- Register link -->
        <p class="text-center text-[11px] text-zinc-500">
            ¿Aún no eres socio?
            <button onclick="SGRouter.navigate('register','auth')" class="text-[#13ecd6] font-black hover:underline ml-1">
                Únete gratis →
            </button>
        </p>
    </div>

    <script src="engine/router.js"></script>
    <script>
        function togglePwd() {
            const inp = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            icon.textContent = inp.type === 'password' ? 'visibility' : 'visibility_off';
        }
        function doLogin() {
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('password').value;
            if (!email || !pwd) {
                SGRouter.showToast('Completa todos los campos', 'error');
                return;
            }
            SGRouter.showToast('Sincronizando nodo...', 'info');
            setTimeout(() => SGRouter.navigate('dashboard', 'auth'), 1000);
        }
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).catch(() => {});
            });
        }
    </script>
</body>
</html>
